resources:
  jobs:
    wiki_rag_ingestion:
      name: "wiki-rag-ingestion-${bundle.target}"
      description: >
        Incremental ingestion pipeline: reads new pages from MediaWiki (via Lakebase),
        cleans wikitext, chunks, generates embeddings, and writes to wiki_rag schema.
        Skips gracefully when there are no new pages.

      # Run every hour to pick up new wiki edits
      schedule:
        quartz_cron_expression: "0 0 * * * ?"
        timezone_id: America/Sao_Paulo
        pause_status: PAUSED  # Unpause after initial setup is done

      tasks:
        - task_key: ingest_and_embed
          notebook_task:
            notebook_path: ../notebooks/01_ingest_mediawiki.py
            source: WORKSPACE

      max_concurrent_runs: 1
