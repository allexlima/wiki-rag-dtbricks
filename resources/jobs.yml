resources:
  jobs:
    # --- One-time setup: Lakebase instance + DDL ---
    setup_lakebase:
      name: "wiki-rag-setup-lakebase-${bundle.target}"
      description: >
        One-time: provision Lakebase instance, create database, PG role,
        secret scope entries, schema, tables, and indexes.
      tasks:
        - task_key: setup
          notebook_task:
            notebook_path: ../notebooks/00_setup_lakebase.py
            base_parameters:
              instance_name: ${var.lakebase_instance_name}
              db_name: ${var.db_name}
              secret_scope: ${var.secret_scope}
            source: WORKSPACE
      max_concurrent_runs: 1

    # --- Model deployment: log, register, deploy endpoint ---
    deploy_agent:
      name: "wiki-rag-deploy-agent-${bundle.target}"
      description: >
        Log WikiRAGAgent to MLflow, register in Unity Catalog
        (serverless optimized), create or update the model serving endpoint.
      tasks:
        - task_key: deploy
          environment_key: serverless
          notebook_task:
            notebook_path: ../notebooks/01_deploy_serving.py
            base_parameters:
              model_name: ${var.model_name}
              endpoint_name: ${var.endpoint_name}
              embedding_model: ${var.embedding_model}
              llm_model: ${var.llm_model}
              secret_scope: ${var.secret_scope}
              lakebase_instance_name: ${var.lakebase_instance_name}
            source: WORKSPACE
      environments:
        - environment_key: serverless
          spec:
            environment_version: "3"
      max_concurrent_runs: 1

    # --- Recurring ingestion pipeline ---
    wiki_rag_ingestion:
      name: "wiki-rag-ingestion-${bundle.target}"
      description: >
        Incremental ingestion pipeline: reads new pages from MediaWiki (via Lakebase),
        cleans wikitext, extracts images, chunks, generates embeddings, and writes
        to wiki_rag schema. Skips gracefully when there are no new pages.
      schedule:
        quartz_cron_expression: "0 0 * * * ?"
        timezone_id: America/Sao_Paulo
        pause_status: PAUSED
      tasks:
        - task_key: ingest_and_embed
          notebook_task:
            notebook_path: ../notebooks/02_ingest_mediawiki.py
            base_parameters:
              secret_scope: ${var.secret_scope}
              embedding_model: ${var.embedding_model}
              llm_model: ${var.llm_model}
              mediawiki_url: ${var.mediawiki_url}
            source: WORKSPACE
      max_concurrent_runs: 1
