# Databricks App — Streamlit chat UI for the Wiki RAG agent.
# The app reads SERVING_ENDPOINT_NAME from app.yaml (plain value)
# and queries it via WorkspaceClient() — no resource binding needed.

resources:
  apps:
    wiki_rag_app:
      name: ${var.app_name}
      source_code_path: ../app
      description: "Wiki RAG Chat UI"
