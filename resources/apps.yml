# Databricks App — Streamlit chat UI for the Wiki RAG agent.

resources:
  apps:
    wiki_rag_app:
      name: ${var.app_name}
      source_code_path: ../app
      description: "Wiki RAG Chat UI"

      resources:
        - name: wiki-rag-serving
          serving_endpoint:
            name: ${var.endpoint_name}
            permission: CAN_QUERY
