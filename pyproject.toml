[tool.pytest.ini_options]
testpaths = ["tests"]
markers = [
    "integration: requires live Databricks/Lakebase (deselect with -m 'not integration')",
]

[tool.coverage.run]
source = ["src"]
omit = []

[tool.coverage.report]
fail_under = 80
show_missing = true
exclude_lines = [
    "pragma: no cover",
    "if __name__ == .__main__.",
    "pass",
]
