bundle:
  name: wiki-rag-dtbricks
  databricks_cli_version: ">=0.236.0"

variables:
  lakebase_instance_name:
    description: "Lakebase PostgreSQL instance name"
    default: wiki-rag-lakebase
  endpoint_name:
    description: "Model serving endpoint name"
    default: wiki-rag-endpoint
  app_name:
    description: "Databricks App name"
    default: wiki-rag-app
  model_name:
    description: "Unity Catalog model name (catalog.schema.name)"
    default: ${var.catalog}.${var.schema}.wiki_rag_agent
  secret_scope:
    description: "Databricks secret scope for Lakebase credentials"
    default: wiki-rag
  catalog:
    description: "Unity Catalog name"
    default: allex_workspace_catalog
  schema:
    description: "Schema name for RAG tables"
    default: wiki_rag
  db_name:
    description: "Lakebase database name"
    default: wikidb
  embedding_model:
    description: "Foundation Model API embedding endpoint"
    default: databricks-qwen3-embedding-0-6b
  llm_model:
    description: "Foundation Model API LLM endpoint"
    default: databricks-claude-sonnet-4-6

include:
  - resources/*.yml

targets:
  dev:
    mode: development
    default: true
  prod:
    mode: production
