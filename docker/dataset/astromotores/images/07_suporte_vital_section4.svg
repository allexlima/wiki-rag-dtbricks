<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="800" height="600" viewBox="0 0 800 600">
  <defs>
    <marker id="ptr" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#333" />
    </marker>
    <style>
      text { font-family: 'Segoe UI', Arial, sans-serif; fill: #333; }
      .title { font-size: 18px; font-weight: bold; }
      .subtitle { font-size: 12px; font-style: italic; }
      .label { font-size: 12px; font-weight: bold; }
      .detail { font-size: 10px; }
      .partno { font-size: 10px; font-style: italic; }
      .num { font-size: 14px; font-weight: bold; }
      .outline { fill: #f0f4f8; stroke: #333; stroke-width: 2; }
      .component { fill: #f0f4f8; stroke: #333; stroke-width: 1.5; }
      .leader { stroke: #333; stroke-width: 1; marker-end: url(#ptr); }
    </style>
  </defs>

  <rect width="800" height="600" fill="#ffffff" />

  <!-- Title -->
  <text x="400" y="30" text-anchor="middle" class="title">Vista Explodida — Módulo de Suporte Vital</text>
  <text x="400" y="48" text-anchor="middle" class="subtitle">Sequência de montagem — de cima para baixo</text>

  <!-- ① Tampa de Acesso -->
  <rect x="250" y="70" width="300" height="40" class="component" rx="3" />
  <rect x="270" y="75" width="20" height="30" fill="#ddd" stroke="#333" stroke-width="1" rx="2" />
  <rect x="510" y="75" width="20" height="30" fill="#ddd" stroke="#333" stroke-width="1" rx="2" />
  <line x1="290" y1="90" x2="510" y2="90" stroke="#333" stroke-width="0.5" stroke-dasharray="4,3" />
  <!-- Screw details -->
  <circle cx="290" cy="80" r="4" fill="#ccc" stroke="#333" stroke-width="1" />
  <circle cx="350" cy="80" r="4" fill="#ccc" stroke="#333" stroke-width="1" />
  <circle cx="450" cy="80" r="4" fill="#ccc" stroke="#333" stroke-width="1" />
  <circle cx="510" cy="80" r="4" fill="#ccc" stroke="#333" stroke-width="1" />
  <!-- Label -->
  <circle cx="210" cy="90" r="12" fill="#fff" stroke="#333" stroke-width="1.5" />
  <text x="210" y="95" text-anchor="middle" class="num">1</text>
  <line x1="222" y1="90" x2="248" y2="90" class="leader" />
  <text x="600" y="82" class="label">Tampa de Acesso</text>
  <text x="600" y="96" class="detail">4x parafusos Phillips M8 | 22 N·m</text>

  <!-- Spacing lines (exploded) -->
  <line x1="350" y1="110" x2="350" y2="140" stroke="#333" stroke-width="0.5" stroke-dasharray="2,4" />
  <line x1="450" y1="110" x2="450" y2="140" stroke="#333" stroke-width="0.5" stroke-dasharray="2,4" />

  <!-- ② Cartucho de Filtro CO₂ -->
  <rect x="280" y="145" width="240" height="70" class="component" rx="10" />
  <!-- Internal hatching to show filter media -->
  <line x1="295" y1="155" x2="295" y2="205" stroke="#bbb" stroke-width="0.5" />
  <line x1="310" y1="155" x2="310" y2="205" stroke="#bbb" stroke-width="0.5" />
  <line x1="325" y1="155" x2="325" y2="205" stroke="#bbb" stroke-width="0.5" />
  <line x1="340" y1="155" x2="340" y2="205" stroke="#bbb" stroke-width="0.5" />
  <line x1="355" y1="155" x2="355" y2="205" stroke="#bbb" stroke-width="0.5" />
  <line x1="370" y1="155" x2="370" y2="205" stroke="#bbb" stroke-width="0.5" />
  <line x1="385" y1="155" x2="385" y2="205" stroke="#bbb" stroke-width="0.5" />
  <line x1="400" y1="155" x2="400" y2="205" stroke="#bbb" stroke-width="0.5" />
  <line x1="415" y1="155" x2="415" y2="205" stroke="#bbb" stroke-width="0.5" />
  <line x1="430" y1="155" x2="430" y2="205" stroke="#bbb" stroke-width="0.5" />
  <line x1="445" y1="155" x2="445" y2="205" stroke="#bbb" stroke-width="0.5" />
  <line x1="460" y1="155" x2="460" y2="205" stroke="#bbb" stroke-width="0.5" />
  <line x1="475" y1="155" x2="475" y2="205" stroke="#bbb" stroke-width="0.5" />
  <line x1="490" y1="155" x2="490" y2="205" stroke="#bbb" stroke-width="0.5" />
  <line x1="505" y1="155" x2="505" y2="205" stroke="#bbb" stroke-width="0.5" />
  <!-- Flow arrow -->
  <text x="400" y="185" text-anchor="middle" class="detail">→ FLUXO →</text>
  <!-- Label -->
  <circle cx="210" cy="180" r="12" fill="#fff" stroke="#333" stroke-width="1.5" />
  <text x="210" y="185" text-anchor="middle" class="num">2</text>
  <line x1="222" y1="180" x2="278" y2="180" class="leader" />
  <text x="570" y="170" class="label">Cartucho de Filtro CO₂</text>
  <text x="570" y="184" class="partno">NE-LSS-7710 | 3,2 kg</text>
  <text x="570" y="198" class="detail">Anéis vedação: NE-LSS-7712 (x2)</text>

  <!-- Spacing -->
  <line x1="350" y1="215" x2="350" y2="245" stroke="#333" stroke-width="0.5" stroke-dasharray="2,4" />
  <line x1="450" y1="215" x2="450" y2="245" stroke="#333" stroke-width="0.5" stroke-dasharray="2,4" />

  <!-- ③ Módulo Gerador O₂ -->
  <rect x="300" y="250" width="200" height="65" class="component" rx="5" />
  <!-- PEM membrane representation -->
  <rect x="320" y="260" width="160" height="45" fill="#e8ecf0" stroke="#333" stroke-width="1" rx="3" />
  <text x="400" y="280" text-anchor="middle" class="detail">Membrana PEM</text>
  <text x="400" y="295" text-anchor="middle" class="detail">H₂O → H₂ + O₂</text>
  <!-- Connectors -->
  <rect x="295" y="268" width="10" height="20" fill="#ddd" stroke="#333" stroke-width="1" />
  <rect x="495" y="268" width="10" height="20" fill="#ddd" stroke="#333" stroke-width="1" />
  <!-- Label -->
  <circle cx="210" cy="282" r="12" fill="#fff" stroke="#333" stroke-width="1.5" />
  <text x="210" y="287" text-anchor="middle" class="num">3</text>
  <line x1="222" y1="282" x2="298" y2="282" class="leader" />
  <text x="560" y="270" class="label">Módulo Gerador O₂</text>
  <text x="560" y="284" class="partno">NE-LSS-7720 | 12,3 kg</text>
  <text x="560" y="298" class="detail">Eletrólise PEM | 0,84 kg O₂/dia</text>

  <!-- Spacing -->
  <line x1="350" y1="315" x2="350" y2="350" stroke="#333" stroke-width="0.5" stroke-dasharray="2,4" />
  <line x1="450" y1="315" x2="450" y2="350" stroke="#333" stroke-width="0.5" stroke-dasharray="2,4" />

  <!-- ④ Bomba de Circulação -->
  <ellipse cx="400" cy="380" rx="100" ry="35" class="component" />
  <circle cx="400" cy="380" r="20" fill="#e8ecf0" stroke="#333" stroke-width="1" />
  <!-- Impeller blades -->
  <line x1="385" y1="370" x2="400" y2="380" stroke="#333" stroke-width="1.5" />
  <line x1="400" y1="380" x2="415" y2="370" stroke="#333" stroke-width="1.5" />
  <line x1="390" y1="390" x2="400" y2="380" stroke="#333" stroke-width="1.5" />
  <line x1="400" y1="380" x2="410" y2="390" stroke="#333" stroke-width="1.5" />
  <!-- Inlet/outlet -->
  <rect x="290" y="372" width="15" height="16" fill="#ddd" stroke="#333" stroke-width="1" />
  <rect x="495" y="372" width="15" height="16" fill="#ddd" stroke="#333" stroke-width="1" />
  <!-- Label -->
  <circle cx="210" cy="380" r="12" fill="#fff" stroke="#333" stroke-width="1.5" />
  <text x="210" y="385" text-anchor="middle" class="num">4</text>
  <line x1="222" y1="380" x2="298" y2="380" class="leader" />
  <text x="560" y="370" class="label">Bomba de Circulação</text>
  <text x="560" y="384" class="partno">NE-LSS-7715 | 6,5 kg</text>
  <text x="560" y="398" class="detail">Montagem: 4x M10 | 35 N·m</text>

  <!-- Spacing -->
  <line x1="350" y1="415" x2="350" y2="440" stroke="#333" stroke-width="0.5" stroke-dasharray="2,4" />
  <line x1="450" y1="415" x2="450" y2="440" stroke="#333" stroke-width="0.5" stroke-dasharray="2,4" />

  <!-- ⑤ Trocador de Calor -->
  <rect x="280" y="445" width="240" height="55" class="component" rx="3" />
  <!-- Serpentine pattern -->
  <path d="M 300 455 L 340 455 L 340 490 L 370 490 L 370 455 L 410 455 L 410 490 L 440 490 L 440 455 L 480 455 L 480 490 L 500 490" fill="none" stroke="#333" stroke-width="1.5" />
  <!-- Label -->
  <circle cx="210" cy="472" r="12" fill="#fff" stroke="#333" stroke-width="1.5" />
  <text x="210" y="477" text-anchor="middle" class="num">5</text>
  <line x1="222" y1="472" x2="278" y2="472" class="leader" />
  <text x="570" y="460" class="label">Trocador de Calor</text>
  <text x="570" y="474" class="partno">NE-LSS-7730 | 8,7 kg</text>
  <text x="570" y="488" class="detail">Refrigerante HFE-7200 | 3,5 kW</text>

  <!-- Spacing -->
  <line x1="350" y1="500" x2="350" y2="520" stroke="#333" stroke-width="0.5" stroke-dasharray="2,4" />
  <line x1="450" y1="500" x2="450" y2="520" stroke="#333" stroke-width="0.5" stroke-dasharray="2,4" />

  <!-- ⑥ Estrutura Base -->
  <rect x="240" y="525" width="320" height="45" class="component" rx="2" />
  <!-- Mounting holes -->
  <circle cx="270" cy="547" r="6" fill="#fff" stroke="#333" stroke-width="1" />
  <circle cx="360" cy="547" r="6" fill="#fff" stroke="#333" stroke-width="1" />
  <circle cx="440" cy="547" r="6" fill="#fff" stroke="#333" stroke-width="1" />
  <circle cx="530" cy="547" r="6" fill="#fff" stroke="#333" stroke-width="1" />
  <!-- Cross pattern in holes -->
  <line x1="267" y1="544" x2="273" y2="550" stroke="#333" stroke-width="0.5" />
  <line x1="273" y1="544" x2="267" y2="550" stroke="#333" stroke-width="0.5" />
  <line x1="357" y1="544" x2="363" y2="550" stroke="#333" stroke-width="0.5" />
  <line x1="363" y1="544" x2="357" y2="550" stroke="#333" stroke-width="0.5" />
  <line x1="437" y1="544" x2="443" y2="550" stroke="#333" stroke-width="0.5" />
  <line x1="443" y1="544" x2="437" y2="550" stroke="#333" stroke-width="0.5" />
  <line x1="527" y1="544" x2="533" y2="550" stroke="#333" stroke-width="0.5" />
  <line x1="533" y1="544" x2="527" y2="550" stroke="#333" stroke-width="0.5" />
  <!-- Label -->
  <circle cx="210" cy="547" r="12" fill="#fff" stroke="#333" stroke-width="1.5" />
  <text x="210" y="552" text-anchor="middle" class="num">6</text>
  <line x1="222" y1="547" x2="238" y2="547" class="leader" />
  <text x="610" y="540" class="label">Estrutura Base</text>
  <text x="610" y="554" class="detail">4 pontos de fixação ao chassi</text>
  <text x="610" y="568" class="detail">Peso total montado: 28,5 kg</text>
</svg>
