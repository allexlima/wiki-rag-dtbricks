<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="800" height="600" viewBox="0 0 800 600">
  <title>Fluxograma de Diagnóstico — Superaquecimento do Sistema Criogênico</title>
  <style>
    text { font-family: Arial, Helvetica, sans-serif; fill: #000; }
    .title { font-size: 15px; font-weight: bold; text-anchor: middle; }
    .decision { font-size: 10px; font-weight: bold; text-anchor: middle; }
    .action { font-size: 10px; text-anchor: middle; }
    .yn { font-size: 10px; font-weight: bold; fill: #333; }
    .box { fill: #fff; stroke: #000; stroke-width: 1.5; }
    .diamond { fill: #fff; stroke: #000; stroke-width: 1.5; }
    .terminal { fill: #e0e0e0; stroke: #000; stroke-width: 1.5; }
  </style>
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#000" />
    </marker>
  </defs>

  <rect width="800" height="600" fill="#fff" />
  <text x="400" y="30" class="title">Fluxograma de Diagnóstico — Superaquecimento (DTC CRY-P0101 / P0102)</text>

  <!-- START -->
  <rect x="320" y="50" width="160" height="36" rx="18" class="terminal" />
  <text x="400" y="73" class="decision">Superaquecimento Detectado?</text>

  <!-- Arrow down -->
  <line x1="400" y1="86" x2="400" y2="110" stroke="#000" stroke-width="1.2" marker-end="url(#arr)" />
  <text x="412" y="103" class="yn">SIM</text>

  <!-- Decision 1: Nível de refrigerante OK? -->
  <polygon points="400,110 500,155 400,200 300,155" class="diamond" />
  <text x="400" y="152" class="decision">Nível de</text>
  <text x="400" y="164" class="decision">refrigerante OK?</text>

  <!-- NO branch left: Nível baixo -->
  <line x1="300" y1="155" x2="180" y2="155" stroke="#000" stroke-width="1.2" marker-end="url(#arr)" />
  <text x="240" y="148" class="yn">NÃO</text>

  <rect x="60" y="135" width="120" height="46" rx="5" class="box" />
  <text x="120" y="154" class="action">Reabastecer</text>
  <text x="120" y="167" class="action">CryoFlex-7</text>

  <!-- Sub-action: Verificar vazamento -->
  <line x1="120" y1="181" x2="120" y2="210" stroke="#000" stroke-width="1.2" marker-end="url(#arr)" />
  <rect x="50" y="210" width="140" height="46" rx="5" class="box" />
  <text x="120" y="229" class="action">Verificar vazamentos</text>
  <text x="120" y="242" class="action">(Seção 3.4)</text>

  <line x1="120" y1="256" x2="120" y2="280" stroke="#000" stroke-width="1.2" marker-end="url(#arr)" />
  <rect x="50" y="280" width="140" height="36" rx="18" class="terminal" />
  <text x="120" y="303" class="action">DTC CRY-P0601/P0602</text>

  <!-- YES branch down -->
  <line x1="400" y1="200" x2="400" y2="240" stroke="#000" stroke-width="1.2" marker-end="url(#arr)" />
  <text x="412" y="225" class="yn">SIM</text>

  <!-- Decision 2: Vazão da bomba OK? -->
  <polygon points="400,240 500,285 400,330 300,285" class="diamond" />
  <text x="400" y="280" class="decision">Vazão da bomba</text>
  <text x="400" y="292" class="decision">≥ 80% nominal?</text>

  <!-- NO branch left: Bomba com falha -->
  <line x1="300" y1="285" x2="180" y2="285" stroke="#000" stroke-width="1.2" />
  <text x="240" y="278" class="yn">NÃO</text>

  <!-- Connect to existing box area, route down -->
  <line x1="180" y1="285" x2="180" y2="370" stroke="#000" stroke-width="1.2" />

  <!-- Decision 2a: Filtro obstruído? -->
  <polygon points="180,370 260,405 180,440 100,405" class="diamond" />
  <text x="180" y="402" class="decision">Filtro de sucção</text>
  <text x="180" y="414" class="decision">obstruído?</text>

  <!-- YES: Limpar filtro -->
  <line x1="100" y1="405" x2="30" y2="405" stroke="#000" stroke-width="1.2" marker-end="url(#arr)" />
  <text x="65" y="398" class="yn">SIM</text>
  <rect x="5" y="430" width="110" height="46" rx="5" class="box" />
  <text x="60" y="449" class="action">Limpar/Trocar</text>
  <text x="60" y="462" class="action">filtro NE-CRY-9910</text>
  <line x1="30" y1="405" x2="30" y2="430" stroke="#000" stroke-width="1.2" marker-end="url(#arr)" />

  <!-- NO: Substituir bomba -->
  <line x1="180" y1="440" x2="180" y2="470" stroke="#000" stroke-width="1.2" marker-end="url(#arr)" />
  <text x="192" y="460" class="yn">NÃO</text>
  <rect x="120" y="470" width="120" height="46" rx="5" class="box" />
  <text x="180" y="489" class="action">Substituir bomba</text>
  <text x="180" y="502" class="action">(Seção 4.2)</text>

  <line x1="180" y1="516" x2="180" y2="545" stroke="#000" stroke-width="1.2" marker-end="url(#arr)" />
  <rect x="120" y="545" width="120" height="36" rx="18" class="terminal" />
  <text x="180" y="567" class="action">DTC CRY-P0501/P0502</text>

  <!-- YES branch down from Decision 2 -->
  <line x1="400" y1="330" x2="400" y2="370" stroke="#000" stroke-width="1.2" marker-end="url(#arr)" />
  <text x="412" y="355" class="yn">SIM</text>

  <!-- Decision 3: Delta-T trocador normal? -->
  <polygon points="400,370 500,415 400,460 300,415" class="diamond" />
  <text x="400" y="410" class="decision">ΔT trocador</text>
  <text x="400" y="422" class="decision">dentro do esperado?</text>

  <!-- NO branch right: Trocador com incrustação -->
  <line x1="500" y1="415" x2="620" y2="415" stroke="#000" stroke-width="1.2" marker-end="url(#arr)" />
  <text x="560" y="408" class="yn">NÃO</text>

  <rect x="620" y="395" width="150" height="46" rx="5" class="box" />
  <text x="695" y="414" class="action">Trocador com incrustação</text>
  <text x="695" y="427" class="action">Limpeza (Seção 4.3)</text>

  <line x1="695" y1="441" x2="695" y2="470" stroke="#000" stroke-width="1.2" marker-end="url(#arr)" />
  <rect x="635" y="470" width="120" height="36" rx="18" class="terminal" />
  <text x="695" y="493" class="action">DTC CRY-P0401</text>

  <!-- YES branch down from Decision 3 -->
  <line x1="400" y1="460" x2="400" y2="500" stroke="#000" stroke-width="1.2" marker-end="url(#arr)" />
  <text x="412" y="485" class="yn">SIM</text>

  <!-- Decision 4: Radiadores OK? -->
  <polygon points="400,500 490,535 400,570 310,535" class="diamond" />
  <text x="400" y="532" class="decision">Radiadores</text>
  <text x="400" y="544" class="decision">operacionais?</text>

  <!-- NO branch right -->
  <line x1="490" y1="535" x2="590" y2="535" stroke="#000" stroke-width="1.2" marker-end="url(#arr)" />
  <text x="540" y="528" class="yn">NÃO</text>
  <rect x="590" y="515" width="150" height="46" rx="5" class="box" />
  <text x="665" y="534" class="action">Inspecionar radiadores</text>
  <text x="665" y="547" class="action">NE-CRY-3310</text>

  <!-- YES: all OK -->
  <line x1="310" y1="535" x2="270" y2="535" stroke="#000" stroke-width="1.2" marker-end="url(#arr)" />
  <text x="290" y="528" class="yn">SIM</text>
  <rect x="250" y="550" width="130" height="36" rx="5" class="box" />
  <text x="315" y="572" class="action">Verificar CEC / Sensores</text>

  <!-- Footer -->
  <text x="400" y="595" font-size="9" fill="#999" text-anchor="middle" font-family="Arial">NE-CRY-DIAG-003 Rev.4.2 — Fluxograma de diagnóstico de superaquecimento</text>
</svg>
