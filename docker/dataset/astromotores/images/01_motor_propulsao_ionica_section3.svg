<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
  <defs>
    <marker id="flow-arrow" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#333"/>
    </marker>
    <style>
      text { font-family: 'Segoe UI', Arial, sans-serif; fill: #333; font-size: 11px; }
      .title { font-size: 16px; font-weight: bold; }
      .start-end { fill: #e8f0fe; stroke: #333; stroke-width: 2; }
      .process { fill: #f0f4f8; stroke: #333; stroke-width: 2; }
      .decision { fill: #fff8e1; stroke: #333; stroke-width: 2; }
      .action { fill: #e8f5e9; stroke: #333; stroke-width: 2; }
      .critical { fill: #fce4ec; stroke: #c0392b; stroke-width: 2; }
      .flow { stroke: #333; stroke-width: 1.5; fill: none; marker-end: url(#flow-arrow); }
      .yes-no { font-size: 10px; font-weight: bold; fill: #1565c0; }
    </style>
  </defs>

  <!-- Title -->
  <text x="400" y="25" text-anchor="middle" class="title">Fluxograma de Diagnóstico — Motor de Propulsão Iônica</text>

  <!-- START -->
  <ellipse cx="400" cy="55" rx="80" ry="20" class="start-end"/>
  <text x="400" y="59" text-anchor="middle" font-weight="bold">INÍCIO: Motor não liga?</text>

  <!-- Arrow down -->
  <line x1="400" y1="75" x2="400" y2="95" class="flow"/>

  <!-- Decision 1: Tensão da UCP OK? -->
  <polygon points="400,95 490,130 400,165 310,130" class="decision"/>
  <text x="400" y="127" text-anchor="middle">Tensão UCP</text>
  <text x="400" y="139" text-anchor="middle">> 1.080 V?</text>

  <!-- NO branch left -->
  <line x1="310" y1="130" x2="180" y2="130" class="flow"/>
  <text x="295" y="123" class="yes-no">NÃO</text>
  <rect x="80" y="110" width="100" height="40" class="critical" rx="5"/>
  <text x="130" y="128" text-anchor="middle">Verificar UCP</text>
  <text x="130" y="140" text-anchor="middle">NE-PWR-3301</text>

  <!-- YES branch down -->
  <line x1="400" y1="165" x2="400" y2="185" class="flow"/>
  <text x="412" y="178" class="yes-no">SIM</text>

  <!-- Decision 2: Fluxo de Xénon OK? -->
  <polygon points="400,185 490,220 400,255 310,220" class="decision"/>
  <text x="400" y="217" text-anchor="middle">Fluxo Xe</text>
  <text x="400" y="229" text-anchor="middle">> 5,5 mg/s?</text>

  <!-- NO branch left -->
  <line x1="310" y1="220" x2="180" y2="220" class="flow"/>
  <text x="295" y="213" class="yes-no">NÃO</text>
  <rect x="80" y="200" width="100" height="40" class="action" rx="5"/>
  <text x="130" y="218" text-anchor="middle">Verificar válvula</text>
  <text x="130" y="230" text-anchor="middle">NE-FLO-2205</text>

  <!-- YES branch down -->
  <line x1="400" y1="255" x2="400" y2="275" class="flow"/>
  <text x="412" y="268" class="yes-no">SIM</text>

  <!-- Decision 3: RF OK? -->
  <polygon points="400,275 490,310 400,345 310,310" class="decision"/>
  <text x="400" y="307" text-anchor="middle">Potência RF</text>
  <text x="400" y="319" text-anchor="middle">> 170 W?</text>

  <!-- NO branch left -->
  <line x1="310" y1="310" x2="180" y2="310" class="flow"/>
  <text x="295" y="303" class="yes-no">NÃO</text>
  <rect x="80" y="290" width="100" height="40" class="action" rx="5"/>
  <text x="130" y="308" text-anchor="middle">Substituir bobina</text>
  <text x="130" y="320" text-anchor="middle">NE-ION-7742-12</text>

  <!-- YES branch down -->
  <line x1="400" y1="345" x2="400" y2="365" class="flow"/>
  <text x="412" y="358" class="yes-no">SIM</text>

  <!-- Decision 4: Corrente do feixe? -->
  <polygon points="400,365 500,400 400,435 300,400" class="decision"/>
  <text x="400" y="395" text-anchor="middle">Corrente feixe</text>
  <text x="400" y="407" text-anchor="middle">> 3,34 A?</text>

  <!-- NO branch right -->
  <line x1="500" y1="400" x2="620" y2="400" class="flow"/>
  <text x="515" y="393" class="yes-no">NÃO</text>

  <!-- Sub-decision: Arco detectado? -->
  <polygon points="700,370 760,400 700,430 640,400" class="decision"/>
  <text x="700" y="397" text-anchor="middle">Arco?</text>
  <text x="700" y="409" text-anchor="middle">ION-E010?</text>

  <!-- YES - Critical -->
  <line x1="700" y1="430" x2="700" y2="455" class="flow"/>
  <text x="712" y="448" class="yes-no">SIM</text>
  <rect x="640" y="455" width="120" height="40" class="critical" rx="5"/>
  <text x="700" y="473" text-anchor="middle" font-weight="bold">DESLIGAR</text>
  <text x="700" y="485" text-anchor="middle">Inspecionar grades</text>

  <!-- NO from arco -->
  <line x1="700" y1="370" x2="700" y2="340" class="flow"/>
  <text x="712" y="358" class="yes-no">NÃO</text>
  <rect x="640" y="300" width="120" height="40" class="action" rx="5"/>
  <text x="700" y="318" text-anchor="middle">Verificar erosão</text>
  <text x="700" y="330" text-anchor="middle">das grades</text>

  <!-- YES branch down from Decision 4 -->
  <line x1="400" y1="435" x2="400" y2="460" class="flow"/>
  <text x="412" y="450" class="yes-no">SIM</text>

  <!-- Decision 5: Temperatura? -->
  <polygon points="400,460 490,495 400,530 310,495" class="decision"/>
  <text x="400" y="492" text-anchor="middle">Temp. câmara</text>
  <text x="400" y="504" text-anchor="middle">265-295 °C?</text>

  <!-- NO branch left - too hot -->
  <line x1="310" y1="495" x2="180" y2="495" class="flow"/>
  <text x="295" y="488" class="yes-no">NÃO</text>
  <rect x="80" y="475" width="100" height="40" class="critical" rx="5"/>
  <text x="130" y="493" text-anchor="middle">Verificar SGT</text>
  <text x="130" y="505" text-anchor="middle">NE-THR-4410</text>

  <!-- YES branch down -->
  <line x1="400" y1="530" x2="400" y2="555" class="flow"/>
  <text x="412" y="545" class="yes-no">SIM</text>

  <!-- End: All OK -->
  <ellipse cx="400" cy="575" rx="110" ry="20" class="start-end"/>
  <text x="400" y="579" text-anchor="middle" font-weight="bold">Diagnóstico completo (Seção 3.4)</text>

  <!-- Vertical connector for action boxes leading to "Retestar" -->
  <line x1="80" y1="150" x2="40" y2="150" stroke="#333" stroke-width="1" fill="none"/>
  <line x1="40" y1="150" x2="40" y2="550" stroke="#333" stroke-width="1" fill="none"/>
  <line x1="40" y1="550" x2="290" y2="575" class="flow"/>
  <text x="45" y="400" class="yes-no" transform="rotate(-90, 45, 400)">Após reparo → retestar</text>

  <!-- Legend -->
  <rect x="80" y="555" width="15" height="12" class="decision" rx="1"/>
  <text x="100" y="565">Decisão</text>
  <rect x="160" y="555" width="15" height="12" class="action" rx="1"/>
  <text x="180" y="565">Ação</text>
  <rect x="230" y="555" width="15" height="12" class="critical" rx="1"/>
  <text x="250" y="565">Crítico</text>
</svg>
