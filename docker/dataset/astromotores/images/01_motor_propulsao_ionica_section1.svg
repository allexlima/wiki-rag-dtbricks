<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#333"/>
    </marker>
    <style>
      text { font-family: 'Segoe UI', Arial, sans-serif; fill: #333; }
      .title { font-size: 18px; font-weight: bold; }
      .label { font-size: 13px; }
      .sublabel { font-size: 11px; fill: #666; }
      .box { fill: #f0f4f8; stroke: #333; stroke-width: 2; rx: 8; ry: 8; }
      .arrow-line { stroke: #333; stroke-width: 2; marker-end: url(#arrowhead); fill: none; }
    </style>
  </defs>

  <!-- Title -->
  <text x="400" y="40" text-anchor="middle" class="title">Diagrama de Blocos — Sistema de Propulsão Iônica Nova ERA</text>
  <line x1="150" y1="50" x2="650" y2="50" stroke="#333" stroke-width="1"/>

  <!-- Box 1: Fonte de Xénon -->
  <rect x="30" y="120" width="160" height="80" class="box"/>
  <text x="110" y="155" text-anchor="middle" class="label">Fonte de Xénon</text>
  <text x="110" y="175" text-anchor="middle" class="sublabel">(Reservatório Xe)</text>

  <!-- Arrow 1→2 -->
  <line x1="190" y1="160" x2="240" y2="160" class="arrow-line"/>
  <text x="215" y="150" text-anchor="middle" class="sublabel">5,7 mg/s</text>

  <!-- Box 2: Câmara de Ionização -->
  <rect x="240" y="120" width="160" height="80" class="box"/>
  <text x="320" y="152" text-anchor="middle" class="label">Câmara de</text>
  <text x="320" y="170" text-anchor="middle" class="label">Ionização</text>
  <text x="320" y="188" text-anchor="middle" class="sublabel">(RF 13,56 MHz)</text>

  <!-- Arrow 2→3 -->
  <line x1="400" y1="160" x2="450" y2="160" class="arrow-line"/>
  <text x="425" y="150" text-anchor="middle" class="sublabel">Xe⁺</text>

  <!-- Box 3: Grade Aceleradora -->
  <rect x="450" y="120" width="160" height="80" class="box"/>
  <text x="530" y="152" text-anchor="middle" class="label">Grade</text>
  <text x="530" y="170" text-anchor="middle" class="label">Aceleradora</text>
  <text x="530" y="188" text-anchor="middle" class="sublabel">(1.100 V / -230 V)</text>

  <!-- Arrow 3→4 -->
  <line x1="610" y1="160" x2="660" y2="160" class="arrow-line"/>
  <text x="635" y="150" text-anchor="middle" class="sublabel">40 km/s</text>

  <!-- Box 4: Bocal de Exaustão -->
  <rect x="660" y="120" width="120" height="80" class="box"/>
  <text x="720" y="152" text-anchor="middle" class="label">Bocal de</text>
  <text x="720" y="170" text-anchor="middle" class="label">Exaustão</text>

  <!-- Arrow to Empuxo -->
  <line x1="720" y1="200" x2="720" y2="250" class="arrow-line"/>

  <!-- Empuxo result -->
  <rect x="660" y="250" width="120" height="50" fill="#e8f0fe" stroke="#333" stroke-width="2" rx="25" ry="25"/>
  <text x="720" y="280" text-anchor="middle" class="label" font-weight="bold">Empuxo</text>
  <text x="720" y="295" text-anchor="middle" class="sublabel">236 mN</text>

  <!-- Secondary systems -->
  <!-- UCP -->
  <rect x="80" y="300" width="160" height="70" class="box"/>
  <text x="160" y="330" text-anchor="middle" class="label">Unidade de Controle</text>
  <text x="160" y="348" text-anchor="middle" class="label">de Potência (UCP)</text>
  <text x="160" y="363" text-anchor="middle" class="sublabel">NE-PWR-3301</text>

  <!-- Arrow UCP → Grade -->
  <line x1="240" y1="335" x2="530" y2="200" class="arrow-line" stroke-dasharray="6,3"/>
  <text x="370" y="255" text-anchor="middle" class="sublabel">1.100 V CC</text>

  <!-- Bobina RF -->
  <rect x="80" y="400" width="160" height="70" class="box"/>
  <text x="160" y="430" text-anchor="middle" class="label">Bobina de RF</text>
  <text x="160" y="448" text-anchor="middle" class="sublabel">NE-ION-7742-12</text>
  <text x="160" y="463" text-anchor="middle" class="sublabel">180 W @ 13,56 MHz</text>

  <!-- Arrow RF → Câmara -->
  <line x1="240" y1="435" x2="320" y2="200" class="arrow-line" stroke-dasharray="6,3"/>
  <text x="260" y="310" text-anchor="middle" class="sublabel">RF</text>

  <!-- CNAV -->
  <rect x="310" y="400" width="160" height="70" class="box"/>
  <text x="390" y="430" text-anchor="middle" class="label">Computador de</text>
  <text x="390" y="448" text-anchor="middle" class="label">Navegação (CNAV)</text>
  <text x="390" y="463" text-anchor="middle" class="sublabel">NE-NAV-1180</text>

  <!-- Arrow CNAV → UCP -->
  <line x1="310" y1="420" x2="240" y2="370" class="arrow-line" stroke-dasharray="6,3"/>
  <text x="260" y="388" text-anchor="middle" class="sublabel">CAN-Bus</text>

  <!-- SGT -->
  <rect x="310" y="300" width="160" height="70" class="box"/>
  <text x="390" y="330" text-anchor="middle" class="label">Gerenciamento</text>
  <text x="390" y="348" text-anchor="middle" class="label">Térmico (SGT)</text>
  <text x="390" y="363" text-anchor="middle" class="sublabel">NE-THR-4410</text>

  <!-- Arrow SGT → Câmara -->
  <line x1="390" y1="300" x2="340" y2="200" class="arrow-line" stroke-dasharray="6,3"/>
  <text x="355" y="246" text-anchor="middle" class="sublabel">Calor</text>

  <!-- Cátodo Neutralizador -->
  <rect x="540" y="350" width="160" height="70" class="box"/>
  <text x="620" y="378" text-anchor="middle" class="label">Cátodo</text>
  <text x="620" y="396" text-anchor="middle" class="label">Neutralizador</text>
  <text x="620" y="413" text-anchor="middle" class="sublabel">NE-ION-7742-08</text>

  <!-- Arrow Cátodo → Bocal -->
  <line x1="650" y1="350" x2="710" y2="250" class="arrow-line" stroke-dasharray="6,3"/>
  <text x="695" y="310" text-anchor="middle" class="sublabel">e⁻</text>

  <!-- Legend box -->
  <rect x="30" y="520" width="740" height="60" fill="none" stroke="#999" stroke-width="1" stroke-dasharray="4,2" rx="5"/>
  <line x1="50" y1="545" x2="100" y2="545" stroke="#333" stroke-width="2" marker-end="url(#arrowhead)"/>
  <text x="110" y="549" class="sublabel">Fluxo principal</text>
  <line x1="250" y1="545" x2="300" y2="545" stroke="#333" stroke-width="2" stroke-dasharray="6,3" marker-end="url(#arrowhead)"/>
  <text x="310" y="549" class="sublabel">Subsistema auxiliar</text>
  <text x="550" y="549" class="sublabel">Veículo Espacial Série Nova ERA — MRT-PROP-001</text>
</svg>
