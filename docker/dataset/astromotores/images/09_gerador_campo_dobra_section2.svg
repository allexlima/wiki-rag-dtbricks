<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="800" height="600" viewBox="0 0 800 600">
  <title>Desenho Dimensional — Seção Transversal da Nacele</title>
  <style>
    text { font-family: Arial, Helvetica, sans-serif; fill: #000; }
    .title { font-size: 18px; font-weight: bold; text-anchor: middle; }
    .subtitle { font-size: 11px; text-anchor: middle; fill: #444; }
    .label { font-size: 11px; font-weight: bold; }
    .dim { font-size: 10px; fill: #333; }
    .leader { stroke: #000; stroke-width: 1; fill: none; }
    .dim-line { stroke: #000; stroke-width: 0.75; stroke-dasharray: 4,2; }
  </style>

  <!-- Title -->
  <text x="400" y="30" class="title">SEÇÃO TRANSVERSAL DA NACELE</text>
  <text x="400" y="48" class="subtitle">Vista frontal | Escala indicativa | NE-WRP-9931</text>

  <!-- Outer casing (Carcaça da Nacele) -->
  <ellipse cx="400" cy="320" rx="250" ry="220" fill="none" stroke="#000" stroke-width="3"/>
  <ellipse cx="400" cy="320" rx="235" ry="206" fill="none" stroke="#000" stroke-width="1.5"/>

  <!-- Coolant channels (Canal de Refrigeração) — 8 small circles between casing walls -->
  <circle cx="400" cy="108" r="10" fill="none" stroke="#000" stroke-width="1.5"/>
  <circle cx="553" cy="148" r="10" fill="none" stroke="#000" stroke-width="1.5"/>
  <circle cx="632" cy="260" r="10" fill="none" stroke="#000" stroke-width="1.5"/>
  <circle cx="632" cy="380" r="10" fill="none" stroke="#000" stroke-width="1.5"/>
  <circle cx="553" cy="492" r="10" fill="none" stroke="#000" stroke-width="1.5"/>
  <circle cx="400" cy="532" r="10" fill="none" stroke="#000" stroke-width="1.5"/>
  <circle cx="247" cy="492" r="10" fill="none" stroke="#000" stroke-width="1.5"/>
  <circle cx="168" cy="380" r="10" fill="none" stroke="#000" stroke-width="1.5"/>
  <circle cx="168" cy="260" r="10" fill="none" stroke="#000" stroke-width="1.5"/>
  <circle cx="247" cy="148" r="10" fill="none" stroke="#000" stroke-width="1.5"/>

  <!-- Upper coil windings (Bobina de Campo Superior) -->
  <ellipse cx="400" cy="230" rx="130" ry="55" fill="none" stroke="#000" stroke-width="2"/>
  <!-- Cross-hatch lines to indicate windings -->
  <line x1="290" y1="215" x2="310" y2="245" stroke="#000" stroke-width="0.75"/>
  <line x1="320" y1="205" x2="340" y2="240" stroke="#000" stroke-width="0.75"/>
  <line x1="350" y1="198" x2="365" y2="235" stroke="#000" stroke-width="0.75"/>
  <line x1="380" y1="195" x2="390" y2="230" stroke="#000" stroke-width="0.75"/>
  <line x1="410" y1="195" x2="415" y2="230" stroke="#000" stroke-width="0.75"/>
  <line x1="440" y1="198" x2="445" y2="235" stroke="#000" stroke-width="0.75"/>
  <line x1="470" y1="205" x2="475" y2="240" stroke="#000" stroke-width="0.75"/>
  <line x1="495" y1="215" x2="500" y2="245" stroke="#000" stroke-width="0.75"/>

  <!-- Lower coil windings (Bobina de Campo Inferior) -->
  <ellipse cx="400" cy="410" rx="130" ry="55" fill="none" stroke="#000" stroke-width="2"/>
  <line x1="290" y1="395" x2="310" y2="425" stroke="#000" stroke-width="0.75"/>
  <line x1="320" y1="385" x2="340" y2="420" stroke="#000" stroke-width="0.75"/>
  <line x1="350" y1="378" x2="365" y2="415" stroke="#000" stroke-width="0.75"/>
  <line x1="380" y1="375" x2="390" y2="410" stroke="#000" stroke-width="0.75"/>
  <line x1="410" y1="375" x2="415" y2="410" stroke="#000" stroke-width="0.75"/>
  <line x1="440" y1="378" x2="445" y2="415" stroke="#000" stroke-width="0.75"/>
  <line x1="470" y1="385" x2="475" y2="420" stroke="#000" stroke-width="0.75"/>
  <line x1="495" y1="395" x2="500" y2="425" stroke="#000" stroke-width="0.75"/>

  <!-- Crystal chamber (Cristal de Dilítio) -->
  <rect x="355" y="290" width="90" height="60" fill="none" stroke="#000" stroke-width="2" rx="3"/>
  <!-- Crystal inside -->
  <polygon points="375,310 400,295 425,310 425,330 400,345 375,330" fill="none" stroke="#000" stroke-width="1.5"/>

  <!-- Leader lines and labels -->

  <!-- Carcaça da Nacele -->
  <line x1="645" y1="320" x2="720" y2="200" class="leader"/>
  <line x1="720" y1="200" x2="790" y2="200" class="leader"/>
  <text x="720" y="193" class="label">Carcaça da Nacele</text>
  <text x="720" y="210" class="dim">Duranium-tritanium | 47,5 mm</text>

  <!-- Canal de Refrigeração -->
  <line x1="632" y1="260" x2="720" y2="255" class="leader"/>
  <line x1="720" y1="255" x2="790" y2="255" class="leader"/>
  <text x="720" y="248" class="label">Canal de Refrigeração</text>
  <text x="720" y="265" class="dim">NE-COOL-77 | -271,3 °C</text>

  <!-- Bobina de Campo (superior) -->
  <line x1="520" y1="220" x2="700" y2="110" class="leader"/>
  <line x1="700" y1="110" x2="790" y2="110" class="leader"/>
  <text x="700" y="103" class="label">Bobina de Campo</text>
  <text x="700" y="118" class="dim">Superior | NE-WRP-9944</text>

  <!-- Bobina de Campo (inferior) -->
  <line x1="520" y1="420" x2="700" y2="480" class="leader"/>
  <line x1="700" y1="480" x2="790" y2="480" class="leader"/>
  <text x="700" y="473" class="label">Bobina de Campo</text>
  <text x="700" y="488" class="dim">Inferior | NE-WRP-9944</text>

  <!-- Cristal de Dilítio -->
  <line x1="355" y1="315" x2="100" y2="315" class="leader"/>
  <text x="30" y="308" class="label">Cristal de Dilítio</text>
  <text x="30" y="323" class="dim">NE-WRP-9930 | 220×85×85 mm</text>

  <!-- Dimension lines -->
  <!-- Outer diameter -->
  <line x1="150" y1="100" x2="150" y2="540" class="dim-line"/>
  <line x1="145" y1="100" x2="155" y2="100" stroke="#000" stroke-width="1"/>
  <line x1="145" y1="540" x2="155" y2="540" stroke="#000" stroke-width="1"/>
  <text x="140" y="325" class="dim" text-anchor="end" transform="rotate(-90,140,325)">⌀ 1.220 mm</text>

  <!-- Casing thickness callout -->
  <line x1="150" y1="100" x2="40" y2="100" class="dim-line"/>
  <line x1="165" y1="114" x2="40" y2="114" class="dim-line"/>
  <line x1="35" y1="95" x2="35" y2="120" stroke="#000" stroke-width="1"/>
  <text x="33" y="90" class="dim" text-anchor="end">47,5 mm</text>

  <!-- Scale note -->
  <text x="400" y="590" class="subtitle">Desenho esquemático — não utilizar para fabricação</text>
</svg>
