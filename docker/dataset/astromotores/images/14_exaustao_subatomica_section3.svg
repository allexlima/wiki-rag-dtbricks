<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#333"/>
    </marker>
    <style>
      text { font-family: 'Segoe UI', Arial, sans-serif; fill: #333; font-size: 12px; }
      .title { font-size: 16px; font-weight: bold; }
      .diamond { fill: #f0f4f8; stroke: #333; stroke-width: 2; }
      .box { fill: #f0f4f8; stroke: #333; stroke-width: 2; }
      .flow { stroke: #333; stroke-width: 1.5; fill: none; marker-end: url(#arrow); }
      .label { font-size: 11px; font-weight: bold; fill: #333; }
    </style>
  </defs>

  <!-- Title -->
  <text x="400" y="30" text-anchor="middle" class="title">Fluxograma de Diagnóstico — Sistema de Exaustão Subatômica</text>

  <!-- Start diamond: Contrapressão Elevada? -->
  <polygon points="400,70 520,125 400,180 280,125" class="diamond"/>
  <text x="400" y="121" text-anchor="middle">Contrapressão</text>
  <text x="400" y="136" text-anchor="middle">Elevada?</text>

  <!-- ===== LEFT BRANCH (SIM) ===== -->
  <line x1="280" y1="125" x2="150" y2="125" class="flow"/>
  <text x="240" y="117" class="label">SIM</text>

  <!-- Verificar Filtro -->
  <rect x="60" y="100" width="90" height="50" rx="5" class="box"/>
  <text x="105" y="122" text-anchor="middle">Verificar</text>
  <text x="105" y="136" text-anchor="middle">Filtro</text>

  <!-- Down from Verificar Filtro -->
  <line x1="105" y1="150" x2="105" y2="220" class="flow"/>

  <!-- Filtro Obstruído? -->
  <polygon points="105,225 205,275 105,325 5,275" class="diamond"/>
  <text x="105" y="271" text-anchor="middle">Filtro</text>
  <text x="105" y="286" text-anchor="middle">Obstruído?</text>

  <!-- YES from Filtro Obstruído → Substituir Filtro -->
  <line x1="5" y1="275" x2="5" y2="380" class="flow"/>
  <text x="15" y="300" class="label">SIM</text>
  <rect x="-55" y="385" width="120" height="45" rx="5" class="box"/>
  <text x="5" y="412" text-anchor="middle">Substituir Filtro</text>

  <!-- NO from Filtro Obstruído → Verificar Bocal -->
  <line x1="205" y1="275" x2="205" y2="380" class="flow"/>
  <text x="215" y="300" class="label">NÃO</text>
  <rect x="145" y="385" width="120" height="45" rx="5" class="box"/>
  <text x="205" y="412" text-anchor="middle">Verificar Bocal</text>

  <!-- ===== RIGHT BRANCH (NÃO) ===== -->
  <line x1="520" y1="125" x2="650" y2="125" class="flow"/>
  <text x="560" y="117" class="label">NÃO</text>

  <!-- Verificar Emissões -->
  <rect x="650" y="100" width="110" height="50" rx="5" class="box"/>
  <text x="705" y="122" text-anchor="middle">Verificar</text>
  <text x="705" y="136" text-anchor="middle">Emissões</text>

  <!-- Down from Verificar Emissões -->
  <line x1="705" y1="150" x2="705" y2="220" class="flow"/>

  <!-- Nível Acima do Limite? -->
  <polygon points="705,225 805,275 705,325 605,275" class="diamond"/>
  <text x="705" y="268" text-anchor="middle">Nível Acima</text>
  <text x="705" y="283" text-anchor="middle">do Limite?</text>

  <!-- YES from Nível → Recalibrar Filtro -->
  <line x1="605" y1="275" x2="545" y2="275" stroke="#333" stroke-width="1.5" fill="none"/>
  <line x1="545" y1="275" x2="545" y2="380" class="flow"/>
  <text x="575" y="267" class="label">SIM</text>
  <rect x="485" y="385" width="120" height="45" rx="5" class="box"/>
  <text x="545" y="412" text-anchor="middle">Recalibrar Filtro</text>

  <!-- NO from Nível → Sistema OK -->
  <line x1="705" y1="325" x2="705" y2="380" class="flow"/>
  <text x="720" y="350" class="label">NÃO</text>
  <rect x="645" y="385" width="120" height="45" rx="5" class="box"/>
  <text x="705" y="412" text-anchor="middle">Sistema OK</text>
</svg>
