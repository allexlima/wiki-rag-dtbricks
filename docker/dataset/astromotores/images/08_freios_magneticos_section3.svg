<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="800" height="600" viewBox="0 0 800 600">
  <title>Fluxograma de Diagnóstico — Sistema de Freios Magnéticos</title>
  <style>
    text { font-family: Arial, Helvetica, sans-serif; fill: #1a1a1a; }
    .title-text { font-size: 18px; font-weight: bold; text-anchor: middle; }
    .node-text { font-size: 11px; text-anchor: middle; fill: #1a1a1a; }
    .node-text-sm { font-size: 10px; text-anchor: middle; fill: #333333; }
    .decision { fill: #ffffff; stroke: #1a1a1a; stroke-width: 2; }
    .process { fill: #ffffff; stroke: #1a1a1a; stroke-width: 2; }
    .terminal { fill: #e0e0e0; stroke: #1a1a1a; stroke-width: 2; }
    .arrow { fill: none; stroke: #1a1a1a; stroke-width: 1.5; marker-end: url(#arrow); }
    .yn-text { font-size: 10px; font-weight: bold; fill: #444444; }
  </style>
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#1a1a1a" />
    </marker>
  </defs>

  <rect width="800" height="600" fill="#fafafa" />

  <!-- Title -->
  <text x="400" y="30" class="title-text">Fluxograma de Diagnóstico de Falhas</text>

  <!-- START: Frenagem Insuficiente? -->
  <polygon points="400,50 520,90 400,130 280,90" class="decision" />
  <text x="400" y="86" class="node-text">Frenagem</text>
  <text x="400" y="99" class="node-text">Insuficiente?</text>

  <!-- YES arrow down -->
  <line x1="400" y1="130" x2="400" y2="160" class="arrow" />
  <text x="412" y="150" class="yn-text">SIM</text>

  <!-- NO arrow right to "Sistema OK" -->
  <line x1="520" y1="90" x2="700" y2="90" class="arrow" />
  <text x="610" y="83" class="yn-text">NÃO</text>
  <rect x="700" y="72" width="80" height="36" rx="18" class="terminal" />
  <text x="740" y="95" class="node-text">Sistema OK</text>

  <!-- Process: Ler DTCs -->
  <rect x="325" y="165" width="150" height="40" rx="4" class="process" />
  <text x="400" y="189" class="node-text">Ler Códigos (DTCs)</text>

  <!-- Arrow down -->
  <line x1="400" y1="205" x2="400" y2="235" class="arrow" />

  <!-- Decision: DTC Bobina? -->
  <polygon points="400,235 500,265 400,295 300,265" class="decision" />
  <text x="400" y="262" class="node-text">DTC Bobina?</text>
  <text x="400" y="275" class="node-text-sm">(P0101/P0102)</text>

  <!-- YES left -->
  <line x1="300" y1="265" x2="200" y2="265" class="arrow" />
  <text x="250" y="258" class="yn-text">SIM</text>

  <!-- Process: Teste Resistência -->
  <rect x="80" y="245" width="120" height="40" rx="4" class="process" />
  <text x="140" y="263" class="node-text">Teste Resistência</text>
  <text x="140" y="276" class="node-text-sm">Bobinas (Seção 3.3)</text>

  <!-- Arrow down from bobina test -->
  <line x1="140" y1="285" x2="140" y2="310" class="arrow" />

  <!-- Decision: Bobina aberta? -->
  <polygon points="140,310 210,335 140,360 70,335" class="decision" />
  <text x="140" y="332" class="node-text-sm">Aberta /</text>
  <text x="140" y="345" class="node-text-sm">Curto?</text>

  <!-- YES -->
  <line x1="140" y1="360" x2="140" y2="390" class="arrow" />
  <text x="152" y="380" class="yn-text">SIM</text>
  <rect x="75" y="390" width="130" height="36" rx="4" class="terminal" />
  <text x="140" y="412" class="node-text">Substituir Bobina</text>

  <!-- NO right from bobina -->
  <line x1="210" y1="335" x2="260" y2="335" class="arrow" />
  <text x="230" y="328" class="yn-text">NÃO</text>
  <rect x="260" y="317" width="100" height="36" rx="4" class="process" />
  <text x="310" y="340" class="node-text">Verificar Gap</text>

  <!-- NO from DTC Bobina — go down -->
  <line x1="400" y1="295" x2="400" y2="330" class="arrow" />
  <text x="412" y="318" class="yn-text">NÃO</text>

  <!-- Decision: DTC Disco? -->
  <polygon points="400,330 500,360 400,390 300,360" class="decision" />
  <text x="400" y="357" class="node-text">DTC Disco?</text>
  <text x="400" y="370" class="node-text-sm">(P0201/P0202)</text>

  <!-- YES right -->
  <line x1="500" y1="360" x2="590" y2="360" class="arrow" />
  <text x="545" y="353" class="yn-text">SIM</text>

  <!-- Process: Medir Espessura -->
  <rect x="590" y="340" width="140" height="40" rx="4" class="process" />
  <text x="660" y="358" class="node-text">Medir Espessura</text>
  <text x="660" y="371" class="node-text-sm">e Batimento (3.5)</text>

  <!-- Arrow down -->
  <line x1="660" y1="380" x2="660" y2="410" class="arrow" />

  <!-- Decision: Abaixo do mínimo? -->
  <polygon points="660,410 740,435 660,460 580,435" class="decision" />
  <text x="660" y="432" class="node-text-sm">Abaixo</text>
  <text x="660" y="444" class="node-text-sm">15,5 mm?</text>

  <!-- YES -->
  <line x1="660" y1="460" x2="660" y2="490" class="arrow" />
  <text x="672" y="480" class="yn-text">SIM</text>
  <rect x="595" y="490" width="130" height="36" rx="4" class="terminal" />
  <text x="660" y="512" class="node-text">Substituir Disco</text>

  <!-- NO from disco -->
  <line x1="580" y1="435" x2="530" y2="435" class="arrow" />
  <text x="552" y="428" class="yn-text">NÃO</text>
  <rect x="440" y="417" width="90" height="36" rx="4" class="process" />
  <text x="485" y="440" class="node-text">Retificar</text>

  <!-- NO from DTC Disco — go down -->
  <line x1="400" y1="390" x2="400" y2="430" class="arrow" />
  <text x="412" y="415" class="yn-text">NÃO</text>

  <!-- Decision: DTC Controlador? -->
  <polygon points="400,430 500,460 400,490 300,460" class="decision" />
  <text x="400" y="457" class="node-text">DTC Controlador?</text>
  <text x="400" y="470" class="node-text-sm">(P0501/P0801)</text>

  <!-- YES left -->
  <line x1="300" y1="460" x2="200" y2="460" class="arrow" />
  <text x="250" y="453" class="yn-text">SIM</text>
  <rect x="75" y="442" width="125" height="36" rx="4" class="terminal" />
  <text x="138" y="458" class="node-text">Substituir Módulo</text>
  <text x="138" y="470" class="node-text-sm">NE-BRK-CTL-4400</text>

  <!-- NO down -->
  <line x1="400" y1="490" x2="400" y2="520" class="arrow" />
  <text x="412" y="510" class="yn-text">NÃO</text>

  <!-- Terminal: Escalate -->
  <rect x="325" y="520" width="150" height="36" rx="18" class="terminal" />
  <text x="400" y="538" class="node-text">Escalar para</text>
  <text x="400" y="550" class="node-text-sm">Nível III</text>

  <!-- Footer -->
  <text x="400" y="590" class="node-text-sm" fill="#777777">Documento MR-BRK-008 | Fluxograma de Diagnóstico</text>
</svg>
