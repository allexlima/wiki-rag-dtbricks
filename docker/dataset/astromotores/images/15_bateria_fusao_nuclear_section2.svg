<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="800" height="600" viewBox="0 0 800 600">
  <defs>
    <style>
      text { font-family: 'Segoe UI', Arial, sans-serif; fill: #333; }
      .title { font-size: 18px; font-weight: bold; text-anchor: middle; }
      .subtitle { font-size: 12px; font-style: italic; text-anchor: middle; }
      .label { font-size: 11px; font-weight: bold; }
      .dim { font-size: 9px; fill: #555; font-family: monospace; }
      .pn { font-size: 9px; fill: #777; font-family: monospace; }
      .leader { stroke: #333; stroke-width: 1; fill: none; }
    </style>
    <marker id="dot" markerWidth="6" markerHeight="6" refX="3" refY="3">
      <circle cx="3" cy="3" r="2" fill="#333"/>
    </marker>
    <marker id="arrow2" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#333"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="800" height="600" fill="#f0f4f8" rx="8"/>

  <!-- Title -->
  <text x="400" y="35" class="title">Corte Transversal — Célula de Fusão Nuclear</text>
  <text x="400" y="55" class="subtitle">Veículo Espacial Série Nova ERA — Desenho Dimensional</text>

  <!-- Cross-section: concentric layers, centered at 350,310 -->

  <!-- Layer 5: Carcaça externa 316L-N (outermost) -->
  <ellipse cx="350" cy="310" rx="220" ry="200" fill="#e8e8e8" stroke="#333" stroke-width="2"/>

  <!-- Layer 4: Polietileno borado -->
  <ellipse cx="350" cy="310" rx="200" ry="180" fill="#dde4d0" stroke="#333" stroke-width="1.5"/>

  <!-- Layer 3: Blindagem de Chumbo Pb-Bi -->
  <ellipse cx="350" cy="310" rx="170" ry="155" fill="#c8c8c8" stroke="#333" stroke-width="1.5"/>

  <!-- Layer 2: Manto de Li-6 -->
  <ellipse cx="350" cy="310" rx="140" ry="127" fill="#d4dce8" stroke="#333" stroke-width="1.5"/>

  <!-- Layer 1: Parede interna W-Re -->
  <ellipse cx="350" cy="310" rx="95" ry="86" fill="#b0b8c0" stroke="#333" stroke-width="1.5"/>

  <!-- Câmara de Fusão (plasma) -->
  <ellipse cx="350" cy="310" rx="82" ry="74" fill="#fff" stroke="#333" stroke-width="2"/>
  <text x="350" y="295" class="label" text-anchor="middle">Câmara de</text>
  <text x="350" y="310" class="label" text-anchor="middle">Fusão</text>
  <text x="350" y="325" class="dim" text-anchor="middle">150 × 10⁶ K</text>
  <text x="350" y="340" class="pn" text-anchor="middle">NE-FUS-1510</text>

  <!-- Eletrodo Central (vertical line through center) -->
  <line x1="350" y1="115" x2="350" y2="505" stroke="#333" stroke-width="3"/>
  <circle cx="350" cy="115" r="5" fill="#333"/>
  <circle cx="350" cy="505" r="5" fill="#333"/>

  <!-- Bobinas magnéticas (small rectangles around the chamber) -->
  <rect x="250" y="190" width="12" height="30" fill="#333" rx="2"/>
  <rect x="438" y="190" width="12" height="30" fill="#333" rx="2"/>
  <rect x="250" y="400" width="12" height="30" fill="#333" rx="2"/>
  <rect x="438" y="400" width="12" height="30" fill="#333" rx="2"/>

  <!-- Conversor Termoelétrico (bottom section) -->
  <rect x="260" y="480" width="180" height="30" fill="#fff" stroke="#333" stroke-width="1.5" rx="3"/>
  <text x="350" y="500" class="label" text-anchor="middle">Conversor Termoelétrico</text>

  <!-- Leader lines and labels -->

  <!-- Carcaça externa -->
  <line x1="570" y1="310" x2="620" y2="180" class="leader" marker-start="url(#dot)"/>
  <text x="625" y="175" class="label">Carcaça Externa</text>
  <text x="625" y="188" class="dim">Aço 316L-N — 12 mm</text>
  <text x="625" y="200" class="pn">NE-FUS-1514</text>

  <!-- Polietileno borado -->
  <line x1="548" y1="280" x2="620" y2="225" class="leader" marker-start="url(#dot)"/>
  <text x="625" y="220" class="label">Polietileno Borado</text>
  <text x="625" y="233" class="dim">25 mm — nêutrons 99,9%</text>
  <text x="625" y="245" class="pn">NE-FUS-1515</text>

  <!-- Blindagem de Chumbo -->
  <line x1="518" y1="300" x2="620" y2="270" class="leader" marker-start="url(#dot)"/>
  <text x="625" y="268" class="label">Blindagem de Chumbo</text>
  <text x="625" y="281" class="dim">Pb-Bi eutético — 30 mm</text>
  <text x="625" y="293" class="pn">NE-FUS-1513</text>

  <!-- Manto de Li-6 -->
  <line x1="490" y1="330" x2="620" y2="320" class="leader" marker-start="url(#dot)"/>
  <text x="625" y="318" class="label">Manto de Lítio-6</text>
  <text x="625" y="331" class="dim">Li-6 enriq. 90% — 45 mm</text>
  <text x="625" y="343" class="pn">NE-FUS-1512</text>

  <!-- Parede interna -->
  <line x1="445" y1="340" x2="620" y2="368" class="leader" marker-start="url(#dot)"/>
  <text x="625" y="366" class="label">Parede Interna</text>
  <text x="625" y="379" class="dim">Tungstênio-Rênio — 8 mm</text>
  <text x="625" y="391" class="pn">NE-FUS-1511</text>

  <!-- Eletrodo Central label -->
  <line x1="350" y1="115" x2="100" y2="90" class="leader"/>
  <text x="30" y="85" class="label">Eletrodo Central</text>
  <text x="30" y="98" class="dim">Ânodo de tungstênio</text>

  <!-- Bobinas label -->
  <line x1="250" y1="205" x2="30" y2="160" class="leader" marker-start="url(#dot)"/>
  <text x="30" y="155" class="label">Bobinas YBCO</text>
  <text x="30" y="168" class="dim">Campo toroidal 12 T</text>

  <!-- Conversor label -->
  <line x1="350" y1="510" x2="620" y2="530" class="leader"/>
  <text x="625" y="528" class="label">Conversor Termoelétrico</text>
  <text x="625" y="541" class="dim">SiGe — η 38,7%</text>
  <text x="625" y="553" class="pn">NE-FUS-1520</text>

  <!-- Dimension lines -->
  <!-- Total diameter -->
  <line x1="130" y1="540" x2="570" y2="540" stroke="#333" stroke-width="0.7"/>
  <line x1="130" y1="535" x2="130" y2="545" stroke="#333" stroke-width="0.7"/>
  <line x1="570" y1="535" x2="570" y2="545" stroke="#333" stroke-width="0.7"/>
  <text x="350" y="555" class="dim" text-anchor="middle">440 mm (diâmetro externo)</text>

  <!-- Total height indicator -->
  <line x1="100" y1="110" x2="100" y2="510" stroke="#333" stroke-width="0.7"/>
  <line x1="95" y1="110" x2="105" y2="110" stroke="#333" stroke-width="0.7"/>
  <line x1="95" y1="510" x2="105" y2="510" stroke="#333" stroke-width="0.7"/>
  <text x="90" y="315" class="dim" text-anchor="middle" transform="rotate(-90, 90, 315)">400 mm (altura)</text>

  <!-- Footer -->
  <text x="400" y="590" class="pn" text-anchor="middle">MR-FUS-015 | Espessura total da blindagem: 120 mm | Massa: 187 kg | Nova ERA Aerospace</text>
</svg>
