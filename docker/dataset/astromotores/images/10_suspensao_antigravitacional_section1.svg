<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="800" height="600" viewBox="0 0 800 600">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#333"/>
    </marker>
    <style>
      text { font-family: Arial, Helvetica, sans-serif; fill: #333; }
      .title { font-size: 18px; font-weight: bold; }
      .label { font-size: 13px; }
      .sublabel { font-size: 11px; fill: #555; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="800" height="600" fill="#f0f4f8" rx="8"/>

  <!-- Title -->
  <text x="400" y="40" text-anchor="middle" class="title">Diagrama de Blocos — Sistema de Suspensao Antigravitacional</text>

  <!-- Block: Sensores de Altura -->
  <rect x="60" y="100" width="180" height="80" rx="6" fill="#fff" stroke="#333" stroke-width="2"/>
  <text x="150" y="135" text-anchor="middle" class="label">Sensores de Altura</text>
  <text x="150" y="155" text-anchor="middle" class="sublabel">(Lidar + Ultrassonico)</text>

  <!-- Arrow 1 -->
  <line x1="240" y1="140" x2="310" y2="140" stroke="#333" stroke-width="2" marker-end="url(#arrowhead)"/>
  <text x="275" y="132" text-anchor="middle" class="sublabel">dados</text>

  <!-- Block: Controlador Central -->
  <rect x="310" y="80" width="180" height="120" rx="6" fill="#fff" stroke="#333" stroke-width="2.5"/>
  <text x="400" y="120" text-anchor="middle" class="label" font-weight="bold">Controlador Central</text>
  <text x="400" y="140" text-anchor="middle" class="sublabel">CCU-5000</text>
  <text x="400" y="160" text-anchor="middle" class="sublabel">(PID Adaptativo)</text>
  <text x="400" y="180" text-anchor="middle" class="sublabel">NE-AGS-2010</text>

  <!-- Arrow 2 -->
  <line x1="490" y1="140" x2="560" y2="140" stroke="#333" stroke-width="2" marker-end="url(#arrowhead)"/>
  <text x="525" y="132" text-anchor="middle" class="sublabel">corrente</text>

  <!-- Block: Repulsores (x4) -->
  <rect x="560" y="100" width="180" height="80" rx="6" fill="#fff" stroke="#333" stroke-width="2"/>
  <text x="650" y="135" text-anchor="middle" class="label">Repulsores (x4)</text>
  <text x="650" y="155" text-anchor="middle" class="sublabel">NE-AGS-1010</text>

  <!-- Arrow 3 down from Repulsores -->
  <line x1="650" y1="180" x2="650" y2="260" stroke="#333" stroke-width="2" marker-end="url(#arrowhead)"/>
  <text x="665" y="225" class="sublabel">campo</text>

  <!-- Block: Campo Antigravitacional -->
  <rect x="540" y="260" width="220" height="80" rx="6" fill="#fff" stroke="#333" stroke-width="2"/>
  <text x="650" y="295" text-anchor="middle" class="label">Campo Antigravitacional</text>
  <text x="650" y="315" text-anchor="middle" class="sublabel">(847 GHz — 1,2 THz)</text>

  <!-- Arrow 4 left from Campo -->
  <line x1="540" y1="300" x2="310" y2="300" stroke="#333" stroke-width="2" marker-end="url(#arrowhead)"/>
  <text x="425" y="292" text-anchor="middle" class="sublabel">forca de sustentacao</text>

  <!-- Block: Estabilizacao -->
  <rect x="110" y="260" width="200" height="80" rx="6" fill="#fff" stroke="#333" stroke-width="2"/>
  <text x="210" y="295" text-anchor="middle" class="label">Estabilizacao</text>
  <text x="210" y="315" text-anchor="middle" class="sublabel">(Roll / Pitch / Amortecimento)</text>

  <!-- Feedback arrow from Estabilizacao back to Controlador -->
  <line x1="210" y1="260" x2="210" y2="220" stroke="#333" stroke-width="1.5" stroke-dasharray="6,3"/>
  <line x1="210" y1="220" x2="400" y2="220" stroke="#333" stroke-width="1.5" stroke-dasharray="6,3"/>
  <line x1="400" y1="220" x2="400" y2="200" stroke="#333" stroke-width="1.5" stroke-dasharray="6,3" marker-end="url(#arrowhead)"/>
  <text x="305" y="215" text-anchor="middle" class="sublabel">realimentacao</text>

  <!-- Giroscópio block -->
  <rect x="60" y="380" width="180" height="70" rx="6" fill="#fff" stroke="#333" stroke-width="1.5"/>
  <text x="150" y="410" text-anchor="middle" class="label">Giroscopios</text>
  <text x="150" y="430" text-anchor="middle" class="sublabel">NE-AGS-2020 (x2)</text>

  <!-- Arrow from Giroscópio to Estabilizacao -->
  <line x1="150" y1="380" x2="150" y2="350" stroke="#333" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  <line x1="150" y1="350" x2="175" y2="340" stroke="#333" stroke-width="1.5" marker-end="url(#arrowhead)"/>

  <!-- AIT block -->
  <rect x="310" y="410" width="180" height="70" rx="6" fill="#fff" stroke="#333" stroke-width="1.5"/>
  <text x="400" y="440" text-anchor="middle" class="label">Modulo AIT</text>
  <text x="400" y="460" text-anchor="middle" class="sublabel">Lidar 360 + Radar</text>

  <!-- Arrow from AIT to Controlador -->
  <line x1="400" y1="410" x2="400" y2="370" stroke="#333" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="435" y="395" class="sublabel">terreno</text>

  <!-- Arrow from Controlador down to AIT path -->
  <!-- Dashed connection from Controlador through Estabilizacao area -->

  <!-- Amortecedores block -->
  <rect x="560" y="410" width="180" height="70" rx="6" fill="#fff" stroke="#333" stroke-width="1.5"/>
  <text x="650" y="440" text-anchor="middle" class="label">Amortecedores</text>
  <text x="650" y="460" text-anchor="middle" class="sublabel">Fluido NE-FMR-220</text>

  <!-- Arrow from Amortecedores to Campo -->
  <line x1="650" y1="410" x2="650" y2="340" stroke="#333" stroke-width="1.5" marker-end="url(#arrowhead)"/>

  <!-- Legend box -->
  <rect x="50" y="520" width="700" height="60" rx="6" fill="#fff" stroke="#333" stroke-width="1"/>
  <text x="70" y="545" class="sublabel">Linha continua: fluxo de sinal/energia</text>
  <line x1="300" y1="540" x2="350" y2="540" stroke="#333" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="360" y="545" class="sublabel">Linha tracejada: realimentacao / dados auxiliares</text>
  <text x="70" y="565" class="sublabel">Veiculo Espacial Serie Nova ERA — Sistema SAG Rev 7.2</text>
</svg>
