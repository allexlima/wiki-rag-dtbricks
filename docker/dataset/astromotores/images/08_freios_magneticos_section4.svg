<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="800" height="600" viewBox="0 0 800 600">
  <title>Vista Explodida — Conjunto de Frenagem Magnética</title>
  <style>
    text { font-family: Arial, Helvetica, sans-serif; fill: #1a1a1a; }
    .title-text { font-size: 18px; font-weight: bold; text-anchor: middle; }
    .label-text { font-size: 12px; font-weight: bold; }
    .part-text { font-size: 10px; fill: #555555; }
    .component { stroke: #1a1a1a; stroke-width: 1.5; }
    .leader { fill: none; stroke: #555555; stroke-width: 0.8; stroke-dasharray: 3,2; }
    .explode-line { fill: none; stroke: #aaaaaa; stroke-width: 0.8; stroke-dasharray: 6,3; }
    .num-circle { fill: #1a1a1a; }
    .num-text { font-size: 10px; font-weight: bold; fill: #ffffff; text-anchor: middle; }
  </style>

  <rect width="800" height="600" fill="#fafafa" />

  <!-- Title -->
  <text x="400" y="30" class="title-text">Vista Explodida — Conjunto de Frenagem</text>

  <!-- Explode axis (vertical dashed center line) -->
  <line x1="350" y1="50" x2="350" y2="540" class="explode-line" />

  <!-- ====== COMPONENT 1: Placa de Fixação (top) ====== -->
  <ellipse cx="350" cy="85" rx="100" ry="18" fill="#d8d8d8" class="component" />
  <ellipse cx="350" cy="85" rx="40" ry="8" fill="#fafafa" class="component" />
  <!-- Holes -->
  <circle cx="310" cy="85" r="4" fill="#fafafa" stroke="#1a1a1a" stroke-width="1" />
  <circle cx="390" cy="85" r="4" fill="#fafafa" stroke="#1a1a1a" stroke-width="1" />
  <circle cx="350" cy="70" r="4" fill="#fafafa" stroke="#1a1a1a" stroke-width="1" />
  <circle cx="350" cy="100" r="4" fill="#fafafa" stroke="#1a1a1a" stroke-width="1" />
  <!-- Label -->
  <circle cx="540" cy="85" r="10" class="num-circle" />
  <text x="540" y="89" class="num-text">1</text>
  <line x1="452" y1="85" x2="530" y2="85" class="leader" />
  <text x="560" y="82" class="label-text">Placa de Fixação</text>
  <text x="560" y="95" class="part-text">NE-BRK-MNT-6600</text>

  <!-- ====== COMPONENT 2: Carcaça Externa (top half) ====== -->
  <ellipse cx="350" cy="160" rx="120" ry="22" fill="#c0c0c0" class="component" />
  <rect x="230" y="160" width="240" height="35" fill="#c0c0c0" class="component" />
  <ellipse cx="350" cy="195" rx="120" ry="12" fill="#b8b8b8" class="component" />
  <ellipse cx="350" cy="160" rx="50" ry="10" fill="#fafafa" class="component" />
  <!-- Label -->
  <circle cx="540" cy="175" r="10" class="num-circle" />
  <text x="540" y="179" class="num-text">2</text>
  <line x1="472" y1="175" x2="530" y2="175" class="leader" />
  <text x="560" y="172" class="label-text">Carcaça Externa</text>
  <text x="560" y="185" class="part-text">NE-BRK-COL-3300 (housing)</text>

  <!-- ====== COMPONENT 3: Bobina Primária ====== -->
  <ellipse cx="350" cy="255" rx="90" ry="16" fill="#a0a0a0" class="component" />
  <rect x="260" y="255" width="180" height="28" fill="#a0a0a0" class="component" />
  <ellipse cx="350" cy="283" rx="90" ry="10" fill="#989898" class="component" />
  <ellipse cx="350" cy="255" rx="55" ry="10" fill="#c8c8c8" class="component" />
  <!-- Coil winding representation -->
  <ellipse cx="350" cy="269" rx="75" ry="8" fill="none" stroke="#666666" stroke-width="1" stroke-dasharray="4,2" />
  <!-- Label -->
  <circle cx="540" cy="269" r="10" class="num-circle" />
  <text x="540" y="273" class="num-text">3</text>
  <line x1="441" y1="269" x2="530" y2="269" class="leader" />
  <text x="560" y="266" class="label-text">Bobina Primária</text>
  <text x="560" y="279" class="part-text">NE-BRK-COL-3301 (x3 superior)</text>

  <!-- ====== COMPONENT 4: Disco de Frenagem ====== -->
  <ellipse cx="350" cy="345" rx="110" ry="20" fill="#e0d0b0" class="component" />
  <rect x="240" y="345" width="220" height="12" fill="#e0d0b0" class="component" />
  <ellipse cx="350" cy="357" rx="110" ry="14" fill="#d8c8a8" class="component" />
  <ellipse cx="350" cy="345" rx="35" ry="7" fill="#fafafa" class="component" />
  <!-- Surface marks -->
  <ellipse cx="350" cy="351" rx="80" ry="10" fill="none" stroke="#c0b090" stroke-width="0.8" />
  <!-- Label -->
  <circle cx="160" cy="351" r="10" class="num-circle" />
  <text x="160" y="355" class="num-text">4</text>
  <line x1="240" y1="351" x2="170" y2="351" class="leader" />
  <text x="60" y="348" class="label-text">Disco de Frenagem</text>
  <text x="60" y="361" class="part-text">NE-BRK-DSC-1100</text>

  <!-- ====== COMPONENT 5: Bobina Secundária ====== -->
  <ellipse cx="350" cy="415" rx="90" ry="16" fill="#a0a0a0" class="component" />
  <rect x="260" y="415" width="180" height="28" fill="#a0a0a0" class="component" />
  <ellipse cx="350" cy="443" rx="90" ry="10" fill="#989898" class="component" />
  <ellipse cx="350" cy="415" rx="55" ry="10" fill="#c8c8c8" class="component" />
  <ellipse cx="350" cy="429" rx="75" ry="8" fill="none" stroke="#666666" stroke-width="1" stroke-dasharray="4,2" />
  <!-- Label -->
  <circle cx="540" cy="429" r="10" class="num-circle" />
  <text x="540" y="433" class="num-text">5</text>
  <line x1="441" y1="429" x2="530" y2="429" class="leader" />
  <text x="560" y="426" class="label-text">Bobina Secundária</text>
  <text x="560" y="439" class="part-text">NE-BRK-COL-3301 (x3 inferior)</text>

  <!-- ====== COMPONENT 6: Módulo Controlador ====== -->
  <rect x="295" y="490" width="110" height="45" rx="5" fill="#b0b8c8" class="component" />
  <!-- Connector representations -->
  <rect x="300" y="498" width="15" height="8" rx="2" fill="#888888" stroke="#1a1a1a" stroke-width="0.8" />
  <rect x="300" y="512" width="15" height="8" rx="2" fill="#888888" stroke="#1a1a1a" stroke-width="0.8" />
  <rect x="385" y="498" width="15" height="8" rx="2" fill="#888888" stroke="#1a1a1a" stroke-width="0.8" />
  <rect x="385" y="512" width="15" height="8" rx="2" fill="#888888" stroke="#1a1a1a" stroke-width="0.8" />
  <!-- LED indicators -->
  <circle cx="345" cy="505" r="3" fill="#ffffff" stroke="#1a1a1a" stroke-width="0.5" />
  <circle cx="355" cy="505" r="3" fill="#ffffff" stroke="#1a1a1a" stroke-width="0.5" />
  <!-- Label -->
  <circle cx="160" cy="512" r="10" class="num-circle" />
  <text x="160" y="516" class="num-text">6</text>
  <line x1="293" y1="512" x2="170" y2="512" class="leader" />
  <text x="60" y="509" class="label-text">Módulo Controlador</text>
  <text x="60" y="522" class="part-text">NE-BRK-CTL-4400</text>

  <!-- BOM table at bottom -->
  <rect x="50" y="555" width="700" height="30" rx="4" fill="#f0f0f0" stroke="#cccccc" stroke-width="1" />
  <text x="400" y="575" class="part-text" text-anchor="middle">
    1 — Placa de Fixação  |  2 — Carcaça  |  3 — Bobina Primária  |  4 — Disco  |  5 — Bobina Secundária  |  6 — Controlador
  </text>
</svg>
