<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="800" height="600" viewBox="0 0 800 600">
  <title>Desenho Dimensional — Trocador de Calor NE-CRY-2210 (Corte Transversal)</title>
  <style>
    text { font-family: Arial, Helvetica, sans-serif; fill: #000; }
    .title { font-size: 15px; font-weight: bold; text-anchor: middle; }
    .label { font-size: 11px; font-weight: bold; }
    .dim { font-size: 10px; fill: #333; }
    .dim-line { stroke: #444; stroke-width: 0.8; }
    .part-line { stroke: #000; stroke-width: 1.5; fill: none; }
    .part-fill { fill: #f5f5f5; stroke: #000; stroke-width: 1.5; }
    .tube { stroke: #000; stroke-width: 1; fill: #e8e8e8; }
    .baffle { stroke: #000; stroke-width: 2; }
    .port { fill: #ddd; stroke: #000; stroke-width: 1.5; }
  </style>
  <defs>
    <marker id="dim-arrow-l" markerWidth="8" markerHeight="6" refX="0" refY="3" orient="auto">
      <polygon points="8 0, 0 3, 8 6" fill="#444" />
    </marker>
    <marker id="dim-arrow-r" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#444" />
    </marker>
  </defs>

  <rect width="800" height="600" fill="#fff" />

  <text x="400" y="32" class="title">Trocador de Calor NE-CRY-2210 — Corte Transversal Longitudinal</text>

  <!-- Carcaça (shell) - main body -->
  <rect x="120" y="160" width="520" height="220" rx="20" class="part-fill" />
  <!-- Inner wall -->
  <rect x="130" y="170" width="500" height="200" rx="15" fill="#fafafa" stroke="#000" stroke-width="1" stroke-dasharray="4,2" />

  <!-- Carcaça label -->
  <line x1="640" y1="270" x2="700" y2="270" stroke="#000" stroke-width="0.8" />
  <line x1="700" y1="270" x2="700" y2="200" stroke="#000" stroke-width="0.8" />
  <text x="705" y="200" class="label">Carcaça</text>
  <text x="705" y="213" class="dim">NE-CRY-2210-SH</text>
  <text x="705" y="226" class="dim">Liga TiZr-40</text>

  <!-- Tube bundle (Feixe de Tubos) - horizontal tubes -->
  <g>
    <line x1="195" y1="210" x2="575" y2="210" class="tube" />
    <line x1="195" y1="225" x2="575" y2="225" class="tube" />
    <line x1="195" y1="240" x2="575" y2="240" class="tube" />
    <line x1="195" y1="255" x2="575" y2="255" class="tube" />
    <line x1="195" y1="270" x2="575" y2="270" class="tube" />
    <line x1="195" y1="285" x2="575" y2="285" class="tube" />
    <line x1="195" y1="300" x2="575" y2="300" class="tube" />
    <line x1="195" y1="315" x2="575" y2="315" class="tube" />
    <line x1="195" y1="330" x2="575" y2="330" class="tube" />
    <line x1="195" y1="345" x2="575" y2="345" class="tube" />
  </g>

  <!-- Feixe de Tubos label -->
  <line x1="385" y1="345" x2="385" y2="410" stroke="#000" stroke-width="0.8" />
  <text x="385" y="425" class="label" text-anchor="middle">Feixe de Tubos</text>
  <text x="385" y="438" class="dim" text-anchor="middle">128 placas — Ø6mm × 0,5mm parede</text>

  <!-- Chicanas (baffles) -->
  <line x1="270" y1="175" x2="270" y2="310" class="baffle" />
  <line x1="380" y1="230" x2="380" y2="370" class="baffle" />
  <line x1="490" y1="175" x2="490" y2="310" class="baffle" />

  <!-- Chicanas label -->
  <line x1="270" y1="175" x2="270" y2="130" stroke="#000" stroke-width="0.8" />
  <line x1="270" y1="130" x2="350" y2="130" stroke="#000" stroke-width="0.8" />
  <text x="355" y="128" class="label">Chicanas</text>
  <text x="355" y="141" class="dim">Espaçamento 110mm</text>

  <!-- Left end plate (Tampa) -->
  <rect x="150" y="165" width="40" height="210" rx="3" fill="#ddd" stroke="#000" stroke-width="2" />
  <line x1="170" y1="165" x2="170" y2="105" stroke="#000" stroke-width="0.8" />
  <text x="115" y="100" class="label">Tampa do</text>
  <text x="115" y="113" class="label">Trocador</text>
  <text x="115" y="126" class="dim">NE-CRY-2210-CP</text>

  <!-- Right end plate -->
  <rect x="570" y="165" width="40" height="210" rx="3" fill="#ddd" stroke="#000" stroke-width="2" />

  <!-- Entrada Quente (top-left port) -->
  <rect x="155" y="120" width="30" height="45" class="port" />
  <rect x="150" y="110" width="40" height="15" rx="2" fill="#bbb" stroke="#000" stroke-width="1.5" />
  <text x="105" y="80" class="label" fill="#000">Entrada Quente</text>
  <text x="105" y="93" class="dim">(Primário) DN-40</text>
  <line x1="170" y1="110" x2="140" y2="85" stroke="#000" stroke-width="0.8" />

  <!-- Saída Fria (bottom-right port) -->
  <rect x="575" y="375" width="30" height="45" class="port" />
  <rect x="570" y="418" width="40" height="15" rx="2" fill="#bbb" stroke="#000" stroke-width="1.5" />
  <text x="620" y="460" class="label">Saída Fria</text>
  <text x="620" y="473" class="dim">(Primário) DN-40</text>
  <line x1="590" y1="433" x2="620" y2="455" stroke="#000" stroke-width="0.8" />

  <!-- Secondary ports (top-right, bottom-left) -->
  <rect x="575" y="120" width="30" height="45" class="port" />
  <rect x="570" y="110" width="40" height="15" rx="2" fill="#bbb" stroke="#000" stroke-width="1.5" />
  <text x="630" y="100" class="label">Saída</text>
  <text x="630" y="113" class="dim">(Secundário) DN-50</text>

  <rect x="155" y="375" width="30" height="45" class="port" />
  <rect x="150" y="418" width="40" height="15" rx="2" fill="#bbb" stroke="#000" stroke-width="1.5" />
  <text x="100" y="460" class="label">Entrada</text>
  <text x="100" y="473" class="dim">(Secundário) DN-50</text>

  <!-- Dimension lines -->
  <!-- Overall length -->
  <line x1="120" y1="500" x2="640" y2="500" class="dim-line" marker-start="url(#dim-arrow-l)" marker-end="url(#dim-arrow-r)" />
  <line x1="120" y1="490" x2="120" y2="510" class="dim-line" />
  <line x1="640" y1="490" x2="640" y2="510" class="dim-line" />
  <text x="380" y="497" class="dim" text-anchor="middle">620 mm</text>

  <!-- Overall height -->
  <line x1="70" y1="160" x2="70" y2="380" class="dim-line" marker-start="url(#dim-arrow-l)" marker-end="url(#dim-arrow-r)" />
  <line x1="60" y1="160" x2="80" y2="160" class="dim-line" />
  <line x1="60" y1="380" x2="80" y2="380" class="dim-line" />
  <text x="65" y="275" class="dim" text-anchor="middle" transform="rotate(-90,65,275)">280 mm</text>

  <!-- Info box -->
  <rect x="20" y="540" width="760" height="45" fill="#f8f8f8" stroke="#999" stroke-width="0.5" rx="4" />
  <text x="400" y="557" font-size="9" fill="#666" text-anchor="middle" font-family="Arial">NE-CRY-DIAG-002 Rev.4.2 — Corte longitudinal esquemático. Cotas em milímetros. Tolerância geral ±1mm salvo indicação.</text>
  <text x="400" y="572" font-size="9" fill="#666" text-anchor="middle" font-family="Arial">Material: Liga TiZr-40 | Massa (vazio): 34,7 kg | Área de transferência: 18,4 m² | Torque flanges: 85 ± 5 N·m</text>
</svg>
