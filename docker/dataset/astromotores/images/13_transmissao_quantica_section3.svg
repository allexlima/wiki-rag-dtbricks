<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="800" height="600" viewBox="0 0 800 600">
  <title>Fluxograma de Diagnóstico — Perda de Torque</title>
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#333"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="800" height="600" fill="#f0f4f8"/>

  <!-- Title -->
  <text x="400" y="30" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#333">Fluxograma de Diagnóstico — Perda de Torque na QTX-7000</text>

  <!-- START: Perda de Torque? -->
  <polygon points="400,55 480,90 400,125 320,90" fill="none" stroke="#333" stroke-width="2"/>
  <text x="400" y="87" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#333">Perda de</text>
  <text x="400" y="100" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#333">Torque?</text>

  <!-- Arrow down from start -->
  <line x1="400" y1="125" x2="400" y2="155" stroke="#333" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="410" y="143" font-family="Arial, sans-serif" font-size="9" fill="#555">Sim</text>

  <!-- Step 1: Ler códigos OBD-Q -->
  <rect x="310" y="158" width="180" height="40" rx="5" ry="5" fill="none" stroke="#333" stroke-width="2"/>
  <text x="400" y="178" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#333">Ler códigos OBD-Q</text>
  <text x="400" y="191" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#555">(NE-FER-2006)</text>

  <!-- Arrow down -->
  <line x1="400" y1="198" x2="400" y2="220" stroke="#333" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Decision: ICQ < 97,5%? -->
  <polygon points="400,223 475,253 400,283 325,253" fill="none" stroke="#333" stroke-width="2"/>
  <text x="400" y="250" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="#333">ICQ &lt; 97,5%?</text>
  <text x="400" y="263" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#555">(Teste coerência)</text>

  <!-- YES branch left: ICQ low -->
  <line x1="325" y1="253" x2="230" y2="253" stroke="#333" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="280" y="247" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#555">Sim</text>

  <!-- Decision: Alinhamento OK? -->
  <polygon points="155,228 230,253 155,278 80,253" fill="none" stroke="#333" stroke-width="1.5"/>
  <text x="155" y="250" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="#333">Alinhamento</text>
  <text x="155" y="263" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="#333">OK?</text>

  <!-- Alinhamento NO → Desalinhamento -->
  <line x1="155" y1="278" x2="155" y2="320" stroke="#333" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="165" y="300" font-family="Arial, sans-serif" font-size="9" fill="#555">Não</text>
  <rect x="80" y="323" width="150" height="50" rx="5" ry="5" fill="none" stroke="#333" stroke-width="2"/>
  <text x="155" y="344" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#333">DESALINHAMENTO</text>
  <text x="155" y="360" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#555">→ Realinhar (Seção 4.2)</text>

  <!-- Alinhamento YES → Check fluido -->
  <line x1="80" y1="253" x2="20" y2="253" stroke="#333" stroke-width="1.5"/>
  <line x1="20" y1="253" x2="20" y2="340" stroke="#333" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="47" y="247" font-family="Arial, sans-serif" font-size="9" fill="#555">Sim</text>

  <polygon points="20,343 70,368 20,393 -30,368" fill="none" stroke="#333" stroke-width="1.5"/>
  <text x="20" y="365" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="#333">Fluido</text>
  <text x="20" y="378" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="#333">puro?</text>

  <!-- Fluido NO → Degradação -->
  <line x1="20" y1="393" x2="20" y2="430" stroke="#333" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="30" y="415" font-family="Arial, sans-serif" font-size="9" fill="#555">Não</text>
  <rect x="-55" y="433" width="150" height="50" rx="5" ry="5" fill="none" stroke="#333" stroke-width="2"/>
  <text x="20" y="453" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#333">DEGRADAÇÃO</text>
  <text x="20" y="467" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#333">DO FLUIDO</text>
  <text x="20" y="480" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#555">→ Trocar QF-9 (Seção 5.3)</text>

  <!-- Fluido YES → Decoerência -->
  <line x1="70" y1="368" x2="120" y2="368" stroke="#333" stroke-width="1.5"/>
  <line x1="120" y1="368" x2="120" y2="430" stroke="#333" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="92" y="362" font-family="Arial, sans-serif" font-size="9" fill="#555">Sim</text>
  <rect x="45" y="433" width="150" height="50" rx="5" ry="5" fill="none" stroke="#333" stroke-width="2"/>
  <text x="120" y="453" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#333">DECOERÊNCIA</text>
  <text x="120" y="467" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#333">DOS PARES</text>
  <text x="120" y="480" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#555">→ Substituir células (Seção 4.3)</text>

  <!-- NO branch right from ICQ decision: ICQ is OK -->
  <line x1="475" y1="253" x2="540" y2="253" stroke="#333" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="510" y="247" font-family="Arial, sans-serif" font-size="9" fill="#555">Não</text>

  <!-- Decision: Vibração anômala? -->
  <polygon points="615,228 690,253 615,278 540,253" fill="none" stroke="#333" stroke-width="2"/>
  <text x="615" y="250" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="#333">Vibração</text>
  <text x="615" y="263" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="#333">anômala?</text>

  <!-- Vibração YES → Análise espectral -->
  <line x1="615" y1="278" x2="615" y2="320" stroke="#333" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="625" y="300" font-family="Arial, sans-serif" font-size="9" fill="#555">Sim</text>

  <rect x="535" y="323" width="160" height="40" rx="5" ry="5" fill="none" stroke="#333" stroke-width="1.5"/>
  <text x="615" y="343" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#333">Análise espectral</text>
  <text x="615" y="356" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#555">(NE-FER-2002)</text>

  <!-- Arrow down from análise -->
  <line x1="615" y1="363" x2="615" y2="390" stroke="#333" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Three sub-branches from vibration analysis -->
  <!-- Branch: 40-80 Hz -->
  <line x1="615" y1="393" x2="500" y2="393" stroke="#333" stroke-width="1.5"/>
  <line x1="500" y1="393" x2="500" y2="430" stroke="#333" stroke-width="1.5" marker-end="url(#arr)"/>
  <rect x="430" y="433" width="140" height="50" rx="5" ry="5" fill="none" stroke="#333" stroke-width="1.5"/>
  <text x="500" y="453" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="#333">40–80 Hz</text>
  <text x="500" y="467" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#333">Decoerência parcial</text>
  <text x="500" y="480" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#555">→ Verificar pares (Seção 3.4)</text>

  <!-- Branch: 80-120 Hz -->
  <line x1="615" y1="393" x2="615" y2="430" stroke="#333" stroke-width="1.5" marker-end="url(#arr)"/>
  <rect x="545" y="433" width="140" height="50" rx="5" ry="5" fill="none" stroke="#333" stroke-width="1.5"/>
  <text x="615" y="453" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="#333">80–120 Hz</text>
  <text x="615" y="467" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#333">Desalinhamento</text>
  <text x="615" y="480" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#555">→ Realinhar (Seção 4.2)</text>

  <!-- Branch: 120-200 Hz -->
  <line x1="615" y1="393" x2="730" y2="393" stroke="#333" stroke-width="1.5"/>
  <line x1="730" y1="393" x2="730" y2="430" stroke="#333" stroke-width="1.5" marker-end="url(#arr)"/>
  <rect x="660" y="433" width="140" height="50" rx="5" ry="5" fill="none" stroke="#333" stroke-width="1.5"/>
  <text x="730" y="453" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="#333">120–200 Hz</text>
  <text x="730" y="467" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#333">Fluido degradado</text>
  <text x="730" y="480" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#555">→ Trocar QF-9 (Seção 5.3)</text>

  <!-- Vibração NO → Check CMQ -->
  <line x1="690" y1="253" x2="750" y2="253" stroke="#333" stroke-width="1.5"/>
  <line x1="750" y1="253" x2="750" y2="290" stroke="#333" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="723" y="247" font-family="Arial, sans-serif" font-size="9" fill="#555">Não</text>

  <rect x="680" y="293" width="140" height="50" rx="5" ry="5" fill="none" stroke="#333" stroke-width="2"/>
  <text x="750" y="313" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#333">FALHA NO CMQ</text>
  <text x="750" y="328" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#555">Verificar NE-CMQ-0455</text>
  <text x="750" y="340" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#555">→ Reiniciar ou substituir</text>

  <!-- Legend box -->
  <rect x="280" y="520" width="240" height="65" rx="4" ry="4" fill="none" stroke="#333" stroke-width="1"/>
  <text x="400" y="540" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="#333">LEGENDA</text>
  <polygon points="310,555 330,548 350,555 330,562" fill="none" stroke="#333" stroke-width="1"/>
  <text x="360" y="559" font-family="Arial, sans-serif" font-size="8" fill="#333">Decisão</text>
  <rect x="310" y="568" width="40" height="12" rx="3" ry="3" fill="none" stroke="#333" stroke-width="1"/>
  <text x="360" y="578" font-family="Arial, sans-serif" font-size="8" fill="#333">Ação / Resultado</text>
</svg>
