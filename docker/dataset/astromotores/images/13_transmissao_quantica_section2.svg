<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="800" height="600" viewBox="0 0 800 600">
  <title>Desenho Dimensional — Acoplador Quântico</title>
  <defs>
    <marker id="dim-arrow-l" markerWidth="8" markerHeight="6" refX="0" refY="3" orient="auto">
      <polygon points="8 0, 0 3, 8 6" fill="#333"/>
    </marker>
    <marker id="dim-arrow-r" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#333"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="800" height="600" fill="#f0f4f8"/>

  <!-- Title -->
  <text x="400" y="35" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#333">Desenho Dimensional — Conjunto Acoplador Quântico</text>
  <text x="400" y="55" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#555">Peça N.º NE-QTX-1310 — Escala ilustrativa (cotas em mm)</text>

  <!-- Main body / Câmara de Entrelaçamento (cross-section view) -->
  <!-- Outer casing -->
  <rect x="200" y="120" width="400" height="300" rx="12" ry="12" fill="none" stroke="#333" stroke-width="2.5"/>
  <!-- Inner chamber -->
  <rect x="250" y="160" width="300" height="220" rx="8" ry="8" fill="none" stroke="#333" stroke-width="1.5" stroke-dasharray="8,4"/>

  <!-- Label: Carcaça externa -->
  <line x1="200" y1="115" x2="160" y2="85" stroke="#333" stroke-width="1"/>
  <text x="70" y="83" font-family="Arial, sans-serif" font-size="11" fill="#333">Carcaça Externa</text>
  <text x="70" y="97" font-family="Arial, sans-serif" font-size="9" fill="#555">Liga Ti-Nb T7N3</text>

  <!-- Label: Câmara de Entrelaçamento -->
  <line x1="250" y1="160" x2="210" y2="130" stroke="#333" stroke-width="1"/>
  <line x1="210" y1="130" x2="100" y2="130" stroke="#333" stroke-width="1"/>
  <text x="15" y="128" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#333">Câmara de</text>
  <text x="15" y="142" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#333">Entrelaçamento</text>
  <text x="15" y="156" font-family="Arial, sans-serif" font-size="9" fill="#555">NE-CEP-0710</text>

  <!-- Par Quântico A (left cell) -->
  <rect x="290" y="210" width="80" height="120" rx="4" ry="4" fill="none" stroke="#333" stroke-width="2"/>
  <text x="330" y="265" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#333">Par</text>
  <text x="330" y="279" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#333">Quântico</text>
  <text x="330" y="293" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#333">A</text>
  <text x="330" y="310" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#555">NE-CQA-1410</text>
  <!-- Arrow showing orientation -->
  <polygon points="325,220 335,220 330,230" fill="#333"/>
  <text x="330" y="245" text-anchor="middle" font-family="Arial, sans-serif" font-size="7" fill="#555">↑ Frente</text>

  <!-- Par Quântico B (right cell) -->
  <rect x="430" y="210" width="80" height="120" rx="4" ry="4" fill="none" stroke="#333" stroke-width="2"/>
  <text x="470" y="265" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#333">Par</text>
  <text x="470" y="279" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#333">Quântico</text>
  <text x="470" y="293" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#333">B</text>
  <text x="470" y="310" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#555">NE-CQB-1420</text>
  <!-- Arrow showing orientation (opposite) -->
  <polygon points="465,320 475,320 470,310" fill="#333"/>
  <text x="470" y="245" text-anchor="middle" font-family="Arial, sans-serif" font-size="7" fill="#555">↓ Trás</text>

  <!-- Entanglement link between A and B -->
  <line x1="370" y1="270" x2="430" y2="270" stroke="#333" stroke-width="1" stroke-dasharray="3,3"/>
  <text x="400" y="262" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#555">Entrelaçamento</text>

  <!-- Eixo de entrada (left) -->
  <rect x="120" y="255" width="80" height="30" rx="2" ry="2" fill="none" stroke="#333" stroke-width="2"/>
  <text x="160" y="274" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="#333">Eixo Entrada</text>
  <line x1="160" y1="240" x2="160" y2="230" stroke="#333" stroke-width="1"/>
  <text x="160" y="225" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#555">Ø45 h6</text>

  <!-- Eixo de saída (right) -->
  <rect x="600" y="255" width="80" height="30" rx="2" ry="2" fill="none" stroke="#333" stroke-width="2"/>
  <text x="640" y="274" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="#333">Eixo de Saída</text>
  <line x1="640" y1="240" x2="640" y2="230" stroke="#333" stroke-width="1"/>
  <text x="640" y="225" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#555">Ø50 h6</text>

  <!-- Alignment pins (4 corners) -->
  <circle cx="220" cy="140" r="5" fill="none" stroke="#333" stroke-width="1.5"/>
  <circle cx="220" cy="140" r="1.5" fill="#333"/>
  <circle cx="580" cy="140" r="5" fill="none" stroke="#333" stroke-width="1.5"/>
  <circle cx="580" cy="140" r="1.5" fill="#333"/>
  <circle cx="220" cy="400" r="5" fill="none" stroke="#333" stroke-width="1.5"/>
  <circle cx="220" cy="400" r="1.5" fill="#333"/>
  <circle cx="580" cy="400" r="5" fill="none" stroke="#333" stroke-width="1.5"/>
  <circle cx="580" cy="400" r="1.5" fill="#333"/>

  <!-- Pin label -->
  <line x1="580" y1="400" x2="650" y2="440" stroke="#333" stroke-width="1"/>
  <text x="655" y="438" font-family="Arial, sans-serif" font-size="9" fill="#333">Pinos de Alinhamento</text>
  <text x="655" y="452" font-family="Arial, sans-serif" font-size="8" fill="#555">Ø6 h7 × 25 mm (×4)</text>
  <text x="655" y="465" font-family="Arial, sans-serif" font-size="8" fill="#555">NE-PIN-0006</text>

  <!-- Mounting bolts (12 around perimeter, show a few) -->
  <circle cx="260" cy="120" r="4" fill="none" stroke="#333" stroke-width="1"/>
  <line x1="256" y1="120" x2="264" y2="120" stroke="#333" stroke-width="1"/>
  <line x1="260" y1="116" x2="260" y2="124" stroke="#333" stroke-width="1"/>

  <circle cx="340" cy="120" r="4" fill="none" stroke="#333" stroke-width="1"/>
  <line x1="336" y1="120" x2="344" y2="120" stroke="#333" stroke-width="1"/>
  <line x1="340" y1="116" x2="340" y2="124" stroke="#333" stroke-width="1"/>

  <circle cx="460" cy="120" r="4" fill="none" stroke="#333" stroke-width="1"/>
  <line x1="456" y1="120" x2="464" y2="120" stroke="#333" stroke-width="1"/>
  <line x1="460" y1="116" x2="460" y2="124" stroke="#333" stroke-width="1"/>

  <circle cx="540" cy="120" r="4" fill="none" stroke="#333" stroke-width="1"/>
  <line x1="536" y1="120" x2="544" y2="120" stroke="#333" stroke-width="1"/>
  <line x1="540" y1="116" x2="540" y2="124" stroke="#333" stroke-width="1"/>

  <!-- Bolt label -->
  <line x1="540" y1="120" x2="650" y2="100" stroke="#333" stroke-width="1"/>
  <text x="655" y="98" font-family="Arial, sans-serif" font-size="9" fill="#333">Parafusos de Montagem</text>
  <text x="655" y="112" font-family="Arial, sans-serif" font-size="8" fill="#555">M8 × 45, classe 12.9 (×12)</text>
  <text x="655" y="125" font-family="Arial, sans-serif" font-size="8" fill="#555">Torque: 35 ± 2 N·m</text>

  <!-- Dimension: overall width -->
  <line x1="200" y1="450" x2="200" y2="480" stroke="#333" stroke-width="0.8"/>
  <line x1="600" y1="450" x2="600" y2="480" stroke="#333" stroke-width="0.8"/>
  <line x1="200" y1="470" x2="600" y2="470" stroke="#333" stroke-width="1" marker-start="url(#dim-arrow-l)" marker-end="url(#dim-arrow-r)"/>
  <text x="400" y="465" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#333">620</text>

  <!-- Dimension: overall height -->
  <line x1="620" y1="120" x2="650" y2="120" stroke="#333" stroke-width="0.8"/>
  <line x1="620" y1="420" x2="650" y2="420" stroke="#333" stroke-width="0.8"/>
  <line x1="640" y1="120" x2="640" y2="420" stroke="#333" stroke-width="1" marker-start="url(#dim-arrow-l)" marker-end="url(#dim-arrow-r)"/>
  <text x="640" y="275" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#333" transform="rotate(-90,640,275)">380</text>

  <!-- Dimension: inner chamber width -->
  <line x1="250" y1="395" x2="250" y2="415" stroke="#333" stroke-width="0.8"/>
  <line x1="550" y1="395" x2="550" y2="415" stroke="#333" stroke-width="0.8"/>
  <line x1="250" y1="408" x2="550" y2="408" stroke="#333" stroke-width="0.8" marker-start="url(#dim-arrow-l)" marker-end="url(#dim-arrow-r)"/>
  <text x="400" y="404" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#333">Ø int. 280</text>

  <!-- Seal label -->
  <line x1="250" y1="380" x2="180" y2="440" stroke="#333" stroke-width="1"/>
  <text x="80" y="438" font-family="Arial, sans-serif" font-size="9" fill="#333">Anel de Vedação Criogênico</text>
  <text x="80" y="452" font-family="Arial, sans-serif" font-size="8" fill="#555">Índio 99,999% — NE-VED-0730</text>

  <!-- Info box -->
  <rect x="30" y="500" width="740" height="80" rx="4" ry="4" fill="none" stroke="#333" stroke-width="1"/>
  <text x="400" y="520" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#333">NOTAS:</text>
  <text x="50" y="540" font-family="Arial, sans-serif" font-size="9" fill="#333">1. Todas as cotas em milímetros, salvo indicação contrária.</text>
  <text x="50" y="555" font-family="Arial, sans-serif" font-size="9" fill="#333">2. Orientação das setas nas células quânticas é OBRIGATÓRIA — Célula A aponta para frente, Célula B aponta para trás.</text>
  <text x="50" y="570" font-family="Arial, sans-serif" font-size="9" fill="#333">3. Massa do conjunto completo: 47,3 kg. Dimensões externas: 620 × 380 × 340 mm.</text>
</svg>
