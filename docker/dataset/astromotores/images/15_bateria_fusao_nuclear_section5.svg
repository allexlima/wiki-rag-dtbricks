<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <style>
      text { font-family: 'Segoe UI', Arial, sans-serif; fill: #333; font-size: 13px; }
      .title { font-size: 16px; font-weight: bold; }
      .bar { fill: #f0f4f8; stroke: #333; stroke-width: 2; }
      .axis { stroke: #333; stroke-width: 1.5; }
      .tick { font-size: 11px; }
      .label { font-size: 13px; }
      .hour { font-size: 11px; font-weight: bold; }
    </style>
  </defs>

  <text x="400" y="40" text-anchor="middle" class="title">Intervalos de Manutenção — Bateria de Fusão Nuclear</text>

  <!-- Y-axis labels -->
  <text x="200" y="125" text-anchor="end" class="label">Monitoramento de Carga</text>
  <text x="200" y="210" text-anchor="end" class="label">Teste de Blindagem</text>
  <text x="200" y="295" text-anchor="end" class="label">Recarga de Trítio</text>
  <text x="200" y="380" text-anchor="end" class="label">Substituição Célula</text>

  <!-- Chart area: x=215..755, 540px for 0..10000h -->

  <!-- Vertical axis -->
  <line x1="215" y1="80" x2="215" y2="430" class="axis"/>
  <!-- Horizontal axis -->
  <line x1="215" y1="430" x2="755" y2="430" class="axis"/>

  <!-- Tick marks: 0, 2000, 4000, 6000, 8000, 10000 -->
  <line x1="215" y1="430" x2="215" y2="438" class="axis"/>
  <text x="215" y="452" text-anchor="middle" class="tick">0</text>

  <line x1="323" y1="430" x2="323" y2="438" class="axis"/>
  <text x="323" y="452" text-anchor="middle" class="tick">2000h</text>

  <line x1="431" y1="430" x2="431" y2="438" class="axis"/>
  <text x="431" y="452" text-anchor="middle" class="tick">4000h</text>

  <line x1="539" y1="430" x2="539" y2="438" class="axis"/>
  <text x="539" y="452" text-anchor="middle" class="tick">6000h</text>

  <line x1="647" y1="430" x2="647" y2="438" class="axis"/>
  <text x="647" y="452" text-anchor="middle" class="tick">8000h</text>

  <line x1="755" y1="430" x2="755" y2="438" class="axis"/>
  <text x="755" y="452" text-anchor="middle" class="tick">10000h</text>

  <!-- Bar 1: Monitoramento de Carga — 100h → 5px -->
  <rect x="215" y="105" width="6" height="35" rx="2" class="bar"/>
  <text x="233" y="128" class="hour">100h</text>

  <!-- Bar 2: Teste de Blindagem — 500h → 27px -->
  <rect x="215" y="190" width="27" height="35" rx="3" class="bar"/>
  <text x="254" y="213" class="hour">500h</text>

  <!-- Bar 3: Recarga de Trítio — 3000h → 162px -->
  <rect x="215" y="275" width="162" height="35" rx="3" class="bar"/>
  <text x="389" y="298" class="hour">3000h</text>

  <!-- Bar 4: Substituição Célula — 10000h → 540px -->
  <rect x="215" y="360" width="540" height="35" rx="3" class="bar"/>
  <text x="485" y="383" class="hour">10000h</text>
</svg>
