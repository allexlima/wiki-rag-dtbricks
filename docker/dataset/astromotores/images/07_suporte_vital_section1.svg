<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="800" height="600" viewBox="0 0 800 600">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#333" />
    </marker>
    <style>
      text { font-family: 'Segoe UI', Arial, sans-serif; fill: #333; }
      .title { font-size: 18px; font-weight: bold; }
      .subtitle { font-size: 12px; font-style: italic; }
      .label { font-size: 13px; font-weight: bold; }
      .detail { font-size: 11px; }
      .box { fill: #f0f4f8; stroke: #333; stroke-width: 2; rx: 8; ry: 8; }
      .box-main { fill: #f0f4f8; stroke: #333; stroke-width: 2.5; rx: 10; ry: 10; }
      .arrow { stroke: #333; stroke-width: 2; fill: none; marker-end: url(#arrowhead); }
    </style>
  </defs>

  <!-- Background -->
  <rect width="800" height="600" fill="#ffffff" />

  <!-- Title -->
  <text x="400" y="35" text-anchor="middle" class="title">Diagrama de Blocos — Módulo de Suporte Vital (MSV)</text>
  <text x="400" y="55" text-anchor="middle" class="subtitle">Veículo Espacial Série Nova ERA — Ciclo Atmosférico Primário</text>

  <!-- Block 1: Entrada de Ar -->
  <rect x="30" y="130" width="140" height="80" class="box-main" />
  <text x="100" y="165" text-anchor="middle" class="label">Entrada de Ar</text>
  <text x="100" y="182" text-anchor="middle" class="detail">Pré-filtro</text>
  <text x="100" y="196" text-anchor="middle" class="detail">NE-LSS-7701</text>

  <!-- Arrow 1→2 -->
  <line x1="170" y1="170" x2="215" y2="170" class="arrow" />

  <!-- Block 2: Filtro de CO₂ -->
  <rect x="220" y="120" width="150" height="100" class="box-main" />
  <text x="295" y="155" text-anchor="middle" class="label">Filtro de CO₂</text>
  <text x="295" y="173" text-anchor="middle" class="detail">Câmara de Absorção</text>
  <text x="295" y="189" text-anchor="middle" class="detail">Zeólita ZAM-4</text>
  <text x="295" y="205" text-anchor="middle" class="detail">NE-LSS-7710</text>

  <!-- Arrow 2→3 -->
  <line x1="370" y1="170" x2="415" y2="170" class="arrow" />

  <!-- Block 3: Gerador de O₂ -->
  <rect x="420" y="120" width="150" height="100" class="box-main" />
  <text x="495" y="155" text-anchor="middle" class="label">Gerador de O₂</text>
  <text x="495" y="173" text-anchor="middle" class="detail">Eletrólise PEM</text>
  <text x="495" y="189" text-anchor="middle" class="detail">H₂O → H₂ + O₂</text>
  <text x="495" y="205" text-anchor="middle" class="detail">NE-LSS-7720</text>

  <!-- Arrow 3→4 -->
  <line x1="570" y1="170" x2="615" y2="170" class="arrow" />

  <!-- Block 4: Regulador Térmico -->
  <rect x="620" y="120" width="150" height="100" class="box-main" />
  <text x="695" y="155" text-anchor="middle" class="label">Regulador</text>
  <text x="695" y="173" text-anchor="middle" class="label">Térmico</text>
  <text x="695" y="191" text-anchor="middle" class="detail">Trocador de Calor</text>
  <text x="695" y="207" text-anchor="middle" class="detail">NE-LSS-7730</text>

  <!-- Arrow 4→5 (down) -->
  <line x1="695" y1="220" x2="695" y2="280" class="arrow" />

  <!-- Block 5: Cabine Pressurizada -->
  <rect x="520" y="285" width="350" height="80" class="box-main" stroke-dasharray="8,4" />
  <text x="695" y="320" text-anchor="middle" class="label">Cabine Pressurizada</text>
  <text x="695" y="340" text-anchor="middle" class="detail">101,3 kPa | 20,9% O₂ | 18-26°C</text>
  <text x="695" y="355" text-anchor="middle" class="detail">Válvula de Alívio NE-LSS-7740</text>

  <!-- Return arrow: Cabine → Entrada de Ar -->
  <path d="M 520 325 L 100 325 L 100 210" class="arrow" />
  <text x="310" y="315" text-anchor="middle" class="detail">Recirculação</text>

  <!-- Bomba de Circulação (between entrada and filtro) -->
  <circle cx="193" cy="170" r="18" fill="#f0f4f8" stroke="#333" stroke-width="2" />
  <text x="193" y="174" text-anchor="middle" class="detail" font-size="9">Bomba</text>
  <text x="193" y="205" text-anchor="middle" class="detail">NE-LSS-7715</text>

  <!-- Side block: Reservatório de Água -->
  <rect x="420" y="270" width="130" height="60" class="box" />
  <text x="485" y="295" text-anchor="middle" class="detail">Reservatório H₂O</text>
  <text x="485" y="310" text-anchor="middle" class="detail">NE-LSS-7725 (85 L)</text>
  <line x1="485" y1="270" x2="485" y2="225" class="arrow" />

  <!-- Side block: H₂ output -->
  <rect x="420" y="60" width="130" height="45" class="box" stroke-dasharray="4,3" />
  <text x="485" y="80" text-anchor="middle" class="detail">Saída de H₂</text>
  <text x="485" y="95" text-anchor="middle" class="detail">→ Propulsão Aux.</text>
  <line x1="485" y1="120" x2="485" y2="105" class="arrow" />

  <!-- Side block: Radiadores Externos -->
  <rect x="620" y="400" width="150" height="55" class="box" stroke-dasharray="4,3" />
  <text x="695" y="422" text-anchor="middle" class="detail">Radiadores Externos</text>
  <text x="695" y="438" text-anchor="middle" class="detail">Dissipação Térmica</text>
  <line x1="695" y1="365" x2="695" y2="400" class="arrow" />

  <!-- CESV Controller -->
  <rect x="30" y="400" width="200" height="80" class="box" />
  <text x="130" y="425" text-anchor="middle" class="label">Controlador CESV</text>
  <text x="130" y="443" text-anchor="middle" class="detail">NE-LSS-7760</text>
  <text x="130" y="460" text-anchor="middle" class="detail">Processador Triplo Redundante</text>
  <text x="130" y="475" text-anchor="middle" class="detail">Sensores: O₂, CO₂, T, P, UR</text>

  <!-- Dashed lines from CESV to components -->
  <line x1="230" y1="430" x2="295" y2="225" stroke="#333" stroke-width="1" stroke-dasharray="4,4" />
  <line x1="230" y1="430" x2="495" y2="225" stroke="#333" stroke-width="1" stroke-dasharray="4,4" />
  <line x1="230" y1="430" x2="695" y2="225" stroke="#333" stroke-width="1" stroke-dasharray="4,4" />

  <!-- Legend -->
  <rect x="30" y="530" width="740" height="50" fill="none" stroke="#333" stroke-width="1" rx="5" />
  <text x="50" y="550" class="detail">Legenda:</text>
  <line x1="110" y1="547" x2="150" y2="547" stroke="#333" stroke-width="2" />
  <text x="160" y="550" class="detail">Fluxo de ar</text>
  <line x1="260" y1="547" x2="300" y2="547" stroke="#333" stroke-width="1" stroke-dasharray="4,4" />
  <text x="310" y="550" class="detail">Sinal de controle</text>
  <rect x="440" y="538" width="20" height="16" fill="none" stroke="#333" stroke-width="2" stroke-dasharray="4,3" />
  <text x="470" y="550" class="detail">Interface externa</text>
  <rect x="600" y="538" width="20" height="16" class="box-main" />
  <text x="630" y="550" class="detail">Componente interno</text>
</svg>
