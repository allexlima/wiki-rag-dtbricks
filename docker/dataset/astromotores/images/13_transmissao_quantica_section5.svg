  <line x1="436" y1="108" x2="436" y2="138" stroke="#333" stroke-width="2"/>
  <line x1="450" y1="108" x2="450" y2="138" stroke="#333" stroke-width="2"/>
  <line x1="463" y1="108" x2="463" y2="138" stroke="#333" stroke-width="2"/>
  <line x1="477" y1="108" x2="477" y2="138" stroke="#333" stroke-width="2"/>
  <line x1="490" y1="108" x2="490" y2="138" stroke="#333" stroke-width="2"/>
