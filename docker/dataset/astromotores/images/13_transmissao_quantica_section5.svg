  <text x="288" y="500" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#333">1000</text>
  <text x="355" y="500" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#333">2000</text>
  <text x="423" y="500" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#333">3000</text>
  <text x="490" y="500" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#333">4000</text>
  <text x="558" y="500" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#333">5000</text>
  <text x="625" y="500" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#333">6000</text>
