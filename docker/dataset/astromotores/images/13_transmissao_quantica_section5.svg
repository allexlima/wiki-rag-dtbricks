  <line x1="220" y1="90" x2="220" y2="480" stroke="#333" stroke-width="1.5"/>
  <line x1="288" y1="90" x2="288" y2="480" stroke="#333" stroke-width="0.5" stroke-dasharray="4,4"/>
  <line x1="355" y1="90" x2="355" y2="480" stroke="#333" stroke-width="0.5" stroke-dasharray="4,4"/>
  <line x1="423" y1="90" x2="423" y2="480" stroke="#333" stroke-width="0.5" stroke-dasharray="4,4"/>
  <line x1="490" y1="90" x2="490" y2="480" stroke="#333" stroke-width="0.5" stroke-dasharray="4,4"/>
  <line x1="558" y1="90" x2="558" y2="480" stroke="#333" stroke-width="0.5" stroke-dasharray="4,4"/>
