  <text x="215" y="465" text-anchor="end" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#333">Subst. Cristal Gerador</text>
  <text x="215" y="478" text-anchor="end" font-family="Arial, sans-serif" font-size="9" fill="#555">A cada 15.000 h | Nível 4</text>
  <line x1="220" y1="468" x2="760" y2="468" stroke="#333" stroke-width="1" stroke-dasharray="2,6"/>
  <text x="490" y="478" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#333">15.000 h (fora da escala)</text>

  <!-- Legend -->
  <rect x="220" y="535" width="540" height="50" rx="4" ry="4" fill="none" stroke="#333" stroke-width="1"/>
  <text x="240" y="555" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="#333">Legenda:</text>
  <line x1="300" y1="550" x2="310" y2="550" stroke="#333" stroke-width="2"/>
  <text x="315" y="554" font-family="Arial, sans-serif" font-size="9" fill="#333">Marcador de intervalo (alta frequência)</text>
  <rect x="520" y="544" width="12" height="12" rx="2" ry="2" fill="#333" opacity="0.6"/>
  <text x="537" y="554" font-family="Arial, sans-serif" font-size="9" fill="#333">Janela de serviço</text>
  <line x1="300" y1="572" x2="340" y2="572" stroke="#333" stroke-width="1" stroke-dasharray="2,6"/>
  <text x="345" y="576" font-family="Arial, sans-serif" font-size="9" fill="#333">Intervalo fora da escala do gráfico</text>
