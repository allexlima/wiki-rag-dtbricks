<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="800" height="600" viewBox="0 0 800 600">
  <title>Cronograma de Manutenção Preventiva — Sistema de Refrigeração Criogênica</title>
  <style>
    text { font-family: Arial, Helvetica, sans-serif; fill: #000; }
    .title { font-size: 15px; font-weight: bold; text-anchor: middle; }
    .axis-label { font-size: 10px; text-anchor: end; }
    .axis-tick { font-size: 9px; text-anchor: middle; fill: #444; }
    .interval { font-size: 9px; fill: #333; text-anchor: middle; }
    .grid { stroke: #e0e0e0; stroke-width: 0.5; }
    .axis { stroke: #000; stroke-width: 1.5; }
    .legend-text { font-size: 10px; fill: #000; }
  </style>

  <rect width="800" height="600" fill="#fff" />
  <text x="400" y="30" class="title">Cronograma de Manutenção Preventiva — Intervalos em Horas de Operação</text>

  <!-- Y-axis -->
  <line x1="220" y1="60" x2="220" y2="460" class="axis" />
  <!-- X-axis -->
  <line x1="220" y1="460" x2="760" y2="460" class="axis" />

  <!-- X-axis labels (hours) -->
  <text x="220" y="480" class="axis-tick">0</text>
  <text x="274" y="480" class="axis-tick">500</text>
  <text x="328" y="480" class="axis-tick">1000</text>
  <text x="382" y="480" class="axis-tick">1500</text>
  <text x="436" y="480" class="axis-tick">2000</text>
  <text x="490" y="480" class="axis-tick">2500</text>
  <text x="544" y="480" class="axis-tick">3000</text>
  <text x="598" y="480" class="axis-tick">3500</text>
  <text x="652" y="480" class="axis-tick">4000</text>
  <text x="706" y="480" class="axis-tick">4500</text>
  <text x="760" y="480" class="axis-tick">5000</text>

  <text x="490" y="500" font-size="11" text-anchor="middle" fill="#333" font-family="Arial">Horas de Operação</text>

  <!-- Grid lines -->
  <line x1="274" y1="60" x2="274" y2="460" class="grid" />
  <line x1="328" y1="60" x2="328" y2="460" class="grid" />
  <line x1="382" y1="60" x2="382" y2="460" class="grid" />
  <line x1="436" y1="60" x2="436" y2="460" class="grid" />
  <line x1="490" y1="60" x2="490" y2="460" class="grid" />
  <line x1="544" y1="60" x2="544" y2="460" class="grid" />
  <line x1="598" y1="60" x2="598" y2="460" class="grid" />
  <line x1="652" y1="60" x2="652" y2="460" class="grid" />
  <line x1="706" y1="60" x2="706" y2="460" class="grid" />
  <line x1="760" y1="60" x2="760" y2="460" class="grid" />

  <!-- Task 1: Análise do Refrigerante — every 300h -->
  <text x="215" y="90" class="axis-label">Análise do</text>
  <text x="215" y="102" class="axis-label">Refrigerante</text>
  <g>
    <rect x="252" y="78" width="6" height="30" rx="2" fill="#333" />
    <rect x="285" y="78" width="6" height="30" rx="2" fill="#333" />
    <rect x="317" y="78" width="6" height="30" rx="2" fill="#333" />
    <rect x="350" y="78" width="6" height="30" rx="2" fill="#333" />
    <rect x="382" y="78" width="6" height="30" rx="2" fill="#333" />
    <rect x="414" y="78" width="6" height="30" rx="2" fill="#333" />
    <rect x="447" y="78" width="6" height="30" rx="2" fill="#333" />
    <rect x="479" y="78" width="6" height="30" rx="2" fill="#333" />
    <rect x="512" y="78" width="6" height="30" rx="2" fill="#333" />
    <rect x="544" y="78" width="6" height="30" rx="2" fill="#333" />
    <rect x="576" y="78" width="6" height="30" rx="2" fill="#333" />
    <rect x="609" y="78" width="6" height="30" rx="2" fill="#333" />
    <rect x="641" y="78" width="6" height="30" rx="2" fill="#333" />
    <rect x="674" y="78" width="6" height="30" rx="2" fill="#333" />
    <rect x="706" y="78" width="6" height="30" rx="2" fill="#333" />
    <rect x="738" y="78" width="6" height="30" rx="2" fill="#333" />
  </g>
  <text x="252" y="72" class="interval">300h</text>

  <!-- Task 2: Inspeção Visual — every 500h -->
  <text x="215" y="145" class="axis-label">Inspeção</text>
  <text x="215" y="157" class="axis-label">Visual Geral</text>
  <g>
    <rect x="274" y="133" width="6" height="30" rx="2" fill="#555" />
    <rect x="328" y="133" width="6" height="30" rx="2" fill="#555" />
    <rect x="382" y="133" width="6" height="30" rx="2" fill="#555" />
    <rect x="436" y="133" width="6" height="30" rx="2" fill="#555" />
    <rect x="490" y="133" width="6" height="30" rx="2" fill="#555" />
    <rect x="544" y="133" width="6" height="30" rx="2" fill="#555" />
    <rect x="598" y="133" width="6" height="30" rx="2" fill="#555" />
    <rect x="652" y="133" width="6" height="30" rx="2" fill="#555" />
    <rect x="706" y="133" width="6" height="30" rx="2" fill="#555" />
    <rect x="760" y="133" width="6" height="30" rx="2" fill="#555" />
  </g>
  <text x="274" y="127" class="interval">500h</text>

  <!-- Task 3: Inspeção Bombas — every 700h -->
  <text x="215" y="200" class="axis-label">Inspeção das</text>
  <text x="215" y="212" class="axis-label">Bombas</text>
  <g>
    <rect x="296" y="188" width="6" height="30" rx="2" fill="#777" />
    <rect x="371" y="188" width="6" height="30" rx="2" fill="#777" />
    <rect x="447" y="188" width="6" height="30" rx="2" fill="#777" />
    <rect x="522" y="188" width="6" height="30" rx="2" fill="#777" />
    <rect x="598" y="188" width="6" height="30" rx="2" fill="#777" />
    <rect x="673" y="188" width="6" height="30" rx="2" fill="#777" />
    <rect x="749" y="188" width="6" height="30" rx="2" fill="#777" />
  </g>
  <text x="296" y="182" class="interval">700h</text>

  <!-- Task 4: Calibração Sensores — every 1000h -->
  <text x="215" y="255" class="axis-label">Calibração de</text>
  <text x="215" y="267" class="axis-label">Sensores</text>
  <g>
    <rect x="328" y="243" width="8" height="30" rx="2" fill="#444" />
    <rect x="436" y="243" width="8" height="30" rx="2" fill="#444" />
    <rect x="544" y="243" width="8" height="30" rx="2" fill="#444" />
    <rect x="652" y="243" width="8" height="30" rx="2" fill="#444" />
    <rect x="760" y="243" width="8" height="30" rx="2" fill="#444" />
  </g>
  <text x="328" y="237" class="interval">1000h</text>

  <!-- Task 5: Limpeza Trocador — every 2000h -->
  <text x="215" y="310" class="axis-label">Limpeza do</text>
  <text x="215" y="322" class="axis-label">Trocador</text>
  <g>
    <rect x="436" y="298" width="12" height="30" rx="2" fill="#222" />
    <rect x="652" y="298" width="12" height="30" rx="2" fill="#222" />
  </g>
  <text x="436" y="292" class="interval">2000h</text>

  <!-- Task 6: Troca Filtros — every 3000h -->
  <text x="215" y="365" class="axis-label">Substituição</text>
  <text x="215" y="377" class="axis-label">de Filtros</text>
  <g>
    <rect x="544" y="353" width="12" height="30" rx="2" fill="#666" />
  </g>
  <text x="544" y="347" class="interval">3000h</text>

  <!-- Task 7: Flush Completo — every 5000h -->
  <text x="215" y="420" class="axis-label">Flush Completo</text>
  <text x="215" y="432" class="axis-label">+ Gaxetas</text>
  <g>
    <rect x="756" y="408" width="14" height="30" rx="2" fill="#000" />
  </g>
  <text x="756" y="402" class="interval">5000h</text>

  <!-- Legend -->
  <rect x="230" y="520" width="540" height="60" rx="6" fill="#fafafa" stroke="#ccc" stroke-width="0.8" />
  <text x="240" y="540" class="legend-text" font-weight="bold">Legenda de Duração Estimada:</text>

  <rect x="240" y="548" width="12" height="12" rx="2" fill="#333" />
  <text x="258" y="559" font-size="9" fill="#000" font-family="Arial">Análise: 0,5h</text>

  <rect x="340" y="548" width="12" height="12" rx="2" fill="#555" />
  <text x="358" y="559" font-size="9" fill="#000" font-family="Arial">Inspeção: 1-2h</text>

  <rect x="445" y="548" width="12" height="12" rx="2" fill="#222" />
  <text x="463" y="559" font-size="9" fill="#000" font-family="Arial">Limpeza: 5h</text>

  <rect x="540" y="548" width="12" height="12" rx="2" fill="#000" />
  <text x="558" y="559" font-size="9" fill="#000" font-family="Arial">Flush Completo: 8h + Gaxetas: 6h = 14h total</text>

  <text x="400" y="595" font-size="9" fill="#999" text-anchor="middle" font-family="Arial">NE-CRY-DIAG-005 Rev.4.2 — Cronograma de manutenção preventiva. Intervalos em horas de operação contínua do sistema.</text>
</svg>
