<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="800" height="600" viewBox="0 0 800 600">
  <defs>
    <style>
      text { font-family: Arial, Helvetica, sans-serif; fill: #333; }
      .title { font-size: 18px; font-weight: bold; }
      .label { font-size: 12px; }
      .label-bold { font-size: 12px; font-weight: bold; }
      .tick { font-size: 10px; fill: #555; }
      .bar-label { font-size: 11px; fill: #fff; font-weight: bold; }
      .note { font-size: 10px; fill: #555; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="800" height="600" fill="#f0f4f8" rx="8"/>

  <!-- Title -->
  <text x="400" y="35" text-anchor="middle" class="title">Cronograma de Manutencao Preventiva — Sistema SAG</text>
  <text x="400" y="55" text-anchor="middle" class="note">Intervalos em horas de hover — Veiculo Espacial Serie Nova ERA</text>

  <!-- Chart area -->
  <!-- Y-axis labels (service names) -->
  <!-- X-axis: 0 to 5000 hours, mapped to x: 250 to 750 -->
  <!-- Scale: 1 hour = (750-250)/5000 = 0.1 px -->

  <!-- Grid lines -->
  <line x1="250" y1="80" x2="250" y2="460" stroke="#333" stroke-width="1"/>
  <line x1="250" y1="460" x2="750" y2="460" stroke="#333" stroke-width="1"/>

  <!-- X-axis ticks and labels -->
  <!-- 0h -->
  <line x1="250" y1="460" x2="250" y2="468" stroke="#333" stroke-width="1"/>
  <text x="250" y="480" text-anchor="middle" class="tick">0</text>

  <!-- 500h -->
  <line x1="300" y1="80" x2="300" y2="460" stroke="#ddd" stroke-width="0.5"/>
  <line x1="300" y1="460" x2="300" y2="468" stroke="#333" stroke-width="1"/>
  <text x="300" y="480" text-anchor="middle" class="tick">500</text>

  <!-- 1000h -->
  <line x1="350" y1="80" x2="350" y2="460" stroke="#ddd" stroke-width="0.5"/>
  <line x1="350" y1="460" x2="350" y2="468" stroke="#333" stroke-width="1"/>
  <text x="350" y="480" text-anchor="middle" class="tick">1.000</text>

  <!-- 1500h -->
  <line x1="400" y1="80" x2="400" y2="460" stroke="#ddd" stroke-width="0.5"/>
  <line x1="400" y1="460" x2="400" y2="468" stroke="#333" stroke-width="1"/>
  <text x="400" y="480" text-anchor="middle" class="tick">1.500</text>

  <!-- 2000h -->
  <line x1="450" y1="80" x2="450" y2="460" stroke="#ddd" stroke-width="0.5"/>
  <line x1="450" y1="460" x2="450" y2="468" stroke="#333" stroke-width="1"/>
  <text x="450" y="480" text-anchor="middle" class="tick">2.000</text>

  <!-- 2500h -->
  <line x1="500" y1="80" x2="500" y2="460" stroke="#ddd" stroke-width="0.5"/>
  <line x1="500" y1="460" x2="500" y2="468" stroke="#333" stroke-width="1"/>
  <text x="500" y="480" text-anchor="middle" class="tick">2.500</text>

  <!-- 3000h -->
  <line x1="550" y1="80" x2="550" y2="460" stroke="#ddd" stroke-width="0.5"/>
  <line x1="550" y1="460" x2="550" y2="468" stroke="#333" stroke-width="1"/>
  <text x="550" y="480" text-anchor="middle" class="tick">3.000</text>

  <!-- 3500h -->
  <line x1="600" y1="80" x2="600" y2="460" stroke="#ddd" stroke-width="0.5"/>
  <line x1="600" y1="460" x2="600" y2="468" stroke="#333" stroke-width="1"/>
  <text x="600" y="480" text-anchor="middle" class="tick">3.500</text>

  <!-- 4000h -->
  <line x1="650" y1="80" x2="650" y2="460" stroke="#ddd" stroke-width="0.5"/>
  <line x1="650" y1="460" x2="650" y2="468" stroke="#333" stroke-width="1"/>
  <text x="650" y="480" text-anchor="middle" class="tick">4.000</text>

  <!-- 4500h -->
  <line x1="700" y1="80" x2="700" y2="460" stroke="#ddd" stroke-width="0.5"/>
  <line x1="700" y1="460" x2="700" y2="468" stroke="#333" stroke-width="1"/>
  <text x="700" y="480" text-anchor="middle" class="tick">4.500</text>

  <!-- 5000h -->
  <line x1="750" y1="460" x2="750" y2="468" stroke="#333" stroke-width="1"/>
  <text x="750" y="480" text-anchor="middle" class="tick">5.000</text>

  <text x="500" y="498" text-anchor="middle" class="label">Horas de Hover</text>

  <!-- Bar 1: Verificacao Sensores — every 150h (repeating) -->
  <!-- Show first occurrence at 150h, bar width representing the interval -->
  <text x="245" y="110" text-anchor="end" class="label">Verificacao Sensores</text>
  <text x="245" y="122" text-anchor="end" class="note">MP-SAG-001/002 (150h)</text>
  <!-- Repeating bars at 150, 300, 450, ... Show markers -->
  <rect x="265" y="98" width="8" height="28" rx="2" fill="#555"/>
  <rect x="280" y="98" width="8" height="28" rx="2" fill="#555"/>
  <rect x="295" y="98" width="8" height="28" rx="2" fill="#555"/>
  <rect x="310" y="98" width="8" height="28" rx="2" fill="#555"/>
  <rect x="325" y="98" width="8" height="28" rx="2" fill="#555"/>
  <rect x="340" y="98" width="8" height="28" rx="2" fill="#555"/>
  <rect x="355" y="98" width="8" height="28" rx="2" fill="#555"/>
  <rect x="370" y="98" width="8" height="28" rx="2" fill="#555"/>
  <rect x="385" y="98" width="8" height="28" rx="2" fill="#555"/>
  <rect x="400" y="98" width="8" height="28" rx="2" fill="#555"/>
  <rect x="415" y="98" width="8" height="28" rx="2" fill="#555"/>
  <rect x="430" y="98" width="8" height="28" rx="2" fill="#555"/>
  <rect x="445" y="98" width="8" height="28" rx="2" fill="#555"/>
  <rect x="460" y="98" width="8" height="28" rx="2" fill="#555"/>
  <rect x="475" y="98" width="8" height="28" rx="2" fill="#555"/>
  <rect x="490" y="98" width="8" height="28" rx="2" fill="#555"/>
  <rect x="505" y="98" width="8" height="28" rx="2" fill="#555"/>
  <rect x="520" y="98" width="8" height="28" rx="2" fill="#555"/>
  <rect x="535" y="98" width="8" height="28" rx="2" fill="#555"/>
  <rect x="550" y="98" width="8" height="28" rx="2" fill="#555"/>
  <rect x="565" y="98" width="8" height="28" rx="2" fill="#555"/>
  <rect x="580" y="98" width="8" height="28" rx="2" fill="#555"/>
  <rect x="595" y="98" width="8" height="28" rx="2" fill="#555"/>
  <rect x="610" y="98" width="8" height="28" rx="2" fill="#555"/>
  <rect x="625" y="98" width="8" height="28" rx="2" fill="#555"/>
  <rect x="640" y="98" width="8" height="28" rx="2" fill="#555"/>
  <rect x="655" y="98" width="8" height="28" rx="2" fill="#555"/>
  <rect x="670" y="98" width="8" height="28" rx="2" fill="#555"/>
  <rect x="685" y="98" width="8" height="28" rx="2" fill="#555"/>
  <rect x="700" y="98" width="8" height="28" rx="2" fill="#555"/>
  <rect x="715" y="98" width="8" height="28" rx="2" fill="#555"/>
  <rect x="730" y="98" width="8" height="28" rx="2" fill="#555"/>

  <!-- Bar 2: Nivel de Fluido — every 500h -->
  <text x="245" y="175" text-anchor="end" class="label">Nivel de Fluido</text>
  <text x="245" y="187" text-anchor="end" class="note">MP-SAG-004/005 (500h)</text>
  <!-- Bars at 500, 1000, 1500, ..., 4500 = x: 300, 350, 400, 450, 500, 550, 600, 650, 700 -->
  <rect x="298" y="163" width="14" height="28" rx="2" fill="#666"/>
  <rect x="348" y="163" width="14" height="28" rx="2" fill="#666"/>
  <rect x="398" y="163" width="14" height="28" rx="2" fill="#666"/>
  <rect x="448" y="163" width="14" height="28" rx="2" fill="#666"/>
  <rect x="498" y="163" width="14" height="28" rx="2" fill="#666"/>
  <rect x="548" y="163" width="14" height="28" rx="2" fill="#666"/>
  <rect x="598" y="163" width="14" height="28" rx="2" fill="#666"/>
  <rect x="648" y="163" width="14" height="28" rx="2" fill="#666"/>
  <rect x="698" y="163" width="14" height="28" rx="2" fill="#666"/>

  <!-- Bar 3: Torque Parafusos — every 1000h -->
  <text x="245" y="240" text-anchor="end" class="label">Torque Parafusos</text>
  <text x="245" y="252" text-anchor="end" class="note">MP-SAG-007 (1.000h)</text>
  <rect x="346" y="228" width="18" height="28" rx="2" fill="#777"/>
  <rect x="446" y="228" width="18" height="28" rx="2" fill="#777"/>
  <rect x="546" y="228" width="18" height="28" rx="2" fill="#777"/>
  <rect x="646" y="228" width="18" height="28" rx="2" fill="#777"/>

  <!-- Bar 4: Recalibracao Terreno — every 1500h -->
  <text x="245" y="305" text-anchor="end" class="label">Recalibracao Terreno</text>
  <text x="245" y="317" text-anchor="end" class="note">MP-SAG-009/010 (1.500h)</text>
  <rect x="395" y="293" width="22" height="28" rx="2" fill="#888"/>
  <rect x="545" y="293" width="22" height="28" rx="2" fill="#888"/>
  <rect x="695" y="293" width="22" height="28" rx="2" fill="#888"/>

  <!-- Bar 5: Troca Fluido FMR — every 2500h -->
  <text x="245" y="370" text-anchor="end" class="label">Troca Fluido FMR</text>
  <text x="245" y="382" text-anchor="end" class="note">MP-SAG-012/013 (2.500h)</text>
  <rect x="495" y="358" width="25" height="28" rx="2" fill="#999"/>
  <rect x="745" y="358" width="25" height="28" rx="2" fill="#999"/>

  <!-- Bar 6: Troca Repulsores — at 4500h -->
  <text x="245" y="435" text-anchor="end" class="label">Troca Repulsores</text>
  <text x="245" y="447" text-anchor="end" class="note">MP-SAG-014 (4.500h)</text>
  <rect x="695" y="423" width="30" height="28" rx="2" fill="#444"/>

  <!-- Legend -->
  <rect x="50" y="510" width="700" height="85" rx="6" fill="#fff" stroke="#333" stroke-width="1"/>
  <text x="70" y="530" class="label-bold">Legenda:</text>
  <rect x="150" y="538" width="12" height="12" rx="1" fill="#555"/>
  <text x="168" y="549" class="tick">150h — Alta frequencia</text>
  <rect x="300" y="538" width="12" height="12" rx="1" fill="#777"/>
  <text x="318" y="549" class="tick">1.000h — Media frequencia</text>
  <rect x="470" y="538" width="12" height="12" rx="1" fill="#999"/>
  <text x="488" y="549" class="tick">2.500h — Baixa frequencia</text>
  <rect x="630" y="538" width="12" height="12" rx="1" fill="#444"/>
  <text x="648" y="549" class="tick">4.500h — Revisao maior</text>

  <text x="400" y="580" text-anchor="middle" class="note">Cada barra representa uma intervencao programada. Respeitar intervalos para manter garantia do fabricante.</text>
</svg>
