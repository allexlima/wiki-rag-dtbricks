<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#333" />
    </marker>
  </defs>

  <!-- Background -->
  <rect width="800" height="600" fill="#f0f4f8" rx="8" />

  <!-- Title -->
  <text x="400" y="30" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#333">Fluxograma de Diagnostico — Escudo Deflector</text>

  <!-- START: Escudo Instavel? (diamond) -->
  <polygon points="400,55 500,95 400,135 300,95" fill="#f0f4f8" stroke="#333" stroke-width="2" />
  <text x="400" y="92" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#333">Escudo</text>
  <text x="400" y="105" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#333">Instavel?</text>

  <!-- NO branch (right) -->
  <line x1="500" y1="95" x2="570" y2="95" stroke="#333" stroke-width="2" marker-end="url(#arrow)" />
  <text x="535" y="88" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#333">NAO</text>
  <rect x="580" y="75" width="140" height="40" rx="5" fill="#f0f4f8" stroke="#333" stroke-width="2" />
  <text x="650" y="100" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#333">Sistema Normal</text>

  <!-- YES branch (down) -->
  <line x1="400" y1="135" x2="400" y2="165" stroke="#333" stroke-width="2" marker-end="url(#arrow)" />
  <text x="415" y="155" font-family="Arial, sans-serif" font-size="10" fill="#333">SIM</text>

  <!-- Step: Executar TIE -->
  <rect x="310" y="170" width="180" height="40" rx="5" fill="#f0f4f8" stroke="#333" stroke-width="2" />
  <text x="400" y="194" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#333">Executar TIE (Sec. 3.1)</text>

  <!-- Down arrow -->
  <line x1="400" y1="210" x2="400" y2="240" stroke="#333" stroke-width="2" marker-end="url(#arrow)" />

  <!-- Decision: Setores em vermelho? -->
  <polygon points="400,245 500,280 400,315 300,280" fill="#f0f4f8" stroke="#333" stroke-width="2" />
  <text x="400" y="277" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#333">Setores em</text>
  <text x="400" y="290" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#333">vermelho?</text>

  <!-- YES (left) - Emitter Failure path -->
  <line x1="300" y1="280" x2="210" y2="280" stroke="#333" stroke-width="2" marker-end="url(#arrow)" />
  <text x="255" y="273" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#333">SIM</text>

  <!-- Teste Emissor Individual -->
  <rect x="70" y="260" width="140" height="40" rx="5" fill="#f0f4f8" stroke="#333" stroke-width="2" />
  <text x="140" y="278" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#333">Teste de Emissor</text>
  <text x="140" y="292" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#333">Individual (Sec. 3.2)</text>

  <!-- Down from Emissor test -->
  <line x1="140" y1="300" x2="140" y2="325" stroke="#333" stroke-width="2" marker-end="url(#arrow)" />

  <!-- Decision: Emissor defeituoso? -->
  <polygon points="140,330 220,358 140,386 60,358" fill="#f0f4f8" stroke="#333" stroke-width="2" />
  <text x="140" y="355" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="#333">Emissor</text>
  <text x="140" y="367" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="#333">defeituoso?</text>

  <!-- YES from emissor defeituoso -->
  <line x1="140" y1="386" x2="140" y2="415" stroke="#333" stroke-width="2" marker-end="url(#arrow)" />
  <text x="155" y="405" font-family="Arial, sans-serif" font-size="10" fill="#333">SIM</text>

  <!-- Action: Substituir emissor -->
  <rect x="60" y="420" width="160" height="45" rx="5" fill="#f0f4f8" stroke="#333" stroke-width="2.5" />
  <text x="140" y="440" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#333">Substituir Emissor</text>
  <text x="140" y="455" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#333">(Secao 4.1 ou 4.2)</text>

  <!-- NO from emissor defeituoso (right) -->
  <line x1="220" y1="358" x2="280" y2="358" stroke="#333" stroke-width="1.5" marker-end="url(#arrow)" />
  <text x="250" y="352" font-family="Arial, sans-serif" font-size="9" fill="#333">NAO</text>

  <!-- Action: Verificar condutor -->
  <rect x="285" y="340" width="130" height="36" rx="5" fill="#f0f4f8" stroke="#333" stroke-width="1.5" />
  <text x="350" y="356" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#333">Verificar Condutor</text>
  <text x="350" y="369" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#333">(Secao 4.3)</text>

  <!-- NO branch from "Setores em vermelho?" (right) — Harmonics path -->
  <line x1="500" y1="280" x2="560" y2="280" stroke="#333" stroke-width="2" marker-end="url(#arrow)" />
  <text x="530" y="273" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#333">NAO</text>

  <!-- Análise Harmônica -->
  <rect x="565" y="260" width="160" height="40" rx="5" fill="#f0f4f8" stroke="#333" stroke-width="2" />
  <text x="645" y="278" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#333">Analise Harmonica</text>
  <text x="645" y="292" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#333">(Secao 3.3)</text>

  <!-- Down from Harmônica -->
  <line x1="645" y1="300" x2="645" y2="325" stroke="#333" stroke-width="2" marker-end="url(#arrow)" />

  <!-- Decision: Harmonicas fora? -->
  <polygon points="645,330 730,358 645,386 560,358" fill="#f0f4f8" stroke="#333" stroke-width="2" />
  <text x="645" y="355" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="#333">Harmonicas</text>
  <text x="645" y="367" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="#333">fora?</text>

  <!-- YES: Recalibração -->
  <line x1="645" y1="386" x2="645" y2="415" stroke="#333" stroke-width="2" marker-end="url(#arrow)" />
  <text x="660" y="405" font-family="Arial, sans-serif" font-size="10" fill="#333">SIM</text>

  <rect x="565" y="420" width="160" height="45" rx="5" fill="#f0f4f8" stroke="#333" stroke-width="2.5" />
  <text x="645" y="440" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#333">Recalibracao</text>
  <text x="645" y="455" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#333">Harmonica (Sec. 5.6)</text>

  <!-- NO from harmonicas (left-down) -->
  <line x1="560" y1="358" x2="490" y2="358" stroke="#333" stroke-width="1.5" marker-end="url(#arrow)" />
  <text x="525" y="352" font-family="Arial, sans-serif" font-size="9" fill="#333">NAO</text>

  <!-- Diagnóstico Distribuidor -->
  <rect x="370" y="400" width="160" height="40" rx="5" fill="#f0f4f8" stroke="#333" stroke-width="2" />
  <text x="450" y="418" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#333">Diagnostico do</text>
  <text x="450" y="432" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#333">Distribuidor (Sec. 3.4)</text>

  <line x1="450" y1="340" x2="450" y2="395" stroke="#333" stroke-width="1.5" marker-end="url(#arrow)" />

  <!-- Decision: Distribuidor com falha? -->
  <line x1="450" y1="440" x2="450" y2="470" stroke="#333" stroke-width="1.5" marker-end="url(#arrow)" />

  <polygon points="450,475 530,500 450,525 370,500" fill="#f0f4f8" stroke="#333" stroke-width="2" />
  <text x="450" y="498" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="#333">Distribuidor</text>
  <text x="450" y="510" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="#333">com falha?</text>

  <!-- YES -->
  <line x1="450" y1="525" x2="450" y2="555" stroke="#333" stroke-width="1.5" marker-end="url(#arrow)" />
  <text x="465" y="545" font-family="Arial, sans-serif" font-size="9" fill="#333">SIM</text>

  <rect x="370" y="558" width="160" height="35" rx="5" fill="#f0f4f8" stroke="#333" stroke-width="2.5" />
  <text x="450" y="580" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#333">Reparar Distribuidor</text>

  <!-- NO from distribuidor -->
  <line x1="530" y1="500" x2="600" y2="500" stroke="#333" stroke-width="1.5" marker-end="url(#arrow)" />
  <text x="565" y="494" font-family="Arial, sans-serif" font-size="9" fill="#333">NAO</text>

  <rect x="605" y="485" width="150" height="35" rx="5" fill="#f0f4f8" stroke="#333" stroke-width="1.5" />
  <text x="680" y="507" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#333">Escalar para Eng.</text>

  <!-- Final: Realinhamento box at bottom -->
  <line x1="140" y1="465" x2="140" y2="545" stroke="#333" stroke-width="1.5" />
  <line x1="140" y1="545" x2="220" y2="545" stroke="#333" stroke-width="1.5" marker-end="url(#arrow)" />
  <line x1="645" y1="465" x2="645" y2="545" stroke="#333" stroke-width="1.5" />
  <line x1="645" y1="545" x2="345" y2="545" stroke="#333" stroke-width="1.5" />

  <!-- Merge to Realinhamento -->
  <rect x="225" y="530" width="120" height="35" rx="5" fill="#f0f4f8" stroke="#333" stroke-width="2" />
  <text x="285" y="550" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#333">Realinhamento</text>
  <text x="285" y="562" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#333">(Secao 4.4)</text>
</svg>
