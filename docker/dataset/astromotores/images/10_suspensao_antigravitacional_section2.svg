<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="800" height="600" viewBox="0 0 800 600">
  <defs>
    <marker id="dim-arrow-l" markerWidth="8" markerHeight="6" refX="0" refY="3" orient="auto">
      <polygon points="8 0, 0 3, 8 6" fill="#333"/>
    </marker>
    <marker id="dim-arrow-r" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#333"/>
    </marker>
    <style>
      text { font-family: Arial, Helvetica, sans-serif; fill: #333; }
      .title { font-size: 18px; font-weight: bold; }
      .label { font-size: 12px; font-weight: bold; }
      .dim { font-size: 11px; }
      .sublabel { font-size: 10px; fill: #555; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="800" height="600" fill="#f0f4f8" rx="8"/>

  <!-- Title -->
  <text x="400" y="35" text-anchor="middle" class="title">Desenho Dimensional — Modulo Repulsor (Corte Transversal)</text>

  <!-- Outer casing (cross-section) -->
  <rect x="200" y="80" width="380" height="130" rx="10" fill="#fff" stroke="#333" stroke-width="2.5"/>
  <!-- Label: Capa Protetora -->
  <text x="390" y="100" text-anchor="middle" class="label">Capa Protetora</text>
  <text x="390" y="114" text-anchor="middle" class="sublabel">NE-AGS-1050 — Liga Ti-Gv</text>

  <!-- Bobina Repulsora (inner ring, shown as rectangle in cross-section) -->
  <rect x="240" y="115" width="300" height="45" rx="4" fill="#e8e8e8" stroke="#333" stroke-width="2"/>
  <text x="390" y="142" text-anchor="middle" class="label">Bobina Repulsora</text>

  <!-- Sensor de Proximidade (small circle on bottom center) -->
  <circle cx="390" cy="225" r="14" fill="#fff" stroke="#333" stroke-width="2"/>
  <text x="390" y="229" text-anchor="middle" style="font-size:9px; fill:#333;">S</text>

  <!-- Label line for Sensor -->
  <line x1="404" y1="225" x2="520" y2="250" stroke="#333" stroke-width="1"/>
  <text x="525" y="248" class="label">Sensor de Proximidade</text>
  <text x="525" y="262" class="sublabel">NE-AGS-1020 — Ø28 mm</text>

  <!-- Amortecedor Fluido (chambers on sides) -->
  <rect x="220" y="165" width="70" height="55" rx="3" fill="#d8dce3" stroke="#333" stroke-width="1.5"/>
  <rect x="490" y="165" width="70" height="55" rx="3" fill="#d8dce3" stroke="#333" stroke-width="1.5"/>

  <!-- Label for left damper -->
  <line x1="220" y1="192" x2="120" y2="250" stroke="#333" stroke-width="1"/>
  <text x="30" y="248" class="label">Amortecedor Fluido</text>
  <text x="30" y="262" class="sublabel">Camara: 340 ml NE-FMR-220</text>

  <!-- Reservatório de fluido (small rectangle above damper) -->
  <rect x="222" y="168" width="20" height="30" rx="2" fill="#c0c8d4" stroke="#333" stroke-width="1"/>
  <line x1="222" y1="175" x2="160" y2="175" stroke="#333" stroke-width="1"/>
  <line x1="160" y1="175" x2="160" y2="310" stroke="#333" stroke-width="1"/>
  <text x="60" y="308" class="label">Reservatorio de Fluido</text>
  <text x="60" y="322" class="sublabel">NE-AGS-3010 — Visor de nivel</text>

  <!-- Base de Montagem (flange) -->
  <rect x="170" y="210" width="440" height="20" rx="2" fill="#ddd" stroke="#333" stroke-width="2"/>

  <!-- Mounting bolt holes -->
  <circle cx="195" cy="220" r="6" fill="#f0f4f8" stroke="#333" stroke-width="1.5"/>
  <circle cx="585" cy="220" r="6" fill="#f0f4f8" stroke="#333" stroke-width="1.5"/>

  <!-- Label: Base de Montagem -->
  <line x1="610" y1="220" x2="660" y2="280" stroke="#333" stroke-width="1"/>
  <text x="540" y="298" class="label">Base de Montagem (Flange)</text>
  <text x="540" y="312" class="sublabel">8x M12 — PCD 400 mm</text>

  <!-- Dimension lines -->
  <!-- Overall width: 380 mm -->
  <line x1="200" y1="60" x2="200" y2="75" stroke="#333" stroke-width="1"/>
  <line x1="580" y1="60" x2="580" y2="75" stroke="#333" stroke-width="1"/>
  <line x1="200" y1="67" x2="380" y2="67" stroke="#333" stroke-width="1" marker-start="url(#dim-arrow-l)"/>
  <line x1="400" y1="67" x2="580" y2="67" stroke="#333" stroke-width="1" marker-end="url(#dim-arrow-r)"/>
  <text x="390" y="64" text-anchor="middle" class="dim">Ø 380 mm</text>

  <!-- Bobina width: 320 mm -->
  <line x1="240" y1="108" x2="240" y2="115" stroke="#333" stroke-width="0.8"/>
  <line x1="540" y1="108" x2="540" y2="115" stroke="#333" stroke-width="0.8"/>
  <line x1="240" y1="111" x2="380" y2="111" stroke="#333" stroke-width="0.8" marker-start="url(#dim-arrow-l)"/>
  <line x1="400" y1="111" x2="540" y2="111" stroke="#333" stroke-width="0.8" marker-end="url(#dim-arrow-r)"/>
  <text x="390" y="109" text-anchor="middle" class="dim">Ø 320 mm</text>

  <!-- Height: 145 mm -->
  <line x1="600" y1="80" x2="630" y2="80" stroke="#333" stroke-width="1"/>
  <line x1="600" y1="230" x2="630" y2="230" stroke="#333" stroke-width="1"/>
  <line x1="625" y1="80" x2="625" y2="148" stroke="#333" stroke-width="1" marker-start="url(#dim-arrow-l)"/>
  <line x1="625" y1="160" x2="625" y2="230" stroke="#333" stroke-width="1" marker-end="url(#dim-arrow-r)"/>
  <text x="632" y="158" class="dim">145 mm</text>

  <!-- Bobina thickness: 42 mm -->
  <line x1="155" y1="115" x2="175" y2="115" stroke="#333" stroke-width="0.8"/>
  <line x1="155" y1="160" x2="175" y2="160" stroke="#333" stroke-width="0.8"/>
  <line x1="165" y1="115" x2="165" y2="132" stroke="#333" stroke-width="0.8" marker-start="url(#dim-arrow-l)"/>
  <line x1="165" y1="143" x2="165" y2="160" stroke="#333" stroke-width="0.8" marker-end="url(#dim-arrow-r)"/>
  <text x="140" y="140" text-anchor="middle" class="dim">42</text>

  <!-- Parts table at bottom -->
  <rect x="50" y="360" width="700" height="220" rx="6" fill="#fff" stroke="#333" stroke-width="1"/>
  <text x="400" y="385" text-anchor="middle" class="label">Especificacoes do Modulo Repulsor</text>

  <line x1="50" y1="395" x2="750" y2="395" stroke="#333" stroke-width="1"/>

  <!-- Table headers -->
  <text x="70" y="415" class="sublabel" font-weight="bold">Componente</text>
  <text x="280" y="415" class="sublabel" font-weight="bold">Peca</text>
  <text x="430" y="415" class="sublabel" font-weight="bold">Material</text>
  <text x="600" y="415" class="sublabel" font-weight="bold">Dimensao</text>

  <line x1="50" y1="422" x2="750" y2="422" stroke="#333" stroke-width="0.5"/>

  <!-- Row 1 -->
  <text x="70" y="440" class="sublabel">Capa Protetora</text>
  <text x="280" y="440" class="sublabel">NE-AGS-1050</text>
  <text x="430" y="440" class="sublabel">Liga Ti-Gv</text>
  <text x="600" y="440" class="sublabel">Ø 380 x 145 mm</text>

  <!-- Row 2 -->
  <text x="70" y="460" class="sublabel">Bobina Repulsora</text>
  <text x="280" y="460" class="sublabel">NE-AGS-1010</text>
  <text x="430" y="460" class="sublabel">Gravitonium-7</text>
  <text x="600" y="460" class="sublabel">Ø 320 x 42 mm</text>

  <!-- Row 3 -->
  <text x="70" y="480" class="sublabel">Sensor Proximidade</text>
  <text x="280" y="480" class="sublabel">NE-AGS-1020</text>
  <text x="430" y="480" class="sublabel">Ceramica GvR</text>
  <text x="600" y="480" class="sublabel">Ø 28 mm</text>

  <!-- Row 4 -->
  <text x="70" y="500" class="sublabel">Camara Amortecimento</text>
  <text x="280" y="500" class="sublabel">NE-AGS-3010</text>
  <text x="430" y="500" class="sublabel">Aco Inox 316L</text>
  <text x="600" y="500" class="sublabel">340 ml</text>

  <!-- Row 5 -->
  <text x="70" y="520" class="sublabel">Base de Montagem</text>
  <text x="280" y="520" class="sublabel">NE-AGS-1060</text>
  <text x="430" y="520" class="sublabel">Liga Al-Gv</text>
  <text x="600" y="520" class="sublabel">PCD 400 mm, 8x M12</text>

  <!-- Row 6 -->
  <text x="70" y="540" class="sublabel">Parafusos Montagem</text>
  <text x="280" y="540" class="sublabel">NE-AGS-5020</text>
  <text x="430" y="540" class="sublabel">Aco GrS8</text>
  <text x="600" y="540" class="sublabel">M12 x 35 mm</text>

  <text x="400" y="570" text-anchor="middle" class="sublabel">Torque de montagem: 45 ± 2 N.m — Padrao estrela — 3 passes progressivos</text>
</svg>
