<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="800" height="600" viewBox="0 0 800 600">
  <title>Vista Explodida — Painel de Controle Holográfico</title>
  <style>
    text { font-family: monospace; font-size: 11px; fill: #222; }
    .title { font-size: 15px; font-weight: bold; }
    .part { fill: #f5f5f5; stroke: #222; stroke-width: 1.5; }
    .partlabel { font-size: 10px; fill: #444; }
    .num { font-size: 13px; font-weight: bold; fill: #222; }
    .leader { stroke: #888; stroke-width: 0.8; stroke-dasharray: 3,2; }
    .explosion { stroke: #aaa; stroke-width: 0.6; stroke-dasharray: 1,3; }
  </style>

  <text x="400" y="28" text-anchor="middle" class="title">Vista Explodida — Conjunto PCH</text>
  <text x="400" y="45" text-anchor="middle" class="partlabel">Veículo Espacial Série Nova ERA | MR-HUD-012</text>

  <!-- Explosion axis lines -->
  <line x1="400" y1="60" x2="400" y2="590" class="explosion"/>

  <!-- 1. Moldura Frontal (topmost) -->
  <rect x="250" y="55" width="300" height="40" rx="8" class="part"/>
  <text x="400" y="78" text-anchor="middle">Moldura Frontal</text>
  <circle cx="220" cy="75" r="10" fill="white" stroke="#222" stroke-width="1.5"/>
  <text x="220" y="79" text-anchor="middle" class="num">1</text>
  <line x1="230" y1="75" x2="250" y2="75" class="leader"/>
  <text x="580" y="78" class="partlabel">NE-HUD-1201</text>

  <!-- 2. Projetor Holográfico -->
  <rect x="280" y="115" width="240" height="50" rx="4" class="part"/>
  <ellipse cx="400" cy="140" rx="20" ry="15" fill="none" stroke="#222" stroke-width="1"/>
  <text x="400" y="145" text-anchor="middle" class="partlabel">LENS</text>
  <text x="400" y="160" text-anchor="middle">Projetor Holográfico</text>
  <circle cx="220" cy="140" r="10" fill="white" stroke="#222" stroke-width="1.5"/>
  <text x="220" y="144" text-anchor="middle" class="num">2</text>
  <line x1="230" y1="140" x2="280" y2="140" class="leader"/>
  <text x="580" y="140" class="partlabel">NE-HUD-1220</text>

  <!-- 3. Lente Colimadora -->
  <ellipse cx="400" cy="190" rx="35" ry="12" class="part"/>
  <text x="400" y="195" text-anchor="middle">Lente Colimadora</text>
  <circle cx="220" cy="190" r="10" fill="white" stroke="#222" stroke-width="1.5"/>
  <text x="220" y="194" text-anchor="middle" class="num">3</text>
  <line x1="230" y1="190" x2="365" y2="190" class="leader"/>
  <text x="580" y="195" class="partlabel">NE-HUD-1220-L</text>

  <!-- 4. Placa de Sensores (superior) -->
  <rect x="260" y="220" width="280" height="25" rx="2" class="part" fill="#eaeaea"/>
  <circle cx="300" cy="232" r="4" fill="#222"/>
  <circle cx="360" cy="232" r="4" fill="#222"/>
  <circle cx="420" cy="232" r="4" fill="#222"/>
  <circle cx="480" cy="232" r="4" fill="#222"/>
  <text x="400" y="237" text-anchor="middle" class="partlabel">Barra Sensores IR</text>
  <circle cx="220" cy="232" r="10" fill="white" stroke="#222" stroke-width="1.5"/>
  <text x="220" y="236" text-anchor="middle" class="num">4</text>
  <line x1="230" y1="232" x2="260" y2="232" class="leader"/>
  <text x="580" y="237" class="partlabel">NE-HUD-1240</text>

  <!-- 5. Rastreamento Ocular -->
  <rect x="300" y="265" width="100" height="35" rx="3" class="part"/>
  <text x="350" y="285" text-anchor="middle">Rastr. Ocular</text>
  <circle cx="220" cy="282" r="10" fill="white" stroke="#222" stroke-width="1.5"/>
  <text x="220" y="286" text-anchor="middle" class="num">5</text>
  <line x1="230" y1="282" x2="300" y2="282" class="leader"/>
  <text x="580" y="285" class="partlabel">NE-HUD-1230</text>

  <!-- 6. Processador Gráfico -->
  <rect x="420" y="265" width="120" height="35" rx="3" class="part"/>
  <text x="480" y="285" text-anchor="middle">Processador GFX</text>
  <circle cx="570" cy="282" r="10" fill="white" stroke="#222" stroke-width="1.5"/>
  <text x="570" y="286" text-anchor="middle" class="num">6</text>
  <line x1="540" y1="282" x2="560" y2="282" class="leader"/>
  <text x="615" y="285" class="partlabel">NE-HUD-1210</text>

  <!-- 7. Barramento de Dados -->
  <rect x="300" y="320" width="200" height="22" rx="2" class="part" fill="#e5e5e5"/>
  <text x="400" y="335" text-anchor="middle">Barramento SpaceBus 4.0</text>
  <circle cx="220" cy="331" r="10" fill="white" stroke="#222" stroke-width="1.5"/>
  <text x="220" y="335" text-anchor="middle" class="num">7</text>
  <line x1="230" y1="331" x2="300" y2="331" class="leader"/>
  <text x="580" y="335" class="partlabel">NE-HUD-1270</text>

  <!-- 8. Controlador Háptico -->
  <rect x="320" y="360" width="160" height="35" rx="3" class="part"/>
  <text x="400" y="381" text-anchor="middle">Controlador Háptico</text>
  <circle cx="220" cy="377" r="10" fill="white" stroke="#222" stroke-width="1.5"/>
  <text x="220" y="381" text-anchor="middle" class="num">8</text>
  <line x1="230" y1="377" x2="320" y2="377" class="leader"/>
  <text x="580" y="381" class="partlabel">NE-HUD-1250</text>

  <!-- 9. Módulo Háptico (transdutores) -->
  <rect x="270" y="415" width="260" height="35" rx="3" class="part" fill="#eaeaea"/>
  <text x="400" y="436" text-anchor="middle">Módulo Háptico (Transdutores)</text>
  <!-- transducer dots -->
  <g>
    <circle cx="290" cy="425" r="2.5" fill="#222"/>
    <circle cx="310" cy="425" r="2.5" fill="#222"/>
    <circle cx="330" cy="425" r="2.5" fill="#222"/>
    <circle cx="350" cy="425" r="2.5" fill="#222"/>
    <circle cx="370" cy="425" r="2.5" fill="#222"/>
    <circle cx="390" cy="425" r="2.5" fill="#222"/>
    <circle cx="410" cy="425" r="2.5" fill="#222"/>
    <circle cx="430" cy="425" r="2.5" fill="#222"/>
    <circle cx="450" cy="425" r="2.5" fill="#222"/>
    <circle cx="470" cy="425" r="2.5" fill="#222"/>
    <circle cx="490" cy="425" r="2.5" fill="#222"/>
    <circle cx="510" cy="425" r="2.5" fill="#222"/>
  </g>
  <circle cx="220" cy="432" r="10" fill="white" stroke="#222" stroke-width="1.5"/>
  <text x="220" y="436" text-anchor="middle" class="num">9</text>
  <line x1="230" y1="432" x2="270" y2="432" class="leader"/>
  <text x="580" y="436" class="partlabel">NE-HUD-1260</text>

  <!-- 10. Kit de parafusos -->
  <g transform="translate(280,470)">
    <line x1="0" y1="10" x2="8" y2="0" stroke="#222" stroke-width="1.5"/>
    <circle cx="4" cy="0" r="4" fill="none" stroke="#222" stroke-width="1"/>
    <line x1="25" y1="10" x2="33" y2="0" stroke="#222" stroke-width="1.5"/>
    <circle cx="29" cy="0" r="4" fill="none" stroke="#222" stroke-width="1"/>
    <line x1="50" y1="10" x2="58" y2="0" stroke="#222" stroke-width="1.5"/>
    <circle cx="54" cy="0" r="4" fill="none" stroke="#222" stroke-width="1"/>
    <line x1="75" y1="10" x2="83" y2="0" stroke="#222" stroke-width="1.5"/>
    <circle cx="79" cy="0" r="4" fill="none" stroke="#222" stroke-width="1"/>
  </g>
  <text x="400" y="490" text-anchor="middle">Kit de Parafusos e Arruelas</text>
  <circle cx="220" cy="480" r="10" fill="white" stroke="#222" stroke-width="1.5"/>
  <text x="220" y="484" text-anchor="middle" class="num">10</text>
  <line x1="230" y1="480" x2="278" y2="480" class="leader"/>
  <text x="580" y="485" class="partlabel">NE-HUD-1290</text>

  <!-- 11. Estrutura Traseira (bottommost) -->
  <rect x="240" y="510" width="320" height="45" rx="6" class="part" fill="#ddd" stroke-width="2"/>
  <text x="400" y="537" text-anchor="middle">Estrutura Traseira</text>
  <circle cx="220" cy="532" r="10" fill="white" stroke="#222" stroke-width="1.5"/>
  <text x="220" y="536" text-anchor="middle" class="num">11</text>
  <line x1="230" y1="532" x2="240" y2="532" class="leader"/>
  <text x="580" y="537" class="partlabel">NE-HUD-1200</text>

  <!-- Assembly direction arrow -->
  <text x="720" y="80" text-anchor="middle" class="partlabel">Montagem</text>
  <line x1="720" y1="90" x2="720" y2="550" stroke="#222" stroke-width="1.5" marker-end="url(#down)"/>
  <defs>
    <marker id="down" markerWidth="8" markerHeight="6" refX="4" refY="6" orient="auto">
      <polygon points="0 0, 8 0, 4 6" fill="#222"/>
    </marker>
  </defs>
</svg>
