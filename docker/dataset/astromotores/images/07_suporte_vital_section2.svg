<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="800" height="600" viewBox="0 0 800 600">
  <defs>
    <marker id="dim-arrow-l" markerWidth="8" markerHeight="6" refX="0" refY="3" orient="auto">
      <polygon points="8 0, 0 3, 8 6" fill="#333" />
    </marker>
    <marker id="dim-arrow-r" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#333" />
    </marker>
    <style>
      text { font-family: 'Segoe UI', Arial, sans-serif; fill: #333; }
      .title { font-size: 18px; font-weight: bold; }
      .subtitle { font-size: 12px; font-style: italic; }
      .label { font-size: 12px; font-weight: bold; }
      .dim { font-size: 11px; }
      .detail { font-size: 10px; }
      .outline { fill: #f0f4f8; stroke: #333; stroke-width: 2; }
      .inner { fill: #ffffff; stroke: #333; stroke-width: 1.5; }
      .dim-line { stroke: #333; stroke-width: 0.8; }
      .dim-ext { stroke: #333; stroke-width: 0.5; stroke-dasharray: 3,3; }
      .center-line { stroke: #333; stroke-width: 0.5; stroke-dasharray: 10,3,2,3; }
    </style>
  </defs>

  <rect width="800" height="600" fill="#ffffff" />

  <!-- Title -->
  <text x="400" y="30" text-anchor="middle" class="title">Desenho Dimensional — Módulo de Filtro e Geração</text>
  <text x="400" y="48" text-anchor="middle" class="subtitle">Vista em corte transversal — NE-LSS-7711 / NE-LSS-7710 / NE-LSS-7720</text>

  <!-- Main housing outline -->
  <rect x="100" y="90" width="560" height="340" class="outline" rx="5" />

  <!-- Center line horizontal -->
  <line x1="90" y1="260" x2="670" y2="260" class="center-line" />

  <!-- Cartucho de Filtro CO₂ (left cylinder) -->
  <rect x="130" y="170" width="180" height="180" class="inner" rx="10" />
  <ellipse cx="220" cy="170" rx="70" ry="15" fill="#f0f4f8" stroke="#333" stroke-width="1.5" />
  <ellipse cx="220" cy="350" rx="70" ry="15" fill="#f0f4f8" stroke="#333" stroke-width="1.5" />
  <!-- Inner cartridge -->
  <rect x="155" y="190" width="130" height="140" fill="#e8ecf0" stroke="#333" stroke-width="1" rx="5" />
  <text x="220" y="250" text-anchor="middle" class="label">Cartucho de</text>
  <text x="220" y="265" text-anchor="middle" class="label">Filtro CO₂</text>
  <text x="220" y="282" text-anchor="middle" class="detail">NE-LSS-7710</text>
  <text x="220" y="296" text-anchor="middle" class="detail">Zeólita ZAM-4</text>
  <!-- O-rings -->
  <rect x="148" y="195" width="144" height="6" fill="#999" stroke="#333" stroke-width="0.5" rx="3" />
  <rect x="148" y="322" width="144" height="6" fill="#999" stroke="#333" stroke-width="0.5" rx="3" />
  <text x="310" y="200" class="detail">Anel vedação NE-LSS-7712</text>
  <line x1="295" y1="198" x2="265" y2="198" class="dim-line" />
  <text x="310" y="330" class="detail">Anel vedação NE-LSS-7712</text>
  <line x1="295" y1="328" x2="265" y2="325" class="dim-line" />

  <!-- Câmara de Reação (center) -->
  <rect x="340" y="155" width="120" height="210" class="inner" rx="5" />
  <text x="400" y="240" text-anchor="middle" class="label">Câmara de</text>
  <text x="400" y="255" text-anchor="middle" class="label">Reação</text>
  <text x="400" y="272" text-anchor="middle" class="detail">⌀ 220 mm</text>
  <!-- Connection from filter to chamber -->
  <rect x="310" y="240" width="30" height="40" fill="#f0f4f8" stroke="#333" stroke-width="1" />

  <!-- Bomba de Circulação (right top) -->
  <circle cx="560" cy="190" r="55" class="inner" />
  <circle cx="560" cy="190" r="30" fill="#e8ecf0" stroke="#333" stroke-width="1" />
  <text x="560" y="185" text-anchor="middle" class="label">Bomba de</text>
  <text x="560" y="200" text-anchor="middle" class="label">Circulação</text>
  <text x="560" y="260" text-anchor="middle" class="detail">NE-LSS-7715</text>
  <!-- Impeller lines -->
  <line x1="540" y1="175" x2="560" y2="190" stroke="#333" stroke-width="1" />
  <line x1="560" y1="190" x2="580" y2="175" stroke="#333" stroke-width="1" />
  <line x1="545" y1="205" x2="560" y2="190" stroke="#333" stroke-width="1" />
  <line x1="560" y1="190" x2="575" y2="205" stroke="#333" stroke-width="1" />

  <!-- Válvula de Segurança (right bottom) -->
  <rect x="510" y="310" width="100" height="60" class="inner" rx="3" />
  <text x="560" y="338" text-anchor="middle" class="label">Válvula de</text>
  <text x="560" y="353" text-anchor="middle" class="label">Segurança</text>
  <text x="560" y="385" text-anchor="middle" class="detail">NE-LSS-7740</text>
  <!-- Spring symbol -->
  <path d="M 540 315 L 545 310 L 555 320 L 565 310 L 575 320 L 580 315" fill="none" stroke="#333" stroke-width="1" />

  <!-- ===== DIMENSIONS ===== -->

  <!-- Overall width: 1120 mm (represented as 560px) -->
  <line x1="100" y1="460" x2="100" y2="440" class="dim-ext" />
  <line x1="660" y1="460" x2="660" y2="440" class="dim-ext" />
  <line x1="100" y1="455" x2="660" y2="455" class="dim-line" marker-start="url(#dim-arrow-l)" marker-end="url(#dim-arrow-r)" />
  <text x="380" y="470" text-anchor="middle" class="dim">1.120 mm (comprimento total)</text>

  <!-- Overall height: 520 mm -->
  <line x1="690" y1="90" x2="720" y2="90" class="dim-ext" />
  <line x1="690" y1="430" x2="720" y2="430" class="dim-ext" />
  <line x1="710" y1="90" x2="710" y2="430" class="dim-line" marker-start="url(#dim-arrow-l)" marker-end="url(#dim-arrow-r)" />
  <text x="745" y="265" text-anchor="middle" class="dim" transform="rotate(90,745,265)">520 mm (altura)</text>

  <!-- Cartridge diameter: 180 mm -->
  <line x1="150" y1="380" x2="150" y2="400" class="dim-ext" />
  <line x1="290" y1="380" x2="290" y2="400" class="dim-ext" />
  <line x1="150" y1="395" x2="290" y2="395" class="dim-line" marker-start="url(#dim-arrow-l)" marker-end="url(#dim-arrow-r)" />
  <text x="220" y="412" text-anchor="middle" class="dim">⌀ 180 mm</text>

  <!-- Cartridge length: 450 mm -->
  <line x1="120" y1="170" x2="120" y2="350" class="dim-line" marker-start="url(#dim-arrow-l)" marker-end="url(#dim-arrow-r)" />
  <line x1="130" y1="170" x2="115" y2="170" class="dim-ext" />
  <line x1="130" y1="350" x2="115" y2="350" class="dim-ext" />
  <text x="105" y="265" text-anchor="middle" class="dim" transform="rotate(-90,105,265)">450 mm</text>

  <!-- Duct diameter -->
  <text x="400" y="150" text-anchor="middle" class="dim">Dutos: ⌀ 76,2 mm (3")</text>

  <!-- Housing label -->
  <text x="380" y="105" text-anchor="middle" class="label">Carcaça NE-LSS-7711 — Liga Al 7075-T6</text>

  <!-- Inlet/Outlet arrows -->
  <polygon points="90,250 100,240 100,260" fill="#333" />
  <text x="80" y="240" text-anchor="end" class="detail">Entrada</text>
  <text x="80" y="252" text-anchor="end" class="detail">de Ar</text>

  <polygon points="670,250 660,240 660,260" fill="#333" />
  <text x="680" y="240" class="detail">Saída</text>
  <text x="680" y="252" class="detail">p/ Cabine</text>

  <!-- Scale reference -->
  <rect x="30" y="540" width="100" height="3" fill="#333" />
  <text x="80" y="560" text-anchor="middle" class="dim">Escala: 1:4</text>

  <!-- Drawing info -->
  <text x="600" y="545" text-anchor="middle" class="detail">Desenho: DWG-LSS-07-002 | Rev. 4.2</text>
  <text x="600" y="560" text-anchor="middle" class="detail">Material da carcaça: Al 7075-T6 | Peso total: 28,5 kg</text>
</svg>
