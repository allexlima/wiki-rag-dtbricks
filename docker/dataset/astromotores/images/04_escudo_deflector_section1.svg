<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#333" />
    </marker>
  </defs>

  <!-- Background -->
  <rect width="800" height="600" fill="#f0f4f8" rx="8" />

  <!-- Title -->
  <text x="400" y="40" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#333">Diagrama de Blocos — Sistema de Escudo Deflector de Partículas</text>

  <!-- Reator Principal -->
  <rect x="60" y="120" width="180" height="80" rx="6" fill="#f0f4f8" stroke="#333" stroke-width="2" />
  <text x="150" y="155" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#333">Reator Principal</text>
  <text x="150" y="175" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#333">NE-PWR-1000</text>
  <text x="150" y="192" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#333">12.000 VAC / 60 Hz</text>

  <!-- Arrow 1 -->
  <line x1="240" y1="160" x2="300" y2="160" stroke="#333" stroke-width="2" marker-end="url(#arrowhead)" />
  <text x="270" y="150" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#333">Barramento</text>
  <text x="270" y="138" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#333">Alta Tensão</text>

  <!-- Distribuidor de Energia -->
  <rect x="310" y="100" width="180" height="120" rx="6" fill="#f0f4f8" stroke="#333" stroke-width="2" />
  <text x="400" y="135" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#333">Distribuidor de</text>
  <text x="400" y="155" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#333">Energia do Escudo</text>
  <text x="400" y="175" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#333">NE-DEF-4100</text>
  <text x="400" y="192" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#333">4 Módulos Conversores</text>
  <text x="400" y="207" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#333">800 VDC saída</text>

  <!-- Arrows from Distribuidor to 3 emitter rings -->
  <!-- Arrow to Anel Primário -->
  <line x1="490" y1="130" x2="570" y2="100" stroke="#333" stroke-width="2" marker-end="url(#arrowhead)" />
  <!-- Arrow to Anel Central -->
  <line x1="490" y1="160" x2="570" y2="160" stroke="#333" stroke-width="2" marker-end="url(#arrowhead)" />
  <!-- Arrow to Anel Terciário -->
  <line x1="490" y1="190" x2="570" y2="220" stroke="#333" stroke-width="2" marker-end="url(#arrowhead)" />

  <!-- Condutores label -->
  <text x="530" y="90" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#333">Condutores</text>
  <text x="530" y="100" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#333">NE-DEF-4200</text>

  <!-- Anel Primário -->
  <rect x="580" y="65" width="170" height="55" rx="6" fill="#f0f4f8" stroke="#333" stroke-width="2" />
  <text x="665" y="85" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#333">Anel Primário</text>
  <text x="665" y="100" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#333">16 Emissores (Proa)</text>
  <text x="665" y="113" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#333">2,4 GHz — 45% cobertura</text>

  <!-- Anel Central -->
  <rect x="580" y="135" width="170" height="55" rx="6" fill="#f0f4f8" stroke="#333" stroke-width="2" />
  <text x="665" y="155" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#333">Anel Central</text>
  <text x="665" y="170" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#333">20 Emissores (Médio)</text>
  <text x="665" y="183" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#333">1,8 GHz — 35% cobertura</text>

  <!-- Anel Terciário -->
  <rect x="580" y="205" width="170" height="55" rx="6" fill="#f0f4f8" stroke="#333" stroke-width="2" />
  <text x="665" y="225" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#333">Anel Terciário</text>
  <text x="665" y="240" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#333">12 Emissores (Popa)</text>
  <text x="665" y="253" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#333">1,2 GHz — 20% cobertura</text>

  <!-- Arrows from emitter rings down to shield layers -->
  <line x1="665" y1="260" x2="665" y2="300" stroke="#333" stroke-width="2" marker-end="url(#arrowhead)" />
  <line x1="665" y1="120" x2="665" y2="135" stroke="#333" stroke-width="1" stroke-dasharray="4,2" />
  <text x="690" y="290" font-family="Arial, sans-serif" font-size="9" fill="#333">Campo EM</text>

  <!-- Shield Layers Section -->
  <text x="400" y="330" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#333">Camadas do Escudo Deflector</text>

  <!-- Vehicle hull (center reference) -->
  <rect x="340" y="370" width="120" height="40" rx="4" fill="#333" stroke="#333" stroke-width="2" />
  <text x="400" y="395" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#f0f4f8">CASCO</text>

  <!-- L3 - Absorção (2-15m) -->
  <path d="M 200,390 Q 200,460 400,470 Q 600,460 600,390" fill="none" stroke="#333" stroke-width="2" stroke-dasharray="8,4" />
  <text x="130" y="440" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#333">L3 — Absorção</text>
  <text x="130" y="455" font-family="Arial, sans-serif" font-size="10" fill="#333">2–15 m do casco</text>
  <text x="130" y="468" font-family="Arial, sans-serif" font-size="10" fill="#333">4,8 GHz / 7,2 kW</text>

  <!-- L2 - Deflexão (15-50m) -->
  <path d="M 130,390 Q 130,510 400,525 Q 670,510 670,390" fill="none" stroke="#333" stroke-width="3" />
  <text x="680" y="480" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#333">L2 — Deflexão</text>
  <text x="680" y="495" font-family="Arial, sans-serif" font-size="10" fill="#333">15–50 m</text>
  <text x="680" y="508" font-family="Arial, sans-serif" font-size="10" fill="#333">1,2–2,4 GHz</text>
  <text x="680" y="521" font-family="Arial, sans-serif" font-size="10" fill="#333">18,6 kW</text>

  <!-- L1 - Detecção (50-80m) -->
  <path d="M 70,390 Q 70,555 400,575 Q 730,555 730,390" fill="none" stroke="#333" stroke-width="1.5" stroke-dasharray="4,4" />
  <text x="130" y="555" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#333">L1 — Detecção</text>
  <text x="130" y="570" font-family="Arial, sans-serif" font-size="10" fill="#333">50–80 m / 800 MHz / 2,4 kW</text>

  <!-- Particle arrows (incoming threats) -->
  <line x1="50" y1="350" x2="110" y2="400" stroke="#333" stroke-width="1.5" marker-end="url(#arrowhead)" />
  <text x="40" y="345" font-family="Arial, sans-serif" font-size="9" fill="#333">Partículas</text>

  <line x1="750" y1="360" x2="690" y2="400" stroke="#333" stroke-width="1.5" marker-end="url(#arrowhead)" />
  <text x="740" y="350" font-family="Arial, sans-serif" font-size="9" fill="#333">Detritos</text>

  <!-- Computador de Bordo -->
  <rect x="60" y="260" width="160" height="50" rx="6" fill="#f0f4f8" stroke="#333" stroke-width="2" stroke-dasharray="6,3" />
  <text x="140" y="282" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#333">Computador de Bordo</text>
  <text x="140" y="298" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#333">NE-CPU-1100 (CAN-BUS)</text>

  <!-- Dashed lines from CPU to Distribuidor and L1 -->
  <line x1="220" y1="275" x2="310" y2="200" stroke="#333" stroke-width="1" stroke-dasharray="4,3" />
  <line x1="140" y1="310" x2="140" y2="390" stroke="#333" stroke-width="1" stroke-dasharray="4,3" />
</svg>
