<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <style>
    text { font-family: Arial, Helvetica, sans-serif; fill: #333; }
    .title { font-size: 18px; font-weight: bold; text-anchor: middle; }
    .label { font-size: 13px; text-anchor: middle; }
    .component { fill: #f0f4f8; stroke: #333; stroke-width: 1.5; }
    .dashed { stroke: #333; stroke-width: 1; stroke-dasharray: 6,4; fill: none; }
  </style>

  <!-- Title -->
  <text x="400" y="40" class="title">Vista Explodida — Trocador Criogênico</text>

  <!-- Component 1: Tampa do Trocador -->
  <rect x="250" y="65" width="300" height="50" rx="4" class="component"/>
  <text x="400" y="95" class="label">Tampa do Trocador</text>
  <!-- Dashed connector -->
  <line x1="330" y1="115" x2="330" y2="145" class="dashed"/>
  <line x1="470" y1="115" x2="470" y2="145" class="dashed"/>

  <!-- Component 2: Feixe de Tubos -->
  <rect x="250" y="145" width="300" height="55" rx="4" class="component"/>
  <text x="400" y="178" class="label">Feixe de Tubos</text>
  <!-- Dashed connector -->
  <line x1="330" y1="200" x2="330" y2="230" class="dashed"/>
  <line x1="470" y1="200" x2="470" y2="230" class="dashed"/>

  <!-- Component 3: Gaxetas -->
  <rect x="250" y="230" width="300" height="45" rx="4" class="component"/>
  <text x="400" y="258" class="label">Gaxetas</text>
  <!-- Dashed connector -->
  <line x1="330" y1="275" x2="330" y2="305" class="dashed"/>
  <line x1="470" y1="275" x2="470" y2="305" class="dashed"/>

  <!-- Component 4: Carcaça Principal -->
  <rect x="230" y="305" width="340" height="65" rx="4" class="component"/>
  <text x="400" y="343" class="label">Carcaça Principal</text>
  <!-- Dashed connector -->
  <line x1="330" y1="370" x2="330" y2="400" class="dashed"/>
  <line x1="470" y1="370" x2="470" y2="400" class="dashed"/>

  <!-- Component 5: Bomba Criogênica -->
  <rect x="270" y="400" width="260" height="55" rx="4" class="component"/>
  <text x="400" y="433" class="label">Bomba Criogênica</text>
  <!-- Dashed connector -->
  <line x1="330" y1="455" x2="330" y2="485" class="dashed"/>
  <line x1="470" y1="455" x2="470" y2="485" class="dashed"/>

  <!-- Component 6: Base de Suporte -->
  <rect x="220" y="485" width="360" height="55" rx="4" class="component"/>
  <text x="400" y="518" class="label">Base de Suporte</text>

  <!-- Assembly arrow on the side -->
  <line x1="170" y1="90" x2="170" y2="510" stroke="#333" stroke-width="1" marker-end="url(#arrowDown)"/>
  <text x="160" y="300" style="font-size:12px; text-anchor:end; fill:#666;" transform="rotate(-90,160,300)">Sequência de Montagem</text>

  <defs>
    <marker id="arrowDown" markerWidth="8" markerHeight="8" refX="4" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="#333"/>
    </marker>
  </defs>
</svg>
