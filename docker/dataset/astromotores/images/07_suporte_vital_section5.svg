<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="800" height="600" viewBox="0 0 800 600">
  <defs>
    <style>
      text { font-family: 'Segoe UI', Arial, sans-serif; fill: #333; }
      .title { font-size: 18px; font-weight: bold; }
      .subtitle { font-size: 12px; font-style: italic; }
      .label { font-size: 12px; font-weight: bold; }
      .detail { font-size: 11px; }
      .tick { font-size: 10px; }
      .axis { stroke: #333; stroke-width: 1.5; }
      .grid { stroke: #ddd; stroke-width: 0.5; }
      .bar1 { fill: #333; }
      .bar2 { fill: #666; }
      .bar3 { fill: #999; }
      .bar4 { fill: #bbb; }
    </style>
  </defs>

  <rect width="800" height="600" fill="#ffffff" />

  <!-- Title -->
  <text x="400" y="30" text-anchor="middle" class="title">Cronograma de Manutenção Preventiva — MSV</text>
  <text x="400" y="50" text-anchor="middle" class="subtitle">Intervalos em horas de operação | Veículo Espacial Série Nova ERA</text>

  <!-- Chart area -->
  <!-- Y-axis -->
  <line x1="200" y1="80" x2="200" y2="440" class="axis" />
  <!-- X-axis -->
  <line x1="200" y1="440" x2="760" y2="440" class="axis" />

  <!-- X-axis label -->
  <text x="480" y="480" text-anchor="middle" class="label">Horas de Operação</text>

  <!-- X-axis ticks and grid lines -->
  <!-- 0 -->
  <line x1="200" y1="440" x2="200" y2="445" class="axis" />
  <text x="200" y="460" text-anchor="middle" class="tick">0</text>

  <!-- 500 -->
  <line x1="293" y1="80" x2="293" y2="440" class="grid" />
  <line x1="293" y1="440" x2="293" y2="445" class="axis" />
  <text x="293" y="460" text-anchor="middle" class="tick">500</text>

  <!-- 1000 -->
  <line x1="387" y1="80" x2="387" y2="440" class="grid" />
  <line x1="387" y1="440" x2="387" y2="445" class="axis" />
  <text x="387" y="460" text-anchor="middle" class="tick">1.000</text>

  <!-- 1500 -->
  <line x1="480" y1="80" x2="480" y2="440" class="grid" />
  <line x1="480" y1="440" x2="480" y2="445" class="axis" />
  <text x="480" y="460" text-anchor="middle" class="tick">1.500</text>

  <!-- 2000 -->
  <line x1="573" y1="80" x2="573" y2="440" class="grid" />
  <line x1="573" y1="440" x2="573" y2="445" class="axis" />
  <text x="573" y="460" text-anchor="middle" class="tick">2.000</text>

  <!-- 2500 -->
  <line x1="667" y1="80" x2="667" y2="440" class="grid" />
  <line x1="667" y1="440" x2="667" y2="445" class="axis" />
  <text x="667" y="460" text-anchor="middle" class="tick">2.500</text>

  <!-- 3000 -->
  <line x1="760" y1="80" x2="760" y2="440" class="grid" />
  <line x1="760" y1="440" x2="760" y2="445" class="axis" />
  <text x="760" y="460" text-anchor="middle" class="tick">3.000</text>

  <!-- Scale: 560px = 3000h → 1h = 0.1867px -->
  <!-- Bar positions: y starts, each bar ~60px tall with 20px gap -->

  <!-- === Row 1: Troca Filtro CO₂ — every 200h === -->
  <text x="190" y="115" text-anchor="end" class="label">Troca Filtro CO₂</text>
  <text x="190" y="130" text-anchor="end" class="detail">MP-LSS-001</text>
  <text x="190" y="145" text-anchor="end" class="tick">(cada 200h)</text>
  <!-- Repeating bars at 200, 400, 600, 800, 1000, 1200, 1400, 1600, 1800, 2000, 2200, 2400, 2600, 2800, 3000 -->
  <rect x="237" y="105" width="8" height="40" class="bar1" rx="1" />
  <rect x="275" y="105" width="8" height="40" class="bar1" rx="1" />
  <rect x="312" y="105" width="8" height="40" class="bar1" rx="1" />
  <rect x="349" y="105" width="8" height="40" class="bar1" rx="1" />
  <rect x="387" y="105" width="8" height="40" class="bar1" rx="1" />
  <rect x="424" y="105" width="8" height="40" class="bar1" rx="1" />
  <rect x="461" y="105" width="8" height="40" class="bar1" rx="1" />
  <rect x="499" y="105" width="8" height="40" class="bar1" rx="1" />
  <rect x="536" y="105" width="8" height="40" class="bar1" rx="1" />
  <rect x="573" y="105" width="8" height="40" class="bar1" rx="1" />
  <rect x="611" y="105" width="8" height="40" class="bar1" rx="1" />
  <rect x="648" y="105" width="8" height="40" class="bar1" rx="1" />
  <rect x="685" y="105" width="8" height="40" class="bar1" rx="1" />
  <rect x="723" y="105" width="8" height="40" class="bar1" rx="1" />
  <rect x="760" y="105" width="8" height="40" class="bar1" rx="1" />

  <!-- === Row 2: Inspeção Bomba — every 500h === -->
  <text x="190" y="200" text-anchor="end" class="label">Inspeção Bomba</text>
  <text x="190" y="215" text-anchor="end" class="detail">MP-LSS-002</text>
  <text x="190" y="230" text-anchor="end" class="tick">(cada 500h)</text>
  <!-- Bars at 500, 1000, 1500, 2000, 2500, 3000 -->
  <rect x="290" y="190" width="12" height="40" class="bar2" rx="1" />
  <rect x="383" y="190" width="12" height="40" class="bar2" rx="1" />
  <rect x="477" y="190" width="12" height="40" class="bar2" rx="1" />
  <rect x="570" y="190" width="12" height="40" class="bar2" rx="1" />
  <rect x="663" y="190" width="12" height="40" class="bar2" rx="1" />
  <rect x="757" y="190" width="12" height="40" class="bar2" rx="1" />

  <!-- === Row 3: Purga do Sistema — every 1000h === -->
  <text x="190" y="295" text-anchor="end" class="label">Purga do Sistema</text>
  <text x="190" y="310" text-anchor="end" class="detail">MP-LSS-004</text>
  <text x="190" y="325" text-anchor="end" class="tick">(cada 1.000h)</text>
  <!-- Bars at 1000, 2000, 3000 -->
  <rect x="383" y="280" width="16" height="45" class="bar3" rx="1" />
  <rect x="570" y="280" width="16" height="45" class="bar3" rx="1" />
  <rect x="756" y="280" width="16" height="45" class="bar3" rx="1" />

  <!-- === Row 4: Revisão Geral — every 3000h === -->
  <text x="190" y="390" text-anchor="end" class="label">Revisão Geral</text>
  <text x="190" y="405" text-anchor="end" class="detail">MP-LSS-010</text>
  <text x="190" y="420" text-anchor="end" class="tick">(cada 3.000h)</text>
  <!-- Bar at 3000 -->
  <rect x="752" y="370" width="20" height="55" class="bar4" rx="1" />
  <!-- Duration label -->
  <text x="762" y="365" text-anchor="middle" class="tick">~8h</text>

  <!-- Duration labels for rows -->
  <text x="241" y="100" text-anchor="middle" class="tick">25min</text>
  <text x="296" y="185" text-anchor="middle" class="tick">45min</text>
  <text x="391" y="275" text-anchor="middle" class="tick">60min</text>

  <!-- Legend -->
  <rect x="200" y="510" width="560" height="60" fill="none" stroke="#333" stroke-width="1" rx="5" />
  <text x="220" y="530" class="label">Legenda:</text>
  <rect x="300" y="520" width="16" height="12" class="bar1" />
  <text x="325" y="530" class="detail">Troca Filtro (25 min)</text>
  <rect x="445" y="520" width="16" height="12" class="bar2" />
  <text x="470" y="530" class="detail">Inspeção (45 min)</text>
  <rect x="300" y="545" width="16" height="12" class="bar3" />
  <text x="325" y="555" class="detail">Purga (60 min)</text>
  <rect x="445" y="545" width="16" height="12" class="bar4" />
  <text x="470" y="555" class="detail">Revisão Geral (~8h)</text>

  <!-- Note -->
  <text x="400" y="590" text-anchor="middle" class="tick">Nota: Intervalos baseados em horas de operação. Em caso de uso intensivo (4 ocupantes), reduzir intervalo do filtro CO₂ para 150h.</text>
</svg>
