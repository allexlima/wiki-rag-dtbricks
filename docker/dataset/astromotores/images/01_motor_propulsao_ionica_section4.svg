<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
  <defs>
    <style>
      text { font-family: 'Segoe UI', Arial, sans-serif; fill: #333; }
      .title { font-size: 16px; font-weight: bold; }
      .part-label { font-size: 12px; font-weight: bold; }
      .part-num { font-size: 10px; fill: #666; }
      .component { fill: #f0f4f8; stroke: #333; stroke-width: 2; }
      .dashed { stroke: #999; stroke-width: 1; stroke-dasharray: 5,3; fill: none; }
      .center-line { stroke: #c0392b; stroke-width: 0.5; stroke-dasharray: 10,3,2,3; }
    </style>
  </defs>

  <!-- Title -->
  <text x="400" y="30" text-anchor="middle" class="title">Vista Explodida — Motor de Propulsão Iônica NE-ION-7742</text>

  <!-- Center axis line -->
  <line x1="350" y1="50" x2="350" y2="580" class="center-line"/>
  <text x="355" y="590" font-size="9" fill="#c0392b">Eixo central</text>

  <!-- Component 1: Tampa Superior -->
  <rect x="250" y="60" width="200" height="40" class="component" rx="6"/>
  <line x1="280" y1="60" x2="280" y2="100" stroke="#bbb" stroke-width="0.5"/>
  <line x1="310" y1="60" x2="310" y2="100" stroke="#bbb" stroke-width="0.5"/>
  <line x1="390" y1="60" x2="390" y2="100" stroke="#bbb" stroke-width="0.5"/>
  <line x1="420" y1="60" x2="420" y2="100" stroke="#bbb" stroke-width="0.5"/>
  <!-- Bolt holes -->
  <circle cx="265" cy="80" r="4" fill="none" stroke="#333" stroke-width="1"/>
  <circle cx="295" cy="80" r="4" fill="none" stroke="#333" stroke-width="1"/>
  <circle cx="405" cy="80" r="4" fill="none" stroke="#333" stroke-width="1"/>
  <circle cx="435" cy="80" r="4" fill="none" stroke="#333" stroke-width="1"/>
  <!-- Label -->
  <text x="520" y="78" class="part-label">Tampa Superior</text>
  <text x="520" y="93" class="part-num">NE-ION-7742-02 | 1.220 g</text>
  <line x1="452" y1="80" x2="515" y2="80" class="dashed"/>

  <!-- Dashed connector line 1→2 -->
  <line x1="350" y1="100" x2="350" y2="140" class="dashed"/>

  <!-- Component 2: Bobina de RF + Câmara de Ionização -->
  <rect x="240" y="140" width="220" height="90" class="component" rx="4"/>
  <!-- Inner cavity representation -->
  <rect x="270" y="155" width="160" height="60" fill="#e2e8f0" stroke="#333" stroke-width="1" rx="3"/>
  <!-- RF coil (decorative spiral) -->
  <ellipse cx="260" cy="185" rx="8" ry="25" fill="none" stroke="#333" stroke-width="1.5"/>
  <ellipse cx="440" cy="185" rx="8" ry="25" fill="none" stroke="#333" stroke-width="1.5"/>
  <!-- Label -->
  <text x="520" y="172" class="part-label">Câmara de Ionização</text>
  <text x="520" y="187" class="part-num">NE-ION-7742-03 | h-BN | 2.150 g</text>
  <text x="520" y="215" class="part-label">Bobina de RF</text>
  <text x="520" y="230" class="part-num">NE-ION-7742-12 | 640 g</text>
  <line x1="462" y1="175" x2="515" y2="175" class="dashed"/>
  <line x1="462" y1="220" x2="515" y2="220" class="dashed"/>

  <!-- Dashed connector line 2→3 -->
  <line x1="350" y1="230" x2="350" y2="270" class="dashed"/>

  <!-- Component 3: Ânodo Central -->
  <rect x="310" y="270" width="80" height="60" class="component" rx="3"/>
  <!-- Surface detail -->
  <line x1="320" y1="280" x2="320" y2="320" stroke="#bbb" stroke-width="0.5"/>
  <line x1="380" y1="280" x2="380" y2="320" stroke="#bbb" stroke-width="0.5"/>
  <rect x="330" y="285" width="40" height="30" fill="none" stroke="#999" stroke-width="0.5"/>
  <!-- Label -->
  <text x="130" y="295" class="part-label">Ânodo Central</text>
  <text x="130" y="310" class="part-num">NE-ION-7742-04 | 316L | 890 g</text>
  <line x1="220" y1="300" x2="308" y2="300" class="dashed"/>

  <!-- Dashed connector line 3→4 -->
  <line x1="350" y1="330" x2="350" y2="360" class="dashed"/>

  <!-- Component 4: Grade de Tela -->
  <rect x="260" y="360" width="180" height="20" class="component"/>
  <!-- Grid holes -->
  <circle cx="280" cy="370" r="3" fill="none" stroke="#333" stroke-width="0.8"/>
  <circle cx="300" cy="370" r="3" fill="none" stroke="#333" stroke-width="0.8"/>
  <circle cx="320" cy="370" r="3" fill="none" stroke="#333" stroke-width="0.8"/>
  <circle cx="340" cy="370" r="3" fill="none" stroke="#333" stroke-width="0.8"/>
  <circle cx="360" cy="370" r="3" fill="none" stroke="#333" stroke-width="0.8"/>
  <circle cx="380" cy="370" r="3" fill="none" stroke="#333" stroke-width="0.8"/>
  <circle cx="400" cy="370" r="3" fill="none" stroke="#333" stroke-width="0.8"/>
  <circle cx="420" cy="370" r="3" fill="none" stroke="#333" stroke-width="0.8"/>
  <!-- Label -->
  <text x="520" y="368" class="part-label">Grade de Tela</text>
  <text x="520" y="383" class="part-num">NE-ION-7742-05 | Mo | 0,38 mm | 340 g</text>
  <line x1="442" y1="370" x2="515" y2="370" class="dashed"/>

  <!-- Spacers between grades -->
  <rect x="275" y="390" width="15" height="15" fill="#e2e8f0" stroke="#333" stroke-width="1"/>
  <rect x="343" y="390" width="15" height="15" fill="#e2e8f0" stroke="#333" stroke-width="1"/>
  <rect x="410" y="390" width="15" height="15" fill="#e2e8f0" stroke="#333" stroke-width="1"/>
  <text x="130" y="400" class="part-num">Espaçadores Al₂O₃ (×6)</text>
  <text x="130" y="413" class="part-num">NE-ION-7742-07</text>
  <line x1="215" y1="400" x2="273" y2="397" class="dashed"/>

  <!-- Dashed connector line spacers→grade aceleradora -->
  <line x1="350" y1="405" x2="350" y2="415" class="dashed"/>

  <!-- Component 5: Grade Aceleradora -->
  <rect x="270" y="415" width="160" height="20" class="component"/>
  <!-- Grid holes (offset from tela) -->
  <circle cx="290" cy="425" r="3" fill="none" stroke="#333" stroke-width="0.8"/>
  <circle cx="310" cy="425" r="3" fill="none" stroke="#333" stroke-width="0.8"/>
  <circle cx="330" cy="425" r="3" fill="none" stroke="#333" stroke-width="0.8"/>
  <circle cx="350" cy="425" r="3" fill="none" stroke="#333" stroke-width="0.8"/>
  <circle cx="370" cy="425" r="3" fill="none" stroke="#333" stroke-width="0.8"/>
  <circle cx="390" cy="425" r="3" fill="none" stroke="#333" stroke-width="0.8"/>
  <circle cx="410" cy="425" r="3" fill="none" stroke="#333" stroke-width="0.8"/>
  <!-- Label -->
  <text x="520" y="423" class="part-label">Grade Aceleradora</text>
  <text x="520" y="438" class="part-num">NE-ION-7742-06 | Mo | 0,51 mm | 480 g</text>
  <line x1="432" y1="425" x2="515" y2="425" class="dashed"/>

  <!-- Dashed connector line 5→6 -->
  <line x1="350" y1="435" x2="350" y2="470" class="dashed"/>

  <!-- Component 6: Base de Montagem -->
  <rect x="220" y="470" width="260" height="50" class="component" rx="6"/>
  <!-- Mounting holes -->
  <circle cx="245" cy="495" r="5" fill="none" stroke="#333" stroke-width="1.5"/>
  <circle cx="350" cy="495" r="5" fill="none" stroke="#333" stroke-width="1.5"/>
  <circle cx="455" cy="495" r="5" fill="none" stroke="#333" stroke-width="1.5"/>
  <!-- Gimbal interface (hatched area) -->
  <rect x="310" y="505" width="80" height="15" fill="#d0d8e0" stroke="#333" stroke-width="1"/>
  <text x="350" y="517" text-anchor="middle" font-size="8" fill="#666">GIMBAL</text>
  <!-- Label -->
  <text x="130" y="490" class="part-label">Base de Montagem</text>
  <text x="130" y="505" class="part-num">NE-ION-7742-09 | Ti-6Al-4V | 2.100 g</text>
  <line x1="215" y1="495" x2="218" y2="495" class="dashed"/>

  <!-- Cátodo Neutralizador (side component) -->
  <rect x="500" y="280" width="30" height="50" fill="#f0f4f8" stroke="#333" stroke-width="1.5" rx="3"/>
  <line x1="515" y1="330" x2="515" y2="345" class="dashed"/>
  <text x="570" y="300" class="part-label">Cátodo</text>
  <text x="570" y="315" class="part-label">Neutralizador</text>
  <text x="570" y="330" class="part-num">NE-ION-7742-08 | W | 95 g</text>
  <line x1="532" y1="305" x2="560" y2="305" class="dashed"/>

  <!-- Assembly direction arrow -->
  <line x1="120" y1="100" x2="120" y2="470" stroke="#333" stroke-width="1.5" marker-end="url(#flow-arrow-down)"/>
  <polygon points="115,460 120,475 125,460" fill="#333"/>
  <text x="115" y="290" text-anchor="middle" font-size="11" transform="rotate(-90, 115, 290)">Direção de montagem</text>

  <!-- Notes -->
  <text x="400" y="555" text-anchor="middle" font-size="10" fill="#666">Massa total do conjunto (seco): 12,7 kg | Todos os fixadores em titânio grau 5</text>
  <text x="400" y="570" text-anchor="middle" font-size="10" fill="#666">Vista explodida — NE-ION-7742 Rev. 4.2 | Veículo Espacial Série Nova ERA</text>
</svg>
