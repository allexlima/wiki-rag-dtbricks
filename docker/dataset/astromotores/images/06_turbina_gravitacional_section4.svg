<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="800" height="600" viewBox="0 0 800 600">
  <title>Vista Explodida — Montagem da Turbina Gravitacional</title>
  <style>
    text { font-family: Arial, Helvetica, sans-serif; fill: #1a1a1a; }
    .title { font-size: 16px; font-weight: bold; text-anchor: middle; }
    .label { font-size: 12px; font-weight: bold; }
    .part-no { font-size: 10px; fill: #555; }
    .outline { fill: none; stroke: #1a1a1a; stroke-width: 2; }
    .ghost { stroke-dasharray: 6,3; }
    .assembly-line { stroke: #999; stroke-width: 1; stroke-dasharray: 4,4; }
  </style>

  <text x="400" y="30" class="title">Vista Explodida — Turbina Gravitacional NE-GRV-6600</text>
  <line x1="150" y1="38" x2="650" y2="38" stroke="#1a1a1a" stroke-width="1"/>

  <!-- Central assembly axis (dashed) -->
  <line x1="400" y1="50" x2="400" y2="580" class="assembly-line"/>

  <!-- 1. Tampa Superior -->
  <ellipse cx="400" cy="80" rx="130" ry="20" fill="#d5d5d5" stroke="#1a1a1a" stroke-width="2"/>
  <rect x="270" y="75" width="260" height="15" fill="#d5d5d5" stroke="#1a1a1a" stroke-width="2"/>
  <ellipse cx="400" cy="75" rx="130" ry="20" fill="#e0e0e0" stroke="#1a1a1a" stroke-width="2"/>
  <!-- Bolt holes -->
  <circle cx="310" cy="75" r="4" fill="#999" stroke="#1a1a1a" stroke-width="1"/>
  <circle cx="350" cy="68" r="4" fill="#999" stroke="#1a1a1a" stroke-width="1"/>
  <circle cx="450" cy="68" r="4" fill="#999" stroke="#1a1a1a" stroke-width="1"/>
  <circle cx="490" cy="75" r="4" fill="#999" stroke="#1a1a1a" stroke-width="1"/>
  <!-- Label -->
  <line x1="530" y1="75" x2="620" y2="60" stroke="#1a1a1a" stroke-width="1"/>
  <text x="625" y="58" class="label">Tampa Superior</text>
  <text x="625" y="71" class="part-no">NE-GRV-6690A — 16× M20</text>
  <text x="625" y="83" class="part-no">Torque: 180 N·m</text>

  <!-- Gap indicator -->
  <line x1="395" y1="95" x2="395" y2="120" stroke="#bbb" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="405" y1="95" x2="405" y2="120" stroke="#bbb" stroke-width="1" stroke-dasharray="3,3"/>

  <!-- 2. Mancal Superior -->
  <ellipse cx="400" cy="145" rx="80" ry="14" fill="#b0b0b0" stroke="#1a1a1a" stroke-width="2"/>
  <rect x="320" y="140" width="160" height="20" fill="#b0b0b0" stroke="#1a1a1a" stroke-width="2"/>
  <ellipse cx="400" cy="140" rx="80" ry="14" fill="#bbb" stroke="#1a1a1a" stroke-width="2"/>
  <!-- Shaft hole -->
  <ellipse cx="400" cy="140" rx="25" ry="5" fill="#e0e0e0" stroke="#1a1a1a" stroke-width="1.5"/>
  <!-- Label -->
  <line x1="320" y1="150" x2="120" y2="140" stroke="#1a1a1a" stroke-width="1"/>
  <text x="15" y="135" class="label">Mancal Superior</text>
  <text x="15" y="148" class="part-no">NE-GRV-6670A — 8× M16</text>
  <text x="15" y="160" class="part-no">Cap. axial: 45 kN</text>

  <!-- Gap -->
  <line x1="395" y1="165" x2="395" y2="200" stroke="#bbb" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="405" y1="165" x2="405" y2="200" stroke="#bbb" stroke-width="1" stroke-dasharray="3,3"/>

  <!-- 3. Rotor de Grávitons -->
  <ellipse cx="400" cy="230" rx="120" ry="22" fill="#c8c8c8" stroke="#1a1a1a" stroke-width="2"/>
  <rect x="280" y="225" width="240" height="80" fill="#c8c8c8" stroke="#1a1a1a" stroke-width="2"/>
  <ellipse cx="400" cy="305" rx="120" ry="22" fill="#bbb" stroke="#1a1a1a" stroke-width="2"/>
  <ellipse cx="400" cy="225" rx="120" ry="22" fill="#d0d0d0" stroke="#1a1a1a" stroke-width="2"/>
  <!-- Shaft hole top -->
  <ellipse cx="400" cy="225" rx="22" ry="5" fill="#e0e0e0" stroke="#1a1a1a" stroke-width="1.5"/>
  <!-- Pá lines on the face -->
  <line x1="310" y1="225" x2="340" y2="212" stroke="#999" stroke-width="1"/>
  <line x1="350" y1="210" x2="380" y2="218" stroke="#999" stroke-width="1"/>
  <line x1="420" y1="218" x2="450" y2="210" stroke="#999" stroke-width="1"/>
  <line x1="460" y1="212" x2="490" y2="225" stroke="#999" stroke-width="1"/>
  <!-- Label -->
  <line x1="520" y1="265" x2="620" y2="250" stroke="#1a1a1a" stroke-width="1"/>
  <text x="625" y="248" class="label">Rotor de Grávitons</text>
  <text x="625" y="261" class="part-no">NE-GRV-6660 — 24 pás</text>
  <text x="625" y="273" class="part-no">Ø 1.840 mm — 287,4 kg</text>
  <text x="625" y="285" class="part-no">14.200 RPM nominal</text>

  <!-- Gap -->
  <line x1="395" y1="330" x2="395" y2="360" stroke="#bbb" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="405" y1="330" x2="405" y2="360" stroke="#bbb" stroke-width="1" stroke-dasharray="3,3"/>

  <!-- 4. Estator -->
  <ellipse cx="400" cy="385" rx="130" ry="20" fill="#d8d8d8" stroke="#1a1a1a" stroke-width="2"/>
  <rect x="270" y="380" width="260" height="55" fill="#d8d8d8" stroke="#1a1a1a" stroke-width="2"/>
  <ellipse cx="400" cy="435" rx="130" ry="20" fill="#ccc" stroke="#1a1a1a" stroke-width="2"/>
  <ellipse cx="400" cy="380" rx="130" ry="20" fill="#e0e0e0" stroke="#1a1a1a" stroke-width="2"/>
  <!-- Inner bore -->
  <ellipse cx="400" cy="380" rx="80" ry="13" fill="#eee" stroke="#1a1a1a" stroke-width="1.5"/>
  <!-- Coil indicators on top face -->
  <circle cx="340" cy="376" r="5" fill="#bbb" stroke="#1a1a1a" stroke-width="1"/>
  <circle cx="365" cy="370" r="5" fill="#bbb" stroke="#1a1a1a" stroke-width="1"/>
  <circle cx="400" cy="367" r="5" fill="#bbb" stroke="#1a1a1a" stroke-width="1"/>
  <circle cx="435" cy="370" r="5" fill="#bbb" stroke="#1a1a1a" stroke-width="1"/>
  <circle cx="460" cy="376" r="5" fill="#bbb" stroke="#1a1a1a" stroke-width="1"/>
  <!-- Label -->
  <line x1="270" y1="410" x2="120" y2="400" stroke="#1a1a1a" stroke-width="1"/>
  <text x="15" y="395" class="label">Estator</text>
  <text x="15" y="408" class="part-no">NE-GRV-6650 — 36 bobinas</text>
  <text x="15" y="420" class="part-no">Fio NCu-220 — 2.400 esp./bobina</text>

  <!-- Gap -->
  <line x1="395" y1="458" x2="395" y2="478" stroke="#bbb" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="405" y1="458" x2="405" y2="478" stroke="#bbb" stroke-width="1" stroke-dasharray="3,3"/>

  <!-- 5. Mancal Inferior -->
  <ellipse cx="400" cy="495" rx="80" ry="14" fill="#b0b0b0" stroke="#1a1a1a" stroke-width="2"/>
  <rect x="320" y="490" width="160" height="20" fill="#b0b0b0" stroke="#1a1a1a" stroke-width="2"/>
  <ellipse cx="400" cy="490" rx="80" ry="14" fill="#bbb" stroke="#1a1a1a" stroke-width="2"/>
  <ellipse cx="400" cy="490" rx="25" ry="5" fill="#e0e0e0" stroke="#1a1a1a" stroke-width="1.5"/>
  <!-- Label -->
  <line x1="480" y1="500" x2="620" y2="490" stroke="#1a1a1a" stroke-width="1"/>
  <text x="625" y="488" class="label">Mancal Inferior</text>
  <text x="625" y="501" class="part-no">NE-GRV-6670B — 8× M16</text>

  <!-- Gap -->
  <line x1="395" y1="515" x2="395" y2="530" stroke="#bbb" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="405" y1="515" x2="405" y2="530" stroke="#bbb" stroke-width="1" stroke-dasharray="3,3"/>

  <!-- 6. Base da Turbina -->
  <ellipse cx="400" cy="555" rx="130" ry="20" fill="#c0c0c0" stroke="#1a1a1a" stroke-width="2"/>
  <rect x="270" y="550" width="260" height="15" fill="#c0c0c0" stroke="#1a1a1a" stroke-width="2"/>
  <ellipse cx="400" cy="550" rx="130" ry="20" fill="#d0d0d0" stroke="#1a1a1a" stroke-width="2"/>
  <circle cx="310" cy="550" r="4" fill="#999" stroke="#1a1a1a" stroke-width="1"/>
  <circle cx="490" cy="550" r="4" fill="#999" stroke="#1a1a1a" stroke-width="1"/>
  <circle cx="350" cy="544" r="4" fill="#999" stroke="#1a1a1a" stroke-width="1"/>
  <circle cx="450" cy="544" r="4" fill="#999" stroke="#1a1a1a" stroke-width="1"/>
  <!-- Label -->
  <line x1="270" y1="555" x2="120" y2="555" stroke="#1a1a1a" stroke-width="1"/>
  <text x="15" y="552" class="label">Base da Turbina</text>
  <text x="15" y="565" class="part-no">12× M24 — Torque: 250 N·m</text>

  <!-- Order numbers -->
  <circle cx="250" cy="75" r="10" fill="#1a1a1a"/>
  <text x="250" y="79" text-anchor="middle" fill="#fff" font-size="11" font-weight="bold">1</text>
  <circle cx="300" cy="145" r="10" fill="#1a1a1a"/>
  <text x="300" y="149" text-anchor="middle" fill="#fff" font-size="11" font-weight="bold">2</text>
  <circle cx="260" cy="265" r="10" fill="#1a1a1a"/>
  <text x="260" y="269" text-anchor="middle" fill="#fff" font-size="11" font-weight="bold">3</text>
  <circle cx="250" cy="410" r="10" fill="#1a1a1a"/>
  <text x="250" y="414" text-anchor="middle" fill="#fff" font-size="11" font-weight="bold">4</text>
  <circle cx="300" cy="498" r="10" fill="#1a1a1a"/>
  <text x="300" y="502" text-anchor="middle" fill="#fff" font-size="11" font-weight="bold">5</text>
  <circle cx="250" cy="555" r="10" fill="#1a1a1a"/>
  <text x="250" y="559" text-anchor="middle" fill="#fff" font-size="11" font-weight="bold">6</text>
</svg>
