  <rect x="293" y="185" width="10" height="30" rx="2" ry="2" fill="#333" opacity="0.55" />
  <rect x="336" y="185" width="10" height="30" rx="2" ry="2" fill="#333" opacity="0.55" />
  <rect x="380" y="185" width="10" height="30" rx="2" ry="2" fill="#333" opacity="0.55" />
  <rect x="423" y="185" width="10" height="30" rx="2" ry="2" fill="#333" opacity="0.55" />
  <rect x="466" y="185" width="10" height="30" rx="2" ry="2" fill="#333" opacity="0.55" />
  <rect x="509" y="185" width="10" height="30" rx="2" ry="2" fill="#333" opacity="0.55" />
  <rect x="553" y="185" width="10" height="30" rx="2" ry="2" fill="#333" opacity="0.55" />
  <rect x="596" y="185" width="10" height="30" rx="2" ry="2" fill="#333" opacity="0.55" />
  <rect x="640" y="185" width="10" height="30" rx="2" ry="2" fill="#333" opacity="0.55" />
  <rect x="683" y="185" width="10" height="30" rx="2" ry="2" fill="#333" opacity="0.55" />
  <rect x="726" y="185" width="10" height="30" rx="2" ry="2" fill="#333" opacity="0.55" />
  <rect x="770" y="185" width="10" height="30" rx="2" ry="2" fill="#333" opacity="0.55" />

  <!-- Separator -->
  <line x1="250" y1="235" x2="770" y2="235" stroke="#eee" stroke-width="1" />

  <!-- Row 3: Atualização Firmware — every 1000h -->
  <text x="245" y="270" text-anchor="end" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#333">Atualização</text>
  <text x="245" y="285" text-anchor="end" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#333">Firmware</text>
  <text x="245" y="298" text-anchor="end" font-family="Arial, sans-serif" font-size="9" fill="#666">(a cada 1.000h)</text>
  <!-- Bars at 1000, 2000, 3000, 4000, 5000, 6000 -->
  <rect x="333" y="260" width="12" height="30" rx="2" ry="2" fill="#333" opacity="0.4" />
  <rect x="420" y="260" width="12" height="30" rx="2" ry="2" fill="#333" opacity="0.4" />
  <rect x="506" y="260" width="12" height="30" rx="2" ry="2" fill="#333" opacity="0.4" />
  <rect x="593" y="260" width="12" height="30" rx="2" ry="2" fill="#333" opacity="0.4" />
  <rect x="680" y="260" width="12" height="30" rx="2" ry="2" fill="#333" opacity="0.4" />
  <rect x="766" y="260" width="12" height="30" rx="2" ry="2" fill="#333" opacity="0.4" />

