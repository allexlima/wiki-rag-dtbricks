  <text x="245" y="430" text-anchor="end" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#333">Sensores</text>
  <text x="245" y="443" text-anchor="end" font-family="Arial, sans-serif" font-size="9" fill="#666">(a cada 5.000h)</text>
  <!-- Bar at 5000 -->
  <rect x="678" y="408" width="14" height="30" rx="2" ry="2" fill="#333" opacity="0.25" />

  <!-- Separator -->
  <line x1="250" y1="455" x2="770" y2="455" stroke="#eee" stroke-width="1" />

  <!-- Row 6: Substituição Antena — at 6000h -->
  <text x="245" y="470" text-anchor="end" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#333">Substituição</text>
  <text x="245" y="478" text-anchor="end" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#333">Antena</text>
  <!-- Bar at 6000 -->
  <rect x="764" y="460" width="14" height="20" rx="2" ry="2" fill="#333" opacity="0.2" />
  <text x="245" y="490" text-anchor="end" font-family="Arial, sans-serif" font-size="9" fill="#666">(a cada 6.000h)</text>

  <!-- Legend -->
  <rect x="260" y="530" width="500" height="35" rx="4" ry="4" fill="#f0f4f8" stroke="#333" stroke-width="1" />
  <text x="275" y="552" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#333">Legenda:</text>
  <rect x="340" y="541" width="10" height="12" fill="#333" opacity="0.7" />
  <text x="356" y="552" font-family="Arial, sans-serif" font-size="9" fill="#333">Alta frequência</text>
  <rect x="440" y="541" width="10" height="12" fill="#333" opacity="0.4" />
  <text x="456" y="552" font-family="Arial, sans-serif" font-size="9" fill="#333">Média frequência</text>
  <rect x="555" y="541" width="10" height="12" fill="#333" opacity="0.2" />
