<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
  <!-- Title -->
  <text x="400" y="35" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#333">Cronograma de Manutenção Preventiva — SNE</text>
  <text x="400" y="55" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#666">Intervalos em horas de operação (escala: 0–6.000h)</text>

  <!-- Y axis -->
  <line x1="250" y1="80" x2="250" y2="480" stroke="#333" stroke-width="1.5" />
  <!-- X axis -->
  <line x1="250" y1="480" x2="770" y2="480" stroke="#333" stroke-width="1.5" />

  <!-- X axis labels (hours) -->
  <text x="250" y="500" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#333">0</text>
  <line x1="250" y1="480" x2="250" y2="485" stroke="#333" stroke-width="1" />

  <text x="336" y="500" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#333">1000</text>
  <line x1="336" y1="480" x2="336" y2="485" stroke="#333" stroke-width="1" />

  <text x="423" y="500" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#333">2000</text>
  <line x1="423" y1="480" x2="423" y2="485" stroke="#333" stroke-width="1" />

  <text x="509" y="500" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#333">3000</text>
  <line x1="509" y1="480" x2="509" y2="485" stroke="#333" stroke-width="1" />

  <text x="596" y="500" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#333">4000</text>
  <line x1="596" y1="480" x2="596" y2="485" stroke="#333" stroke-width="1" />

  <text x="683" y="500" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#333">5000</text>
  <line x1="683" y1="480" x2="683" y2="485" stroke="#333" stroke-width="1" />

  <text x="769" y="500" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#333">6000</text>
  <line x1="769" y1="480" x2="769" y2="485" stroke="#333" stroke-width="1" />

  <!-- X axis title -->
  <text x="510" y="525" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#333">Horas de Operação</text>

  <!-- Grid lines (vertical, light) -->
  <line x1="336" y1="80" x2="336" y2="480" stroke="#ddd" stroke-width="0.5" />
  <line x1="423" y1="80" x2="423" y2="480" stroke="#ddd" stroke-width="0.5" />
  <line x1="509" y1="80" x2="509" y2="480" stroke="#ddd" stroke-width="0.5" />
  <line x1="596" y1="80" x2="596" y2="480" stroke="#ddd" stroke-width="0.5" />
  <line x1="683" y1="80" x2="683" y2="480" stroke="#ddd" stroke-width="0.5" />

  <!-- Scale: 1 hour = (770-250)/6000 = 0.08667 px -->
  <!-- 300h = 26px, 500h = 43.3px, 1000h = 86.7px, 2000h = 173.3px, 3000h = 260px, 5000h = 433.3px, 6000h = 520px -->

  <!-- Row 1: Calibração Giroscópio — every 300h -->
