  <rect x="484" y="110" width="8" height="30" rx="2" ry="2" fill="#333" opacity="0.7" />
  <rect x="510" y="110" width="8" height="30" rx="2" ry="2" fill="#333" opacity="0.7" />
  <rect x="536" y="110" width="8" height="30" rx="2" ry="2" fill="#333" opacity="0.7" />
  <rect x="562" y="110" width="8" height="30" rx="2" ry="2" fill="#333" opacity="0.7" />
  <rect x="588" y="110" width="8" height="30" rx="2" ry="2" fill="#333" opacity="0.7" />
  <rect x="614" y="110" width="8" height="30" rx="2" ry="2" fill="#333" opacity="0.7" />
  <rect x="640" y="110" width="8" height="30" rx="2" ry="2" fill="#333" opacity="0.7" />
  <rect x="666" y="110" width="8" height="30" rx="2" ry="2" fill="#333" opacity="0.7" />
  <rect x="692" y="110" width="8" height="30" rx="2" ry="2" fill="#333" opacity="0.7" />
  <rect x="718" y="110" width="8" height="30" rx="2" ry="2" fill="#333" opacity="0.7" />
  <rect x="744" y="110" width="8" height="30" rx="2" ry="2" fill="#333" opacity="0.7" />
  <rect x="770" y="110" width="8" height="30" rx="2" ry="2" fill="#333" opacity="0.7" />

  <!-- Separator -->
