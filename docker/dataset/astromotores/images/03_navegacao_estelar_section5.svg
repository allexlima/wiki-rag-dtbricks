  <text x="245" y="373" text-anchor="end" font-family="Arial, sans-serif" font-size="9" fill="#666">(a cada 2.000h)</text>
  <!-- Bars at 2000, 4000, 6000 -->
  <rect x="418" y="335" width="14" height="30" rx="2" ry="2" fill="#333" opacity="0.3" />
  <rect x="591" y="335" width="14" height="30" rx="2" ry="2" fill="#333" opacity="0.3" />
  <rect x="764" y="335" width="14" height="30" rx="2" ry="2" fill="#333" opacity="0.3" />

