  <text x="245" y="135" text-anchor="end" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#333">Giroscópio</text>
  <text x="245" y="148" text-anchor="end" font-family="Arial, sans-serif" font-size="9" fill="#666">(a cada 300h)</text>
