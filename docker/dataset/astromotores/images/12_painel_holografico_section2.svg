<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="800" height="600" viewBox="0 0 800 600">
  <title>Desenho Dimensional — Módulo de Exibição Holográfica</title>
  <style>
    text { font-family: monospace; font-size: 11px; fill: #222; }
    .title { font-size: 15px; font-weight: bold; }
    .dim { font-size: 10px; fill: #444; }
    .outline { fill: none; stroke: #222; stroke-width: 2; }
    .inner { fill: none; stroke: #222; stroke-width: 1.5; }
    .dimline { stroke: #666; stroke-width: 0.8; marker-start: url(#dimstart); marker-end: url(#dimend); }
    .leader { stroke: #666; stroke-width: 0.8; stroke-dasharray: 3,2; }
    .component { fill: #f0f0f0; stroke: #222; stroke-width: 1.5; }
  </style>
  <defs>
    <marker id="dimstart" markerWidth="8" markerHeight="6" refX="0" refY="3" orient="auto">
      <polygon points="8 0, 0 3, 8 6" fill="#666"/>
    </marker>
    <marker id="dimend" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#666"/>
    </marker>
  </defs>

  <text x="400" y="30" text-anchor="middle" class="title">Desenho Dimensional — Conjunto PCH (Vista Frontal)</text>
  <text x="400" y="48" text-anchor="middle" class="dim">Escala: 1:2 | Cotas em milímetros</text>

  <!-- Main housing outline -->
  <rect x="150" y="80" width="500" height="340" rx="10" class="outline"/>
  <text x="400" y="100" text-anchor="middle" class="dim">Moldura Frontal (NE-HUD-1201)</text>

  <!-- Projector housing (center top) -->
  <rect x="280" y="120" width="240" height="100" rx="4" class="component"/>
  <text x="400" y="165" text-anchor="middle">Projetor Principal</text>
  <text x="400" y="180" text-anchor="middle" class="dim">NE-HUD-1220</text>
  <!-- Lens circle inside projector -->
  <circle cx="400" cy="155" r="30" class="inner" stroke-dasharray="4,2"/>
  <text x="400" y="205" text-anchor="middle" class="dim">Lente Colimadora</text>

  <!-- Dimension: projector width -->
  <line x1="280" y1="110" x2="520" y2="110" class="dimline"/>
  <text x="400" y="107" text-anchor="middle" class="dim">280 mm</text>

  <!-- Dimension: projector height -->
  <line x1="530" y1="120" x2="530" y2="220" class="dimline"/>
  <text x="555" y="175" text-anchor="middle" class="dim" transform="rotate(90,555,175)">95 mm</text>

  <!-- Sensor bars — Top -->
  <rect x="170" y="75" width="460" height="12" rx="2" class="component" fill="#e0e0e0"/>
  <text x="680" y="86" class="dim">Array Sensores IR (Superior)</text>
  <line x1="640" y1="83" x2="632" y2="83" class="leader"/>

  <!-- Sensor bars — Bottom -->
  <rect x="170" y="413" width="460" height="12" rx="2" class="component" fill="#e0e0e0"/>
  <text x="680" y="424" class="dim">Array Sensores IR (Inferior)</text>

  <!-- Sensor bars — Left -->
  <rect x="145" y="90" width="12" height="330" rx="2" class="component" fill="#e0e0e0"/>
  <text x="100" y="260" text-anchor="middle" class="dim" transform="rotate(-90,100,260)">Array Sensores IR (Esquerda)</text>

  <!-- Sensor bars — Right -->
  <rect x="643" y="90" width="12" height="330" rx="2" class="component" fill="#e0e0e0"/>
  <text x="700" y="260" text-anchor="middle" class="dim" transform="rotate(90,700,260)">Array Sensores IR (Direita)</text>

  <!-- Sensor dots on top bar -->
  <circle cx="250" cy="81" r="4" fill="#222"/>
  <circle cx="350" cy="81" r="4" fill="#222"/>
  <circle cx="450" cy="81" r="4" fill="#222"/>
  <circle cx="550" cy="81" r="4" fill="#222"/>

  <!-- Sensor dots on bottom bar -->
  <circle cx="250" cy="419" r="4" fill="#222"/>
  <circle cx="350" cy="419" r="4" fill="#222"/>
  <circle cx="450" cy="419" r="4" fill="#222"/>
  <circle cx="550" cy="419" r="4" fill="#222"/>

  <!-- Haptic module (bottom inside) -->
  <rect x="240" y="350" width="320" height="50" rx="3" class="component" fill="#e8e8e8"/>
  <text x="400" y="378" text-anchor="middle">Atuador Háptico</text>
  <text x="400" y="393" text-anchor="middle" class="dim">NE-HUD-1260 | 320×60×25 mm</text>
  <!-- Transducer dots -->
  <g>
    <circle cx="260" cy="365" r="2" fill="#222"/>
    <circle cx="280" cy="365" r="2" fill="#222"/>
    <circle cx="300" cy="365" r="2" fill="#222"/>
    <circle cx="320" cy="365" r="2" fill="#222"/>
    <circle cx="340" cy="365" r="2" fill="#222"/>
    <circle cx="360" cy="365" r="2" fill="#222"/>
    <circle cx="380" cy="365" r="2" fill="#222"/>
    <circle cx="400" cy="365" r="2" fill="#222"/>
    <circle cx="420" cy="365" r="2" fill="#222"/>
    <circle cx="440" cy="365" r="2" fill="#222"/>
    <circle cx="460" cy="365" r="2" fill="#222"/>
    <circle cx="480" cy="365" r="2" fill="#222"/>
    <circle cx="500" cy="365" r="2" fill="#222"/>
    <circle cx="520" cy="365" r="2" fill="#222"/>
    <circle cx="540" cy="365" r="2" fill="#222"/>
  </g>

  <!-- Eye tracking module (left of projector) -->
  <rect x="175" y="150" width="80" height="50" rx="3" class="component"/>
  <text x="215" y="172" text-anchor="middle" class="dim">Rastreamento</text>
  <text x="215" y="185" text-anchor="middle" class="dim">Ocular</text>
  <text x="215" y="196" text-anchor="middle" class="dim">NE-HUD-1230</text>

  <!-- GPU module (lower left) -->
  <rect x="175" y="260" width="160" height="70" rx="3" class="component"/>
  <text x="255" y="290" text-anchor="middle">Processador Gráfico</text>
  <text x="255" y="307" text-anchor="middle" class="dim">NE-HUD-1210</text>
  <text x="255" y="322" text-anchor="middle" class="dim">150×100×18 mm</text>

  <!-- Overall dimensions -->
  <!-- Width -->
  <line x1="150" y1="450" x2="650" y2="450" class="dimline"/>
  <text x="400" y="465" text-anchor="middle" class="dim">500 mm (moldura frontal)</text>
  <!-- Height -->
  <line x1="130" y1="80" x2="130" y2="420" class="dimline"/>
  <text x="115" y="255" text-anchor="middle" class="dim" transform="rotate(-90,115,255)">340 mm</text>

  <!-- Mounting holes (corners) -->
  <circle cx="168" cy="92" r="5" fill="none" stroke="#222" stroke-width="1"/>
  <line x1="163" y1="92" x2="173" y2="92" stroke="#222" stroke-width="0.5"/>
  <line x1="168" y1="87" x2="168" y2="97" stroke="#222" stroke-width="0.5"/>

  <circle cx="632" cy="92" r="5" fill="none" stroke="#222" stroke-width="1"/>
  <line x1="627" y1="92" x2="637" y2="92" stroke="#222" stroke-width="0.5"/>
  <line x1="632" y1="87" x2="632" y2="97" stroke="#222" stroke-width="0.5"/>

  <circle cx="168" cy="408" r="5" fill="none" stroke="#222" stroke-width="1"/>
  <line x1="163" y1="408" x2="173" y2="408" stroke="#222" stroke-width="0.5"/>
  <line x1="168" y1="403" x2="168" y2="413" stroke="#222" stroke-width="0.5"/>

  <circle cx="632" cy="408" r="5" fill="none" stroke="#222" stroke-width="1"/>
  <line x1="627" y1="408" x2="637" y2="408" stroke="#222" stroke-width="0.5"/>
  <line x1="632" y1="403" x2="632" y2="413" stroke="#222" stroke-width="0.5"/>

  <!-- Mounting hole labels -->
  <text x="168" y="440" text-anchor="middle" class="dim">M4 (4×) Torque: 3,2 N·m</text>

  <!-- SpaceBus connector -->
  <rect x="545" y="260" width="80" height="35" rx="2" class="component"/>
  <text x="585" y="280" text-anchor="middle" class="dim">SpaceBus 4.0</text>
  <text x="585" y="292" text-anchor="middle" class="dim">NE-CON-0412</text>

  <!-- Notes -->
  <text x="50" y="520" class="dim">NOTAS:</text>
  <text x="50" y="535" class="dim">1. Todas as cotas em milímetros, tolerância geral ±0,5 mm salvo indicação.</text>
  <text x="50" y="550" class="dim">2. Furos de montagem M4 — torque conforme seção 2 do manual.</text>
  <text x="50" y="565" class="dim">3. Superfícies ópticas: NÃO TOCAR — usar luvas e ambiente ISO 7.</text>
  <text x="50" y="580" class="dim">4. Documento: MR-HUD-012 Rev.4.2 | Nova ERA Aerospace</text>
</svg>
