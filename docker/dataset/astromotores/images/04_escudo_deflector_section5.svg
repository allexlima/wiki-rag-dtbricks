<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
  <!-- Background -->
  <rect width="800" height="600" fill="#f0f4f8" rx="8" />

  <!-- Title -->
  <text x="400" y="35" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#333">Linha do Tempo de Manutencao Preventiva</text>
  <text x="400" y="55" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#333">Intervalos em horas de operacao do escudo (0–8.000 h)</text>

  <!-- X-axis -->
  <line x1="100" y1="530" x2="750" y2="530" stroke="#333" stroke-width="2" />

  <!-- X-axis ticks and labels -->
  <line x1="100" y1="530" x2="100" y2="540" stroke="#333" stroke-width="1.5" />
  <text x="100" y="555" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#333">0</text>

  <line x1="181" y1="530" x2="181" y2="540" stroke="#333" stroke-width="1.5" />
  <text x="181" y="555" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#333">1000</text>

  <line x1="262" y1="530" x2="262" y2="540" stroke="#333" stroke-width="1.5" />
  <text x="262" y="555" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#333">2000</text>

  <line x1="344" y1="530" x2="344" y2="540" stroke="#333" stroke-width="1.5" />
  <text x="344" y="555" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#333">3000</text>

  <line x1="425" y1="530" x2="425" y2="540" stroke="#333" stroke-width="1.5" />
  <text x="425" y="555" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#333">4000</text>

  <line x1="506" y1="530" x2="506" y2="540" stroke="#333" stroke-width="1.5" />
  <text x="506" y="555" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#333">5000</text>

  <line x1="587" y1="530" x2="587" y2="540" stroke="#333" stroke-width="1.5" />
  <text x="587" y="555" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#333">6000</text>

  <line x1="669" y1="530" x2="669" y2="540" stroke="#333" stroke-width="1.5" />
  <text x="669" y="555" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#333">7000</text>

  <line x1="750" y1="530" x2="750" y2="540" stroke="#333" stroke-width="1.5" />
  <text x="750" y="555" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#333">8000</text>

  <text x="425" y="580" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#333">Horas de Operacao</text>

  <!-- Scale: 1000h = 81.25px, so pixel_per_hour = 0.08125 -->
  <!-- Bar start at x=100 -->

  <!-- Grid lines (light) -->
  <line x1="181" y1="70" x2="181" y2="530" stroke="#333" stroke-width="0.3" stroke-dasharray="4,4" />
  <line x1="262" y1="70" x2="262" y2="530" stroke="#333" stroke-width="0.3" stroke-dasharray="4,4" />
  <line x1="344" y1="70" x2="344" y2="530" stroke="#333" stroke-width="0.3" stroke-dasharray="4,4" />
  <line x1="425" y1="70" x2="425" y2="530" stroke="#333" stroke-width="0.3" stroke-dasharray="4,4" />
  <line x1="506" y1="70" x2="506" y2="530" stroke="#333" stroke-width="0.3" stroke-dasharray="4,4" />
  <line x1="587" y1="70" x2="587" y2="530" stroke="#333" stroke-width="0.3" stroke-dasharray="4,4" />
  <line x1="669" y1="70" x2="669" y2="530" stroke="#333" stroke-width="0.3" stroke-dasharray="4,4" />

  <!-- Row 1: Teste de Integridade (TIE) — every 100h -->
  <!-- Show repeating markers at 100, 200, 300... -->
  <text x="95" y="95" text-anchor="end" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#333">Teste de</text>
  <text x="95" y="108" text-anchor="end" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#333">Integridade (TIE)</text>
  <text x="95" y="120" text-anchor="end" font-family="Arial, sans-serif" font-size="9" fill="#333">A cada 100 h</text>

  <!-- Small tick marks every 100h for TIE -->
  <line x1="108" y1="88" x2="108" y2="115" stroke="#333" stroke-width="2" />
  <line x1="116" y1="88" x2="116" y2="115" stroke="#333" stroke-width="2" />
  <line x1="124" y1="88" x2="124" y2="115" stroke="#333" stroke-width="2" />
  <line x1="132" y1="88" x2="132" y2="115" stroke="#333" stroke-width="2" />
  <line x1="141" y1="88" x2="141" y2="115" stroke="#333" stroke-width="2" />
  <line x1="149" y1="88" x2="149" y2="115" stroke="#333" stroke-width="2" />
  <line x1="157" y1="88" x2="157" y2="115" stroke="#333" stroke-width="2" />
  <line x1="165" y1="88" x2="165" y2="115" stroke="#333" stroke-width="2" />
  <line x1="173" y1="88" x2="173" y2="115" stroke="#333" stroke-width="2" />
  <line x1="181" y1="88" x2="181" y2="115" stroke="#333" stroke-width="2" />
  <!-- Continuation dots -->
  <text x="200" y="107" font-family="Arial, sans-serif" font-size="14" fill="#333">...</text>
  <!-- More ticks representing pattern continues -->
  <rect x="100" y="98" width="650" height="3" fill="#333" opacity="0.15" />

  <!-- Row 2: Limpeza dos Emissores — every 500h -->
  <text x="95" y="165" text-anchor="end" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#333">Limpeza dos</text>
  <text x="95" y="178" text-anchor="end" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#333">Emissores</text>
  <text x="95" y="190" text-anchor="end" font-family="Arial, sans-serif" font-size="9" fill="#333">A cada 500 h</text>

  <!-- Bars at 500, 1000, 1500, 2000, 2500, 3000, 3500, 4000, ... -->
  <rect x="140" y="158" width="20" height="25" rx="2" fill="#333" opacity="0.7" />
  <rect x="181" y="158" width="20" height="25" rx="2" fill="#333" opacity="0.7" />
  <rect x="222" y="158" width="20" height="25" rx="2" fill="#333" opacity="0.7" />
  <rect x="262" y="158" width="20" height="25" rx="2" fill="#333" opacity="0.7" />
  <rect x="303" y="158" width="20" height="25" rx="2" fill="#333" opacity="0.7" />
  <rect x="344" y="158" width="20" height="25" rx="2" fill="#333" opacity="0.7" />
  <rect x="384" y="158" width="20" height="25" rx="2" fill="#333" opacity="0.7" />
  <rect x="425" y="158" width="20" height="25" rx="2" fill="#333" opacity="0.7" />
  <rect x="466" y="158" width="20" height="25" rx="2" fill="#333" opacity="0.7" />
  <rect x="506" y="158" width="20" height="25" rx="2" fill="#333" opacity="0.7" />
  <rect x="547" y="158" width="20" height="25" rx="2" fill="#333" opacity="0.7" />
  <rect x="587" y="158" width="20" height="25" rx="2" fill="#333" opacity="0.7" />
  <rect x="628" y="158" width="20" height="25" rx="2" fill="#333" opacity="0.7" />
  <rect x="669" y="158" width="20" height="25" rx="2" fill="#333" opacity="0.7" />
  <rect x="709" y="158" width="20" height="25" rx="2" fill="#333" opacity="0.7" />
  <rect x="750" y="158" width="20" height="25" rx="2" fill="#333" opacity="0.7" />

  <!-- Row 3: Recalibracao Harmonica — every 1500h -->
  <text x="95" y="245" text-anchor="end" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#333">Recalibracao</text>
  <text x="95" y="258" text-anchor="end" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#333">Harmonica</text>
  <text x="95" y="270" text-anchor="end" font-family="Arial, sans-serif" font-size="9" fill="#333">A cada 1.500 h</text>

  <!-- Bars at 1500, 3000, 4500, 6000, 7500 -->
  <!-- 1500h = 100 + 1500*0.08125 = 221.9 -->
  <rect x="222" y="238" width="30" height="25" rx="2" fill="#333" opacity="0.55" />
  <!-- 3000h = 344 -->
  <rect x="344" y="238" width="30" height="25" rx="2" fill="#333" opacity="0.55" />
  <!-- 4500h = 465.6 -->
  <rect x="466" y="238" width="30" height="25" rx="2" fill="#333" opacity="0.55" />
  <!-- 6000h = 587.5 -->
  <rect x="587" y="238" width="30" height="25" rx="2" fill="#333" opacity="0.55" />
  <!-- 7500h = 709.4 -->
  <rect x="709" y="238" width="30" height="25" rx="2" fill="#333" opacity="0.55" />

  <!-- Row 4: Troca de Bobinas — every 4000h -->
  <text x="95" y="325" text-anchor="end" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#333">Troca de</text>
  <text x="95" y="338" text-anchor="end" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#333">Bobinas</text>
  <text x="95" y="350" text-anchor="end" font-family="Arial, sans-serif" font-size="9" fill="#333">A cada 4.000 h</text>

  <!-- 4000h = 425 -->
  <rect x="425" y="318" width="40" height="25" rx="2" fill="#333" opacity="0.85" />
  <!-- 8000h = 750 -->
  <rect x="750" y="318" width="40" height="25" rx="2" fill="#333" opacity="0.85" />

  <!-- Row 5: Revisao Geral Distribuidor — every 4000h -->
  <text x="95" y="400" text-anchor="end" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#333">Revisao Geral</text>
  <text x="95" y="413" text-anchor="end" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#333">Distribuidor</text>
  <text x="95" y="425" text-anchor="end" font-family="Arial, sans-serif" font-size="9" fill="#333">A cada 4.000 h</text>

  <rect x="425" y="393" width="40" height="25" rx="2" fill="#333" opacity="0.85" />
  <rect x="750" y="393" width="40" height="25" rx="2" fill="#333" opacity="0.85" />

  <!-- Row 6: Recertificacao Completa — at 8000h -->
  <text x="95" y="475" text-anchor="end" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#333">Recertificacao</text>
  <text x="95" y="488" text-anchor="end" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#333">Completa</text>
  <text x="95" y="500" text-anchor="end" font-family="Arial, sans-serif" font-size="9" fill="#333">A cada 8.000 h</text>

  <!-- 8000h = 750 -->
  <rect x="750" y="468" width="40" height="25" rx="2" fill="#333" />

  <!-- Horizontal separator lines -->
  <line x1="100" y1="135" x2="750" y2="135" stroke="#333" stroke-width="0.5" stroke-dasharray="2,2" />
  <line x1="100" y1="210" x2="750" y2="210" stroke="#333" stroke-width="0.5" stroke-dasharray="2,2" />
  <line x1="100" y1="290" x2="750" y2="290" stroke="#333" stroke-width="0.5" stroke-dasharray="2,2" />
  <line x1="100" y1="370" x2="750" y2="370" stroke="#333" stroke-width="0.5" stroke-dasharray="2,2" />
  <line x1="100" y1="445" x2="750" y2="445" stroke="#333" stroke-width="0.5" stroke-dasharray="2,2" />

  <!-- Legend note -->
  <text x="400" y="592" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#333">Barras indicam execucao da tarefa no intervalo correspondente. Consulte Secao 5 para procedimentos detalhados.</text>
</svg>
