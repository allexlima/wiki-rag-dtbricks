  <rect class="bar bar-2000" x="760" y="303" width="14" height="22" rx="2"/>

  <!-- Task 7: Troca Mancais Emergência (cada 5000h) -->
  <text x="215" y="362" class="task-label">Troca Mancais</text>
  <rect class="bar bar-5000" x="490" y="348" width="18" height="22" rx="2"/>
  <rect class="bar bar-5000" x="760" y="348" width="18" height="22" rx="2"/>

  <!-- Task 8: Inspeção Cristal (cada 5000h) -->
  <text x="215" y="407" class="task-label">Inspeção Cristal</text>
  <rect class="bar bar-5000" x="490" y="393" width="18" height="22" rx="2"/>
  <rect class="bar bar-5000" x="760" y="393" width="18" height="22" rx="2"/>

