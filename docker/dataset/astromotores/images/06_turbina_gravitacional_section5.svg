  <rect class="bar bar-2000" x="328" y="303" width="14" height="22" rx="2"/>
  <rect class="bar bar-2000" x="436" y="303" width="14" height="22" rx="2"/>
  <rect class="bar bar-2000" x="544" y="303" width="14" height="22" rx="2"/>
