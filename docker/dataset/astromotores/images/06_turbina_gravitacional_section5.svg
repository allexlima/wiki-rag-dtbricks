  <rect x="540" y="530" width="16" height="12" class="bar-10000" stroke="#1a1a1a" stroke-width="1" rx="2"/>
  <text x="562" y="541" class="legend-label">10.000 h</text>

  <text x="45" y="568" font-size="9" fill="#777" font-style="italic">Nota: horas em marcha lenta (RPM &lt; 5.000) contam como 0,5 h para fins de manutenção preventiva.</text>
