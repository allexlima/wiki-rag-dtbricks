<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="800" height="600" viewBox="0 0 800 600">
  <title>Cronograma de Manutenção Preventiva — Turbina Gravitacional</title>
  <style>
    text { font-family: Arial, Helvetica, sans-serif; fill: #1a1a1a; }
    .title { font-size: 16px; font-weight: bold; text-anchor: middle; }
    .axis-label { font-size: 11px; text-anchor: middle; }
    .task-label { font-size: 11px; text-anchor: end; }
    .bar { stroke: #1a1a1a; stroke-width: 1; }
    .bar-400 { fill: #555; }
    .bar-800 { fill: #777; }
    .bar-2000 { fill: #999; }
    .bar-5000 { fill: #bbb; }
    .bar-10000 { fill: #ddd; }
    .grid { stroke: #ccc; stroke-width: 0.5; }
    .axis { stroke: #1a1a1a; stroke-width: 1.5; }
    .tick { font-size: 10px; text-anchor: middle; fill: #555; }
    .legend-label { font-size: 10px; }
    .interval { font-size: 9px; fill: #fff; text-anchor: middle; font-weight: bold; }
  </style>

  <text x="400" y="30" class="title">Cronograma de Manutenção Preventiva — 0 a 10.000 h</text>
  <line x1="100" y1="38" x2="700" y2="38" stroke="#1a1a1a" stroke-width="1"/>

  <!-- Chart area -->
  <!-- Y axis -->
  <line class="axis" x1="220" y1="60" x2="220" y2="460"/>
  <!-- X axis -->
  <line class="axis" x1="220" y1="460" x2="760" y2="460"/>

  <!-- X axis: hours (0 to 10000) -->
  <!-- Grid lines and tick labels -->
  <line class="grid" x1="220" y1="60" x2="220" y2="460"/>
  <text x="220" y="478" class="tick">0</text>

  <line class="grid" x1="274" y1="60" x2="274" y2="460"/>
  <text x="274" y="478" class="tick">1000</text>

  <line class="grid" x1="328" y1="60" x2="328" y2="460"/>
  <text x="328" y="478" class="tick">2000</text>

  <line class="grid" x1="382" y1="60" x2="382" y2="460"/>
  <text x="382" y="478" class="tick">3000</text>

  <line class="grid" x1="436" y1="60" x2="436" y2="460"/>
  <text x="436" y="478" class="tick">4000</text>

  <line class="grid" x1="490" y1="60" x2="490" y2="460"/>
  <text x="490" y="478" class="tick">5000</text>

  <line class="grid" x1="544" y1="60" x2="544" y2="460"/>
  <text x="544" y="478" class="tick">6000</text>

  <line class="grid" x1="598" y1="60" x2="598" y2="460"/>
  <text x="598" y="478" class="tick">7000</text>

  <line class="grid" x1="652" y1="60" x2="652" y2="460"/>
  <text x="652" y="478" class="tick">8000</text>

  <line class="grid" x1="706" y1="60" x2="706" y2="460"/>
  <text x="706" y="478" class="tick">9000</text>

  <line class="grid" x1="760" y1="60" x2="760" y2="460"/>
  <text x="760" y="478" class="tick">10000</text>

  <text x="490" y="500" class="axis-label" font-weight="bold">Horas de Operação</text>

  <!-- Scale: 1000h = 54px, so 400h = 21.6px, 800h = 43.2px -->
  <!-- Row height: 45px, starting at y=75 -->

  <!-- Task 1: Balanceamento do Rotor (cada 400h) -->
  <text x="215" y="92" class="task-label">Balanceamento Rotor</text>
  <!-- Bars at 400, 800, 1200, ..., 9600 -->
