  <rect x="30" y="520" width="740" height="60" fill="none" stroke="#ccc" stroke-width="1" rx="4"/>
  <text x="45" y="540" font-size="11" font-weight="bold">Legenda — Intervalos:</text>

  <rect x="190" y="530" width="16" height="12" class="bar-400" stroke="#1a1a1a" stroke-width="1" rx="2"/>
