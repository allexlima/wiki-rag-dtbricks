<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <style>
    text { font-family: Arial, Helvetica, sans-serif; fill: #333; }
    .title { font-size: 18px; font-weight: bold; text-anchor: middle; }
    .label { font-size: 14px; text-anchor: end; }
    .hours { font-size: 12px; text-anchor: middle; fill: #fff; }
    .axis-label { font-size: 11px; text-anchor: middle; fill: #666; }
    .bar { fill: #f0f4f8; stroke: #333; stroke-width: 1.5; }
    .grid { stroke: #ddd; stroke-width: 0.5; }
  </style>

  <!-- Title -->
  <text x="400" y="45" class="title">Intervalos de Manutenção — Câmara de Combustão Plasmática</text>

  <!-- Grid lines -->
  <line x1="220" y1="80" x2="220" y2="480" class="grid"/>
  <line x1="310" y1="80" x2="310" y2="480" class="grid"/>
  <line x1="400" y1="80" x2="400" y2="480" class="grid"/>
  <line x1="490" y1="80" x2="490" y2="480" class="grid"/>
  <line x1="580" y1="80" x2="580" y2="480" class="grid"/>
  <line x1="670" y1="80" x2="670" y2="480" class="grid"/>
  <line x1="760" y1="80" x2="760" y2="480" class="grid"/>

  <!-- Axis lines -->
  <line x1="220" y1="480" x2="760" y2="480" stroke="#333" stroke-width="1.5"/>
  <line x1="220" y1="80" x2="220" y2="480" stroke="#333" stroke-width="1.5"/>

  <!-- Axis labels (hours) -->
  <text x="220" y="510" class="axis-label">0</text>
  <text x="310" y="510" class="axis-label">1000</text>
  <text x="400" y="510" class="axis-label">2000</text>
  <text x="490" y="510" class="axis-label">3000</text>
  <text x="580" y="510" class="axis-label">4000</text>
  <text x="670" y="510" class="axis-label">5000</text>
  <text x="760" y="510" class="axis-label">6000</text>
  <text x="490" y="545" class="axis-label" style="font-size:13px;">Horas de Operação (h)</text>

  <!-- Bar 1: Inspeção Térmica — 200h -->
  <text x="210" y="150" class="label">Inspeção Térmica</text>
  <rect x="220" y="125" width="18" height="40" rx="3" fill="#f0f4f8" stroke="#333" stroke-width="1.5"/>
  <text x="260" y="150" style="font-size:12px; fill:#333;">200h</text>

  <!-- Bar 2: Limpeza Injetores — 800h -->
  <text x="210" y="240" class="label">Limpeza Injetores</text>
  <rect x="220" y="215" width="72" height="40" rx="3" fill="#f0f4f8" stroke="#333" stroke-width="1.5"/>
  <text x="256" y="240" style="font-size:12px; fill:#333; text-anchor:middle;">800h</text>

  <!-- Bar 3: Troca Revestimento — 2500h -->
  <text x="210" y="330" class="label">Troca Revestimento</text>
  <rect x="220" y="305" width="225" height="40" rx="3" fill="#f0f4f8" stroke="#333" stroke-width="1.5"/>
  <text x="332" y="330" style="font-size:12px; fill:#333; text-anchor:middle;">2500h</text>

  <!-- Bar 4: Revisão Geral — 6000h -->
  <text x="210" y="420" class="label">Revisão Geral</text>
  <rect x="220" y="395" width="540" height="40" rx="3" fill="#f0f4f8" stroke="#333" stroke-width="1.5"/>
  <text x="490" y="420" style="font-size:12px; fill:#333; text-anchor:middle;">6000h</text>
</svg>
