<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#333" />
    </marker>
    <style>
      text { font-family: Arial, Helvetica, sans-serif; fill: #333; }
      .title { font-size: 18px; font-weight: bold; }
      .label { font-size: 13px; }
      .sublabel { font-size: 11px; fill: #666; }
      .box { fill: #f0f4f8; stroke: #333; stroke-width: 2; rx: 8; ry: 8; }
      .arrow-line { stroke: #333; stroke-width: 2; marker-end: url(#arrowhead); fill: none; }
    </style>
  </defs>

  <!-- Title -->
  <text x="400" y="40" text-anchor="middle" class="title">Diagrama de Blocos — Conversor de Antimateria NE-ATM-3300</text>

  <!-- Block 1: Reservatorio -->
  <rect x="30" y="100" width="160" height="90" class="box" />
  <text x="110" y="135" text-anchor="middle" class="label">Reservatorio de</text>
  <text x="110" y="155" text-anchor="middle" class="label">Antiprotons</text>
  <text x="110" y="175" text-anchor="middle" class="sublabel">NE-ATM-3301</text>

  <!-- Arrow 1->2 -->
  <line x1="190" y1="145" x2="240" y2="145" class="arrow-line" />

  <!-- Block 2: Injetor -->
  <rect x="250" y="100" width="160" height="90" class="box" />
  <text x="330" y="135" text-anchor="middle" class="label">Injetor de</text>
  <text x="330" y="155" text-anchor="middle" class="label">Antiprotons</text>
  <text x="330" y="175" text-anchor="middle" class="sublabel">NE-ATM-3302</text>

  <!-- Arrow 2->3 -->
  <line x1="410" y1="145" x2="460" y2="145" class="arrow-line" />

  <!-- Block 3: Campo de Contencao -->
  <rect x="470" y="80" width="160" height="130" class="box" stroke-dasharray="6,3" />
  <text x="550" y="115" text-anchor="middle" class="label">Campo de</text>
  <text x="550" y="135" text-anchor="middle" class="label">Contencao</text>
  <text x="550" y="155" text-anchor="middle" class="label">Magnetico</text>
  <text x="550" y="180" text-anchor="middle" class="sublabel">NE-ATM-3303</text>
  <text x="550" y="198" text-anchor="middle" class="sublabel">12,8 T (toroidal)</text>

  <!-- Block 4: Camara de Aniquilacao (center, below) -->
  <rect x="320" y="270" width="200" height="100" class="box" stroke-width="3" />
  <text x="420" y="305" text-anchor="middle" class="label">Camara de</text>
  <text x="420" y="325" text-anchor="middle" class="label">Aniquilacao</text>
  <text x="420" y="350" text-anchor="middle" class="sublabel">NE-ATM-3305</text>

  <!-- Arrow from Injetor down to Camara -->
  <path d="M 330 190 L 330 240 L 400 240 L 400 270" class="arrow-line" />

  <!-- Arrow from Campo de Contencao down to Camara -->
  <path d="M 550 210 L 550 240 L 460 240 L 460 270" class="arrow-line" />

  <!-- Annotation: contencao envelops camara -->
  <rect x="300" y="250" width="240" height="140" fill="none" stroke="#333" stroke-width="1" stroke-dasharray="4,4" rx="12" ry="12" />
  <text x="540" y="260" class="sublabel">Zona de Contencao</text>

  <!-- Products labels -->
  <text x="200" y="310" text-anchor="middle" class="sublabel">Pions (pi+, pi-)</text>
  <text x="200" y="330" text-anchor="middle" class="sublabel">Raios Gama (gamma)</text>

  <!-- Arrow from Camara left to product labels -->
  <line x1="320" y1="320" x2="260" y2="320" class="arrow-line" />

  <!-- Arrow from products down to Conversor Termico -->
  <path d="M 200 340 L 200 430 L 280 430" class="arrow-line" />

  <!-- Block 5: Conversor Termico -->
  <rect x="290" y="400" width="200" height="90" class="box" />
  <text x="390" y="430" text-anchor="middle" class="label">Conversor Termico</text>
  <text x="390" y="450" text-anchor="middle" class="label">(3 estagios)</text>
  <text x="390" y="475" text-anchor="middle" class="sublabel">NE-ATM-3310</text>

  <!-- Arrow 5->6 -->
  <line x1="490" y1="445" x2="550" y2="445" class="arrow-line" />

  <!-- Block 6: Saida de Energia -->
  <rect x="560" y="400" width="180" height="90" class="box" />
  <text x="650" y="430" text-anchor="middle" class="label">Saida de Energia</text>
  <text x="650" y="450" text-anchor="middle" class="label">4,8 GW (nominal)</text>
  <text x="650" y="475" text-anchor="middle" class="sublabel">NE-ATM-3315</text>

  <!-- Output arrows from Saida de Energia -->
  <line x1="740" y1="420" x2="780" y2="400" class="arrow-line" />
  <text x="770" y="393" class="sublabel">Propulsao</text>
  <line x1="740" y1="445" x2="780" y2="445" class="arrow-line" />
  <text x="770" y="440" class="sublabel">Escudos</text>
  <line x1="740" y1="470" x2="780" y2="490" class="arrow-line" />
  <text x="770" y="500" class="sublabel">Suporte Vital</text>

  <!-- He-3 loop annotation -->
  <rect x="30" y="420" width="140" height="60" fill="none" stroke="#333" stroke-width="1" rx="6" ry="6" />
  <text x="100" y="445" text-anchor="middle" class="sublabel">Fluido de Trabalho</text>
  <text x="100" y="462" text-anchor="middle" class="sublabel">He-3 Supercritico</text>
  <line x1="170" y1="450" x2="290" y2="450" class="arrow-line" />

  <!-- Legend -->
  <rect x="30" y="530" width="300" height="55" fill="none" stroke="#333" stroke-width="1" rx="4" ry="4" />
  <text x="40" y="550" class="sublabel">Legenda:</text>
  <line x1="100" y1="545" x2="140" y2="545" stroke="#333" stroke-width="2" />
  <text x="150" y="550" class="sublabel">Fluxo de processo</text>
  <line x1="100" y1="570" x2="140" y2="570" stroke="#333" stroke-width="1" stroke-dasharray="4,4" />
  <text x="150" y="575" class="sublabel">Zona de contencao magnetica</text>
</svg>
