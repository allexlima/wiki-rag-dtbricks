<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="800" height="600" viewBox="0 0 800 600">
  <title>Vista Explodida — Conjunto da Câmara de Combustão Plasmática</title>
  <style>
    text { font-family: 'Courier New', monospace; fill: #1a1a1a; }
    .title { font-size: 16px; font-weight: bold; text-anchor: middle; }
    .subtitle { font-size: 10px; text-anchor: middle; fill: #555; }
    .part-name { font-size: 10px; font-weight: bold; }
    .part-num { font-size: 8px; fill: #555; font-style: italic; }
    .item-num { font-size: 11px; font-weight: bold; text-anchor: middle; }
    .component { fill: #fff; stroke: #1a1a1a; stroke-width: 1.5; }
    .component-accent { fill: #e8e8e8; stroke: #1a1a1a; stroke-width: 1.5; }
    .leader { stroke: #1a1a1a; stroke-width: 0.8; }
    .assembly-line { stroke: #1a1a1a; stroke-width: 0.8; stroke-dasharray: 6,4; }
    .circle-ref { fill: #fff; stroke: #1a1a1a; stroke-width: 1.5; }
  </style>

  <!-- Background -->
  <rect x="5" y="5" width="790" height="590" rx="8" ry="8" fill="#fafafa" stroke="#ccc" stroke-width="1"/>

  <!-- Title -->
  <text class="title" x="400" y="35">VISTA EXPLODIDA — CÂMARA DE COMBUSTÃO</text>
  <text class="subtitle" x="400" y="52">Conjunto NE-PLS-5500 | Montagem axial da esquerda para a direita</text>

  <!-- Assembly axis (dashed center line) -->
  <line class="assembly-line" x1="40" y1="320" x2="760" y2="320"/>

  <!-- ITEM 1: Flange de Entrada (leftmost) -->
  <rect class="component" x="50" y="250" width="60" height="140" rx="3"/>
  <rect class="component-accent" x="55" y="280" width="50" height="80"/>
  <circle cx="80" cy="290" r="6" fill="none" stroke="#1a1a1a" stroke-width="1"/>
  <circle cx="80" cy="350" r="6" fill="none" stroke="#1a1a1a" stroke-width="1"/>
  <!-- Bolt holes -->
  <circle cx="60" cy="265" r="3" fill="#1a1a1a"/>
  <circle cx="100" cy="265" r="3" fill="#1a1a1a"/>
  <circle cx="60" cy="375" r="3" fill="#1a1a1a"/>
  <circle cx="100" cy="375" r="3" fill="#1a1a1a"/>
  <!-- Label -->
  <circle class="circle-ref" cx="80" cy="220" r="12"/>
  <text class="item-num" x="80" y="224">1</text>
  <line class="leader" x1="80" y1="232" x2="80" y2="248"/>

  <!-- ITEM 2: Injetor de Plasma (angled, above) -->
  <g transform="translate(175, 140)">
    <rect class="component" x="0" y="0" width="80" height="45" rx="4"/>
    <rect class="component-accent" x="15" y="45" width="20" height="30"/>
    <rect class="component-accent" x="45" y="45" width="20" height="30"/>
    <circle cx="25" cy="60" r="4" fill="none" stroke="#1a1a1a" stroke-width="1"/>
    <circle cx="55" cy="60" r="4" fill="none" stroke="#1a1a1a" stroke-width="1"/>
    <!-- Nozzle tip -->
    <path d="M 30,75 L 50,75 L 44,90 L 36,90 Z" class="component"/>
    <!-- Label -->
    <circle class="circle-ref" cx="40" cy="-20" r="12"/>
    <text class="item-num" x="40" y="-16">2</text>
    <line class="leader" x1="40" y1="-8" x2="40" y2="0"/>
  </g>

  <!-- Arrow from injetor to chamber position -->
  <line class="assembly-line" x1="215" y1="230" x2="215" y2="260"/>
  <polygon points="212,258 215,268 218,258" fill="#1a1a1a"/>

  <!-- ITEM 3: Módulo de Ignição (above, slightly right) -->
  <g transform="translate(310, 120)">
    <rect class="component" x="0" y="0" width="70" height="60" rx="4"/>
    <!-- High voltage terminal -->
    <rect class="component-accent" x="20" y="60" width="30" height="20"/>
    <circle cx="35" cy="75" r="5" fill="none" stroke="#1a1a1a" stroke-width="1.5"/>
    <!-- Electrode tip -->
    <line x1="35" y1="80" x2="35" y2="95" stroke="#1a1a1a" stroke-width="2"/>
    <!-- Capacitor symbol -->
    <line x1="15" y1="25" x2="25" y2="25" stroke="#1a1a1a" stroke-width="1.5"/>
    <line x1="15" y1="30" x2="25" y2="30" stroke="#1a1a1a" stroke-width="1.5"/>
    <line x1="45" y1="25" x2="55" y2="25" stroke="#1a1a1a" stroke-width="1.5"/>
    <line x1="45" y1="30" x2="55" y2="30" stroke="#1a1a1a" stroke-width="1.5"/>
    <!-- Label -->
    <circle class="circle-ref" cx="35" cy="-20" r="12"/>
    <text class="item-num" x="35" y="-16">3</text>
    <line class="leader" x1="35" y1="-8" x2="35" y2="0"/>
  </g>

  <!-- Arrow from ignição to chamber -->
  <line class="assembly-line" x1="345" y1="215" x2="345" y2="260"/>
  <polygon points="342,258 345,268 348,258" fill="#1a1a1a"/>

  <!-- ITEM 4: Revestimento Cerâmico (cylinder, center-left) -->
  <g transform="translate(155, 270)">
    <!-- Cylinder representation -->
    <ellipse cx="90" cy="10" rx="90" ry="12" class="component-accent"/>
    <rect class="component-accent" x="0" y="10" width="180" height="80"/>
    <ellipse cx="90" cy="90" rx="90" ry="12" class="component"/>
    <line x1="0" y1="10" x2="0" y2="90" stroke="#1a1a1a" stroke-width="1.5"/>
    <line x1="180" y1="10" x2="180" y2="90" stroke="#1a1a1a" stroke-width="1.5"/>
    <!-- Inner bore -->
    <ellipse cx="90" cy="10" rx="60" ry="8" fill="#fafafa" stroke="#1a1a1a" stroke-width="1"/>
    <!-- Hatching pattern -->
    <line x1="20" y1="30" x2="40" y2="70" stroke="#999" stroke-width="0.5"/>
    <line x1="50" y1="30" x2="70" y2="70" stroke="#999" stroke-width="0.5"/>
    <line x1="80" y1="30" x2="100" y2="70" stroke="#999" stroke-width="0.5"/>
    <line x1="110" y1="30" x2="130" y2="70" stroke="#999" stroke-width="0.5"/>
    <line x1="140" y1="30" x2="160" y2="70" stroke="#999" stroke-width="0.5"/>
    <!-- Label -->
    <circle class="circle-ref" cx="90" cy="-25" r="12"/>
    <text class="item-num" x="90" y="-21">4</text>
    <line class="leader" x1="90" y1="-13" x2="90" y2="-2"/>
  </g>

  <!-- ITEM 5: Câmara Interna (larger cylinder, center) -->
  <g transform="translate(380, 260)">
    <!-- Outer cylinder -->
    <ellipse cx="100" cy="12" rx="100" ry="15" class="component"/>
    <rect class="component" x="0" y="12" width="200" height="96"/>
    <ellipse cx="100" cy="108" rx="100" ry="15" class="component"/>
    <line x1="0" y1="12" x2="0" y2="108" stroke="#1a1a1a" stroke-width="1.5"/>
    <line x1="200" y1="12" x2="200" y2="108" stroke="#1a1a1a" stroke-width="1.5"/>
    <!-- Inner bore -->
    <ellipse cx="100" cy="12" rx="70" ry="10" fill="#fafafa" stroke="#1a1a1a" stroke-width="1"/>
    <!-- Injector ports (circles on surface) -->
    <circle cx="30" cy="45" r="8" fill="none" stroke="#1a1a1a" stroke-width="1"/>
    <circle cx="30" cy="75" r="8" fill="none" stroke="#1a1a1a" stroke-width="1"/>
    <circle cx="170" cy="45" r="8" fill="none" stroke="#1a1a1a" stroke-width="1"/>
    <circle cx="170" cy="75" r="8" fill="none" stroke="#1a1a1a" stroke-width="1"/>
    <!-- Mounting flange indicators -->
    <circle cx="15" cy="20" r="3" fill="#1a1a1a"/>
    <circle cx="185" cy="20" r="3" fill="#1a1a1a"/>
    <circle cx="15" cy="100" r="3" fill="#1a1a1a"/>
    <circle cx="185" cy="100" r="3" fill="#1a1a1a"/>
    <!-- Label -->
    <circle class="circle-ref" cx="100" cy="-25" r="12"/>
    <text class="item-num" x="100" y="-21">5</text>
    <line class="leader" x1="100" y1="-13" x2="100" y2="-3"/>
  </g>

  <!-- ITEM 6: Bocal de Exaustão (rightmost, converging-diverging shape) -->
  <g transform="translate(630, 265)">
    <!-- Converging section -->
    <path d="M 0,10 L 0,100 L 40,75 L 40,35 Z" class="component"/>
    <!-- Throat -->
    <rect class="component-accent" x="40" y="35" width="15" height="40"/>
    <!-- Diverging section -->
    <path d="M 55,35 L 55,75 L 120,0 L 120,110 Z" class="component"/>
    <!-- Inner contour -->
    <path d="M 5,20 L 5,90 L 42,70 L 42,40 Z" fill="#fafafa" stroke="#1a1a1a" stroke-width="0.8"/>
    <path d="M 53,40 L 53,70 L 115,8 L 115,102 Z" fill="#fafafa" stroke="#1a1a1a" stroke-width="0.8"/>
    <!-- Mounting bolts -->
    <circle cx="5" cy="15" r="3" fill="#1a1a1a"/>
    <circle cx="5" cy="95" r="3" fill="#1a1a1a"/>
    <!-- Label -->
    <circle class="circle-ref" cx="60" cy="-25" r="12"/>
    <text class="item-num" x="60" y="-21">6</text>
    <line class="leader" x1="60" y1="-13" x2="60" y2="5"/>
  </g>

  <!-- Parts list at bottom -->
  <rect x="30" y="440" width="740" height="145" fill="#fff" stroke="#1a1a1a" stroke-width="1"/>

  <!-- Header -->
  <rect x="30" y="440" width="740" height="22" fill="#e0e0e0" stroke="#1a1a1a" stroke-width="1"/>
  <text style="font-size:10px; font-weight:bold; text-anchor:middle;" x="60" y="455">Item</text>
  <text style="font-size:10px; font-weight:bold; text-anchor:middle;" x="200" y="455">Descrição</text>
  <text style="font-size:10px; font-weight:bold; text-anchor:middle;" x="380" y="455">Peça Nº</text>
  <text style="font-size:10px; font-weight:bold; text-anchor:middle;" x="500" y="455">Material</text>
  <text style="font-size:10px; font-weight:bold; text-anchor:middle;" x="640" y="455">Qtd.</text>
  <text style="font-size:10px; font-weight:bold; text-anchor:middle;" x="720" y="455">Massa</text>

  <!-- Divider lines -->
  <line x1="90" y1="440" x2="90" y2="585" stroke="#1a1a1a" stroke-width="0.5"/>
  <line x1="310" y1="440" x2="310" y2="585" stroke="#1a1a1a" stroke-width="0.5"/>
  <line x1="440" y1="440" x2="440" y2="585" stroke="#1a1a1a" stroke-width="0.5"/>
  <line x1="570" y1="440" x2="570" y2="585" stroke="#1a1a1a" stroke-width="0.5"/>
  <line x1="680" y1="440" x2="680" y2="585" stroke="#1a1a1a" stroke-width="0.5"/>

  <!-- Row 1 -->
  <text style="font-size:9px; text-anchor:middle;" x="60" y="475">1</text>
  <text style="font-size:9px; text-anchor:middle;" x="200" y="475">Flange de Entrada</text>
  <text style="font-size:9px; text-anchor:middle;" x="380" y="475">NE-PLS-5515</text>
  <text style="font-size:9px; text-anchor:middle;" x="500" y="475">Ti-6Al-4V-Nb</text>
  <text style="font-size:9px; text-anchor:middle;" x="640" y="475">1</text>
  <text style="font-size:9px; text-anchor:middle;" x="720" y="475">18,4 kg</text>

  <!-- Row 2 -->
  <line x1="30" y1="482" x2="770" y2="482" stroke="#ddd" stroke-width="0.5"/>
  <text style="font-size:9px; text-anchor:middle;" x="60" y="495">2</text>
  <text style="font-size:9px; text-anchor:middle;" x="200" y="495">Injetor de Plasma</text>
  <text style="font-size:9px; text-anchor:middle;" x="380" y="495">NE-PLS-5520</text>
  <text style="font-size:9px; text-anchor:middle;" x="500" y="495">Inconel 718-Plus</text>
  <text style="font-size:9px; text-anchor:middle;" x="640" y="495">8</text>
  <text style="font-size:9px; text-anchor:middle;" x="720" y="495">3,8 kg</text>

  <!-- Row 3 -->
  <line x1="30" y1="502" x2="770" y2="502" stroke="#ddd" stroke-width="0.5"/>
  <text style="font-size:9px; text-anchor:middle;" x="60" y="515">3</text>
  <text style="font-size:9px; text-anchor:middle;" x="200" y="515">Módulo de Ignição</text>
  <text style="font-size:9px; text-anchor:middle;" x="380" y="515">NE-PLS-5540</text>
  <text style="font-size:9px; text-anchor:middle;" x="500" y="515">Diverso (conjunto)</text>
  <text style="font-size:9px; text-anchor:middle;" x="640" y="515">1</text>
  <text style="font-size:9px; text-anchor:middle;" x="720" y="515">12,6 kg</text>

  <!-- Row 4 -->
  <line x1="30" y1="522" x2="770" y2="522" stroke="#ddd" stroke-width="0.5"/>
  <text style="font-size:9px; text-anchor:middle;" x="60" y="535">4</text>
  <text style="font-size:9px; text-anchor:middle;" x="200" y="535">Revestimento Cerâmico</text>
  <text style="font-size:9px; text-anchor:middle;" x="380" y="535">NE-PLS-5535</text>
  <text style="font-size:9px; text-anchor:middle;" x="500" y="535">YSZ (ZrO₂-Y₂O₃)</text>
  <text style="font-size:9px; text-anchor:middle;" x="640" y="535">1</text>
  <text style="font-size:9px; text-anchor:middle;" x="720" y="535">64,2 kg</text>

  <!-- Row 5 -->
  <line x1="30" y1="542" x2="770" y2="542" stroke="#ddd" stroke-width="0.5"/>
  <text style="font-size:9px; text-anchor:middle;" x="60" y="555">5</text>
  <text style="font-size:9px; text-anchor:middle;" x="200" y="555">Câmara Interna</text>
  <text style="font-size:9px; text-anchor:middle;" x="380" y="555">NE-PLS-5530</text>
  <text style="font-size:9px; text-anchor:middle;" x="500" y="555">Ti-6Al-4V-Nb</text>
  <text style="font-size:9px; text-anchor:middle;" x="640" y="555">1</text>
  <text style="font-size:9px; text-anchor:middle;" x="720" y="555">285 kg</text>

  <!-- Row 6 -->
  <line x1="30" y1="562" x2="770" y2="562" stroke="#ddd" stroke-width="0.5"/>
  <text style="font-size:9px; text-anchor:middle;" x="60" y="578">6</text>
  <text style="font-size:9px; text-anchor:middle;" x="200" y="578">Bocal de Exaustão</text>
  <text style="font-size:9px; text-anchor:middle;" x="380" y="578">NE-PLS-5590</text>
  <text style="font-size:9px; text-anchor:middle;" x="500" y="578">HfTaC₄ + Ti-6Al</text>
  <text style="font-size:9px; text-anchor:middle;" x="640" y="578">1</text>
  <text style="font-size:9px; text-anchor:middle;" x="720" y="578">96,4 kg</text>
</svg>
