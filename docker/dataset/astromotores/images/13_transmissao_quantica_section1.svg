<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="800" height="600" viewBox="0 0 800 600">
  <title>Diagrama de Blocos — Sistema de Transmissão Quântica</title>
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#333"/>
    </marker>
    <filter id="shadow" x="-2%" y="-2%" width="104%" height="104%">
      <feDropShadow dx="1" dy="1" stdDeviation="2" flood-color="#333" flood-opacity="0.15"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="600" fill="#f0f4f8"/>

  <!-- Title -->
  <text x="400" y="45" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#333">Diagrama de Blocos — Transmissão Quântica QTX-7000</text>
  <text x="400" y="68" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#555">Fluxo de Torque: Motor Principal → Propulsores</text>

  <!-- Block 1: Motor Principal -->
  <rect x="50" y="250" width="140" height="80" rx="8" ry="8" fill="#f0f4f8" stroke="#333" stroke-width="2" filter="url(#shadow)"/>
  <text x="120" y="283" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#333">Motor</text>
  <text x="120" y="300" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#333">Principal</text>
  <text x="120" y="320" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#555">12.500 N·m</text>

  <!-- Arrow 1→2 -->
  <line x1="190" y1="290" x2="240" y2="290" stroke="#333" stroke-width="2" marker-end="url(#arrowhead)"/>
  <text x="215" y="280" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#555">Eixo</text>

  <!-- Block 2: Acoplador de Entrada -->
  <rect x="245" y="230" width="120" height="120" rx="8" ry="8" fill="#f0f4f8" stroke="#333" stroke-width="2" filter="url(#shadow)"/>
  <text x="305" y="268" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#333">Acoplador</text>
  <text x="305" y="283" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#333">Quântico</text>
  <text x="305" y="298" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#333">de Entrada</text>
  <text x="305" y="318" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#555">NE-AQE-0820</text>
  <text x="305" y="340" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#555">Conversão mecânica</text>
  <text x="305" y="352" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#555">→ quântica</text>

  <!-- Arrow 2→3 -->
  <line x1="365" y1="290" x2="415" y2="290" stroke="#333" stroke-width="2" marker-end="url(#arrowhead)"/>
  <text x="390" y="280" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#555">Pares Q</text>

  <!-- Block 3: Câmara de Entrelaçamento (central, larger) -->
  <rect x="420" y="210" width="140" height="160" rx="10" ry="10" fill="#f0f4f8" stroke="#333" stroke-width="3" filter="url(#shadow)"/>
  <text x="490" y="255" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#333">Câmara de</text>
  <text x="490" y="272" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#333">Entrelaçamento</text>
  <text x="490" y="300" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#555">NE-CEP-0710</text>
  <text x="490" y="318" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#555">2.048 pares ativos</text>
  <text x="490" y="333" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#555">ICQ ≥ 97,5%</text>
  <text x="490" y="348" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#555">T = 0,020 K</text>

  <!-- CMQ connection from top -->
  <rect x="435" y="100" width="110" height="70" rx="6" ry="6" fill="#f0f4f8" stroke="#333" stroke-width="1.5" stroke-dasharray="5,3" filter="url(#shadow)"/>
  <text x="490" y="128" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#333">Controlador</text>
  <text x="490" y="143" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#333">CMQ</text>
  <text x="490" y="160" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#555">NE-CMQ-0455</text>
  <line x1="490" y1="170" x2="490" y2="210" stroke="#333" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrowhead)"/>
  <text x="510" y="195" font-family="Arial, sans-serif" font-size="8" fill="#555">Controle</text>

  <!-- Fluido Quântico connection from bottom -->
  <rect x="435" y="420" width="110" height="60" rx="6" ry="6" fill="#f0f4f8" stroke="#333" stroke-width="1.5" stroke-dasharray="5,3" filter="url(#shadow)"/>
  <text x="490" y="445" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#333">Fluido Quântico</text>
  <text x="490" y="460" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#333">QF-9</text>
  <text x="490" y="475" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#555">NE-RFQ-0560</text>
  <line x1="490" y1="420" x2="490" y2="370" stroke="#333" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrowhead)"/>
  <text x="510" y="400" font-family="Arial, sans-serif" font-size="8" fill="#555">Suprimento</text>

  <!-- Arrow 3→4 -->
  <line x1="560" y1="290" x2="610" y2="290" stroke="#333" stroke-width="2" marker-end="url(#arrowhead)"/>
  <text x="585" y="280" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#555">Torque Q</text>

  <!-- Block 4: Distribuidor de Torque -->
  <rect x="615" y="215" width="130" height="150" rx="8" ry="8" fill="#f0f4f8" stroke="#333" stroke-width="2" filter="url(#shadow)"/>
  <text x="680" y="253" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#333">Distribuidor</text>
  <text x="680" y="270" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#333">de Torque</text>
  <text x="680" y="295" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#555">NE-DTM-0940</text>
  <text x="680" y="313" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#555">RMQ: 1:1 a 1:7</text>
  <text x="680" y="328" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#555">Até 87.500 N·m</text>

  <!-- Propulsores (multiple outputs) -->
  <!-- Propulsor 1 -->
  <line x1="680" y1="365" x2="680" y2="410" stroke="#333" stroke-width="1.5"/>
  <line x1="680" y1="410" x2="600" y2="410" stroke="#333" stroke-width="1.5"/>
  <line x1="600" y1="410" x2="600" y2="530" stroke="#333" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  <rect x="555" y="533" width="90" height="40" rx="6" ry="6" fill="#f0f4f8" stroke="#333" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="600" y="555" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#333">Propulsor 1</text>
  <text x="600" y="567" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#555">Esquerdo</text>

  <!-- Propulsor 2 -->
  <line x1="680" y1="410" x2="680" y2="530" stroke="#333" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  <rect x="635" y="533" width="90" height="40" rx="6" ry="6" fill="#f0f4f8" stroke="#333" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="680" y="555" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#333">Propulsor 2</text>
  <text x="680" y="567" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#555">Central</text>

  <!-- Propulsor 3 -->
  <line x1="680" y1="410" x2="760" y2="410" stroke="#333" stroke-width="1.5"/>
  <line x1="760" y1="410" x2="760" y2="530" stroke="#333" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  <rect x="715" y="533" width="90" height="40" rx="6" ry="6" fill="#f0f4f8" stroke="#333" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="760" y="555" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#333">Propulsor 3</text>
  <text x="760" y="567" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#555">Direito</text>

  <!-- Legend -->
  <rect x="30" y="520" width="200" height="65" rx="4" ry="4" fill="#f0f4f8" stroke="#333" stroke-width="1"/>
  <text x="40" y="538" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="#333">Legenda:</text>
  <line x1="40" y1="552" x2="70" y2="552" stroke="#333" stroke-width="2"/>
  <text x="75" y="556" font-family="Arial, sans-serif" font-size="9" fill="#333">Fluxo de torque</text>
  <line x1="40" y1="572" x2="70" y2="572" stroke="#333" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="75" y="576" font-family="Arial, sans-serif" font-size="9" fill="#333">Controle / suprimento</text>
</svg>
