<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="800" height="600" viewBox="0 0 800 600">
  <defs>
    <marker id="arr4" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#333"/>
    </marker>
    <style>
      text { font-family: Arial, Helvetica, sans-serif; fill: #333; }
      .title { font-size: 18px; font-weight: bold; }
      .label { font-size: 12px; font-weight: bold; }
      .part { font-size: 10px; fill: #555; }
      .num { font-size: 14px; font-weight: bold; fill: #333; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="800" height="600" fill="#f0f4f8" rx="8"/>

  <!-- Title -->
  <text x="400" y="35" text-anchor="middle" class="title">Vista Explodida — Modulo Repulsor SAG</text>

  <!-- Part 1: Capa Protetora (top) -->
  <ellipse cx="400" cy="85" rx="150" ry="25" fill="#fff" stroke="#333" stroke-width="2"/>
  <rect x="250" y="85" width="300" height="18" rx="0" fill="#fff" stroke="#333" stroke-width="2"/>
  <ellipse cx="400" cy="103" rx="150" ry="25" fill="#fff" stroke="#333" stroke-width="2"/>
  <text x="400" y="98" text-anchor="middle" class="label">1</text>

  <!-- Dashed line down -->
  <line x1="400" y1="128" x2="400" y2="148" stroke="#333" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- Part 2: Bobina Repulsora -->
  <ellipse cx="400" cy="165" rx="130" ry="20" fill="#e8e8e8" stroke="#333" stroke-width="2"/>
  <rect x="270" y="165" width="260" height="30" rx="0" fill="#e8e8e8" stroke="#333" stroke-width="2"/>
  <ellipse cx="400" cy="195" rx="130" ry="20" fill="#e8e8e8" stroke="#333" stroke-width="2"/>
  <!-- Coil pattern lines -->
  <line x1="290" y1="175" x2="290" y2="190" stroke="#333" stroke-width="0.5"/>
  <line x1="310" y1="175" x2="310" y2="190" stroke="#333" stroke-width="0.5"/>
  <line x1="330" y1="175" x2="330" y2="190" stroke="#333" stroke-width="0.5"/>
  <line x1="350" y1="175" x2="350" y2="190" stroke="#333" stroke-width="0.5"/>
  <line x1="370" y1="175" x2="370" y2="190" stroke="#333" stroke-width="0.5"/>
  <line x1="390" y1="175" x2="390" y2="190" stroke="#333" stroke-width="0.5"/>
  <line x1="410" y1="175" x2="410" y2="190" stroke="#333" stroke-width="0.5"/>
  <line x1="430" y1="175" x2="430" y2="190" stroke="#333" stroke-width="0.5"/>
  <line x1="450" y1="175" x2="450" y2="190" stroke="#333" stroke-width="0.5"/>
  <line x1="470" y1="175" x2="470" y2="190" stroke="#333" stroke-width="0.5"/>
  <line x1="490" y1="175" x2="490" y2="190" stroke="#333" stroke-width="0.5"/>
  <line x1="510" y1="175" x2="510" y2="190" stroke="#333" stroke-width="0.5"/>
  <text x="400" y="183" text-anchor="middle" class="num">2</text>

  <!-- Dashed line down -->
  <line x1="400" y1="215" x2="400" y2="238" stroke="#333" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- Part 3: Sensor de Proximidade (small disc) -->
  <ellipse cx="400" cy="252" rx="25" ry="8" fill="#fff" stroke="#333" stroke-width="2"/>
  <rect x="375" y="252" width="50" height="12" rx="0" fill="#fff" stroke="#333" stroke-width="2"/>
  <ellipse cx="400" cy="264" rx="25" ry="8" fill="#fff" stroke="#333" stroke-width="2"/>
  <text x="400" y="261" text-anchor="middle" class="num" style="font-size:11px;">3</text>

  <!-- Dashed line down -->
  <line x1="400" y1="272" x2="400" y2="295" stroke="#333" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- Part 4: Camara de Amortecimento -->
  <ellipse cx="400" cy="310" rx="110" ry="18" fill="#d8dce3" stroke="#333" stroke-width="2"/>
  <rect x="290" y="310" width="220" height="25" rx="0" fill="#d8dce3" stroke="#333" stroke-width="2"/>
  <ellipse cx="400" cy="335" rx="110" ry="18" fill="#d8dce3" stroke="#333" stroke-width="2"/>
  <text x="400" y="326" text-anchor="middle" class="num">4</text>

  <!-- Dashed line down -->
  <line x1="400" y1="353" x2="400" y2="375" stroke="#333" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- Part 5: Reservatorio de Fluido -->
  <ellipse cx="400" cy="390" rx="60" ry="12" fill="#c0c8d4" stroke="#333" stroke-width="2"/>
  <rect x="340" y="390" width="120" height="20" rx="0" fill="#c0c8d4" stroke="#333" stroke-width="2"/>
  <ellipse cx="400" cy="410" rx="60" ry="12" fill="#c0c8d4" stroke="#333" stroke-width="2"/>
  <text x="400" y="404" text-anchor="middle" class="num">5</text>

  <!-- Dashed line down -->
  <line x1="400" y1="422" x2="400" y2="445" stroke="#333" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- Part 6: Flange de Montagem -->
  <ellipse cx="400" cy="460" rx="160" ry="22" fill="#ddd" stroke="#333" stroke-width="2"/>
  <rect x="240" y="460" width="320" height="12" rx="0" fill="#ddd" stroke="#333" stroke-width="2"/>
  <ellipse cx="400" cy="472" rx="160" ry="22" fill="#ddd" stroke="#333" stroke-width="2"/>
  <!-- Bolt holes -->
  <circle cx="280" cy="468" r="5" fill="#f0f4f8" stroke="#333" stroke-width="1"/>
  <circle cx="320" cy="462" r="5" fill="#f0f4f8" stroke="#333" stroke-width="1"/>
  <circle cx="370" cy="458" r="5" fill="#f0f4f8" stroke="#333" stroke-width="1"/>
  <circle cx="430" cy="458" r="5" fill="#f0f4f8" stroke="#333" stroke-width="1"/>
  <circle cx="480" cy="462" r="5" fill="#f0f4f8" stroke="#333" stroke-width="1"/>
  <circle cx="520" cy="468" r="5" fill="#f0f4f8" stroke="#333" stroke-width="1"/>
  <text x="400" y="470" text-anchor="middle" class="num">6</text>

  <!-- Labels on right side -->
  <!-- Label 1 -->
  <line x1="550" y1="95" x2="620" y2="75" stroke="#333" stroke-width="1"/>
  <text x="625" y="72" class="label">1. Capa Protetora</text>
  <text x="625" y="85" class="part">NE-AGS-1050 — Liga Ti-Gv</text>

  <!-- Label 2 -->
  <line x1="530" y1="180" x2="620" y2="145" stroke="#333" stroke-width="1"/>
  <text x="625" y="142" class="label">2. Bobina Repulsora</text>
  <text x="625" y="155" class="part">NE-AGS-1010 — Gravitonium-7</text>

  <!-- Label 3 -->
  <line x1="425" y1="258" x2="620" y2="210" stroke="#333" stroke-width="1"/>
  <text x="625" y="207" class="label">3. Sensor de Proximidade</text>
  <text x="625" y="220" class="part">NE-AGS-1020 — Ø 28 mm</text>

  <!-- Label 4 -->
  <line x1="510" y1="322" x2="620" y2="275" stroke="#333" stroke-width="1"/>
  <text x="625" y="272" class="label">4. Camara de Amortecimento</text>
  <text x="625" y="285" class="part">NE-AGS-3010 — 340 ml</text>

  <!-- Label 5 -->
  <line x1="460" y1="400" x2="620" y2="340" stroke="#333" stroke-width="1"/>
  <text x="625" y="337" class="label">5. Reservatorio de Fluido</text>
  <text x="625" y="350" class="part">NE-FMR-220 — 340 ml</text>

  <!-- Label 6 -->
  <line x1="560" y1="468" x2="620" y2="405" stroke="#333" stroke-width="1"/>
  <text x="625" y="402" class="label">6. Flange de Montagem</text>
  <text x="625" y="415" class="part">NE-AGS-1060 — 8x M12</text>
  <text x="625" y="428" class="part">Torque: 45 ± 2 N.m</text>

  <!-- Assembly arrow on left -->
  <text x="80" y="100" text-anchor="middle" class="part" font-weight="bold">MONTAGEM</text>
  <line x1="80" y1="110" x2="80" y2="470" stroke="#333" stroke-width="1.5" marker-end="url(#arr4)"/>
  <text x="80" y="490" text-anchor="middle" class="part">Sequencia:</text>
  <text x="80" y="503" text-anchor="middle" class="part">6 → 5 → 4 → 3 → 2 → 1</text>

  <!-- Footer -->
  <text x="400" y="540" text-anchor="middle" class="part">NE-DWG-SAG-EXP-001 Rev 7.2</text>
  <text x="400" y="555" text-anchor="middle" class="part">Veiculo Espacial Serie Nova ERA — Modulo Repulsor Antigravitacional</text>
  <text x="400" y="570" text-anchor="middle" class="part">AVISO: Utilizar apenas pecas originais NE-AGS. Parafusos NE-AGS-5020 com arruelas NE-AGS-5030 novas.</text>
</svg>
