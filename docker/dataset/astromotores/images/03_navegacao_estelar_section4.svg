<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
  <defs>
    <marker id="explode-arrow" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#333" />
    </marker>
    <filter id="drop-shadow" x="-3%" y="-3%" width="106%" height="106%">
      <feDropShadow dx="1" dy="1" stdDeviation="1.5" flood-color="#aaa" flood-opacity="0.3" />
    </filter>
  </defs>

  <!-- Title -->
  <text x="400" y="30" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#333">Vista Explodida — Conjunto de Navegação Estelar</text>
  <text x="400" y="48" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#666">NE-NAV-ASSY-001 — Sequência de Montagem</text>

  <!-- Component 1: Cúpula Protetora (top) -->
  <ellipse cx="400" cy="90" rx="100" ry="25" fill="#f0f4f8" stroke="#333" stroke-width="2" filter="url(#drop-shadow)" />
  <path d="M 300 90 Q 400 140 500 90" fill="none" stroke="#333" stroke-width="2" />
  <text x="560" y="95" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#333">1. Cúpula Protetora</text>
  <text x="560" y="112" font-family="Arial, sans-serif" font-size="10" fill="#666">NE-NAV-8800</text>
  <text x="560" y="127" font-family="Arial, sans-serif" font-size="10" fill="#666">Material: Policarbonato óptico</text>
  <line x1="500" y1="90" x2="555" y2="95" stroke="#333" stroke-width="0.8" stroke-dasharray="3,2" />

  <!-- Explode line 1→2 -->
  <line x1="400" y1="120" x2="400" y2="155" stroke="#333" stroke-width="1" stroke-dasharray="6,3" marker-end="url(#explode-arrow)" />

  <!-- Component 2: Antena Estelar -->
  <ellipse cx="400" cy="175" rx="90" ry="22" fill="#f0f4f8" stroke="#333" stroke-width="2" filter="url(#drop-shadow)" />
  <path d="M 310 175 Q 400 220 490 175" fill="none" stroke="#333" stroke-width="1.5" />
  <!-- Feed structure -->
  <line x1="400" y1="175" x2="400" y2="155" stroke="#333" stroke-width="1" />
  <line x1="385" y1="175" x2="395" y2="158" stroke="#333" stroke-width="0.8" />
  <line x1="415" y1="175" x2="405" y2="158" stroke="#333" stroke-width="0.8" />
  <text x="560" y="175" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#333">2. Antena Estelar</text>
  <text x="560" y="192" font-family="Arial, sans-serif" font-size="10" fill="#666">NE-NAV-5520 — Ø 320 mm</text>
  <text x="560" y="207" font-family="Arial, sans-serif" font-size="10" fill="#666">Faixa: 1,2–44 GHz</text>
  <line x1="490" y1="175" x2="555" y2="175" stroke="#333" stroke-width="0.8" stroke-dasharray="3,2" />

  <!-- Explode line 2→3 -->
  <line x1="400" y1="220" x2="400" y2="255" stroke="#333" stroke-width="1" stroke-dasharray="6,3" marker-end="url(#explode-arrow)" />

  <!-- Component 3: Placa de Sensores -->
  <rect x="330" y="260" width="140" height="45" rx="8" ry="8" fill="#f0f4f8" stroke="#333" stroke-width="2" filter="url(#drop-shadow)" />
  <!-- Sensor lenses on the board -->
  <circle cx="365" cy="282" r="10" fill="none" stroke="#333" stroke-width="1.5" />
  <circle cx="365" cy="282" r="4" fill="#f0f4f8" stroke="#333" stroke-width="0.8" />
  <circle cx="435" cy="282" r="10" fill="none" stroke="#333" stroke-width="1.5" />
  <circle cx="435" cy="282" r="4" fill="#f0f4f8" stroke="#333" stroke-width="0.8" />
  <!-- Chip representations -->
  <rect x="390" y="273" width="18" height="18" fill="#f0f4f8" stroke="#333" stroke-width="0.8" />
  <text x="560" y="270" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#333">3. Placa de Sensores</text>
  <text x="560" y="287" font-family="Arial, sans-serif" font-size="10" fill="#666">NE-NAV-2210 (x2)</text>
  <text x="560" y="302" font-family="Arial, sans-serif" font-size="10" fill="#666">CCD 4096x4096 — Par estéreo</text>
  <line x1="470" y1="282" x2="555" y2="275" stroke="#333" stroke-width="0.8" stroke-dasharray="3,2" />

  <!-- Explode line 3→4 -->
  <line x1="400" y1="305" x2="400" y2="340" stroke="#333" stroke-width="1" stroke-dasharray="6,3" marker-end="url(#explode-arrow)" />

  <!-- Component 4: Giroscópio Quântico -->
  <rect x="345" y="345" width="110" height="65" rx="6" ry="6" fill="#f0f4f8" stroke="#333" stroke-width="2" filter="url(#drop-shadow)" />
  <!-- Internal detail -->
  <circle cx="400" cy="377" r="20" fill="none" stroke="#333" stroke-width="1" stroke-dasharray="3,2" />
  <circle cx="400" cy="377" r="8" fill="#f0f4f8" stroke="#333" stroke-width="1" />
  <text x="400" y="380" text-anchor="middle" font-family="Arial, sans-serif" font-size="7" fill="#333">Rb-87</text>
  <text x="560" y="358" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#333">4. Giroscópio Quântico</text>
  <text x="560" y="375" font-family="Arial, sans-serif" font-size="10" fill="#666">NE-NAV-3310</text>
  <text x="560" y="390" font-family="Arial, sans-serif" font-size="10" fill="#666">Interferômetro Rb-87 — 3 eixos</text>
  <text x="560" y="405" font-family="Arial, sans-serif" font-size="10" fill="#666">Torque fixação: 4,5 N·m</text>
  <line x1="455" y1="377" x2="555" y2="370" stroke="#333" stroke-width="0.8" stroke-dasharray="3,2" />

  <!-- Explode line 4→5 -->
  <line x1="400" y1="410" x2="400" y2="440" stroke="#333" stroke-width="1" stroke-dasharray="6,3" marker-end="url(#explode-arrow)" />

  <!-- Component 5: Módulo CPU -->
  <rect x="340" y="445" width="120" height="50" rx="6" ry="6" fill="#f0f4f8" stroke="#333" stroke-width="2" filter="url(#drop-shadow)" />
  <!-- Chip detail -->
  <rect x="360" y="455" width="30" height="30" fill="#f0f4f8" stroke="#333" stroke-width="1" />
  <rect x="400" y="455" width="30" height="30" fill="#f0f4f8" stroke="#333" stroke-width="1" />
  <!-- Pin rows -->
  <line x1="350" y1="460" x2="340" y2="460" stroke="#333" stroke-width="0.5" />
  <line x1="350" y1="465" x2="340" y2="465" stroke="#333" stroke-width="0.5" />
  <line x1="350" y1="470" x2="340" y2="470" stroke="#333" stroke-width="0.5" />
  <line x1="350" y1="475" x2="340" y2="475" stroke="#333" stroke-width="0.5" />
  <line x1="350" y1="480" x2="340" y2="480" stroke="#333" stroke-width="0.5" />
  <text x="560" y="455" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#333">5. Módulo CPU</text>
  <text x="560" y="472" font-family="Arial, sans-serif" font-size="10" fill="#666">NE-NAV-4400 (x3 — RTM)</text>
  <text x="560" y="487" font-family="Arial, sans-serif" font-size="10" fill="#666">Processador quântico-clássico</text>
  <line x1="460" y1="470" x2="555" y2="460" stroke="#333" stroke-width="0.8" stroke-dasharray="3,2" />

  <!-- Explode line 5→6 -->
  <line x1="400" y1="495" x2="400" y2="520" stroke="#333" stroke-width="1" stroke-dasharray="6,3" marker-end="url(#explode-arrow)" />

  <!-- Component 6: Base de Fixação -->
  <rect x="310" y="525" width="180" height="35" rx="4" ry="4" fill="#f0f4f8" stroke="#333" stroke-width="2" filter="url(#drop-shadow)" />
  <!-- Mounting holes -->
  <circle cx="335" cy="542" r="5" fill="none" stroke="#333" stroke-width="1" />
  <circle cx="365" cy="542" r="5" fill="none" stroke="#333" stroke-width="1" />
  <circle cx="435" cy="542" r="5" fill="none" stroke="#333" stroke-width="1" />
  <circle cx="465" cy="542" r="5" fill="none" stroke="#333" stroke-width="1" />
  <text x="560" y="537" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#333">6. Base de Fixação</text>
  <text x="560" y="554" font-family="Arial, sans-serif" font-size="10" fill="#666">NE-NAV-BASE-01 — 4x M8</text>
  <line x1="490" y1="542" x2="555" y2="540" stroke="#333" stroke-width="0.8" stroke-dasharray="3,2" />

  <!-- Assembly order note -->
  <rect x="30" y="440" width="200" height="110" rx="6" ry="6" fill="#f0f4f8" stroke="#333" stroke-width="1" />
  <text x="130" y="460" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#333">Ordem de Montagem</text>
  <text x="45" y="480" font-family="Arial, sans-serif" font-size="10" fill="#333">6 → 5 → 4 → 3 → 2 → 1</text>
  <text x="45" y="497" font-family="Arial, sans-serif" font-size="10" fill="#333">(base para cúpula)</text>
  <text x="45" y="520" font-family="Arial, sans-serif" font-size="9" fill="#666">Aplicar pasta térmica entre</text>
  <text x="45" y="535" font-family="Arial, sans-serif" font-size="9" fill="#666">componentes 4 e 6</text>

  <!-- Footer -->
  <text x="400" y="585" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#999">Nova ERA — NE-NAV-ASSY-001 — Vista Explodida</text>
</svg>
