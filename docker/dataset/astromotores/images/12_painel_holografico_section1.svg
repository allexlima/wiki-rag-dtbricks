<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="800" height="600" viewBox="0 0 800 600">
  <title>Diagrama de Blocos — Painel de Controle Holográfico</title>
  <style>
    text { font-family: monospace; font-size: 13px; fill: #222; }
    .title { font-size: 16px; font-weight: bold; }
    .box { fill: none; stroke: #222; stroke-width: 2; }
    .arrow { fill: none; stroke: #222; stroke-width: 2; marker-end: url(#arrowhead); }
    .label { font-size: 11px; fill: #555; }
  </style>
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#222"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="400" y="35" text-anchor="middle" class="title">Arquitetura Funcional — Painel de Controle Holográfico (PCH)</text>

  <!-- Box 1: Processador Gráfico -->
  <rect x="50" y="100" width="200" height="80" rx="6" class="box"/>
  <text x="150" y="133" text-anchor="middle">Processador Gráfico</text>
  <text x="150" y="153" text-anchor="middle" class="label">NE-HUD-1210</text>
  <text x="150" y="170" text-anchor="middle" class="label">NovaCore GX-7</text>

  <!-- Arrow 1→2 -->
  <line x1="250" y1="140" x2="310" y2="140" class="arrow"/>
  <text x="280" y="132" text-anchor="middle" class="label">SpaceBus</text>

  <!-- Box 2: Projetor Holográfico -->
  <rect x="310" y="100" width="200" height="80" rx="6" class="box"/>
  <text x="410" y="133" text-anchor="middle">Projetor Holográfico</text>
  <text x="410" y="153" text-anchor="middle" class="label">NE-HUD-1220</text>
  <text x="410" y="170" text-anchor="middle" class="label">Lasers RGB + MEMS</text>

  <!-- Arrow 2→3 -->
  <line x1="510" y1="140" x2="570" y2="140" class="arrow"/>
  <text x="540" y="132" text-anchor="middle" class="label">Feixe</text>

  <!-- Box 3: Campo de Exibição -->
  <rect x="570" y="100" width="190" height="80" rx="6" class="box" stroke-dasharray="6,3"/>
  <text x="665" y="133" text-anchor="middle">Campo de Exibição</text>
  <text x="665" y="153" text-anchor="middle" class="label">Volume Holográfico</text>
  <text x="665" y="170" text-anchor="middle" class="label">120×80×40 cm</text>

  <!-- Box 4: Sensores de Gestos -->
  <rect x="310" y="260" width="200" height="80" rx="6" class="box"/>
  <text x="410" y="293" text-anchor="middle">Sensores de Gestos</text>
  <text x="410" y="313" text-anchor="middle" class="label">NE-HUD-1240</text>
  <text x="410" y="330" text-anchor="middle" class="label">16× ToF IR (940 nm)</text>

  <!-- Arrow 3→4 (downward from Campo de Exibição to Sensores) -->
  <line x1="665" y1="180" x2="665" y2="290" class="arrow" stroke-dasharray="4,3"/>
  <line x1="665" y1="290" x2="510" y2="290" class="arrow"/>
  <text x="590" y="282" text-anchor="middle" class="label">Interação do Piloto</text>

  <!-- Arrow 4→1 (Sensores back to Processador) -->
  <line x1="310" y1="300" x2="150" y2="300" class="arrow"/>
  <line x1="150" y1="300" x2="150" y2="180" class="arrow"/>
  <text x="230" y="292" text-anchor="middle" class="label">Dados de Gestos</text>

  <!-- Box 5: Atuadores Hápticos -->
  <rect x="310" y="400" width="200" height="80" rx="6" class="box"/>
  <text x="410" y="433" text-anchor="middle">Atuadores Hápticos</text>
  <text x="410" y="453" text-anchor="middle" class="label">NE-HUD-1260</text>
  <text x="410" y="470" text-anchor="middle" class="label">256× Ultrassônicos 40 kHz</text>

  <!-- Box 6: Controlador Háptico -->
  <rect x="50" y="400" width="200" height="80" rx="6" class="box"/>
  <text x="150" y="433" text-anchor="middle">Controlador Háptico</text>
  <text x="150" y="453" text-anchor="middle" class="label">NE-HUD-1250</text>
  <text x="150" y="470" text-anchor="middle" class="label">Processamento Tátil</text>

  <!-- Arrow Processador → Controlador Háptico -->
  <line x1="80" y1="180" x2="80" y2="400" class="arrow"/>
  <text x="72" y="290" text-anchor="middle" class="label" transform="rotate(-90,72,290)">Comandos Hápticos</text>

  <!-- Arrow Controlador → Atuadores -->
  <line x1="250" y1="440" x2="310" y2="440" class="arrow"/>
  <text x="280" y="432" text-anchor="middle" class="label">Drive</text>

  <!-- Arrow Atuadores → Campo (feedback to volume) -->
  <line x1="510" y1="430" x2="700" y2="430" class="arrow" stroke-dasharray="4,3"/>
  <line x1="700" y1="430" x2="700" y2="180" class="arrow" stroke-dasharray="4,3"/>
  <text x="710" y="310" text-anchor="middle" class="label" transform="rotate(-90,710,310)">Retorno Tátil ao Piloto</text>

  <!-- Box 7: Rastreamento Ocular -->
  <rect x="570" y="400" width="190" height="80" rx="6" class="box"/>
  <text x="665" y="433" text-anchor="middle">Rastreamento Ocular</text>
  <text x="665" y="453" text-anchor="middle" class="label">NE-HUD-1230</text>
  <text x="665" y="470" text-anchor="middle" class="label">Eye Tracking</text>

  <!-- Arrow Rastreamento → Processador -->
  <path d="M 570,450 L 540,450 L 540,540 L 30,540 L 30,140 L 50,140" class="arrow" fill="none"/>
  <text x="280" y="555" text-anchor="middle" class="label">Posição dos Olhos do Piloto</text>

  <!-- Legend -->
  <rect x="50" y="565" width="30" height="2" stroke="#222" stroke-width="2" fill="none"/>
  <text x="90" y="570" class="label">Fluxo de dados</text>
  <rect x="200" y="565" width="30" height="2" stroke="#222" stroke-width="2" fill="none" stroke-dasharray="4,3"/>
  <text x="240" y="570" class="label">Interação física</text>
</svg>
