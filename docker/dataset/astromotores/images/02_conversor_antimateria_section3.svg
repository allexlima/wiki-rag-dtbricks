<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
  <defs>
    <marker id="arrow3" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#333" />
    </marker>
    <style>
      text { font-family: Arial, Helvetica, sans-serif; fill: #333; }
      .title { font-size: 16px; font-weight: bold; }
      .label { font-size: 11px; }
      .label-bold { font-size: 11px; font-weight: bold; }
      .yn { font-size: 10px; font-weight: bold; fill: #333; }
      .box { fill: #f0f4f8; stroke: #333; stroke-width: 2; rx: 6; ry: 6; }
      .diamond { fill: #f0f4f8; stroke: #333; stroke-width: 2; }
      .action { fill: #e8f0e8; stroke: #333; stroke-width: 2; rx: 6; ry: 6; }
      .critical { fill: #f8e8e8; stroke: #333; stroke-width: 2; rx: 6; ry: 6; }
      .arrow { stroke: #333; stroke-width: 1.5; marker-end: url(#arrow3); fill: none; }
    </style>
  </defs>

  <!-- Title -->
  <text x="400" y="30" text-anchor="middle" class="title">Fluxograma de Diagnostico — Conversor de Antimateria</text>

  <!-- START -->
  <ellipse cx="400" cy="65" rx="60" ry="20" fill="#f0f4f8" stroke="#333" stroke-width="2" />
  <text x="400" y="70" text-anchor="middle" class="label-bold">INICIO</text>
  <line x1="400" y1="85" x2="400" y2="105" class="arrow" />

  <!-- Diamond 1: Alarme Ativo? -->
  <polygon points="400,108 480,148 400,188 320,148" class="diamond" />
  <text x="400" y="145" text-anchor="middle" class="label">Alarme de</text>
  <text x="400" y="158" text-anchor="middle" class="label">Contencao?</text>

  <!-- NO branch (right) -->
  <line x1="480" y1="148" x2="540" y2="148" class="arrow" />
  <text x="505" y="140" class="yn">NAO</text>

  <!-- Box: Inspecao de rotina -->
  <rect x="545" y="128" width="140" height="40" class="box" />
  <text x="615" y="148" text-anchor="middle" class="label">Inspecao de Rotina</text>
  <text x="615" y="160" text-anchor="middle" class="label">(Secao 5.3)</text>

  <!-- YES branch (down) -->
  <line x1="400" y1="188" x2="400" y2="215" class="arrow" />
  <text x="412" y="205" class="yn">SIM</text>

  <!-- Diamond 2: Campo Magnetico Baixo? -->
  <polygon points="400,218 490,258 400,298 310,258" class="diamond" />
  <text x="400" y="252" text-anchor="middle" class="label">Campo Magn.</text>
  <text x="400" y="265" text-anchor="middle" class="label">Baixo?</text>

  <!-- YES left -->
  <line x1="310" y1="258" x2="210" y2="258" class="arrow" />
  <text x="265" y="250" class="yn">SIM</text>

  <!-- Action: Verificar Bobinas -->
  <rect x="60" y="238" width="150" height="50" class="action" />
  <text x="135" y="257" text-anchor="middle" class="label">Verificar Bobinas</text>
  <text x="135" y="272" text-anchor="middle" class="label">(Secao 3.2)</text>

  <!-- Sub-diamond: Bobina defeituosa? -->
  <line x1="135" y1="288" x2="135" y2="310" class="arrow" />
  <polygon points="135,313 195,343 135,373 75,343" class="diamond" />
  <text x="135" y="340" text-anchor="middle" class="label">Bobina</text>
  <text x="135" y="353" text-anchor="middle" class="label">Defeituosa?</text>

  <!-- Yes: Substituir -->
  <line x1="75" y1="343" x2="20" y2="343" class="arrow" />
  <text x="50" y="335" class="yn">SIM</text>
  <rect x="5" y="380" width="130" height="45" class="critical" />
  <text x="70" y="398" text-anchor="middle" class="label">Substituir Bobina</text>
  <text x="70" y="413" text-anchor="middle" class="label">(Secao 4.2)</text>
  <line x1="20" y1="343" x2="20" y2="380" class="arrow" />

  <!-- No: Recalibrar -->
  <line x1="135" y1="373" x2="135" y2="400" class="arrow" />
  <text x="147" y="393" class="yn">NAO</text>
  <rect x="70" y="405" width="130" height="40" class="action" />
  <text x="135" y="425" text-anchor="middle" class="label">Recalibrar Campo</text>
  <text x="135" y="438" text-anchor="middle" class="label">(Secao 5.2)</text>

  <!-- NO from Diamond 2 (down) -->
  <line x1="400" y1="298" x2="400" y2="325" class="arrow" />
  <text x="412" y="315" class="yn">NAO</text>

  <!-- Diamond 3: Vazamento de Radiacao? -->
  <polygon points="400,328 490,368 400,408 310,368" class="diamond" />
  <text x="400" y="362" text-anchor="middle" class="label">Vazamento de</text>
  <text x="400" y="375" text-anchor="middle" class="label">Radiacao?</text>

  <!-- YES right -->
  <line x1="490" y1="368" x2="560" y2="368" class="arrow" />
  <text x="520" y="360" class="yn">SIM</text>

  <rect x="565" y="345" width="170" height="55" class="critical" />
  <text x="650" y="365" text-anchor="middle" class="label-bold">EVACUACAO IMEDIATA</text>
  <text x="650" y="380" text-anchor="middle" class="label">Descontaminacao</text>
  <text x="650" y="393" text-anchor="middle" class="label">(Secao 4.5)</text>

  <!-- NO from Diamond 3 (down) -->
  <line x1="400" y1="408" x2="400" y2="435" class="arrow" />
  <text x="412" y="425" class="yn">NAO</text>

  <!-- Diamond 4: Flutuacao de Potencia? -->
  <polygon points="400,438 490,478 400,518 310,478" class="diamond" />
  <text x="400" y="472" text-anchor="middle" class="label">Flutuacao de</text>
  <text x="400" y="485" text-anchor="middle" class="label">Potencia?</text>

  <!-- YES right -->
  <line x1="490" y1="478" x2="560" y2="478" class="arrow" />
  <text x="520" y="470" class="yn">SIM</text>

  <rect x="565" y="455" width="170" height="55" class="action" />
  <text x="650" y="475" text-anchor="middle" class="label">Teste de Eficiencia</text>
  <text x="650" y="490" text-anchor="middle" class="label">Conversor Termico</text>
  <text x="650" y="503" text-anchor="middle" class="label">(Secao 3.4)</text>

  <!-- NO from Diamond 4 (down) -->
  <line x1="400" y1="518" x2="400" y2="545" class="arrow" />
  <text x="412" y="538" class="yn">NAO</text>

  <!-- End: Registrar e monitorar -->
  <rect x="325" y="548" width="150" height="35" class="box" />
  <text x="400" y="565" text-anchor="middle" class="label">Registrar e</text>
  <text x="400" y="578" text-anchor="middle" class="label">Monitorar (200 h)</text>
</svg>
