<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
  <defs>
    <marker id="dim-arrow-left" markerWidth="8" markerHeight="6" refX="0" refY="3" orient="auto">
      <polygon points="8 0, 0 3, 8 6" fill="#333" />
    </marker>
    <marker id="dim-arrow-right" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#333" />
    </marker>
  </defs>

  <!-- Title -->
  <text x="400" y="35" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#333">Desenho Dimensional — Conjunto de Navegação Estelar</text>
  <text x="400" y="55" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#666">NE-NAV-ASSY-001 — Vista Frontal e Lateral</text>

  <!-- Main dish antenna - front view -->
  <!-- Dish outline (ellipse for perspective) -->
  <ellipse cx="250" cy="220" rx="130" ry="45" fill="none" stroke="#333" stroke-width="2" />
  <!-- Dish body -->
  <path d="M 120 220 Q 250 340 380 220" fill="none" stroke="#333" stroke-width="2" />
  <!-- Feed horn -->
  <line x1="250" y1="220" x2="250" y2="140" stroke="#333" stroke-width="1.5" />
  <line x1="220" y1="220" x2="245" y2="155" stroke="#333" stroke-width="1" />
  <line x1="280" y1="220" x2="255" y2="155" stroke="#333" stroke-width="1" />
  <rect x="238" y="130" width="24" height="20" rx="3" ry="3" fill="#f0f4f8" stroke="#333" stroke-width="1.5" />

  <!-- Dish diameter dimension -->
  <line x1="120" y1="90" x2="120" y2="215" stroke="#333" stroke-width="0.5" stroke-dasharray="3,3" />
  <line x1="380" y1="90" x2="380" y2="215" stroke="#333" stroke-width="0.5" stroke-dasharray="3,3" />
  <line x1="120" y1="100" x2="380" y2="100" stroke="#333" stroke-width="1" marker-start="url(#dim-arrow-left)" marker-end="url(#dim-arrow-right)" />
  <rect x="200" y="88" width="100" height="16" fill="white" />
  <text x="250" y="100" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#333">Ø 320 mm</text>

  <!-- Label: Antena Principal -->
  <line x1="300" y1="280" x2="420" y2="310" stroke="#333" stroke-width="0.8" />
  <text x="425" y="315" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#333">Antena Principal (Ø 320mm)</text>
  <text x="425" y="330" font-family="Arial, sans-serif" font-size="10" fill="#666">NE-NAV-5520</text>

  <!-- Label: Feed horn -->
  <line x1="262" y1="140" x2="350" y2="120" stroke="#333" stroke-width="0.8" />
  <text x="355" y="118" font-family="Arial, sans-serif" font-size="10" fill="#333">Alimentador (Feed Horn)</text>

  <!-- Sensor cluster - below dish -->
  <rect x="190" y="370" width="120" height="70" rx="6" ry="6" fill="#f0f4f8" stroke="#333" stroke-width="2" />
  <!-- Sensor lenses -->
  <circle cx="220" cy="395" r="12" fill="none" stroke="#333" stroke-width="1.5" />
  <circle cx="220" cy="395" r="5" fill="#f0f4f8" stroke="#333" stroke-width="1" />
  <circle cx="280" cy="395" r="12" fill="none" stroke="#333" stroke-width="1.5" />
  <circle cx="280" cy="395" r="5" fill="#f0f4f8" stroke="#333" stroke-width="1" />
  <!-- Connector dots -->
  <circle cx="225" cy="425" r="3" fill="#333" />
  <circle cx="245" cy="425" r="3" fill="#333" />
  <circle cx="265" cy="425" r="3" fill="#333" />
  <circle cx="285" cy="425" r="3" fill="#333" />

  <!-- Sensor cluster dimension -->
  <line x1="190" y1="455" x2="190" y2="470" stroke="#333" stroke-width="0.5" stroke-dasharray="3,3" />
  <line x1="310" y1="455" x2="310" y2="470" stroke="#333" stroke-width="0.5" stroke-dasharray="3,3" />
  <line x1="190" y1="465" x2="310" y2="465" stroke="#333" stroke-width="1" marker-start="url(#dim-arrow-left)" marker-end="url(#dim-arrow-right)" />
  <text x="250" y="480" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#333">120 mm</text>

  <!-- Sensor cluster height dimension -->
  <line x1="315" y1="370" x2="340" y2="370" stroke="#333" stroke-width="0.5" stroke-dasharray="3,3" />
  <line x1="315" y1="440" x2="340" y2="440" stroke="#333" stroke-width="0.5" stroke-dasharray="3,3" />
  <line x1="335" y1="370" x2="335" y2="440" stroke="#333" stroke-width="1" marker-start="url(#dim-arrow-left)" marker-end="url(#dim-arrow-right)" />
  <text x="345" y="410" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#333">70 mm</text>

  <!-- Label: Cluster de Sensores -->
  <line x1="310" y1="390" x2="420" y2="380" stroke="#333" stroke-width="0.8" />
  <text x="425" y="378" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#333">Cluster de Sensores</text>
  <text x="425" y="393" font-family="Arial, sans-serif" font-size="10" fill="#666">NE-NAV-2210 (x2) — Estereoscópico</text>
  <text x="425" y="408" font-family="Arial, sans-serif" font-size="10" fill="#666">Separação de base: 60 mm</text>

  <!-- Mounting bracket connecting dish to sensor -->
  <rect x="240" y="320" width="20" height="50" fill="#f0f4f8" stroke="#333" stroke-width="1.5" />
  <text x="300" y="350" font-family="Arial, sans-serif" font-size="9" fill="#666">Suporte</text>

  <!-- Processor module - side view (right side) -->
  <rect x="560" y="180" width="160" height="100" rx="6" ry="6" fill="#f0f4f8" stroke="#333" stroke-width="2" />
  <!-- Heatsink lines -->
  <line x1="570" y1="190" x2="570" y2="270" stroke="#333" stroke-width="0.8" />
  <line x1="580" y1="190" x2="580" y2="270" stroke="#333" stroke-width="0.8" />
  <line x1="590" y1="190" x2="590" y2="270" stroke="#333" stroke-width="0.8" />
  <line x1="600" y1="190" x2="600" y2="270" stroke="#333" stroke-width="0.8" />
  <!-- LEDs -->
  <circle cx="660" cy="200" r="4" fill="none" stroke="#333" stroke-width="1" />
  <circle cx="660" cy="215" r="4" fill="none" stroke="#333" stroke-width="1" />
  <circle cx="660" cy="230" r="4" fill="none" stroke="#333" stroke-width="1" />
  <!-- Connectors -->
  <rect x="700" y="195" width="20" height="12" fill="#f0f4f8" stroke="#333" stroke-width="1" />
  <rect x="700" y="215" width="20" height="12" fill="#f0f4f8" stroke="#333" stroke-width="1" />
  <rect x="700" y="245" width="20" height="20" fill="#f0f4f8" stroke="#333" stroke-width="1" />

  <!-- Processor dimensions -->
  <line x1="560" y1="295" x2="560" y2="310" stroke="#333" stroke-width="0.5" stroke-dasharray="3,3" />
  <line x1="720" y1="295" x2="720" y2="310" stroke="#333" stroke-width="0.5" stroke-dasharray="3,3" />
  <line x1="560" y1="305" x2="720" y2="305" stroke="#333" stroke-width="1" marker-start="url(#dim-arrow-left)" marker-end="url(#dim-arrow-right)" />
  <text x="640" y="320" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#333">160 mm</text>

  <!-- Label: Módulo Processador -->
  <text x="640" y="170" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#333">Módulo Processador</text>
  <text x="640" y="155" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#666">NE-NAV-4400</text>

  <!-- Connector labels -->
  <text x="740" y="204" font-family="Arial, sans-serif" font-size="8" fill="#666">FO-44</text>
  <text x="740" y="224" font-family="Arial, sans-serif" font-size="8" fill="#666">QSP-8</text>
  <text x="740" y="258" font-family="Arial, sans-serif" font-size="8" fill="#666">PWR-12</text>

  <!-- Overall height dimension (left side) -->
  <line x1="100" y1="100" x2="80" y2="100" stroke="#333" stroke-width="0.5" stroke-dasharray="3,3" />
  <line x1="100" y1="440" x2="80" y2="440" stroke="#333" stroke-width="0.5" stroke-dasharray="3,3" />
  <line x1="85" y1="100" x2="85" y2="440" stroke="#333" stroke-width="1" marker-start="url(#dim-arrow-left)" marker-end="url(#dim-arrow-right)" />
  <text x="75" y="275" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#333" transform="rotate(-90, 75, 275)">Altura total: 380 mm</text>

  <!-- Notes -->
  <rect x="460" y="440" width="300" height="100" rx="4" ry="4" fill="#f0f4f8" stroke="#333" stroke-width="1" />
  <text x="470" y="460" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#333">Notas:</text>
  <text x="470" y="477" font-family="Arial, sans-serif" font-size="9" fill="#333">1. Dimensões em milímetros</text>
  <text x="470" y="492" font-family="Arial, sans-serif" font-size="9" fill="#333">2. Tolerâncias gerais: ±1 mm</text>
  <text x="470" y="507" font-family="Arial, sans-serif" font-size="9" fill="#333">3. Material da parábola: compósito Al-C</text>
  <text x="470" y="522" font-family="Arial, sans-serif" font-size="9" fill="#333">4. Massa total do conjunto: 20,1 kg</text>

  <!-- Footer -->
  <text x="400" y="585" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#999">Nova ERA — NE-NAV-ASSY-001 — Desenho Dimensional</text>
</svg>
