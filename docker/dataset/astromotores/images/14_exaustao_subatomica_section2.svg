<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="800" height="600" viewBox="0 0 800 600">
  <title>Desenho Dimensional — Bocal Convergente-Divergente</title>
  <style>
    text { font-family: 'Helvetica Neue', Arial, sans-serif; fill: #1a1a1a; }
    .title { font-size: 18px; font-weight: bold; text-anchor: middle; }
    .subtitle { font-size: 11px; text-anchor: middle; fill: #555; }
    .dim-text { font-size: 11px; text-anchor: middle; fill: #333; }
    .label { font-size: 12px; font-weight: bold; text-anchor: middle; fill: #1a1a1a; }
    .small-label { font-size: 10px; text-anchor: middle; fill: #555; }
    .dim-line { stroke: #444; stroke-width: 1; }
    .center-line { stroke: #999; stroke-width: 0.5; stroke-dasharray: 12,4,2,4; }
  </style>
  <defs>
    <marker id="dim-arrow-l" markerWidth="8" markerHeight="6" refX="0" refY="3" orient="auto">
      <polygon points="0 3, 8 0, 8 6" fill="#444" />
    </marker>
    <marker id="dim-arrow-r" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="8 3, 0 0, 0 6" fill="#444" />
    </marker>
    <pattern id="hatch" patternUnits="userSpaceOnUse" width="6" height="6" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="6" stroke="#aaa" stroke-width="0.5" />
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="800" height="600" fill="#fafafa" />

  <!-- Title -->
  <text x="400" y="35" class="title">Bocal Convergente-Divergente — Corte Longitudinal</text>
  <text x="400" y="55" class="subtitle">NE-EXH-1410 | Escala aproximada | Cotas em milímetros</text>

  <!-- Centerline -->
  <line x1="60" y1="300" x2="740" y2="300" class="center-line" />
  <text x="755" y="304" style="font-size:9px; fill:#999;">CL</text>

  <!-- Nozzle outer profile (top half) -->
  <!-- Convergent section outer wall -->
  <path d="M 100,180 L 100,160 L 370,250 L 370,270" fill="url(#hatch)" stroke="#333" stroke-width="1.5" />
  <!-- Throat outer wall -->
  <path d="M 370,250 L 370,240 Q 400,235 430,240 L 430,250" fill="url(#hatch)" stroke="#333" stroke-width="1.5" />
  <!-- Divergent section outer wall -->
  <path d="M 430,250 L 430,240 L 700,130 L 700,150" fill="url(#hatch)" stroke="#333" stroke-width="1.5" />

  <!-- Nozzle inner profile (top half) -->
  <path d="M 100,180 L 370,270 Q 400,276 430,270 L 700,150" fill="none" stroke="#333" stroke-width="2" />

  <!-- Nozzle outer profile (bottom half — mirror) -->
  <path d="M 100,420 L 100,440 L 370,350 L 370,330" fill="url(#hatch)" stroke="#333" stroke-width="1.5" />
  <path d="M 370,350 L 370,360 Q 400,365 430,360 L 430,350" fill="url(#hatch)" stroke="#333" stroke-width="1.5" />
  <path d="M 430,350 L 430,360 L 700,470 L 700,450" fill="url(#hatch)" stroke="#333" stroke-width="1.5" />

  <!-- Nozzle inner profile (bottom half) -->
  <path d="M 100,420 L 370,330 Q 400,324 430,330 L 700,450" fill="none" stroke="#333" stroke-width="2" />

  <!-- YSZ coating indication (top) -->
  <path d="M 120,190 L 370,272 Q 400,278 430,272 L 680,165" fill="none" stroke="#666" stroke-width="0.8" stroke-dasharray="3,2" />
  <!-- YSZ coating indication (bottom) -->
  <path d="M 120,410 L 370,328 Q 400,322 430,328 L 680,435" fill="none" stroke="#666" stroke-width="0.8" stroke-dasharray="3,2" />

  <!-- Entry cap (left) -->
  <line x1="100" y1="155" x2="100" y2="445" stroke="#333" stroke-width="2" />

  <!-- Exit cap (right) -->
  <line x1="700" y1="125" x2="700" y2="475" stroke="#333" stroke-width="2" />

  <!-- === DIMENSIONS === -->

  <!-- Total length: 1480 mm -->
  <line x1="100" y1="520" x2="100" y2="495" class="dim-line" />
  <line x1="700" y1="520" x2="700" y2="495" class="dim-line" />
  <line x1="100" y1="510" x2="700" y2="510" class="dim-line" marker-start="url(#dim-arrow-l)" marker-end="url(#dim-arrow-r)" />
  <text x="400" y="506" class="dim-text">1480</text>

  <!-- Entry diameter: 320 mm -->
  <line x1="70" y1="180" x2="90" y2="180" class="dim-line" />
  <line x1="70" y1="420" x2="90" y2="420" class="dim-line" />
  <line x1="80" y1="180" x2="80" y2="420" class="dim-line" marker-start="url(#dim-arrow-l)" marker-end="url(#dim-arrow-r)" />
  <text x="65" y="304" class="dim-text" transform="rotate(-90,65,304)">Ø 320</text>

  <!-- Throat diameter: 48 mm -->
  <line x1="400" y1="276" x2="400" y2="324" class="dim-line" stroke="#333" stroke-width="1.5" />
  <text x="400" y="296" class="dim-text" style="font-size:10px;">Ø 48</text>

  <!-- Exit diameter: 680 mm -->
  <line x1="720" y1="150" x2="740" y2="150" class="dim-line" />
  <line x1="720" y1="450" x2="740" y2="450" class="dim-line" />
  <line x1="730" y1="150" x2="730" y2="450" class="dim-line" marker-start="url(#dim-arrow-l)" marker-end="url(#dim-arrow-r)" />
  <text x="755" y="304" class="dim-text" transform="rotate(-90,755,304)">Ø 680</text>

  <!-- Wall thickness at throat: 18.5 mm -->
  <line x1="345" y1="240" x2="345" y2="210" class="dim-line" />
  <line x1="345" y1="270" x2="345" y2="210" class="dim-line" />
  <text x="345" y="205" class="dim-text" style="font-size:9px;">18,5</text>

  <!-- Convergent angle: 32° -->
  <path d="M 160,210 A 60,60 0 0,1 175,195" fill="none" stroke="#444" stroke-width="1" />
  <text x="195" y="195" class="dim-text" style="font-size:10px;">32°</text>

  <!-- Divergent angle: 14° -->
  <path d="M 500,250 A 60,60 0 0,0 515,240" fill="none" stroke="#444" stroke-width="1" />
  <text x="530" y="235" class="dim-text" style="font-size:10px;">14°</text>

  <!-- === LABELS === -->

  <!-- Seção Convergente -->
  <text x="220" y="140" class="label">Seção Convergente</text>
  <line x1="220" y1="145" x2="240" y2="195" stroke="#333" stroke-width="0.8" />

  <!-- Garganta -->
  <text x="400" y="195" class="label">Garganta</text>
  <line x1="400" y1="200" x2="400" y2="270" stroke="#333" stroke-width="0.8" />

  <!-- Seção Divergente -->
  <text x="580" y="110" class="label">Seção Divergente</text>
  <line x1="580" y1="115" x2="560" y2="185" stroke="#333" stroke-width="0.8" />

  <!-- Revestimento Térmico YSZ -->
  <text x="550" y="400" class="small-label">Revestimento YSZ (2,3 mm)</text>
  <line x1="480" y1="395" x2="460" y2="370" stroke="#666" stroke-width="0.8" />

  <!-- Material label -->
  <text x="250" y="470" class="small-label">Material: Liga HfC-TaC + nanotubos de carbono</text>
  <text x="250" y="484" class="small-label">Revestimento interno: YSZ por plasma spray</text>

  <!-- Part number -->
  <rect x="550" y="540" width="220" height="40" rx="3" fill="none" stroke="#333" stroke-width="1" />
  <text x="660" y="557" style="font-size:10px; text-anchor:middle; font-weight:bold;">NE-EXH-1410 Rev. C</text>
  <text x="660" y="572" style="font-size:9px; text-anchor:middle; fill:#555;">Bocal Convergente-Divergente</text>
</svg>
