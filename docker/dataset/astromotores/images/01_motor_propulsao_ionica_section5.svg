  <rect x="592" y="203" width="8" height="28" class="bar" fill="#ffcc80"/>
  <rect x="648" y="203" width="8" height="28" class="bar" fill="#ffcc80"/>
  <rect x="704" y="203" width="8" height="28" class="bar" fill="#ffcc80"/>
  <rect x="760" y="203" width="8" height="28" class="bar" fill="#ffcc80"/>
  <text x="200" y="248" font-size="9" fill="#e65100">MP-ION-005/006/007 | Nível III | 7,5h</text>

  <line x1="200" y1="255" x2="760" y2="255" stroke="#eee" stroke-width="1"/>

  <!-- Row 4: Substituição do Cátodo — every 5000h -->
  <text x="10" y="278" class="row-label">Substituição do</text>
  <text x="10" y="291" class="row-label">Cátodo</text>
  <text x="10" y="304" class="interval">(a cada 5.000h)</text>
  <rect x="340" y="268" width="10" height="28" class="bar" fill="#ef9a9a"/>
  <rect x="480" y="268" width="10" height="28" class="bar" fill="#ef9a9a"/>
  <rect x="620" y="268" width="10" height="28" class="bar" fill="#ef9a9a"/>
  <rect x="760" y="268" width="10" height="28" class="bar" fill="#ef9a9a"/>
  <text x="200" y="313" font-size="9" fill="#c62828">MP-ION-008/009 | Nível III | 3,5h</text>

  <line x1="200" y1="320" x2="760" y2="320" stroke="#eee" stroke-width="1"/>

  <!-- Row 5: Substituição das Grades — every 10000h -->
  <text x="10" y="343" class="row-label">Substituição</text>
  <text x="10" y="356" class="row-label">das Grades</text>
  <text x="10" y="369" class="interval">(a cada 10.000h)</text>
  <rect x="480" y="333" width="12" height="28" class="bar" fill="#ce93d8"/>
  <rect x="760" y="333" width="12" height="28" class="bar" fill="#ce93d8"/>
  <text x="200" y="378" font-size="9" fill="#7b1fa2">MP-ION-010/011/012 | Nível III-IV | 9,5h</text>

  <line x1="200" y1="385" x2="760" y2="385" stroke="#eee" stroke-width="1"/>

  <!-- Row 6: Overhaul Completo — at 20000h -->
  <text x="10" y="408" class="row-label">Overhaul Completo</text>
  <text x="10" y="421" class="row-label">ou Substituição</text>
  <text x="10" y="434" class="interval">(20.000h)</text>
  <!-- Full lifespan bar -->
  <rect x="200" y="400" width="560" height="28" fill="#fff3e0" stroke="#e65100" stroke-width="1.5" rx="3"/>
  <text x="480" y="418" text-anchor="middle" font-size="10" fill="#e65100" font-weight="bold">Vida útil nominal: 20.000 horas</text>
  <!-- End marker -->
  <rect x="756" y="398" width="16" height="32" fill="#c62828" stroke="#333" stroke-width="1.5" rx="2"/>
  <text x="764" y="418" text-anchor="middle" font-size="8" fill="white" font-weight="bold">OH</text>
  <text x="200" y="445" font-size="9" fill="#c62828">MP-ION-013 | Nível IV | 8,0h | Obrigatório</text>

  <line x1="200" y1="455" x2="760" y2="455" stroke="#eee" stroke-width="1"/>

  <!-- Vida útil dos componentes (summary) -->
  <text x="10" y="480" class="row-label">Vida Útil dos</text>
  <text x="10" y="493" class="row-label">Componentes:</text>

  <!-- Cátodo lifespan bar -->
  <rect x="200" y="472" width="140" height="14" fill="#ef9a9a" stroke="#333" stroke-width="0.5" rx="2"/>
  <text x="275" y="483" text-anchor="middle" font-size="8">Cátodo (5.000h)</text>

  <!-- Grades lifespan bar -->
  <rect x="200" y="490" width="280" height="14" fill="#ce93d8" stroke="#333" stroke-width="0.5" rx="2"/>
  <text x="340" y="501" text-anchor="middle" font-size="8">Grade Aceleradora (10.000h)</text>

  <!-- Bobina RF lifespan bar -->
  <rect x="200" y="508" width="336" height="14" fill="#90caf9" stroke="#333" stroke-width="0.5" rx="2"/>
  <text x="368" y="519" text-anchor="middle" font-size="8">Bobina RF / Grade Tela (12.000h)</text>

  <!-- Câmara h-BN lifespan bar -->
  <rect x="200" y="526" width="420" height="14" fill="#a5d6a7" stroke="#333" stroke-width="0.5" rx="2"/>
  <text x="410" y="537" text-anchor="middle" font-size="8">Câmara h-BN (15.000h)</text>

  <!-- Footer -->
  <text x="400" y="580" text-anchor="middle" font-size="10" fill="#666">NE-ION-7742 Rev. 4.2 | Manutenção Preventiva | Veículo Espacial Série Nova ERA</text>
</svg>
