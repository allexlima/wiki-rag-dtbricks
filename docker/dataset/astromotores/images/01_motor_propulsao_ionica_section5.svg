<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
  <defs>
    <style>
      text { font-family: 'Segoe UI', Arial, sans-serif; fill: #333; }
      .title { font-size: 16px; font-weight: bold; }
      .row-label { font-size: 11px; font-weight: bold; }
      .interval { font-size: 10px; }
      .axis-label { font-size: 10px; fill: #666; }
      .grid-line { stroke: #e0e0e0; stroke-width: 0.5; }
      .bar { stroke: #333; stroke-width: 1; rx: 3; ry: 3; }
    </style>
  </defs>

  <!-- Title -->
  <text x="400" y="30" text-anchor="middle" class="title">Intervalos de Manutenção Preventiva — Motor Iônico NE-ION-7742</text>
  <text x="400" y="48" text-anchor="middle" font-size="11" fill="#666">Escala: 0 - 20.000 horas de operação</text>

  <!-- Chart area -->
  <!-- Y-axis labels area: x=0..200, Chart: x=200..760 -->
  <!-- X-axis: 200 = 0h, 760 = 20000h => 1h = 0.028px, 1000h = 28px -->

  <!-- Grid lines (vertical, every 2500h) -->
  <line x1="200" y1="70" x2="200" y2="540" stroke="#333" stroke-width="1"/>
  <line x1="270" y1="70" x2="270" y2="540" class="grid-line"/>
  <text x="270" y="558" text-anchor="middle" class="axis-label">2.500h</text>
  <line x1="340" y1="70" x2="340" y2="540" class="grid-line"/>
  <text x="340" y="558" text-anchor="middle" class="axis-label">5.000h</text>
  <line x1="410" y1="70" x2="410" y2="540" class="grid-line"/>
  <text x="410" y="558" text-anchor="middle" class="axis-label">7.500h</text>
  <line x1="480" y1="70" x2="480" y2="540" class="grid-line"/>
  <text x="480" y="558" text-anchor="middle" class="axis-label">10.000h</text>
  <line x1="550" y1="70" x2="550" y2="540" class="grid-line"/>
  <text x="550" y="558" text-anchor="middle" class="axis-label">12.500h</text>
  <line x1="620" y1="70" x2="620" y2="540" class="grid-line"/>
  <text x="620" y="558" text-anchor="middle" class="axis-label">15.000h</text>
  <line x1="690" y1="70" x2="690" y2="540" class="grid-line"/>
  <text x="690" y="558" text-anchor="middle" class="axis-label">17.500h</text>
  <line x1="760" y1="70" x2="760" y2="540" class="grid-line"/>
  <text x="760" y="558" text-anchor="middle" class="axis-label">20.000h</text>
  <text x="200" y="558" text-anchor="middle" class="axis-label">0h</text>

  <!-- Horizontal axis -->
  <line x1="200" y1="540" x2="760" y2="540" stroke="#333" stroke-width="1"/>

  <!-- Row 1: Inspeção Visual — every 500h (repeating bars) -->
  <text x="10" y="95" class="row-label">Inspeção Visual</text>
  <text x="10" y="108" class="interval">(a cada 500h)</text>
  <!-- Show repeating small bars every 500h = 14px -->
  <rect x="214" y="82" width="4" height="24" class="bar" fill="#90caf9"/>
  <rect x="228" y="82" width="4" height="24" class="bar" fill="#90caf9"/>
  <rect x="242" y="82" width="4" height="24" class="bar" fill="#90caf9"/>
  <rect x="256" y="82" width="4" height="24" class="bar" fill="#90caf9"/>
  <rect x="270" y="82" width="4" height="24" class="bar" fill="#90caf9"/>
  <rect x="284" y="82" width="4" height="24" class="bar" fill="#90caf9"/>
  <rect x="298" y="82" width="4" height="24" class="bar" fill="#90caf9"/>
  <rect x="312" y="82" width="4" height="24" class="bar" fill="#90caf9"/>
  <rect x="326" y="82" width="4" height="24" class="bar" fill="#90caf9"/>
  <rect x="340" y="82" width="4" height="24" class="bar" fill="#90caf9"/>
  <rect x="354" y="82" width="4" height="24" class="bar" fill="#90caf9"/>
  <rect x="368" y="82" width="4" height="24" class="bar" fill="#90caf9"/>
  <rect x="382" y="82" width="4" height="24" class="bar" fill="#90caf9"/>
  <rect x="396" y="82" width="4" height="24" class="bar" fill="#90caf9"/>
  <rect x="410" y="82" width="4" height="24" class="bar" fill="#90caf9"/>
  <rect x="424" y="82" width="4" height="24" class="bar" fill="#90caf9"/>
  <rect x="438" y="82" width="4" height="24" class="bar" fill="#90caf9"/>
  <rect x="452" y="82" width="4" height="24" class="bar" fill="#90caf9"/>
  <rect x="466" y="82" width="4" height="24" class="bar" fill="#90caf9"/>
  <rect x="480" y="82" width="4" height="24" class="bar" fill="#90caf9"/>
  <text x="200" y="118" font-size="9" fill="#1565c0">MP-ION-001/002 | Nível II | 1,5h</text>

  <!-- Separator -->
  <line x1="200" y1="125" x2="760" y2="125" stroke="#eee" stroke-width="1"/>

  <!-- Row 2: Troca/Recarga de Xénon — every 1000h -->
  <text x="10" y="148" class="row-label">Troca/Recarga</text>
  <text x="10" y="161" class="row-label">de Xénon</text>
  <text x="10" y="174" class="interval">(a cada 1.000h)</text>
  <rect x="228" y="138" width="6" height="28" class="bar" fill="#a5d6a7"/>
  <rect x="256" y="138" width="6" height="28" class="bar" fill="#a5d6a7"/>
  <rect x="284" y="138" width="6" height="28" class="bar" fill="#a5d6a7"/>
  <rect x="312" y="138" width="6" height="28" class="bar" fill="#a5d6a7"/>
  <rect x="340" y="138" width="6" height="28" class="bar" fill="#a5d6a7"/>
  <rect x="368" y="138" width="6" height="28" class="bar" fill="#a5d6a7"/>
  <rect x="396" y="138" width="6" height="28" class="bar" fill="#a5d6a7"/>
  <rect x="424" y="138" width="6" height="28" class="bar" fill="#a5d6a7"/>
  <rect x="452" y="138" width="6" height="28" class="bar" fill="#a5d6a7"/>
  <rect x="480" y="138" width="6" height="28" class="bar" fill="#a5d6a7"/>
  <text x="200" y="183" font-size="9" fill="#2e7d32">MP-ION-003/004 | Nível II-III | 3,5h</text>

  <line x1="200" y1="190" x2="760" y2="190" stroke="#eee" stroke-width="1"/>

  <!-- Row 3: Recalibração das Grades — every 2000h -->
  <text x="10" y="213" class="row-label">Recalibração</text>
  <text x="10" y="226" class="row-label">das Grades</text>
  <text x="10" y="239" class="interval">(a cada 2.000h)</text>
  <rect x="256" y="203" width="8" height="28" class="bar" fill="#ffcc80"/>
  <rect x="312" y="203" width="8" height="28" class="bar" fill="#ffcc80"/>
  <rect x="368" y="203" width="8" height="28" class="bar" fill="#ffcc80"/>
  <rect x="424" y="203" width="8" height="28" class="bar" fill="#ffcc80"/>
  <rect x="480" y="203" width="8" height="28" class="bar" fill="#ffcc80"/>
