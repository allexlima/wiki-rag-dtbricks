<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
  <!-- Background -->
  <rect width="800" height="600" fill="#f0f4f8" rx="8" />

  <!-- Title -->
  <text x="400" y="30" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#333">Vista Explodida — Emissor de Campo NE-DEF-4400</text>
  <text x="400" y="50" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#333">Sequencia de montagem (de baixo para cima)</text>

  <!-- Central axis line -->
  <line x1="350" y1="70" x2="350" y2="570" stroke="#333" stroke-width="0.5" stroke-dasharray="8,4" />

  <!-- 1. Suporte de Montagem (bottom) -->
  <rect x="280" y="490" width="140" height="35" rx="4" fill="#f0f4f8" stroke="#333" stroke-width="2" />
  <line x1="300" y1="507" x2="310" y2="507" stroke="#333" stroke-width="1.5" />
  <line x1="370" y1="507" x2="380" y2="507" stroke="#333" stroke-width="1.5" />
  <!-- Mounting holes -->
  <circle cx="295" cy="507" r="5" fill="none" stroke="#333" stroke-width="1.5" />
  <circle cx="405" cy="507" r="5" fill="none" stroke="#333" stroke-width="1.5" />

  <!-- Label -->
  <line x1="420" y1="507" x2="520" y2="507" stroke="#333" stroke-width="1" />
  <text x="525" y="504" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#333">6. Suporte de Montagem</text>
  <text x="525" y="518" font-family="Arial, sans-serif" font-size="10" fill="#333">Flange com 8 furos M6</text>
  <text x="525" y="530" font-family="Arial, sans-serif" font-size="10" fill="#333">Torque: 24 N·m</text>

  <!-- Assembly arrow -->
  <line x1="350" y1="485" x2="350" y2="460" stroke="#333" stroke-width="1" stroke-dasharray="4,3" />

  <!-- 2. Placa de Interface -->
  <rect x="295" y="420" width="110" height="30" rx="3" fill="#f0f4f8" stroke="#333" stroke-width="2" />
  <!-- Connector pins -->
  <circle cx="315" cy="435" r="2" fill="#333" />
  <circle cx="330" cy="435" r="2" fill="#333" />
  <circle cx="345" cy="435" r="2" fill="#333" />
  <circle cx="360" cy="435" r="2" fill="#333" />
  <circle cx="375" cy="435" r="2" fill="#333" />
  <circle cx="390" cy="435" r="2" fill="#333" />

  <!-- Label -->
  <line x1="405" y1="435" x2="520" y2="435" stroke="#333" stroke-width="1" />
  <text x="525" y="432" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#333">5. Placa de Interface</text>
  <text x="525" y="446" font-family="Arial, sans-serif" font-size="10" fill="#333">Conector NE-CON-770</text>
  <text x="525" y="458" font-family="Arial, sans-serif" font-size="10" fill="#333">12 pinos, terminais M4</text>

  <!-- Assembly arrow -->
  <line x1="350" y1="415" x2="350" y2="385" stroke="#333" stroke-width="1" stroke-dasharray="4,3" />

  <!-- 3. Bobina Secundária -->
  <ellipse cx="350" cy="355" rx="80" ry="25" fill="none" stroke="#333" stroke-width="2" />
  <ellipse cx="350" cy="355" rx="75" ry="22" fill="none" stroke="#333" stroke-width="1" stroke-dasharray="3,2" />
  <ellipse cx="350" cy="355" rx="70" ry="19" fill="none" stroke="#333" stroke-width="1" stroke-dasharray="3,2" />

  <!-- Label -->
  <line x1="430" y1="348" x2="520" y2="348" stroke="#333" stroke-width="1" />
  <text x="525" y="345" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#333">4. Bobina Secundaria</text>
  <text x="525" y="359" font-family="Arial, sans-serif" font-size="10" fill="#333">NE-DEF-4420</text>
  <text x="525" y="371" font-family="Arial, sans-serif" font-size="10" fill="#333">480 espiras, fio 0,4 mm NbTi</text>
  <text x="525" y="383" font-family="Arial, sans-serif" font-size="10" fill="#333">Indutancia: 18,8 mH</text>

  <!-- Assembly arrow -->
  <line x1="350" y1="328" x2="350" y2="298" stroke="#333" stroke-width="1" stroke-dasharray="4,3" />

  <!-- 4. Núcleo Magnético -->
  <rect x="320" y="255" width="60" height="40" rx="3" fill="#333" stroke="#333" stroke-width="2" />
  <text x="350" y="278" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="#f0f4f8">FERRITE</text>

  <!-- Label -->
  <line x1="270" y1="275" x2="180" y2="275" stroke="#333" stroke-width="1" />
  <text x="175" y="265" text-anchor="end" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#333">3. Nucleo Magnetico</text>
  <text x="175" y="280" text-anchor="end" font-family="Arial, sans-serif" font-size="10" fill="#333">NE-DEF-4430</text>
  <text x="175" y="293" text-anchor="end" font-family="Arial, sans-serif" font-size="10" fill="#333">Ferrite Mn-Zn, Ø 35 mm</text>
  <text x="175" y="306" text-anchor="end" font-family="Arial, sans-serif" font-size="10" fill="#333">Fator Q &gt; 200 a 1 MHz</text>

  <!-- Assembly arrow -->
  <line x1="350" y1="250" x2="350" y2="218" stroke="#333" stroke-width="1" stroke-dasharray="4,3" />

  <!-- 5. Bobina Primária -->
  <ellipse cx="350" cy="190" rx="65" ry="22" fill="none" stroke="#333" stroke-width="2.5" />
  <ellipse cx="350" cy="190" rx="60" ry="19" fill="none" stroke="#333" stroke-width="1.5" />

  <!-- Label -->
  <line x1="270" y1="190" x2="180" y2="190" stroke="#333" stroke-width="1" />
  <text x="175" y="180" text-anchor="end" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#333">2. Bobina Primaria</text>
  <text x="175" y="195" text-anchor="end" font-family="Arial, sans-serif" font-size="10" fill="#333">NE-DEF-4410</text>
  <text x="175" y="208" text-anchor="end" font-family="Arial, sans-serif" font-size="10" fill="#333">240 espiras, fio 0,8 mm NbTi</text>
  <text x="175" y="221" text-anchor="end" font-family="Arial, sans-serif" font-size="10" fill="#333">Indutancia: 4,7 mH</text>

  <!-- Assembly arrow -->
  <line x1="350" y1="165" x2="350" y2="135" stroke="#333" stroke-width="1" stroke-dasharray="4,3" />

  <!-- 6. Carcaça do Emissor (top, shown as outline) -->
  <rect x="270" y="75" width="160" height="55" rx="10" fill="none" stroke="#333" stroke-width="2.5" />
  <!-- Heat sink lines -->
  <line x1="275" y1="80" x2="275" y2="125" stroke="#333" stroke-width="1" />
  <line x1="282" y1="80" x2="282" y2="125" stroke="#333" stroke-width="1" />
  <line x1="289" y1="80" x2="289" y2="125" stroke="#333" stroke-width="1" />

  <!-- Label -->
  <line x1="430" y1="102" x2="520" y2="102" stroke="#333" stroke-width="1" />
  <text x="525" y="92" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#333">1. Carcaca do Emissor</text>
  <text x="525" y="107" font-family="Arial, sans-serif" font-size="10" fill="#333">Liga Ti-6Al-4V-Nb</text>
  <text x="525" y="120" font-family="Arial, sans-serif" font-size="10" fill="#333">Ø 80 mm x 150 mm</text>
  <text x="525" y="133" font-family="Arial, sans-serif" font-size="10" fill="#333">Inclui dissipador NE-DEF-4440</text>

  <!-- Assembly direction arrow (large, on the left) -->
  <line x1="80" y1="500" x2="80" y2="100" stroke="#333" stroke-width="2" marker-end="url(#arrow)" />
  <text x="85" y="300" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#333" transform="rotate(-90,85,300)">DIRECAO DE MONTAGEM</text>

  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#333" />
    </marker>
  </defs>

  <!-- Notes at bottom -->
  <text x="400" y="565" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#333">Sequencia de montagem: 1 (carcaca) → 2 (bobina primaria) → 3 (nucleo) → 4 (bobina secundaria) → 5 (placa) → 6 (suporte)</text>
  <text x="400" y="582" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#333">ATENCAO: Alinhar marcacao "TOP" da bobina primaria com pino-guia da carcaca (posicao 12 horas)</text>
</svg>
