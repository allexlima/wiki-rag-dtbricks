<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="800" height="600" viewBox="0 0 800 600">
  <title>Vista Explodida — Conjunto da Transmissão Quântica</title>
  <defs>
    <marker id="expl-arr" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#333"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="800" height="600" fill="#f0f4f8"/>

  <!-- Title -->
  <text x="400" y="30" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#333">Vista Explodida — Transmissão Quântica QTX-7000</text>
  <text x="400" y="50" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#555">Sequência de montagem: de baixo para cima (6 → 1)</text>

  <!-- Component 1: Carcaça Superior (topmost) -->
  <rect x="250" y="65" width="300" height="55" rx="10" ry="10" fill="none" stroke="#333" stroke-width="2"/>
  <text x="400" y="90" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#333">1. Carcaça Superior</text>
  <text x="400" y="108" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#555">Liga Ti-Nb T7N3 — 8,2 kg</text>
  <!-- Label line -->
  <line x1="550" y1="85" x2="630" y2="85" stroke="#333" stroke-width="1"/>
  <text x="635" y="83" font-family="Arial, sans-serif" font-size="9" fill="#555">12× M8 parafusos</text>
  <text x="635" y="96" font-family="Arial, sans-serif" font-size="9" fill="#555">NE-FIX-0008</text>

  <!-- Exploded gap arrow -->
  <line x1="400" y1="120" x2="400" y2="145" stroke="#333" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- Component 2: Anel de Vedação Superior -->
  <ellipse cx="400" cy="162" rx="130" ry="15" fill="none" stroke="#333" stroke-width="1.5"/>
  <text x="400" y="167" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#333">2. Anel Vedação Superior</text>
  <line x1="530" y1="162" x2="630" y2="162" stroke="#333" stroke-width="1"/>
  <text x="635" y="160" font-family="Arial, sans-serif" font-size="9" fill="#555">Índio 99,999%</text>
  <text x="635" y="173" font-family="Arial, sans-serif" font-size="9" fill="#555">NE-VED-0730</text>

  <!-- Exploded gap -->
  <line x1="400" y1="177" x2="400" y2="200" stroke="#333" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- Component 3: Câmara de Entrelaçamento with cells inside -->
  <rect x="250" y="203" width="300" height="120" rx="8" ry="8" fill="none" stroke="#333" stroke-width="2.5"/>
  <text x="400" y="222" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#333">3. Câmara de Entrelaçamento</text>
  <text x="400" y="238" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#555">NE-CEP-0710 — Cerâmica YBaCuO</text>

  <!-- Cell A inside chamber -->
  <rect x="275" y="250" width="100" height="55" rx="4" ry="4" fill="none" stroke="#333" stroke-width="1.5"/>
  <text x="325" y="272" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#333">Célula</text>
  <text x="325" y="286" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#333">Quântica A</text>
  <text x="325" y="300" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#555">NE-CQA-1410</text>
  <!-- Orientation arrow -->
  <polygon points="320,252 330,252 325,245" fill="#333"/>

  <!-- Cell B inside chamber -->
  <rect x="425" y="250" width="100" height="55" rx="4" ry="4" fill="none" stroke="#333" stroke-width="1.5"/>
  <text x="475" y="272" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#333">Célula</text>
  <text x="475" y="286" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#333">Quântica B</text>
  <text x="475" y="300" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#555">NE-CQB-1420</text>
  <!-- Orientation arrow (opposite) -->
  <polygon points="470,303 480,303 475,310" fill="#333"/>

  <!-- Label lines for cells -->
  <line x1="275" y1="275" x2="170" y2="260" stroke="#333" stroke-width="1"/>
  <text x="75" y="255" font-family="Arial, sans-serif" font-size="9" fill="#555">↑ Seta para FRENTE</text>
  <text x="75" y="268" font-family="Arial, sans-serif" font-size="9" fill="#555">Par casado (mesmo lote)</text>

  <line x1="525" y1="275" x2="630" y2="275" stroke="#333" stroke-width="1"/>
  <text x="635" y="273" font-family="Arial, sans-serif" font-size="9" fill="#555">↓ Seta para TRÁS</text>
  <text x="635" y="286" font-family="Arial, sans-serif" font-size="9" fill="#555">Orientação INVERSA à A</text>

  <!-- Bobinas label -->
  <line x1="250" y1="315" x2="170" y2="330" stroke="#333" stroke-width="1"/>
  <text x="50" y="328" font-family="Arial, sans-serif" font-size="9" fill="#555">6× Bobinas Contenção</text>
  <text x="50" y="341" font-family="Arial, sans-serif" font-size="9" fill="#555">Nb₃Sn — NE-BCM-0715</text>

  <!-- Sensores label -->
  <line x1="550" y1="315" x2="630" y2="330" stroke="#333" stroke-width="1"/>
  <text x="635" y="328" font-family="Arial, sans-serif" font-size="9" fill="#555">4× Sensores Coerência</text>
  <text x="635" y="341" font-family="Arial, sans-serif" font-size="9" fill="#555">NE-SCQ-0725</text>

  <!-- Exploded gap -->
  <line x1="400" y1="323" x2="400" y2="350" stroke="#333" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- Component 4: Anel de Vedação Inferior -->
  <ellipse cx="400" cy="365" rx="130" ry="15" fill="none" stroke="#333" stroke-width="1.5"/>
  <text x="400" y="370" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#333">4. Anel Vedação Inferior</text>
  <line x1="530" y1="365" x2="630" y2="365" stroke="#333" stroke-width="1"/>
  <text x="635" y="363" font-family="Arial, sans-serif" font-size="9" fill="#555">NE-VED-0730</text>
  <text x="635" y="376" font-family="Arial, sans-serif" font-size="9" fill="#555">(sempre novo)</text>

  <!-- Exploded gap -->
  <line x1="400" y1="380" x2="400" y2="405" stroke="#333" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- Component 5: Distribuidor de Torque -->
  <rect x="280" y="408" width="240" height="55" rx="6" ry="6" fill="none" stroke="#333" stroke-width="2"/>
  <text x="400" y="432" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#333">5. Distribuidor de Torque</text>
  <text x="400" y="450" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#555">NE-DTM-0940 — Multicanal (3 saídas)</text>

  <!-- Output shafts from distributor -->
  <line x1="310" y1="463" x2="310" y2="478" stroke="#333" stroke-width="1.5"/>
  <text x="310" y="490" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#555">Prop. 1</text>
  <line x1="400" y1="463" x2="400" y2="478" stroke="#333" stroke-width="1.5"/>
  <text x="400" y="490" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#555">Prop. 2</text>
  <line x1="490" y1="463" x2="490" y2="478" stroke="#333" stroke-width="1.5"/>
  <text x="490" y="490" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#555">Prop. 3</text>

  <!-- Exploded gap -->
  <line x1="400" y1="495" x2="400" y2="510" stroke="#333" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- Component 6: Placa Base -->
  <rect x="220" y="513" width="360" height="45" rx="4" ry="4" fill="none" stroke="#333" stroke-width="2.5"/>
  <text x="400" y="535" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#333">6. Placa Base</text>
  <text x="400" y="550" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#555">Fixação à estrutura do veículo — 4× M16 (NE-FIX-0016, 145 N·m)</text>

  <!-- Alignment pins on placa base -->
  <circle cx="250" cy="513" r="4" fill="none" stroke="#333" stroke-width="1.5"/>
  <circle cx="250" cy="513" r="1.5" fill="#333"/>
  <circle cx="550" cy="513" r="4" fill="none" stroke="#333" stroke-width="1.5"/>
  <circle cx="550" cy="513" r="1.5" fill="#333"/>
  <line x1="555" y1="510" x2="630" y2="500" stroke="#333" stroke-width="1"/>
  <text x="635" y="498" font-family="Arial, sans-serif" font-size="9" fill="#555">Pinos alinhamento</text>
  <text x="635" y="511" font-family="Arial, sans-serif" font-size="9" fill="#555">Ø6 h7 — NE-PIN-0006</text>

  <!-- Assembly direction arrow on the right -->
  <line x1="750" y1="530" x2="750" y2="90" stroke="#333" stroke-width="2" marker-end="url(#expl-arr)"/>
  <text x="750" y="310" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#333" transform="rotate(-90,750,310)">SENTIDO DE MONTAGEM</text>

  <!-- Note -->
  <text x="400" y="585" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#333">Peça completa: NE-QTX-1310 | Massa total: 47,3 kg | Torque max saída: 87.500 N·m</text>
</svg>
