<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="800" height="600" viewBox="0 0 800 600">
  <defs>
    <marker id="arr" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#333"/>
    </marker>
    <style>
      text { font-family: 'Segoe UI', Arial, sans-serif; fill: #333; }
      .title { font-size: 18px; font-weight: bold; text-anchor: middle; }
      .subtitle { font-size: 12px; font-style: italic; text-anchor: middle; }
      .decision { font-size: 11px; font-weight: bold; text-anchor: middle; }
      .action { font-size: 10px; text-anchor: middle; }
      .code { font-size: 9px; text-anchor: middle; fill: #777; font-family: monospace; }
      .yes-no { font-size: 10px; font-weight: bold; fill: #333; }
    </style>
  </defs>

  <rect width="800" height="600" fill="#f0f4f8" rx="8"/>

  <text x="400" y="30" class="title">Fluxograma de Diagnóstico — Queda de Tensão</text>
  <text x="400" y="48" class="subtitle">Bateria de Fusão Nuclear — Série Nova ERA</text>

  <!-- Start: Queda de Tensão Detectada -->
  <ellipse cx="400" cy="85" rx="100" ry="22" fill="#fff" stroke="#333" stroke-width="2"/>
  <text x="400" y="89" class="decision">Queda de Tensão?</text>

  <!-- Arrow down -->
  <line x1="400" y1="107" x2="400" y2="135" stroke="#333" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="415" y="125" class="yes-no">SIM</text>

  <!-- Decision 1: Verificar tensão em standby -->
  <polygon points="400,140 510,175 400,210 290,175" fill="#fff" stroke="#333" stroke-width="2"/>
  <text x="400" y="172" class="decision">Tensão standby</text>
  <text x="400" y="185" class="decision">480V ± 2,4V?</text>

  <!-- NO branch left: Regulador defeituoso -->
  <line x1="290" y1="175" x2="130" y2="175" stroke="#333" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="210" y="168" class="yes-no">NÃO</text>
  <rect x="20" y="155" width="110" height="45" rx="5" fill="#fff" stroke="#333" stroke-width="2"/>
  <text x="75" y="175" class="action">Regulador de</text>
  <text x="75" y="188" class="action">Tensão defeituoso</text>
  <text x="75" y="198" class="code">FUS-E530</text>

  <!-- YES branch down -->
  <line x1="400" y1="210" x2="400" y2="240" stroke="#333" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="415" y="230" class="yes-no">SIM</text>

  <!-- Decision 2: Eficiência do conversor -->
  <polygon points="400,245 520,280 400,315 280,280" fill="#fff" stroke="#333" stroke-width="2"/>
  <text x="400" y="277" class="decision">Eficiência conversor</text>
  <text x="400" y="290" class="decision">> 32%?</text>

  <!-- NO branch left: Conversor degradado -->
  <line x1="280" y1="280" x2="130" y2="280" stroke="#333" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="205" y="273" class="yes-no">NÃO</text>
  <rect x="20" y="260" width="110" height="45" rx="5" fill="#fff" stroke="#333" stroke-width="2"/>
  <text x="75" y="277" class="action">Conversor</text>
  <text x="75" y="290" class="action">degradado</text>
  <text x="75" y="300" class="code">FUS-E203</text>

  <!-- Arrow from conversor to action -->
  <rect x="20" y="315" width="110" height="30" rx="3" fill="#fff" stroke="#333" stroke-width="1"/>
  <text x="75" y="334" class="action">Substituir NE-FUS-1520</text>
  <line x1="75" y1="305" x2="75" y2="315" stroke="#333" stroke-width="1" marker-end="url(#arr)"/>

  <!-- YES branch down -->
  <line x1="400" y1="315" x2="400" y2="345" stroke="#333" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="415" y="335" class="yes-no">SIM</text>

  <!-- Decision 3: Nível de trítio -->
  <polygon points="400,350 520,385 400,420 280,385" fill="#fff" stroke="#333" stroke-width="2"/>
  <text x="400" y="382" class="decision">Nível trítio</text>
  <text x="400" y="395" class="decision">> 30%?</text>

  <!-- NO branch left: Trítio depletado -->
  <line x1="280" y1="385" x2="130" y2="385" stroke="#333" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="205" y="378" class="yes-no">NÃO</text>
  <rect x="20" y="365" width="110" height="45" rx="5" fill="#fff" stroke="#333" stroke-width="2"/>
  <text x="75" y="382" class="action">Trítio</text>
  <text x="75" y="395" class="action">depletado</text>
  <text x="75" y="405" class="code">FUS-C301</text>

  <rect x="20" y="420" width="110" height="30" rx="3" fill="#fff" stroke="#333" stroke-width="1"/>
  <text x="75" y="439" class="action">Recarga — Seção 4.3</text>
  <line x1="75" y1="410" x2="75" y2="420" stroke="#333" stroke-width="1" marker-end="url(#arr)"/>

  <!-- YES branch down -->
  <line x1="400" y1="420" x2="400" y2="450" stroke="#333" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="415" y="440" class="yes-no">SIM</text>

  <!-- Decision 4: Campo magnético -->
  <polygon points="400,455 520,490 400,525 280,490" fill="#fff" stroke="#333" stroke-width="2"/>
  <text x="400" y="487" class="decision">Campo magnético</text>
  <text x="400" y="500" class="decision">dentro ± 20%?</text>

  <!-- NO branch right: Bobinas degradadas -->
  <line x1="520" y1="490" x2="640" y2="490" stroke="#333" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="575" y="483" class="yes-no">NÃO</text>
  <rect x="645" y="470" width="130" height="45" rx="5" fill="#fff" stroke="#333" stroke-width="2"/>
  <text x="710" y="487" class="action">Bobinas YBCO</text>
  <text x="710" y="500" class="action">degradadas</text>
  <text x="710" y="510" class="code">Substituir célula — 4.4</text>

  <!-- YES branch down -->
  <line x1="400" y1="525" x2="400" y2="555" stroke="#333" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="415" y="545" class="yes-no">SIM</text>

  <!-- Final: Verificar conectores -->
  <rect x="330" y="558" width="140" height="35" rx="5" fill="#fff" stroke="#333" stroke-width="2"/>
  <text x="400" y="575" class="action">Verificar conectores</text>
  <text x="400" y="588" class="action">e corrosão — Seção 4.5</text>

  <!-- Right side: "NÃO" from start -->
  <line x1="500" y1="85" x2="680" y2="85" stroke="#333" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="590" y="78" class="yes-no">NÃO</text>
  <rect x="685" y="68" width="100" height="35" rx="5" fill="#fff" stroke="#333" stroke-width="2"/>
  <text x="735" y="89" class="action">Sistema normal</text>
</svg>
