<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="800" height="600" viewBox="0 0 800 600">
  <title>Diagrama de Blocos — Sistema de Propulsão Gravitacional</title>
  <style>
    text { font-family: Arial, Helvetica, sans-serif; fill: #1a1a1a; }
    .title { font-size: 16px; font-weight: bold; }
    .block-label { font-size: 13px; text-anchor: middle; }
    .block-sublabel { font-size: 10px; text-anchor: middle; fill: #555; }
    .arrow-label { font-size: 10px; fill: #333; text-anchor: middle; }
    rect.block { fill: #fff; stroke: #1a1a1a; stroke-width: 2; rx: 6; ry: 6; }
    rect.block-highlight { fill: #e8e8e8; stroke: #1a1a1a; stroke-width: 2.5; rx: 6; ry: 6; }
    line.arrow, polyline.arrow { stroke: #1a1a1a; stroke-width: 2; fill: none; }
    polygon.arrowhead { fill: #1a1a1a; }
  </style>

  <!-- Title -->
  <text x="400" y="35" class="title" text-anchor="middle">Diagrama de Blocos — Cadeia Funcional da Turbina Gravitacional</text>
  <line x1="100" y1="45" x2="700" y2="45" stroke="#1a1a1a" stroke-width="1"/>

  <!-- Block 1: Fonte de Energia (RFC) -->
  <rect class="block" x="60" y="80" width="160" height="70"/>
  <text x="140" y="110" class="block-label">Fonte de Energia</text>
  <text x="140" y="128" class="block-sublabel">(Reator de Fusão Compacto)</text>
  <text x="140" y="142" class="block-sublabel">NE-RFC-1000</text>

  <!-- Arrow 1→2 -->
  <line class="arrow" x1="220" y1="115" x2="280" y2="115"/>
  <polygon class="arrowhead" points="280,110 295,115 280,120"/>
  <text x="250" y="105" class="arrow-label">2,4 PW</text>

  <!-- Block 2: Regulador de Potência -->
  <rect class="block" x="295" y="80" width="160" height="70"/>
  <text x="375" y="110" class="block-label">Regulador de</text>
  <text x="375" y="126" class="block-label">Potência</text>
  <text x="375" y="142" class="block-sublabel">NE-GRV-6640</text>

  <!-- Arrow 2→3 -->
  <line class="arrow" x1="455" y1="115" x2="515" y2="115"/>
  <polygon class="arrowhead" points="515,110 530,115 515,120"/>

  <!-- Block 3: Gerador Primário de Grávitons -->
  <rect class="block-highlight" x="530" y="70" width="200" height="90"/>
  <text x="630" y="100" class="block-label">Gerador Primário</text>
  <text x="630" y="118" class="block-label">de Grávitons</text>
  <text x="630" y="136" class="block-sublabel">Cristal de Neutronita-7</text>
  <text x="630" y="150" class="block-sublabel">NE-GRV-6601 / NE-GRV-6605</text>

  <!-- Arrow 3→4 (down) -->
  <line class="arrow" x1="630" y1="160" x2="630" y2="210"/>
  <polygon class="arrowhead" points="625,210 630,225 635,210"/>
  <text x="660" y="195" class="arrow-label">Grávitons</text>

  <!-- Block 4: Guias de Onda Gravitacional -->
  <rect class="block" x="530" y="225" width="200" height="70"/>
  <text x="630" y="255" class="block-label">Guias de Onda</text>
  <text x="630" y="273" class="block-label">Gravitacional (×12)</text>
  <text x="630" y="288" class="block-sublabel">NE-GRV-6610</text>

  <!-- Arrow 4→5 (down) -->
  <line class="arrow" x1="630" y1="295" x2="630" y2="340"/>
  <polygon class="arrowhead" points="625,340 630,355 635,340"/>
  <text x="672" y="325" class="arrow-label">Fluxo rotacional</text>

  <!-- Block 5: Estator Gravitacional -->
  <rect class="block-highlight" x="530" y="355" width="200" height="70"/>
  <text x="630" y="382" class="block-label">Estator Gravitacional</text>
  <text x="630" y="398" class="block-sublabel">36 bobinas — 3 anéis</text>
  <text x="630" y="412" class="block-sublabel">NE-GRV-6650</text>

  <!-- Arrow 5→6 (left) -->
  <line class="arrow" x1="530" y1="390" x2="460" y2="390"/>
  <polygon class="arrowhead" points="460,385 445,390 460,395"/>
  <text x="490" y="380" class="arrow-label">Campo polarizado</text>

  <!-- Block 6: Rotor de Grávitons -->
  <rect class="block-highlight" x="245" y="355" width="200" height="70"/>
  <text x="345" y="382" class="block-label">Rotor de Grávitons</text>
  <text x="345" y="398" class="block-sublabel">14.200 RPM — 24 pás</text>
  <text x="345" y="412" class="block-sublabel">NE-GRV-6660</text>

  <!-- Arrow 6→7 (left) -->
  <line class="arrow" x1="245" y1="390" x2="175" y2="390"/>
  <polygon class="arrowhead" points="175,385 160,390 175,395"/>
  <text x="205" y="380" class="arrow-label">Campo amplificado</text>

  <!-- Block 7: Campo Gravitacional Dirigido -->
  <rect class="block" x="20" y="355" width="140" height="70"/>
  <text x="90" y="378" class="block-label">Campo</text>
  <text x="90" y="394" class="block-label">Gravitacional</text>
  <text x="90" y="410" class="block-label">Dirigido</text>

  <!-- Arrow 7→8 (down) -->
  <line class="arrow" x1="90" y1="425" x2="90" y2="470"/>
  <polygon class="arrowhead" points="85,470 90,485 95,470"/>

  <!-- Block 8: Vetor de Empuxo -->
  <rect class="block" x="20" y="485" width="140" height="70"/>
  <text x="90" y="512" class="block-label">Vetor de Empuxo</text>
  <text x="90" y="530" class="block-sublabel">4,7 MN nominal</text>
  <text x="90" y="544" class="block-sublabel">Defletor NE-GRV-6680</text>

  <!-- MSH feedback loop -->
  <rect class="block" x="245" y="225" width="200" height="60"/>
  <text x="345" y="250" class="block-label">Módulo de Sincronização</text>
  <text x="345" y="268" class="block-label">Harmônica (MSH)</text>
  <text x="345" y="280" class="block-sublabel">NE-GRV-6630</text>

  <!-- Dashed feedback arrow from Rotor back to MSH -->
  <line x1="345" y1="355" x2="345" y2="290" stroke="#1a1a1a" stroke-width="1.5" stroke-dasharray="6,4"/>
  <polygon class="arrowhead" points="340,295 345,285 350,295"/>
  <text x="310" y="330" class="arrow-label" font-style="italic">Feedback</text>

  <!-- Dashed arrow from MSH to Gerador -->
  <line x1="445" y1="250" x2="530" y2="135" stroke="#1a1a1a" stroke-width="1.5" stroke-dasharray="6,4"/>
  <polygon class="arrowhead" points="524,143 533,131 519,136"/>
  <text x="510" y="190" class="arrow-label" font-style="italic">Controle</text>

  <!-- Legend -->
  <rect x="520" y="510" width="250" height="70" fill="none" stroke="#999" stroke-width="1" rx="4"/>
  <text x="535" y="530" font-size="10" fill="#555">Legenda:</text>
  <rect x="535" y="538" width="20" height="12" fill="#e8e8e8" stroke="#1a1a1a" stroke-width="1.5"/>
  <text x="562" y="549" font-size="10" fill="#555">Componente crítico</text>
  <line x1="535" y1="565" x2="555" y2="565" stroke="#1a1a1a" stroke-width="1.5" stroke-dasharray="6,4"/>
  <text x="562" y="569" font-size="10" fill="#555">Malha de realimentação</text>
</svg>
