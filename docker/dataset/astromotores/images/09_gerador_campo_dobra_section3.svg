<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="800" height="600" viewBox="0 0 800 600">
  <title>Fluxograma de Diagnóstico — Campo de Dobra Instável</title>
  <style>
    text { font-family: Arial, Helvetica, sans-serif; fill: #000; }
    .title { font-size: 18px; font-weight: bold; text-anchor: middle; }
    .subtitle { font-size: 11px; text-anchor: middle; fill: #444; }
    .decision-text { font-size: 11px; text-anchor: middle; font-weight: bold; }
    .action-text { font-size: 10px; text-anchor: middle; }
    .yes-no { font-size: 10px; font-weight: bold; fill: #333; }
    rect.action { fill: #fff; stroke: #000; stroke-width: 2; rx: 4; }
    rect.terminal { fill: #fff; stroke: #000; stroke-width: 2.5; rx: 12; }
    polygon.decision { fill: #fff; stroke: #000; stroke-width: 2; }
    line.flow { stroke: #000; stroke-width: 1.5; }
  </style>
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#000"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="400" y="28" class="title">FLUXOGRAMA DE DIAGNÓSTICO</text>
  <text x="400" y="45" class="subtitle">Campo de Dobra Instável | NE-DIAG-FLOW-01</text>

  <!-- START: Campo de Dobra Instável? -->
  <rect class="terminal" x="295" y="58" width="210" height="40"/>
  <text x="400" y="83" class="decision-text">Campo de Dobra Instável?</text>

  <!-- Arrow down -->
  <line class="flow" x1="400" y1="98" x2="400" y2="125" marker-end="url(#arrow)"/>
  <text x="412" y="115" class="yes-no">SIM</text>

  <!-- Decision 1: Coerência < 99,90%? -->
  <polygon class="decision" points="400,130 480,165 400,200 320,165"/>
  <text x="400" y="162" class="decision-text" font-size="9">Coerência</text>
  <text x="400" y="174" class="decision-text" font-size="9">&lt; 99,90%?</text>

  <!-- Branch LEFT (SIM) — Verificar cristal -->
  <line class="flow" x1="320" y1="165" x2="210" y2="165" marker-end="url(#arrow)"/>
  <text x="270" y="158" class="yes-no">SIM</text>

  <!-- Decision 2: Cristal degradado? -->
  <polygon class="decision" points="140,165 210,195 140,225 70,195"/>
  <text x="140" y="192" class="decision-text" font-size="9">Cristal</text>
  <text x="140" y="204" class="decision-text" font-size="9">degradado?</text>

  <!-- Branch LEFT-LEFT (SIM) — Substituir cristal -->
  <line class="flow" x1="70" y1="195" x2="20" y2="195" stroke="#000" stroke-width="1.5"/>
  <line class="flow" x1="20" y1="195" x2="20" y2="265" stroke="#000" stroke-width="1.5"/>
  <line class="flow" x1="20" y1="265" x2="50" y2="265" marker-end="url(#arrow)"/>
  <text x="30" y="225" class="yes-no">SIM</text>
  <rect class="action" x="55" y="245" width="170" height="40"/>
  <text x="140" y="262" class="action-text">Substituir Cristal de Dilítio</text>
  <text x="140" y="275" class="action-text">Seção 4.1 | NE-WRP-9930</text>

  <!-- Branch LEFT-RIGHT (NÃO) — Verificar bobinas -->
  <line class="flow" x1="140" y1="225" x2="140" y2="315" marker-end="url(#arrow)"/>
  <text x="152" y="250" class="yes-no">NÃO</text>

  <!-- Decision 3: Bobina com falha? -->
  <polygon class="decision" points="140,320 210,350 140,380 70,350"/>
  <text x="140" y="347" class="decision-text" font-size="9">Bobina com</text>
  <text x="140" y="359" class="decision-text" font-size="9">falha?</text>

  <!-- Branch: Bobina SIM -->
  <line class="flow" x1="70" y1="350" x2="20" y2="350" stroke="#000" stroke-width="1.5"/>
  <line class="flow" x1="20" y1="350" x2="20" y2="415" stroke="#000" stroke-width="1.5"/>
  <line class="flow" x1="20" y1="415" x2="50" y2="415" marker-end="url(#arrow)"/>
  <text x="30" y="380" class="yes-no">SIM</text>
  <rect class="action" x="55" y="395" width="170" height="40"/>
  <text x="140" y="412" class="action-text">Substituir Bobina de Campo</text>
  <text x="140" y="425" class="action-text">Seção 4.3 | NE-WRP-9944</text>

  <!-- Branch: Bobina NÃO → conduto -->
  <line class="flow" x1="140" y1="380" x2="140" y2="465" marker-end="url(#arrow)"/>
  <text x="152" y="400" class="yes-no">NÃO</text>
  <rect class="action" x="55" y="470" width="170" height="40"/>
  <text x="140" y="487" class="action-text">Inspecionar Condutos ETC</text>
  <text x="140" y="500" class="action-text">Seção 4.4 | NE-WRP-9950</text>

  <!-- Branch RIGHT from Decision 1 (NÃO) — Verificar alinhamento -->
  <line class="flow" x1="480" y1="165" x2="560" y2="165" marker-end="url(#arrow)"/>
  <text x="520" y="158" class="yes-no">NÃO</text>

  <!-- Decision 4: Alinhamento fora da tolerância? -->
  <polygon class="decision" points="640,165 720,195 640,225 560,195"/>
  <text x="640" y="189" class="decision-text" font-size="9">Alinhamento</text>
  <text x="640" y="201" class="decision-text" font-size="9">fora?</text>

  <!-- Branch RIGHT-LEFT (SIM) — Realinhar naceles -->
  <line class="flow" x1="640" y1="225" x2="640" y2="270" marker-end="url(#arrow)"/>
  <text x="652" y="250" class="yes-no">SIM</text>
  <rect class="action" x="555" y="275" width="170" height="40"/>
  <text x="640" y="292" class="action-text">Realinhar Naceles</text>
  <text x="640" y="305" class="action-text">Seção 4.2 | NE-TOOL-310/315</text>

  <!-- Branch RIGHT-RIGHT (NÃO) — Verificar refrigeração -->
  <line class="flow" x1="720" y1="195" x2="770" y2="195" stroke="#000" stroke-width="1.5"/>
  <line class="flow" x1="770" y1="195" x2="770" y2="330" stroke="#000" stroke-width="1.5"/>
  <line class="flow" x1="770" y1="330" x2="725" y2="330" marker-end="url(#arrow)"/>
  <text x="778" y="230" class="yes-no">NÃO</text>

  <!-- Decision 5: Refrigeração insuficiente? -->
  <polygon class="decision" points="640,330 720,360 640,390 560,360"/>
  <text x="640" y="354" class="decision-text" font-size="9">Refrigeração</text>
  <text x="640" y="366" class="decision-text" font-size="9">insuficiente?</text>

  <!-- Branch: Refrig SIM -->
  <line class="flow" x1="640" y1="390" x2="640" y2="430" marker-end="url(#arrow)"/>
  <text x="652" y="415" class="yes-no">SIM</text>
  <rect class="action" x="555" y="435" width="170" height="40"/>
  <text x="640" y="452" class="action-text">Reabastecer / Reparar</text>
  <text x="640" y="465" class="action-text">Sistema de Refrigeração</text>

  <!-- Branch: Refrig NÃO -->
  <line class="flow" x1="560" y1="360" x2="460" y2="360" marker-end="url(#arrow)"/>
  <text x="510" y="353" class="yes-no">NÃO</text>
  <rect class="action" x="340" y="340" width="115" height="40"/>
  <text x="397" y="357" class="action-text">Diagnóstico</text>
  <text x="397" y="370" class="action-text">avançado</text>

  <!-- Final convergence: Reteste -->
  <line class="flow" x1="140" y1="510" x2="140" y2="545" stroke="#000" stroke-width="1.5"/>
  <line class="flow" x1="140" y1="545" x2="640" y2="545" stroke="#000" stroke-width="1.5"/>
  <line class="flow" x1="640" y1="475" x2="640" y2="545" stroke="#000" stroke-width="1.5"/>
  <line class="flow" x1="640" y1="315" x2="640" y2="325" stroke="#000" stroke-width="0.5"/>

  <rect class="terminal" x="325" y="555" width="150" height="35"/>
  <text x="400" y="577" class="decision-text">RETESTE (Seção 3.1)</text>
  <line class="flow" x1="400" y1="545" x2="400" y2="555" marker-end="url(#arrow)"/>
</svg>
