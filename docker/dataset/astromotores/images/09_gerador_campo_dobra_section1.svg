<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="800" height="600" viewBox="0 0 800 600">
  <title>Diagrama de Blocos — Sistema Gerador de Campo de Dobra</title>
  <style>
    text { font-family: Arial, Helvetica, sans-serif; fill: #000; }
    .title { font-size: 18px; font-weight: bold; text-anchor: middle; }
    .subtitle { font-size: 11px; text-anchor: middle; fill: #444; }
    .block-label { font-size: 12px; text-anchor: middle; font-weight: bold; }
    .block-sublabel { font-size: 10px; text-anchor: middle; fill: #333; }
    .arrow-label { font-size: 9px; text-anchor: middle; fill: #555; }
    rect.block { fill: #fff; stroke: #000; stroke-width: 2; }
    rect.block-main { fill: #fff; stroke: #000; stroke-width: 2.5; }
    ellipse.bubble { fill: none; stroke: #000; stroke-width: 2; stroke-dasharray: 8,4; }
  </style>

  <!-- Title -->
  <text x="400" y="35" class="title">DIAGRAMA DE BLOCOS — GERADOR DE CAMPO DE DOBRA</text>
  <text x="400" y="52" class="subtitle">Veículo Espacial Série Nova ERA | NE-WRP-9900</text>

  <!-- Block: Cristal de Dilítio -->
  <rect class="block" x="60" y="100" width="160" height="80" rx="6"/>
  <text x="140" y="135" class="block-label">Cristal de Dilítio</text>
  <text x="140" y="152" class="block-sublabel">NE-WRP-9930</text>
  <text x="140" y="167" class="block-sublabel">21,47 GHz subespaciais</text>

  <!-- Arrow: Cristal → Câmara -->
  <line x1="220" y1="140" x2="295" y2="140" stroke="#000" stroke-width="2" marker-end="url(#arrowhead)"/>
  <text x="258" y="132" class="arrow-label">Regulação</text>

  <!-- Block: Câmara de Reação -->
  <rect class="block-main" x="300" y="100" width="180" height="80" rx="6"/>
  <text x="390" y="130" class="block-label">Câmara de Reação</text>
  <text x="390" y="147" class="block-sublabel">Matéria / Antimatéria</text>
  <text x="390" y="162" class="block-sublabel">1,8 × 10¹² W nominal</text>

  <!-- Arrow: Câmara → Bobinas -->
  <line x1="390" y1="180" x2="390" y2="250" stroke="#000" stroke-width="2" marker-end="url(#arrowhead)"/>
  <text x="430" y="220" class="arrow-label">Plasma de</text>
  <text x="430" y="232" class="arrow-label">alta energia</text>

  <!-- Block: Bobinas de Campo -->
  <rect class="block" x="300" y="255" width="180" height="70" rx="6"/>
  <text x="390" y="285" class="block-label">Bobinas de Campo</text>
  <text x="390" y="302" class="block-sublabel">18 por nacele | 12,4 T</text>

  <!-- Arrow: Bobinas → Nacele Esquerda -->
  <line x1="300" y1="325" x2="180" y2="395" stroke="#000" stroke-width="2" marker-end="url(#arrowhead)"/>
  <text x="220" y="360" class="arrow-label">Campo</text>
  <text x="220" y="372" class="arrow-label">subespacial</text>

  <!-- Arrow: Bobinas → Nacele Direita -->
  <line x1="480" y1="325" x2="590" y2="395" stroke="#000" stroke-width="2" marker-end="url(#arrowhead)"/>
  <text x="555" y="360" class="arrow-label">Campo</text>
  <text x="555" y="372" class="arrow-label">subespacial</text>

  <!-- Block: Nacele Esquerda -->
  <rect class="block" x="60" y="400" width="170" height="65" rx="6"/>
  <text x="145" y="427" class="block-label">Nacele Esquerda</text>
  <text x="145" y="447" class="block-sublabel">NE-WRP-9931 (bombordo)</text>

  <!-- Block: Nacele Direita -->
  <rect class="block" x="550" y="400" width="170" height="65" rx="6"/>
  <text x="635" y="427" class="block-label">Nacele Direita</text>
  <text x="635" y="447" class="block-sublabel">NE-WRP-9931 (estibordo)</text>

  <!-- Arrows: Naceles → Bolha de Dobra -->
  <line x1="145" y1="465" x2="295" y2="520" stroke="#000" stroke-width="2" marker-end="url(#arrowhead)"/>
  <line x1="635" y1="465" x2="490" y2="520" stroke="#000" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- Block: Bolha de Dobra (ellipse) -->
  <ellipse class="bubble" cx="390" cy="540" rx="140" ry="40"/>
  <text x="390" y="537" class="block-label">Bolha de Dobra</text>
  <text x="390" y="554" class="block-sublabel">Dobra 1 a 9,975</text>

  <!-- Feedback arrow: Sistema de Controle -->
  <rect class="block" x="590" y="225" width="160" height="55" rx="6"/>
  <text x="670" y="250" class="block-label">Sistema de Controle</text>
  <text x="670" y="265" class="block-sublabel">128 sensores | Redundância 3×</text>
  <line x1="590" y1="252" x2="480" y2="280" stroke="#000" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrowhead)"/>
  <text x="545" y="258" class="arrow-label">Realimentação</text>

  <!-- Arrowhead marker -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#000"/>
    </marker>
  </defs>
</svg>
