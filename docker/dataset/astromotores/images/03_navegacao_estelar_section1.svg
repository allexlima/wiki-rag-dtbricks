<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#333" />
    </marker>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="2" dy="2" stdDeviation="2" flood-color="#999" flood-opacity="0.3" />
    </filter>
  </defs>

  <!-- Title -->
  <text x="400" y="40" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#333">Diagrama de Blocos — Sistema de Navegação Estelar (SNE)</text>

  <!-- Block 1: Sensores Estelares -->
  <rect x="50" y="100" width="180" height="80" rx="8" ry="8" fill="#f0f4f8" stroke="#333" stroke-width="2" filter="url(#shadow)" />
  <text x="140" y="135" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#333">Sensores Estelares</text>
  <text x="140" y="155" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#333">NE-NAV-2210 (x2)</text>
  <text x="140" y="172" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#666">Triangulação óptica</text>

  <!-- Arrow 1→2 -->
  <line x1="230" y1="140" x2="290" y2="140" stroke="#333" stroke-width="2" marker-end="url(#arrowhead)" />
  <text x="260" y="132" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#666">Dados ópticos</text>

  <!-- Block 2: Processador de Navegação -->
  <rect x="300" y="100" width="200" height="80" rx="8" ry="8" fill="#f0f4f8" stroke="#333" stroke-width="2" filter="url(#shadow)" />
  <text x="400" y="130" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#333">Processador de</text>
  <text x="400" y="148" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#333">Navegação</text>
  <text x="400" y="168" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#333">NE-NAV-4400 (x3)</text>

  <!-- Block 3: Giroscópio Quântico -->
  <rect x="50" y="260" width="180" height="80" rx="8" ry="8" fill="#f0f4f8" stroke="#333" stroke-width="2" filter="url(#shadow)" />
  <text x="140" y="295" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#333">Giroscópio Quântico</text>
  <text x="140" y="315" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#333">NE-NAV-3310</text>
  <text x="140" y="332" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#666">Inercial 3 eixos</text>

  <!-- Arrow 3→2 -->
  <line x1="230" y1="290" x2="380" y2="190" stroke="#333" stroke-width="2" marker-end="url(#arrowhead)" />
  <text x="290" y="228" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#666" transform="rotate(-25, 290, 228)">Dados inerciais</text>

  <!-- Block 4: Receptor de Pulsar -->
  <rect x="50" y="400" width="180" height="80" rx="8" ry="8" fill="#f0f4f8" stroke="#333" stroke-width="2" filter="url(#shadow)" />
  <text x="140" y="435" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#333">Receptor de Pulsar</text>
  <text x="140" y="455" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#333">NE-NAV-5520</text>
  <text x="140" y="472" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#666">Referência temporal</text>

  <!-- Arrow 4→2 -->
  <line x1="230" y1="430" x2="380" y2="190" stroke="#333" stroke-width="2" marker-end="url(#arrowhead)" />
  <text x="280" y="330" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#666" transform="rotate(-40, 280, 330)">Sinal de pulsar</text>

  <!-- Block 5: Display Holográfico -->
  <rect x="570" y="100" width="180" height="80" rx="8" ry="8" fill="#f0f4f8" stroke="#333" stroke-width="2" filter="url(#shadow)" />
  <text x="660" y="135" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#333">Display Holográfico</text>
  <text x="660" y="155" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#333">NE-NAV-6600</text>
  <text x="660" y="172" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#666">Interface do piloto</text>

  <!-- Arrow 2→5 -->
  <line x1="500" y1="130" x2="560" y2="130" stroke="#333" stroke-width="2" marker-end="url(#arrowhead)" />
  <text x="530" y="122" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#666">Posição/Rota</text>

  <!-- Block 6: Piloto Automático -->
  <rect x="570" y="260" width="180" height="80" rx="8" ry="8" fill="#f0f4f8" stroke="#333" stroke-width="2" filter="url(#shadow)" />
  <text x="660" y="295" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#333">Piloto Automático</text>
  <text x="660" y="315" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#333">Sistema de Propulsão</text>
  <text x="660" y="332" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#666">Correções de curso</text>

  <!-- Arrow 2→6 -->
  <line x1="500" y1="160" x2="570" y2="280" stroke="#333" stroke-width="2" marker-end="url(#arrowhead)" />
  <text x="550" y="210" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#666" transform="rotate(30, 550, 210)">Comandos de curso</text>

  <!-- Block 7: Filtro de Kalman (central detail) -->
  <rect x="310" y="350" width="180" height="60" rx="8" ry="8" fill="#f0f4f8" stroke="#333" stroke-width="1.5" stroke-dasharray="6,3" />
  <text x="400" y="378" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-style="italic" fill="#333">Filtro de Kalman</text>
  <text x="400" y="398" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#666">18 estados — fusão sensorial</text>

  <!-- Arrow FK→Processor -->
  <line x1="400" y1="350" x2="400" y2="190" stroke="#333" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrowhead)" />

  <!-- Legend -->
  <rect x="520" y="440" width="240" height="120" rx="6" ry="6" fill="#f0f4f8" stroke="#333" stroke-width="1" />
  <text x="640" y="462" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#333">Legenda</text>
  <line x1="540" y1="480" x2="580" y2="480" stroke="#333" stroke-width="2" marker-end="url(#arrowhead)" />
  <text x="590" y="484" font-family="Arial, sans-serif" font-size="10" fill="#333">Fluxo de dados principal</text>
  <line x1="540" y1="505" x2="580" y2="505" stroke="#333" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrowhead)" />
  <text x="590" y="509" font-family="Arial, sans-serif" font-size="10" fill="#333">Processamento interno</text>
  <rect x="540" y="522" width="40" height="20" rx="4" ry="4" fill="#f0f4f8" stroke="#333" stroke-width="2" />
  <text x="590" y="536" font-family="Arial, sans-serif" font-size="10" fill="#333">Módulo de hardware</text>

  <!-- Footer -->
  <text x="400" y="585" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#999">Nova ERA — NE-MAN-NAV-003 Rev 7.2 — Diagrama de Blocos do SNE</text>
</svg>
