<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
  <defs>
    <marker id="flow-arrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#333" />
    </marker>
  </defs>

  <!-- Title -->
  <text x="400" y="30" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#333">Fluxograma de Diagnóstico — Desvio de Rota</text>

  <!-- Start: Diamond - Desvio de Rota Detectado? -->
  <polygon points="400,55 520,100 400,145 280,100" fill="#f0f4f8" stroke="#333" stroke-width="2" />
  <text x="400" y="96" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#333">Desvio de Rota</text>
  <text x="400" y="111" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#333">Detectado?</text>

  <!-- No branch (left) -->
  <line x1="280" y1="100" x2="200" y2="100" stroke="#333" stroke-width="1.5" marker-end="url(#flow-arrow)" />
  <text x="240" y="93" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#333">Não</text>
  <rect x="100" y="80" width="100" height="40" rx="15" ry="15" fill="#f0f4f8" stroke="#333" stroke-width="2" />
  <text x="150" y="105" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#333">Operação OK</text>

  <!-- Yes branch (down) -->
  <line x1="400" y1="145" x2="400" y2="175" stroke="#333" stroke-width="1.5" marker-end="url(#flow-arrow)" />
  <text x="412" y="165" font-family="Arial, sans-serif" font-size="10" fill="#333">Sim</text>

  <!-- Step: Executar NAV SELF-TEST -->
  <rect x="310" y="180" width="180" height="45" rx="6" ry="6" fill="#f0f4f8" stroke="#333" stroke-width="2" />
  <text x="400" y="200" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#333">Executar</text>
  <text x="400" y="215" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#333">NAV SELF-TEST FULL</text>

  <!-- Arrow down -->
  <line x1="400" y1="225" x2="400" y2="255" stroke="#333" stroke-width="1.5" marker-end="url(#flow-arrow)" />

  <!-- Diamond: Código de Erro? -->
  <polygon points="400,260 510,300 400,340 290,300" fill="#f0f4f8" stroke="#333" stroke-width="2" />
  <text x="400" y="297" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#333">Código de Erro?</text>

  <!-- Branch Left: NAV-ERR-003 (Gyro Drift) -->
  <line x1="290" y1="300" x2="180" y2="300" stroke="#333" stroke-width="1.5" marker-end="url(#flow-arrow)" />
  <text x="235" y="293" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#333">ERR-003</text>

  <rect x="50" y="280" width="130" height="40" rx="6" ry="6" fill="#f0f4f8" stroke="#333" stroke-width="2" />
  <text x="115" y="297" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#333">Deriva do</text>
  <text x="115" y="312" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#333">Giroscópio</text>

  <!-- Gyro sub-flow down -->
  <line x1="115" y1="320" x2="115" y2="350" stroke="#333" stroke-width="1.5" marker-end="url(#flow-arrow)" />

  <rect x="40" y="355" width="150" height="35" rx="6" ry="6" fill="#f0f4f8" stroke="#333" stroke-width="1.5" />
  <text x="115" y="377" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#333">Recalibrar Giroscópio</text>

  <line x1="115" y1="390" x2="115" y2="415" stroke="#333" stroke-width="1.5" marker-end="url(#flow-arrow)" />

  <polygon points="115,420 180,448 115,476 50,448" fill="#f0f4f8" stroke="#333" stroke-width="1.5" />
  <text x="115" y="452" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#333">Resolvido?</text>

  <line x1="50" y1="448" x2="20" y2="448" stroke="#333" stroke-width="1.5" marker-end="url(#flow-arrow)" />
  <text x="35" y="441" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#333">Não</text>

  <rect x="10" y="500" width="140" height="35" rx="6" ry="6" fill="#f0f4f8" stroke="#333" stroke-width="2" />
  <text x="80" y="522" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#333">Substituir NE-NAV-3310</text>
  <line x1="20" y1="448" x2="80" y2="448" stroke="#333" stroke-width="0.5" />
  <line x1="80" y1="448" x2="80" y2="500" stroke="#333" stroke-width="1.5" marker-end="url(#flow-arrow)" />

  <line x1="115" y1="476" x2="115" y2="500" stroke="#333" stroke-width="1.5" marker-end="url(#flow-arrow)" />
  <text x="125" y="492" font-family="Arial, sans-serif" font-size="9" fill="#333">Sim</text>
  <rect x="65" y="500" width="100" height="35" rx="15" ry="15" fill="#f0f4f8" stroke="#333" stroke-width="2" />
  <text x="115" y="522" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#333">Resolvido</text>

  <!-- Branch Right: NAV-ERR-001 (Sensor Failure) -->
  <line x1="510" y1="300" x2="600" y2="300" stroke="#333" stroke-width="1.5" marker-end="url(#flow-arrow)" />
  <text x="555" y="293" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#333">ERR-001</text>

  <rect x="605" y="280" width="140" height="40" rx="6" ry="6" fill="#f0f4f8" stroke="#333" stroke-width="2" />
  <text x="675" y="297" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#333">Falha de Sensor</text>
  <text x="675" y="312" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#333">Estelar</text>

  <line x1="675" y1="320" x2="675" y2="350" stroke="#333" stroke-width="1.5" marker-end="url(#flow-arrow)" />

  <rect x="600" y="355" width="150" height="35" rx="6" ry="6" fill="#f0f4f8" stroke="#333" stroke-width="1.5" />
  <text x="675" y="377" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#333">Limpar Sensores</text>

  <line x1="675" y1="390" x2="675" y2="415" stroke="#333" stroke-width="1.5" marker-end="url(#flow-arrow)" />

  <polygon points="675,420 740,448 675,476 610,448" fill="#f0f4f8" stroke="#333" stroke-width="1.5" />
  <text x="675" y="452" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#333">Resolvido?</text>

  <line x1="740" y1="448" x2="770" y2="448" stroke="#333" stroke-width="1.5" marker-end="url(#flow-arrow)" />
  <text x="757" y="441" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#333">Não</text>

  <rect x="650" y="500" width="140" height="35" rx="6" ry="6" fill="#f0f4f8" stroke="#333" stroke-width="2" />
  <text x="720" y="522" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#333">Substituir NE-NAV-2210</text>
  <line x1="770" y1="448" x2="720" y2="448" stroke="#333" stroke-width="0.5" />
  <line x1="720" y1="448" x2="720" y2="500" stroke="#333" stroke-width="1.5" marker-end="url(#flow-arrow)" />

  <line x1="675" y1="476" x2="675" y2="500" stroke="#333" stroke-width="1.5" marker-end="url(#flow-arrow)" />
  <text x="685" y="492" font-family="Arial, sans-serif" font-size="9" fill="#333">Sim</text>
  <rect x="625" y="500" width="100" height="35" rx="15" ry="15" fill="#f0f4f8" stroke="#333" stroke-width="2" />
  <text x="675" y="522" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#333">Resolvido</text>

  <!-- Branch Down: NAV-ERR-006/010 (Software) -->
  <line x1="400" y1="340" x2="400" y2="365" stroke="#333" stroke-width="1.5" marker-end="url(#flow-arrow)" />
  <text x="415" y="358" font-family="Arial, sans-serif" font-size="9" fill="#333">ERR-006/010</text>

  <rect x="310" y="370" width="180" height="40" rx="6" ry="6" fill="#f0f4f8" stroke="#333" stroke-width="2" />
  <text x="400" y="387" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#333">Erro de Software /</text>
  <text x="400" y="402" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#333">Catálogo Corrompido</text>

  <line x1="400" y1="410" x2="400" y2="435" stroke="#333" stroke-width="1.5" marker-end="url(#flow-arrow)" />

  <rect x="300" y="440" width="200" height="35" rx="6" ry="6" fill="#f0f4f8" stroke="#333" stroke-width="1.5" />
  <text x="400" y="462" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#333">Atualizar FW / Recarregar STARDB</text>

  <line x1="400" y1="475" x2="400" y2="500" stroke="#333" stroke-width="1.5" marker-end="url(#flow-arrow)" />

  <rect x="350" y="500" width="100" height="35" rx="15" ry="15" fill="#f0f4f8" stroke="#333" stroke-width="2" />
  <text x="400" y="522" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#333">Resolvido</text>

  <!-- Footer -->
  <text x="400" y="575" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#999">Nova ERA — Fluxograma de Diagnóstico de Desvio de Rota — NE-MAN-NAV-003</text>
</svg>
