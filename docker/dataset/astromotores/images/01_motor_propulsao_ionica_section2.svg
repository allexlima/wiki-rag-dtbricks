<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
  <defs>
    <marker id="dim-arrow-left" markerWidth="8" markerHeight="6" refX="0" refY="3" orient="auto">
      <polygon points="8 0, 0 3, 8 6" fill="#333"/>
    </marker>
    <marker id="dim-arrow-right" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#333"/>
    </marker>
    <style>
      text { font-family: 'Segoe UI', Arial, sans-serif; fill: #333; }
      .title { font-size: 16px; font-weight: bold; }
      .dim { font-size: 12px; font-weight: bold; fill: #c0392b; }
      .label { font-size: 11px; }
      .part-label { font-size: 12px; font-weight: bold; }
      .dim-line { stroke: #c0392b; stroke-width: 1; }
      .dim-ext { stroke: #c0392b; stroke-width: 0.5; stroke-dasharray: 3,2; }
      .outline { fill: #f0f4f8; stroke: #333; stroke-width: 2; }
      .inner { fill: #e2e8f0; stroke: #333; stroke-width: 1.5; }
      .hatch { stroke: #999; stroke-width: 0.5; }
    </style>
  </defs>

  <!-- Title -->
  <text x="400" y="30" text-anchor="middle" class="title">Desenho Dimensional — Corte Transversal do Motor Iônico NE-ION-7742</text>

  <!-- Outer casing (cross-section, symmetric about center) -->
  <!-- Left half cross-section with hatching to show solid material -->
  <rect x="175" y="80" width="450" height="420" class="outline" rx="10"/>

  <!-- Inner cavity - Câmara de Ionização -->
  <rect x="220" y="120" width="360" height="280" class="inner" rx="5"/>

  <!-- Ânodo Central -->
  <rect x="370" y="140" width="60" height="240" fill="#d0d8e0" stroke="#333" stroke-width="1.5" rx="3"/>
  <text x="400" y="270" text-anchor="middle" class="part-label" transform="rotate(-90, 400, 270)">Ânodo Central</text>

  <!-- Grade de Tela -->
  <line x1="220" y1="410" x2="580" y2="410" stroke="#333" stroke-width="3"/>
  <line x1="230" y1="410" x2="230" y2="400" stroke="#333" stroke-width="1"/>
  <line x1="260" y1="410" x2="260" y2="400" stroke="#333" stroke-width="1"/>
  <line x1="290" y1="410" x2="290" y2="400" stroke="#333" stroke-width="1"/>
  <line x1="320" y1="410" x2="320" y2="400" stroke="#333" stroke-width="1"/>
  <line x1="350" y1="410" x2="350" y2="400" stroke="#333" stroke-width="1"/>
  <line x1="380" y1="410" x2="380" y2="400" stroke="#333" stroke-width="1"/>
  <line x1="410" y1="410" x2="410" y2="400" stroke="#333" stroke-width="1"/>
  <line x1="440" y1="410" x2="440" y2="400" stroke="#333" stroke-width="1"/>
  <line x1="470" y1="410" x2="470" y2="400" stroke="#333" stroke-width="1"/>
  <line x1="500" y1="410" x2="500" y2="400" stroke="#333" stroke-width="1"/>
  <line x1="530" y1="410" x2="530" y2="400" stroke="#333" stroke-width="1"/>
  <line x1="560" y1="410" x2="560" y2="400" stroke="#333" stroke-width="1"/>

  <!-- Grade Aceleradora -->
  <line x1="250" y1="425" x2="550" y2="425" stroke="#333" stroke-width="3"/>
  <line x1="265" y1="425" x2="265" y2="435" stroke="#333" stroke-width="1"/>
  <line x1="295" y1="425" x2="295" y2="435" stroke="#333" stroke-width="1"/>
  <line x1="325" y1="425" x2="325" y2="435" stroke="#333" stroke-width="1"/>
  <line x1="355" y1="425" x2="355" y2="435" stroke="#333" stroke-width="1"/>
  <line x1="385" y1="425" x2="385" y2="435" stroke="#333" stroke-width="1"/>
  <line x1="415" y1="425" x2="415" y2="435" stroke="#333" stroke-width="1"/>
  <line x1="445" y1="425" x2="445" y2="435" stroke="#333" stroke-width="1"/>
  <line x1="475" y1="425" x2="475" y2="435" stroke="#333" stroke-width="1"/>
  <line x1="505" y1="425" x2="505" y2="435" stroke="#333" stroke-width="1"/>
  <line x1="535" y1="425" x2="535" y2="435" stroke="#333" stroke-width="1"/>

  <!-- Bocal de Exaustão -->
  <polygon points="300,440 500,440 540,500 260,500" fill="#f0f4f8" stroke="#333" stroke-width="2"/>
  <text x="400" y="478" text-anchor="middle" class="part-label">Bocal de Exaustão</text>

  <!-- Cátodo (small, on the side) -->
  <rect x="590" y="370" width="30" height="60" fill="#d0d8e0" stroke="#333" stroke-width="1.5" rx="2"/>
  <text x="660" y="405" text-anchor="middle" class="part-label">Cátodo</text>
  <line x1="620" y1="400" x2="640" y2="400" stroke="#333" stroke-width="1" stroke-dasharray="3,2"/>

  <!-- Labels with leader lines -->
  <!-- Câmara label -->
  <text x="100" y="260" text-anchor="middle" class="part-label">Câmara de</text>
  <text x="100" y="275" text-anchor="middle" class="part-label">Ionização</text>
  <text x="100" y="290" text-anchor="middle" class="label">(h-BN)</text>
  <line x1="140" y1="270" x2="218" y2="270" stroke="#333" stroke-width="1" stroke-dasharray="3,2"/>

  <!-- Grade de Tela label -->
  <text x="680" y="412" text-anchor="middle" class="part-label">Grade de Tela</text>
  <text x="680" y="427" text-anchor="middle" class="label">(Mo, 0,38 mm)</text>
  <line x1="582" y1="410" x2="640" y2="415" stroke="#333" stroke-width="1" stroke-dasharray="3,2"/>

  <!-- Grade Aceleradora label -->
  <text x="120" y="435" text-anchor="middle" class="part-label">Grade de</text>
  <text x="120" y="450" text-anchor="middle" class="part-label">Aceleração</text>
  <text x="120" y="465" text-anchor="middle" class="label">(Mo, 0,51 mm)</text>
  <line x1="170" y1="445" x2="248" y2="425" stroke="#333" stroke-width="1" stroke-dasharray="3,2"/>

  <!-- ======= DIMENSION LINES ======= -->

  <!-- Overall width: 450mm -->
  <line x1="175" y1="60" x2="175" y2="75" class="dim-ext"/>
  <line x1="625" y1="60" x2="625" y2="75" class="dim-ext"/>
  <line x1="175" y1="68" x2="625" y2="68" class="dim-line" marker-start="url(#dim-arrow-left)" marker-end="url(#dim-arrow-right)"/>
  <text x="400" y="63" text-anchor="middle" class="dim">450 mm</text>

  <!-- Overall height: 584mm -->
  <line x1="145" y1="80" x2="160" y2="80" class="dim-ext"/>
  <line x1="145" y1="500" x2="160" y2="500" class="dim-ext"/>
  <line x1="152" y1="80" x2="152" y2="500" class="dim-line" marker-start="url(#dim-arrow-left)" marker-end="url(#dim-arrow-right)"/>
  <text x="148" y="295" text-anchor="middle" class="dim" transform="rotate(-90, 148, 295)">584 mm</text>

  <!-- Câmara diameter: 310mm -->
  <line x1="220" y1="520" x2="220" y2="535" class="dim-ext"/>
  <line x1="580" y1="520" x2="580" y2="535" class="dim-ext"/>
  <line x1="220" y1="528" x2="580" y2="528" class="dim-line" marker-start="url(#dim-arrow-left)" marker-end="url(#dim-arrow-right)"/>
  <text x="400" y="524" text-anchor="middle" class="dim">310 mm diâmetro</text>

  <!-- Bocal opening: 120mm -->
  <line x1="310" y1="505" x2="310" y2="555" class="dim-ext"/>
  <line x1="490" y1="505" x2="490" y2="555" class="dim-ext"/>
  <line x1="310" y1="550" x2="490" y2="550" class="dim-line" marker-start="url(#dim-arrow-left)" marker-end="url(#dim-arrow-right)"/>
  <text x="400" y="568" text-anchor="middle" class="dim">120 mm diâmetro bocal</text>

  <!-- Grade spacing: 1,2mm -->
  <line x1="640" y1="410" x2="660" y2="410" class="dim-ext"/>
  <line x1="640" y1="425" x2="660" y2="425" class="dim-ext"/>
  <line x1="655" y1="410" x2="655" y2="425" class="dim-line" marker-start="url(#dim-arrow-left)" marker-end="url(#dim-arrow-right)"/>
  <text x="710" y="420" text-anchor="middle" class="dim">1,2 mm</text>

  <!-- Câmara depth: 185mm -->
  <line x1="585" y1="120" x2="640" y2="120" class="dim-ext"/>
  <line x1="585" y1="400" x2="640" y2="400" class="dim-ext"/>
  <line x1="635" y1="120" x2="635" y2="400" class="dim-line" marker-start="url(#dim-arrow-left)" marker-end="url(#dim-arrow-right)"/>
  <text x="638" y="265" text-anchor="middle" class="dim" transform="rotate(-90, 638, 265)">185 mm prof.</text>

  <!-- Scale note -->
  <text x="400" y="595" text-anchor="middle" class="label" fill="#666">Escala: sem escala — cotas em milímetros | NE-ION-7742 Rev. 4.2</text>
</svg>
