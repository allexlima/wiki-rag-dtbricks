<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <style>
      text { font-family: 'Segoe UI', Arial, sans-serif; fill: #333; font-size: 14px; }
      .title { font-size: 16px; font-weight: bold; }
      .component { fill: #f0f4f8; stroke: #333; stroke-width: 2; }
      .dashed { stroke: #333; stroke-width: 1.5; stroke-dasharray: 6,4; fill: none; }
      .num { font-size: 12px; font-weight: bold; }
    </style>
  </defs>

  <text x="400" y="35" text-anchor="middle" class="title">Vista Explodida — Sistema de Exaustão Subatômica</text>

  <!-- Component 1: Flange de Entrada -->
  <text x="230" y="90" text-anchor="end" class="num">1</text>
  <rect x="250" y="65" width="300" height="50" rx="4" class="component"/>
  <text x="400" y="95" text-anchor="middle">Flange de Entrada</text>

  <line x1="400" y1="115" x2="400" y2="145" class="dashed"/>

  <!-- Component 2: Filtro de Partículas -->
  <text x="230" y="175" text-anchor="end" class="num">2</text>
  <rect x="250" y="145" width="300" height="50" rx="4" class="component"/>
  <text x="400" y="175" text-anchor="middle">Filtro de Partículas</text>

  <line x1="400" y1="195" x2="400" y2="225" class="dashed"/>

  <!-- Component 3: Coletor Central -->
  <text x="230" y="255" text-anchor="end" class="num">3</text>
  <rect x="250" y="225" width="300" height="50" rx="4" class="component"/>
  <text x="400" y="255" text-anchor="middle">Coletor Central</text>

  <line x1="400" y1="275" x2="400" y2="305" class="dashed"/>

  <!-- Component 4: Bocal Convergente -->
  <text x="230" y="335" text-anchor="end" class="num">4</text>
  <rect x="250" y="305" width="300" height="50" rx="4" class="component"/>
  <text x="400" y="335" text-anchor="middle">Bocal Convergente</text>

  <line x1="400" y1="355" x2="400" y2="385" class="dashed"/>

  <!-- Component 5: Bocal Divergente -->
  <text x="230" y="415" text-anchor="end" class="num">5</text>
  <rect x="250" y="385" width="300" height="50" rx="4" class="component"/>
  <text x="400" y="415" text-anchor="middle">Bocal Divergente</text>

  <line x1="400" y1="435" x2="400" y2="465" class="dashed"/>

  <!-- Component 6: Escudo Térmico -->
  <text x="230" y="495" text-anchor="end" class="num">6</text>
  <rect x="250" y="465" width="300" height="50" rx="4" class="component"/>
  <text x="400" y="495" text-anchor="middle">Escudo Térmico</text>
</svg>
