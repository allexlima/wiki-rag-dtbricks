<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="800" height="600" viewBox="0 0 800 600">
  <title>Vista Explodida — Montagem da Nacele</title>
  <style>
    text { font-family: Arial, Helvetica, sans-serif; fill: #000; }
    .title { font-size: 18px; font-weight: bold; text-anchor: middle; }
    .subtitle { font-size: 11px; text-anchor: middle; fill: #444; }
    .part-label { font-size: 11px; font-weight: bold; }
    .part-num { font-size: 10px; fill: #333; }
    .callout-num { font-size: 14px; font-weight: bold; text-anchor: middle; }
    .leader { stroke: #000; stroke-width: 1; fill: none; }
    .center-line { stroke: #000; stroke-width: 0.5; stroke-dasharray: 12,4,2,4; }
  </style>

  <!-- Title -->
  <text x="400" y="30" class="title">VISTA EXPLODIDA — MONTAGEM DA NACELE</text>
  <text x="400" y="48" class="subtitle">Ordem de montagem: de baixo (6) para cima (1) | NE-WRP-9931</text>

  <!-- Center axis line -->
  <line class="center-line" x1="400" y1="60" x2="400" y2="570"/>

  <!-- Part 1: Carcaça da Nacele (top half) -->
  <ellipse cx="400" cy="100" rx="160" ry="30" fill="none" stroke="#000" stroke-width="2"/>
  <line x1="240" y1="100" x2="240" y2="115" stroke="#000" stroke-width="2"/>
  <line x1="560" y1="100" x2="560" y2="115" stroke="#000" stroke-width="2"/>
  <line x1="240" y1="115" x2="560" y2="115" stroke="#000" stroke-width="2"/>
  <!-- Callout -->
  <circle cx="620" cy="100" r="12" fill="none" stroke="#000" stroke-width="1.5"/>
  <text x="620" y="105" class="callout-num">1</text>
  <line class="leader" x1="560" y1="100" x2="608" y2="100"/>
  <text x="640" y="97" class="part-label">Carcaça da Nacele</text>
  <text x="640" y="112" class="part-num">NE-WRP-9931 | Duranium-tritanium</text>

  <!-- Exploded gap indicator -->
  <line x1="390" y1="120" x2="390" y2="155" stroke="#000" stroke-width="0.5" stroke-dasharray="3,3"/>
  <line x1="410" y1="120" x2="410" y2="155" stroke="#000" stroke-width="0.5" stroke-dasharray="3,3"/>

  <!-- Part 2: Bobina de Campo Superior -->
  <ellipse cx="400" cy="185" rx="120" ry="25" fill="none" stroke="#000" stroke-width="2"/>
  <!-- Winding pattern -->
  <line x1="295" y1="178" x2="310" y2="192" stroke="#000" stroke-width="0.75"/>
  <line x1="325" y1="173" x2="340" y2="192" stroke="#000" stroke-width="0.75"/>
  <line x1="355" y1="170" x2="370" y2="190" stroke="#000" stroke-width="0.75"/>
  <line x1="385" y1="168" x2="395" y2="188" stroke="#000" stroke-width="0.75"/>
  <line x1="415" y1="168" x2="420" y2="188" stroke="#000" stroke-width="0.75"/>
  <line x1="445" y1="170" x2="450" y2="190" stroke="#000" stroke-width="0.75"/>
  <line x1="470" y1="173" x2="480" y2="192" stroke="#000" stroke-width="0.75"/>
  <line x1="495" y1="178" x2="505" y2="192" stroke="#000" stroke-width="0.75"/>
  <!-- Callout -->
  <circle cx="620" cy="185" r="12" fill="none" stroke="#000" stroke-width="1.5"/>
  <text x="620" y="190" class="callout-num">2</text>
  <line class="leader" x1="520" y1="185" x2="608" y2="185"/>
  <text x="640" y="182" class="part-label">Bobina de Campo Superior</text>
  <text x="640" y="197" class="part-num">NE-WRP-9944 | 9 un. | Verterium-cortenide</text>

  <!-- Exploded gap -->
  <line x1="390" y1="210" x2="390" y2="245" stroke="#000" stroke-width="0.5" stroke-dasharray="3,3"/>
  <line x1="410" y1="210" x2="410" y2="245" stroke="#000" stroke-width="0.5" stroke-dasharray="3,3"/>

  <!-- Part 3: Cristal de Dilítio -->
  <polygon points="365,275 400,255 435,275 435,305 400,325 365,305" fill="none" stroke="#000" stroke-width="2.5"/>
  <!-- Internal facet lines -->
  <line x1="400" y1="255" x2="400" y2="325" stroke="#000" stroke-width="0.5" stroke-dasharray="2,2"/>
  <line x1="365" y1="275" x2="435" y2="305" stroke="#000" stroke-width="0.5" stroke-dasharray="2,2"/>
  <line x1="435" y1="275" x2="365" y2="305" stroke="#000" stroke-width="0.5" stroke-dasharray="2,2"/>
  <!-- Callout -->
  <circle cx="620" cy="290" r="12" fill="none" stroke="#000" stroke-width="1.5"/>
  <text x="620" y="295" class="callout-num">3</text>
  <line class="leader" x1="435" y1="290" x2="608" y2="290"/>
  <text x="640" y="287" class="part-label">Cristal de Dilítio</text>
  <text x="640" y="302" class="part-num">NE-WRP-9930 | 220×85×85 mm | Classe 7+</text>

  <!-- Exploded gap -->
  <line x1="390" y1="330" x2="390" y2="355" stroke="#000" stroke-width="0.5" stroke-dasharray="3,3"/>
  <line x1="410" y1="330" x2="410" y2="355" stroke="#000" stroke-width="0.5" stroke-dasharray="3,3"/>

  <!-- Part 4: Suporte do Cristal -->
  <rect x="345" y="360" width="110" height="30" fill="none" stroke="#000" stroke-width="2" rx="3"/>
  <!-- Mounting holes -->
  <circle cx="360" cy="375" r="5" fill="none" stroke="#000" stroke-width="1"/>
  <circle cx="400" cy="375" r="5" fill="none" stroke="#000" stroke-width="1"/>
  <circle cx="440" cy="375" r="5" fill="none" stroke="#000" stroke-width="1"/>
  <!-- Callout -->
  <circle cx="175" cy="375" r="12" fill="none" stroke="#000" stroke-width="1.5"/>
  <text x="175" y="380" class="callout-num">4</text>
  <line class="leader" x1="345" y1="375" x2="187" y2="375"/>
  <text x="30" y="372" class="part-label">Suporte do Cristal</text>
  <text x="30" y="387" class="part-num">NE-WRP-9935 | Torque: 67 N·m</text>

  <!-- Exploded gap -->
  <line x1="390" y1="395" x2="390" y2="425" stroke="#000" stroke-width="0.5" stroke-dasharray="3,3"/>
  <line x1="410" y1="395" x2="410" y2="425" stroke="#000" stroke-width="0.5" stroke-dasharray="3,3"/>

  <!-- Part 5: Bobina de Campo Inferior -->
  <ellipse cx="400" cy="455" rx="120" ry="25" fill="none" stroke="#000" stroke-width="2"/>
  <line x1="295" y1="448" x2="310" y2="462" stroke="#000" stroke-width="0.75"/>
  <line x1="325" y1="443" x2="340" y2="462" stroke="#000" stroke-width="0.75"/>
  <line x1="355" y1="440" x2="370" y2="460" stroke="#000" stroke-width="0.75"/>
  <line x1="385" y1="438" x2="395" y2="458" stroke="#000" stroke-width="0.75"/>
  <line x1="415" y1="438" x2="420" y2="458" stroke="#000" stroke-width="0.75"/>
  <line x1="445" y1="440" x2="450" y2="460" stroke="#000" stroke-width="0.75"/>
  <line x1="470" y1="443" x2="480" y2="462" stroke="#000" stroke-width="0.75"/>
  <line x1="495" y1="448" x2="505" y2="462" stroke="#000" stroke-width="0.75"/>
  <!-- Callout -->
  <circle cx="175" cy="455" r="12" fill="none" stroke="#000" stroke-width="1.5"/>
  <text x="175" y="460" class="callout-num">5</text>
  <line class="leader" x1="280" y1="455" x2="187" y2="455"/>
  <text x="30" y="452" class="part-label">Bobina de Campo Inferior</text>
  <text x="30" y="467" class="part-num">NE-WRP-9944 | 9 un. | 847 mH</text>

  <!-- Exploded gap -->
  <line x1="390" y1="480" x2="390" y2="510" stroke="#000" stroke-width="0.5" stroke-dasharray="3,3"/>
  <line x1="410" y1="480" x2="410" y2="510" stroke="#000" stroke-width="0.5" stroke-dasharray="3,3"/>

  <!-- Part 6: Placa de Conexão -->
  <rect x="310" y="515" width="180" height="25" fill="none" stroke="#000" stroke-width="2" rx="2"/>
  <!-- Connector pins -->
  <rect x="330" y="540" width="15" height="12" fill="none" stroke="#000" stroke-width="1"/>
  <rect x="355" y="540" width="15" height="12" fill="none" stroke="#000" stroke-width="1"/>
  <rect x="380" y="540" width="15" height="12" fill="none" stroke="#000" stroke-width="1"/>
  <rect x="405" y="540" width="15" height="12" fill="none" stroke="#000" stroke-width="1"/>
  <rect x="430" y="540" width="15" height="12" fill="none" stroke="#000" stroke-width="1"/>
  <rect x="455" y="540" width="15" height="12" fill="none" stroke="#000" stroke-width="1"/>
  <!-- Callout -->
  <circle cx="175" cy="530" r="12" fill="none" stroke="#000" stroke-width="1.5"/>
  <text x="175" y="535" class="callout-num">6</text>
  <line class="leader" x1="310" y1="530" x2="187" y2="530"/>
  <text x="30" y="527" class="part-label">Placa de Conexão</text>
  <text x="30" y="542" class="part-num">NE-WRP-9948 | 6 terminais de potência</text>

  <!-- Assembly direction arrow -->
  <line x1="50" y1="530" x2="50" y2="110" stroke="#000" stroke-width="1.5" marker-end="url(#arrowup)"/>
  <text x="47" y="320" class="part-num" text-anchor="end" transform="rotate(-90,47,320)">DIREÇÃO DE MONTAGEM</text>
  <defs>
    <marker id="arrowup" markerWidth="8" markerHeight="6" refX="4" refY="0" orient="auto">
      <polygon points="0 6, 4 0, 8 6" fill="#000"/>
    </marker>
  </defs>
</svg>
