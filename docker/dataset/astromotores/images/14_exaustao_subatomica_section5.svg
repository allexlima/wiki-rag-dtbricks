<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <style>
      text { font-family: 'Segoe UI', Arial, sans-serif; fill: #333; font-size: 13px; }
      .title { font-size: 16px; font-weight: bold; }
      .bar { fill: #f0f4f8; stroke: #333; stroke-width: 2; }
      .axis { stroke: #333; stroke-width: 1.5; }
      .tick { font-size: 11px; }
      .label { font-size: 13px; }
      .hour { font-size: 11px; font-weight: bold; }
    </style>
  </defs>

  <text x="400" y="40" text-anchor="middle" class="title">Intervalos de Manutenção — Sistema de Exaustão</text>

  <!-- Y-axis labels -->
  <text x="200" y="125" text-anchor="end" class="label">Inspeção Filtro</text>
  <text x="200" y="210" text-anchor="end" class="label">Medição Desgaste Bocal</text>
  <text x="200" y="295" text-anchor="end" class="label">Troca Filtro</text>
  <text x="200" y="380" text-anchor="end" class="label">Substituição Bocal</text>

  <!-- Chart area: x=215..750, 535px for 0..4500h -->

  <!-- Vertical axis -->
  <line x1="215" y1="80" x2="215" y2="430" class="axis"/>
  <!-- Horizontal axis -->
  <line x1="215" y1="430" x2="750" y2="430" class="axis"/>

  <!-- Tick marks -->
  <line x1="215" y1="430" x2="215" y2="438" class="axis"/>
  <text x="215" y="452" text-anchor="middle" class="tick">0</text>

  <line x1="274" y1="430" x2="274" y2="438" class="axis"/>
  <text x="274" y="452" text-anchor="middle" class="tick">500h</text>

  <line x1="334" y1="430" x2="334" y2="438" class="axis"/>
  <text x="334" y="452" text-anchor="middle" class="tick">1000h</text>

  <line x1="393" y1="430" x2="393" y2="438" class="axis"/>
  <text x="393" y="452" text-anchor="middle" class="tick">1500h</text>

  <line x1="453" y1="430" x2="453" y2="438" class="axis"/>
  <text x="453" y="452" text-anchor="middle" class="tick">2000h</text>

  <line x1="512" y1="430" x2="512" y2="438" class="axis"/>
  <text x="512" y="452" text-anchor="middle" class="tick">2500h</text>

  <line x1="572" y1="430" x2="572" y2="438" class="axis"/>
  <text x="572" y="452" text-anchor="middle" class="tick">3000h</text>

  <line x1="631" y1="430" x2="631" y2="438" class="axis"/>
  <text x="631" y="452" text-anchor="middle" class="tick">3500h</text>

  <line x1="691" y1="430" x2="691" y2="438" class="axis"/>
  <text x="691" y="452" text-anchor="middle" class="tick">4000h</text>

  <line x1="750" y1="430" x2="750" y2="438" class="axis"/>
  <text x="750" y="452" text-anchor="middle" class="tick">4500h</text>

  <!-- Bar 1: Inspeção Filtro — 150h → 18px -->
  <rect x="215" y="105" width="18" height="35" rx="3" class="bar"/>
  <text x="245" y="128" class="hour">150h</text>

  <!-- Bar 2: Medição Desgaste Bocal — 600h → 71px -->
  <rect x="215" y="190" width="71" height="35" rx="3" class="bar"/>
  <text x="298" y="213" class="hour">600h</text>

  <!-- Bar 3: Troca Filtro — 1500h → 178px -->
  <rect x="215" y="275" width="178" height="35" rx="3" class="bar"/>
  <text x="405" y="298" class="hour">1500h</text>

  <!-- Bar 4: Substituição Bocal — 4000h → 476px -->
  <rect x="215" y="360" width="476" height="35" rx="3" class="bar"/>
  <text x="703" y="383" class="hour">4000h</text>
</svg>
