<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="800" height="600" viewBox="0 0 800 600">
  <title>Diagrama de Blocos — Sistema de Exaustão Subatômica</title>
  <style>
    text { font-family: 'Helvetica Neue', Arial, sans-serif; fill: #1a1a1a; }
    .title { font-size: 18px; font-weight: bold; text-anchor: middle; }
    .subtitle { font-size: 11px; text-anchor: middle; fill: #555; }
    .block-label { font-size: 13px; font-weight: bold; text-anchor: middle; }
    .block-sub { font-size: 10px; text-anchor: middle; fill: #444; }
    .arrow-label { font-size: 9px; text-anchor: middle; fill: #666; }
  </style>
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#333" />
    </marker>
  </defs>

  <!-- Background -->
  <rect width="800" height="600" fill="#fafafa" />

  <!-- Title -->
  <text x="400" y="35" class="title">Sistema de Exaustão Subatômica — Diagrama de Blocos</text>
  <text x="400" y="55" class="subtitle">Veículo Espacial Série Nova ERA — Fluxo Principal de Exaustão</text>

  <!-- Block 1: Câmara de Reação -->
  <rect x="50" y="90" width="160" height="80" rx="6" fill="none" stroke="#333" stroke-width="2" />
  <text x="130" y="125" class="block-label">Câmara de</text>
  <text x="130" y="143" class="block-label">Reação</text>
  <text x="130" y="160" class="block-sub">NE-REA-1000</text>

  <!-- Arrow 1→2 -->
  <line x1="210" y1="130" x2="270" y2="130" stroke="#333" stroke-width="2" marker-end="url(#arrowhead)" />
  <text x="240" y="120" class="arrow-label">Subprodutos</text>
  <text x="240" y="108" class="arrow-label">de reação</text>

  <!-- Block 2: Coletor de Exaustão -->
  <rect x="280" y="90" width="160" height="80" rx="6" fill="none" stroke="#333" stroke-width="2" />
  <text x="360" y="125" class="block-label">Coletor de</text>
  <text x="360" y="143" class="block-label">Exaustão</text>
  <text x="360" y="160" class="block-sub">NE-EXH-1400</text>

  <!-- Arrow 2→3 -->
  <line x1="440" y1="130" x2="500" y2="130" stroke="#333" stroke-width="2" marker-end="url(#arrowhead)" />
  <text x="470" y="120" class="arrow-label">Fluxo</text>
  <text x="470" y="108" class="arrow-label">canalizado</text>

  <!-- Block 3: Filtro de Partículas -->
  <rect x="510" y="90" width="160" height="80" rx="6" fill="none" stroke="#333" stroke-width="2" />
  <text x="590" y="125" class="block-label">Filtro de</text>
  <text x="590" y="143" class="block-label">Partículas</text>
  <text x="590" y="160" class="block-sub">NE-EXH-1425</text>

  <!-- Arrow 3→4 (down) -->
  <line x1="590" y1="170" x2="590" y2="230" stroke="#333" stroke-width="2" marker-end="url(#arrowhead)" />
  <text x="620" y="205" class="arrow-label">Fluxo filtrado</text>

  <!-- Block 4: Bocal Convergente-Divergente -->
  <rect x="480" y="240" width="220" height="80" rx="6" fill="none" stroke="#333" stroke-width="2" />
  <text x="590" y="270" class="block-label">Bocal Convergente-</text>
  <text x="590" y="288" class="block-label">Divergente</text>
  <text x="590" y="308" class="block-sub">NE-EXH-1410</text>

  <!-- Arrow 4→5 (down) -->
  <line x1="590" y1="320" x2="590" y2="380" stroke="#333" stroke-width="2" marker-end="url(#arrowhead)" />
  <text x="620" y="355" class="arrow-label">Aceleração</text>

  <!-- Block 5: Ejeção Subatômica -->
  <rect x="490" y="390" width="200" height="80" rx="6" fill="none" stroke="#333" stroke-width="2" stroke-dasharray="8,4" />
  <text x="590" y="425" class="block-label">Ejeção</text>
  <text x="590" y="443" class="block-label">Subatômica</text>
  <text x="590" y="460" class="block-sub">Saída → Espaço Exterior</text>

  <!-- Side systems -->
  <!-- UCE -->
  <rect x="50" y="250" width="160" height="70" rx="6" fill="none" stroke="#333" stroke-width="1.5" stroke-dasharray="4,3" />
  <text x="130" y="280" class="block-label">Unidade de Controle</text>
  <text x="130" y="296" class="block-label">de Exaustão (UCE)</text>
  <text x="130" y="312" class="block-sub">NE-EXH-1401</text>

  <!-- Dashed lines from UCE to blocks -->
  <line x1="210" y1="270" x2="280" y2="150" stroke="#999" stroke-width="1" stroke-dasharray="4,3" />
  <line x1="210" y1="280" x2="510" y2="150" stroke="#999" stroke-width="1" stroke-dasharray="4,3" />
  <line x1="210" y1="285" x2="480" y2="270" stroke="#999" stroke-width="1" stroke-dasharray="4,3" />

  <!-- SRT (Regeneração Térmica) -->
  <rect x="50" y="400" width="160" height="70" rx="6" fill="none" stroke="#333" stroke-width="1.5" stroke-dasharray="4,3" />
  <text x="130" y="428" class="block-label">Regeneração</text>
  <text x="130" y="446" class="block-label">Térmica (SRT)</text>
  <text x="130" y="462" class="block-sub">NE-EXH-1440</text>

  <!-- Arrow from SRT to nozzle area -->
  <line x1="210" y1="430" x2="480" y2="300" stroke="#999" stroke-width="1" stroke-dasharray="4,3" />
  <text x="320" y="375" class="arrow-label">Recuperação</text>
  <text x="320" y="387" class="arrow-label">de energia</text>

  <!-- SDE (Desvio de Emergência) -->
  <rect x="280" y="400" width="160" height="70" rx="6" fill="none" stroke="#333" stroke-width="1.5" stroke-dasharray="4,3" />
  <text x="360" y="428" class="block-label">Desvio de</text>
  <text x="360" y="446" class="block-label">Emergência (SDE)</text>
  <text x="360" y="462" class="block-sub">NE-EXH-1460</text>

  <!-- Arrow from collector to SDE -->
  <line x1="360" y1="170" x2="360" y2="395" stroke="#999" stroke-width="1" stroke-dasharray="4,3" />

  <!-- Legend -->
  <rect x="50" y="530" width="700" height="55" rx="4" fill="none" stroke="#ccc" stroke-width="1" />
  <text x="70" y="552" style="font-size:10px; fill:#333;">Legenda:</text>
  <line x1="130" y1="548" x2="170" y2="548" stroke="#333" stroke-width="2" />
  <text x="180" y="552" style="font-size:10px; fill:#555;">Fluxo principal</text>
  <line x1="300" y1="548" x2="340" y2="548" stroke="#999" stroke-width="1" stroke-dasharray="4,3" />
  <text x="350" y="552" style="font-size:10px; fill:#555;">Subsistema auxiliar / sinal de controle</text>
  <rect x="130" y="562" width="40" height="14" rx="3" fill="none" stroke="#333" stroke-width="2" />
  <text x="180" y="574" style="font-size:10px; fill:#555;">Componente principal</text>
  <rect x="300" y="562" width="40" height="14" rx="3" fill="none" stroke="#333" stroke-width="1.5" stroke-dasharray="4,3" />
  <text x="350" y="574" style="font-size:10px; fill:#555;">Subsistema auxiliar</text>
</svg>
