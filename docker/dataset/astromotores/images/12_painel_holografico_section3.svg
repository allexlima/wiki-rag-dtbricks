<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="800" height="600" viewBox="0 0 800 600">
  <title>Fluxograma de Diagnóstico — Artefatos Visuais no Display Holográfico</title>
  <style>
    text { font-family: monospace; font-size: 11px; fill: #222; }
    .title { font-size: 15px; font-weight: bold; }
    .decision { fill: #f9f9f9; stroke: #222; stroke-width: 2; }
    .process { fill: #f0f0f0; stroke: #222; stroke-width: 2; }
    .terminal { fill: #e0e0e0; stroke: #222; stroke-width: 2; }
    .arrow { fill: none; stroke: #222; stroke-width: 1.5; marker-end: url(#ah); }
    .label { font-size: 10px; fill: #555; font-weight: bold; }
  </style>
  <defs>
    <marker id="ah" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#222"/>
    </marker>
  </defs>

  <text x="400" y="28" text-anchor="middle" class="title">Diagnóstico: Artefatos Visuais no Display Holográfico</text>

  <!-- START -->
  <ellipse cx="400" cy="60" rx="80" ry="20" class="terminal"/>
  <text x="400" y="65" text-anchor="middle">INÍCIO: Display</text>
  <text x="400" y="76" text-anchor="middle" class="label">com Artefatos?</text>

  <!-- Arrow to first decision -->
  <line x1="400" y1="80" x2="400" y2="110" class="arrow"/>

  <!-- Decision 1: Ler códigos de falha -->
  <rect x="310" y="110" width="180" height="45" rx="4" class="process"/>
  <text x="400" y="130" text-anchor="middle">Conectar Scanner</text>
  <text x="400" y="145" text-anchor="middle">NE-DIAG-5000</text>

  <line x1="400" y1="155" x2="400" y2="185" class="arrow"/>

  <!-- Decision 2: Código HUD-2xxx? -->
  <polygon points="400,185 490,215 400,245 310,215" class="decision"/>
  <text x="400" y="212" text-anchor="middle">Código</text>
  <text x="400" y="225" text-anchor="middle">HUD-2xxx?</text>

  <!-- YES branch (left) — Projetor -->
  <text x="300" y="210" text-anchor="end" class="label">SIM</text>
  <line x1="310" y1="215" x2="180" y2="215" class="arrow"/>

  <rect x="80" y="195" width="100" height="40" rx="4" class="process"/>
  <text x="130" y="212" text-anchor="middle">Falha no</text>
  <text x="130" y="226" text-anchor="middle">Projetor</text>

  <line x1="130" y1="235" x2="130" y2="265" class="arrow"/>

  <!-- Sub-decision: HUD-2004? -->
  <polygon points="130,265 195,288 130,311 65,288" class="decision"/>
  <text x="130" y="286" text-anchor="middle">HUD-</text>
  <text x="130" y="299" text-anchor="middle">2004?</text>

  <!-- YES: Lente suja -->
  <text x="55" y="282" text-anchor="end" class="label">SIM</text>
  <line x1="65" y1="288" x2="20" y2="288" class="arrow"/>
  <line x1="20" y1="288" x2="20" y2="340" class="arrow"/>
  <rect x="-30" y="340" width="100" height="50" rx="4" class="terminal"/>
  <text x="20" y="360" text-anchor="middle">Limpar Lente</text>
  <text x="20" y="375" text-anchor="middle" class="label">NE-CLN-0033</text>

  <!-- NO: Other projector fault -->
  <text x="200" y="318" class="label">NÃO</text>
  <line x1="130" y1="311" x2="130" y2="350" class="arrow"/>
  <rect x="80" y="350" width="100" height="50" rx="4" class="terminal"/>
  <text x="130" y="370" text-anchor="middle">Substituir</text>
  <text x="130" y="385" text-anchor="middle" class="label">NE-HUD-1220</text>

  <!-- NO branch from HUD-2xxx (right) -->
  <text x="500" y="210" class="label">NÃO</text>
  <line x1="490" y1="215" x2="540" y2="215" class="arrow"/>

  <!-- Decision 3: Código HUD-1xxx? -->
  <polygon points="620,185 710,215 620,245 530,215" class="decision"/>
  <text x="620" y="212" text-anchor="middle">Código</text>
  <text x="620" y="225" text-anchor="middle">HUD-1xxx?</text>

  <!-- YES: Processador -->
  <text x="720" y="210" class="label">SIM</text>
  <line x1="710" y1="215" x2="770" y2="215" class="arrow"/>
  <line x1="770" y1="215" x2="770" y2="260" class="arrow"/>
  <rect x="720" y="260" width="100" height="50" rx="4" class="terminal"/>
  <text x="770" y="280" text-anchor="middle">Erro no</text>
  <text x="770" y="295" text-anchor="middle">Processador</text>

  <line x1="770" y1="310" x2="770" y2="340" class="arrow"/>
  <rect x="710" y="340" width="120" height="50" rx="4" class="terminal"/>
  <text x="770" y="360" text-anchor="middle">Substituir</text>
  <text x="770" y="375" text-anchor="middle" class="label">NE-HUD-1210</text>

  <!-- NO: Run pattern test -->
  <text x="620" y="258" class="label">NÃO</text>
  <line x1="620" y1="245" x2="620" y2="285" class="arrow"/>

  <rect x="545" y="285" width="150" height="40" rx="4" class="process"/>
  <text x="620" y="302" text-anchor="middle">Executar Teste</text>
  <text x="620" y="316" text-anchor="middle">de Padrão Visual</text>

  <line x1="620" y1="325" x2="620" y2="360" class="arrow"/>

  <!-- Decision 4: Artefato no teste? -->
  <polygon points="620,360 700,385 620,410 540,385" class="decision"/>
  <text x="620" y="382" text-anchor="middle">Artefato</text>
  <text x="620" y="395" text-anchor="middle">no teste?</text>

  <!-- YES -->
  <text x="530" y="380" text-anchor="end" class="label">SIM</text>
  <line x1="540" y1="385" x2="460" y2="385" class="arrow"/>

  <rect x="350" y="365" width="110" height="40" rx="4" class="process"/>
  <text x="405" y="382" text-anchor="middle">Verificar potência</text>
  <text x="405" y="396" text-anchor="middle">laser (seção 3.4)</text>

  <line x1="405" y1="405" x2="405" y2="440" class="arrow"/>

  <polygon points="405,440 475,463 405,486 335,463" class="decision"/>
  <text x="405" y="460" text-anchor="middle">Potência</text>
  <text x="405" y="473" text-anchor="middle">OK?</text>

  <text x="325" y="458" text-anchor="end" class="label">NÃO</text>
  <line x1="335" y1="463" x2="260" y2="463" class="arrow"/>
  <rect x="200" y="443" width="60" height="40" rx="4" class="terminal"/>
  <text x="230" y="460" text-anchor="middle">Trocar</text>
  <text x="230" y="474" text-anchor="middle" class="label">1220</text>

  <text x="405" y="500" text-anchor="middle" class="label">SIM</text>
  <line x1="405" y1="486" x2="405" y2="515" class="arrow"/>
  <rect x="340" y="515" width="130" height="40" rx="4" class="process"/>
  <text x="405" y="532" text-anchor="middle">Recalibrar óptica</text>
  <text x="405" y="546" text-anchor="middle">(seção 4.3)</text>

  <!-- NO from artefato no teste -->
  <text x="710" y="380" class="label">NÃO</text>
  <line x1="700" y1="385" x2="760" y2="385" class="arrow"/>
  <line x1="760" y1="385" x2="760" y2="440" class="arrow"/>

  <rect x="680" y="440" width="150" height="55" rx="4" class="process"/>
  <text x="755" y="458" text-anchor="middle">Falha intermitente.</text>
  <text x="755" y="472" text-anchor="middle">Ativar Logger</text>
  <text x="755" y="486" text-anchor="middle">contínuo (24 h)</text>

  <!-- Legend -->
  <rect x="30" y="500" width="60" height="20" rx="3" class="process"/>
  <text x="100" y="514" class="label">Processo</text>
  <polygon points="190,500 220,510 190,520 160,510" class="decision"/>
  <text x="230" y="514" class="label">Decisão</text>
  <rect x="280" y="500" width="60" height="20" rx="3" class="terminal"/>
  <text x="350" y="514" class="label">Resultado</text>
</svg>
