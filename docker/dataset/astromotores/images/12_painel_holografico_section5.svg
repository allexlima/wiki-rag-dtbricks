<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <style>
    text { font-family: Arial, Helvetica, sans-serif; fill: #333; }
    .title { font-size: 18px; font-weight: bold; text-anchor: middle; }
    .label { font-size: 14px; text-anchor: end; }
    .hours { font-size: 12px; text-anchor: middle; fill: #fff; }
    .axis-label { font-size: 11px; text-anchor: middle; fill: #666; }
    .grid { stroke: #ddd; stroke-width: 0.5; }
  </style>

  <!-- Title -->
  <text x="400" y="45" class="title">Intervalos de Manutenção — Painel Holográfico</text>

  <!-- Grid lines -->
  <line x1="220" y1="80" x2="220" y2="480" class="grid"/>
  <line x1="328" y1="80" x2="328" y2="480" class="grid"/>
  <line x1="436" y1="80" x2="436" y2="480" class="grid"/>
  <line x1="544" y1="80" x2="544" y2="480" class="grid"/>
  <line x1="652" y1="80" x2="652" y2="480" class="grid"/>
  <line x1="760" y1="80" x2="760" y2="480" class="grid"/>

  <!-- Axis -->
  <line x1="220" y1="480" x2="760" y2="480" stroke="#333" stroke-width="1.5"/>
  <line x1="220" y1="80" x2="220" y2="480" stroke="#333" stroke-width="1.5"/>

  <!-- Axis labels -->
  <text x="220" y="510" class="axis-label">0</text>
  <text x="328" y="510" class="axis-label">1000</text>
  <text x="436" y="510" class="axis-label">2000</text>
  <text x="544" y="510" class="axis-label">3000</text>
  <text x="652" y="510" class="axis-label">4000</text>
  <text x="760" y="510" class="axis-label">5000</text>
  <text x="490" y="545" class="axis-label" style="font-size:13px;">Horas de Operação (h)</text>

  <!-- Bar 1: Limpeza de Lentes — 100h -->
  <text x="210" y="150" class="label">Limpeza de Lentes</text>
  <rect x="220" y="125" width="11" height="40" rx="3" fill="#f0f4f8" stroke="#333" stroke-width="1.5"/>
  <text x="250" y="150" style="font-size:12px; fill:#333;">100h</text>

  <!-- Bar 2: Calibração Gestos — 400h -->
  <text x="210" y="240" class="label">Calibração Gestos</text>
  <rect x="220" y="215" width="43" height="40" rx="3" fill="#f0f4f8" stroke="#333" stroke-width="1.5"/>
  <text x="268" y="240" style="font-size:12px; fill:#333;">400h</text>

  <!-- Bar 3: Atualização Firmware — 1000h -->
  <text x="210" y="330" class="label">Atualização Firmware</text>
  <rect x="220" y="305" width="108" height="40" rx="3" fill="#f0f4f8" stroke="#333" stroke-width="1.5"/>
  <text x="290" y="330" style="font-size:12px; fill:#333;">1000h</text>

  <!-- Bar 4: Troca Projetor — 5000h -->
  <text x="210" y="420" class="label">Troca Projetor</text>
  <rect x="220" y="395" width="540" height="40" rx="3" fill="#f0f4f8" stroke="#333" stroke-width="1.5"/>
  <text x="490" y="420" style="font-size:12px; fill:#333; text-anchor:middle;">5000h</text>
</svg>
