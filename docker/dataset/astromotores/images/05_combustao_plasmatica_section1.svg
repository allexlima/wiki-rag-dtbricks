<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="800" height="600" viewBox="0 0 800 600">
  <title>Diagrama de Blocos — Sistema de Combustão Plasmática</title>
  <style>
    text { font-family: 'Courier New', monospace; fill: #1a1a1a; }
    .title { font-size: 18px; font-weight: bold; text-anchor: middle; }
    .subtitle { font-size: 11px; text-anchor: middle; fill: #555; }
    .block-label { font-size: 12px; font-weight: bold; text-anchor: middle; }
    .block-sub { font-size: 9px; text-anchor: middle; fill: #444; }
    .part-num { font-size: 8px; text-anchor: middle; fill: #666; font-style: italic; }
    rect.block { fill: #fff; stroke: #1a1a1a; stroke-width: 2; rx: 6; ry: 6; }
    line.arrow-line { stroke: #1a1a1a; stroke-width: 2; }
    polygon.arrow-head { fill: #1a1a1a; }
    rect.bg { fill: #fafafa; stroke: #ccc; stroke-width: 1; }
  </style>

  <!-- Background -->
  <rect class="bg" x="5" y="5" width="790" height="590" rx="10" ry="10"/>

  <!-- Title -->
  <text class="title" x="400" y="40">SISTEMA DE COMBUSTÃO PLASMÁTICA</text>
  <text class="subtitle" x="400" y="58">Diagrama de Blocos Funcional — Veículo Espacial Série Nova ERA</text>

  <!-- Block 1: Reservatório de Hidrogênio -->
  <rect class="block" x="30" y="120" width="160" height="90"/>
  <text class="block-label" x="110" y="155">Reservatório de</text>
  <text class="block-label" x="110" y="172">Hidrogênio</text>
  <text class="block-sub" x="110" y="190">H₂ criogênico</text>
  <text class="part-num" x="110" y="203">NE-PLS-5501</text>

  <!-- Arrow 1→2 -->
  <line class="arrow-line" x1="190" y1="165" x2="238" y2="165"/>
  <polygon class="arrow-head" points="238,160 248,165 238,170"/>
  <text class="block-sub" x="215" y="155">700 bar</text>

  <!-- Block 2: Injetores de Plasma -->
  <rect class="block" x="250" y="120" width="160" height="90"/>
  <text class="block-label" x="330" y="155">Injetores de</text>
  <text class="block-label" x="330" y="172">Plasma</text>
  <text class="block-sub" x="330" y="190">8x atomização + pré-ionização</text>
  <text class="part-num" x="330" y="203">NE-PLS-5520</text>

  <!-- Arrow 2→3 -->
  <line class="arrow-line" x1="410" y1="165" x2="458" y2="165"/>
  <polygon class="arrow-head" points="458,160 468,165 458,170"/>
  <text class="block-sub" x="435" y="155">2,4 GHz</text>

  <!-- Block 3: Câmara de Combustão -->
  <rect class="block" x="470" y="100" width="170" height="120" style="stroke-width: 3;"/>
  <text class="block-label" x="555" y="140">Câmara de</text>
  <text class="block-label" x="555" y="157">Combustão</text>
  <text class="block-sub" x="555" y="177">Ionização total</text>
  <text class="block-sub" x="555" y="190">12.000–14.500 K</text>
  <text class="part-num" x="555" y="207">NE-PLS-5530</text>

  <!-- Arrow 3→4 (going down) -->
  <line class="arrow-line" x1="555" y1="220" x2="555" y2="278"/>
  <polygon class="arrow-head" points="550,278 555,288 560,278"/>

  <!-- Block 4: Expansor Térmico -->
  <rect class="block" x="470" y="290" width="170" height="90"/>
  <text class="block-label" x="555" y="325">Expansor</text>
  <text class="block-label" x="555" y="342">Térmico</text>
  <text class="block-sub" x="555" y="360">Convergente-divergente</text>
  <text class="part-num" x="555" y="373">NE-PLS-5580</text>

  <!-- Arrow 4→5 (going down) -->
  <line class="arrow-line" x1="555" y1="380" x2="555" y2="428"/>
  <polygon class="arrow-head" points="550,428 555,438 560,428"/>

  <!-- Block 5: Bocal de Exaustão -->
  <rect class="block" x="470" y="440" width="170" height="90"/>
  <text class="block-label" x="555" y="475">Bocal de</text>
  <text class="block-label" x="555" y="492">Exaustão</text>
  <text class="block-sub" x="555" y="510">Vetorização ±18°</text>
  <text class="part-num" x="555" y="523">NE-PLS-5590</text>

  <!-- Exhaust arrow -->
  <line class="arrow-line" x1="555" y1="530" x2="555" y2="570"/>
  <polygon class="arrow-head" points="550,570 555,580 560,570"/>
  <text class="block-sub" x="555" y="595">EMPUXO: 120–860 kN</text>

  <!-- Support systems on the left side -->

  <!-- Módulo de Ignição -->
  <rect class="block" x="30" y="290" width="160" height="80"/>
  <text class="block-label" x="110" y="320">Módulo de</text>
  <text class="block-label" x="110" y="337">Ignição</text>
  <text class="block-sub" x="110" y="355">45 kV / 1.200 A</text>
  <text class="part-num" x="110" y="365">NE-PLS-5540</text>

  <!-- Arrow Ignição → Câmara -->
  <line class="arrow-line" x1="190" y1="330" x2="370" y2="200"/>
  <line class="arrow-line" x1="370" y1="200" x2="468" y2="165"/>
  <polygon class="arrow-head" points="462,158 470,165 462,172"/>

  <!-- Bobinas de Confinamento -->
  <rect class="block" x="250" y="290" width="160" height="80"/>
  <text class="block-label" x="330" y="320">Bobinas de</text>
  <text class="block-label" x="330" y="337">Confinamento</text>
  <text class="block-sub" x="330" y="355">8,5 Tesla</text>
  <text class="part-num" x="330" y="365">NE-PLS-5570</text>

  <!-- Arrow Bobinas → Câmara -->
  <line class="arrow-line" x1="410" y1="310" x2="468" y2="200"/>
  <polygon class="arrow-head" points="462,194 470,198 465,207"/>

  <!-- Sistema de Refrigeração -->
  <rect class="block" x="30" y="440" width="160" height="80"/>
  <text class="block-label" x="110" y="470">Sistema de</text>
  <text class="block-label" x="110" y="487">Refrigeração</text>
  <text class="block-sub" x="110" y="505">Circuito fechado</text>
  <text class="part-num" x="110" y="515">NE-PLS-5560</text>

  <!-- Arrow Refrigeração → Câmara -->
  <line class="arrow-line" x1="190" y1="465" x2="380" y2="410"/>
  <line class="arrow-line" x1="380" y1="410" x2="470" y2="210" style="stroke-dasharray: 6,3;"/>

  <!-- MCP (Controlador) -->
  <rect class="block" x="250" y="440" width="160" height="80" style="stroke-dasharray: 4,2;"/>
  <text class="block-label" x="330" y="470">MCP — Controle</text>
  <text class="block-label" x="330" y="487">de Propulsão</text>
  <text class="block-sub" x="330" y="505">SpaceCAN-FD</text>
  <text class="part-num" x="330" y="515">NE-CTR-2200</text>

  <!-- Dashed lines from MCP to all blocks -->
  <line x1="330" y1="440" x2="330" y2="372" style="stroke:#1a1a1a; stroke-width:1; stroke-dasharray:3,3;"/>
  <line x1="330" y1="440" x2="110" y2="372" style="stroke:#1a1a1a; stroke-width:1; stroke-dasharray:3,3;"/>
  <line x1="410" y1="460" x2="470" y2="340" style="stroke:#1a1a1a; stroke-width:1; stroke-dasharray:3,3;"/>

  <!-- Legend -->
  <line x1="30" y1="570" x2="60" y2="570" style="stroke:#1a1a1a; stroke-width:2;"/>
  <text x="65" y="574" style="font-size:10px; fill:#555;">Fluxo de combustível / energia</text>
  <line x1="220" y1="570" x2="250" y2="570" style="stroke:#1a1a1a; stroke-width:1; stroke-dasharray:3,3;"/>
  <text x="255" y="574" style="font-size:10px; fill:#555;">Sinal de controle (SpaceCAN-FD)</text>
</svg>
